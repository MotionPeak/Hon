# electron-builder config — produces a .dmg for macOS, a .exe NSIS installer
# for Windows, and an .AppImage for Linux from a single source tree.
#
# Run from this folder:   npm run dist          (current OS only)
#                          npm run dist:mac     (macOS, only works on a Mac)
#                          npm run dist:win     (Windows)
#                          npm run dist:linux   (Linux)
#
# CI (.github/workflows/release.yml) runs one of these per OS in parallel
# on a tag push.

appId: com.shaharsolomons.hon
productName: Hon
copyright: © 2026 Shahar Solomons

# Where to find the sources. The Electron app lives in this `electron/` folder;
# the sidecar source it spawns lives one level up. Both ride along in the build.
directories:
  output: dist
  buildResources: build

# Files to include in the app bundle's own directory ("app.asar" by default).
# Just the Electron shell — the sidecar is shipped separately under resources/
# so its node_modules (with native binaries) aren't packed into asar.
files:
  - main.cjs
  - package.json

# The sidecar is copied verbatim into Resources/sidecar inside the app bundle.
# `main.cjs` resolves it via `process.resourcesPath` in production.
extraResources:
  - from: ../sidecar
    to: sidecar
    filter:
      - "**/*"
      - "!**/.DS_Store"
      - "!**/*.log"
      - "!**/.env"
      - "!**/.env.local"
      # The dev launchers are not used inside the packaged app.
      - "!web.mjs"
      - "!web.sh"
      - "!web.cmd"
      - "!Dockerfile"
      - "!docker-compose.yml"
      - "!.dockerignore"
      - "!.env.example"
      # Local financial data and the failure-screenshot dump are runtime-only.
      - "!*.db"
      - "!*.db-shm"
      - "!*.db-wal"
      - "!debug"
      - "!models"

# --- macOS -----------------------------------------------------------------
# Currently shipped UNSIGNED — first launch needs a right-click → Open
# (or "Open Anyway" from System Settings → Privacy & Security), same UX
# as the unsigned Windows build. To sign + notarize once you have a paid
# Apple Developer ID Application cert, restore the block below and set
# CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
# APPLE_TEAM_ID as repo secrets in .github/workflows/release.yml:
#
#   hardenedRuntime: true
#   gatekeeperAssess: false
#   entitlements: build/entitlements.mac.plist
#   entitlementsInherit: build/entitlements.mac.plist
#   notarize: true
#
# (hardenedRuntime + notarize both require a real signing cert, so leaving
# them on with empty secrets makes electron-builder fail mid-build.)
mac:
  category: public.app-category.finance
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # Skip the local keychain — CI runners have none and probing for one
  # adds nothing useful when we're explicitly shipping unsigned.
  identity: null
  # File name says the OS up front so the GitHub Releases page reads
  # without anyone needing to know that .dmg == macOS. Apple Silicon
  # gets `arm64`, Intel gets `x64`.
  artifactName: ${productName}-macOS-${arch}-${version}.${ext}

dmg:
  title: ${productName} ${version}

# --- Windows ---------------------------------------------------------------
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Windows-${version}-Setup.${ext}
  # Unsigned — SmartScreen shows "Windows protected your PC" on first run,
  # user clicks "More info → Run anyway". Authenticode signing is a paid
  # follow-up.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Hon

# --- Linux -----------------------------------------------------------------
linux:
  category: Office;Finance
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: ${productName}-Linux-${version}.${ext}
  # AppImages just need `chmod +x` on first run — most file managers handle
  # this automatically. No installer or trust ceremony.
