# Run Hon on a NAS or home server.
#
#   1. cp .env.example .env   and set a long random HON_TOKEN
#   2. docker compose up -d --build
#
# Reach it at  http://<server>:4000/#token=<HON_TOKEN>
# Keep <server> on your LAN or a private VPN (Tailscale, WireGuard) — never
# port-forward this to the public internet.
services:
  hon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hon
    restart: unless-stopped
    ports:
      # host:container — change the host side to move it off 4000.
      - "4000:4000"
    environment:
      # Required. Compose aborts if HON_TOKEN is missing from .env.
      HON_TOKEN: ${HON_TOKEN:?set HON_TOKEN in .env — see .env.example}
    volumes:
      # The vault, SQLite database and downloaded AI models persist here.
      - hon-data:/data

volumes:
  hon-data:
