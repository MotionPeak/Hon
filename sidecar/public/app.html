<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hon · &#x05D4;&#xFB4B;&#x05DF;</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='b' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23fcb932'/%3E%3Cstop offset='100%25' stop-color='%23d4831a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23b)'/%3E%3Cg fill='none' stroke='%231a1612' stroke-width='3.4' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M8.5 12.4 L24 8.8'/%3E%3Cpath d='M8.5 12.4 L8.5 24'/%3E%3Cpath d='M24 14.6 L24 24'/%3E%3C/g%3E%3Ccircle cx='24' cy='8.8' r='1.8' fill='%231a1612'/%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #1a1612; --bg-elev: #221c16; --card: #2a231b; --card-hi: #352b21;
    --hairline: rgba(252,233,194,0.08); --hairline-2: rgba(252,233,194,0.17);
    --text: #faf3e5; --muted: rgba(250,243,229,0.62); --faint: rgba(250,243,229,0.42);
    --brand: #fcb932; --accent: #fcb932; --accent-soft: rgba(252,185,50,0.16);
    --green: #4fcf8a; --amber: #f59842; --red: #f4685a;
    --indigo: #8b8dff; --indigo-soft: rgba(139,141,255,0.16);
    --grad-1: #fcb932; --grad-2: #d4831a;
    /* Chart palette — bright enough to pop on the dark card background. */
    --chart-up: #4fe39a; --chart-up-glow: rgba(79,227,154,0.45);
    --chart-down: #ff7a6a; --chart-down-glow: rgba(255,122,106,0.42);
    --chart-grid: rgba(250,243,229,0.06);
    --shadow: 0 10px 30px rgba(0,0,0,0.48); --shadow-sm: 0 2px 10px rgba(0,0,0,0.34);
    --scrim: rgba(14,11,7,0.82);
  }
  [data-theme="light"] {
    --bg: #faf6ee; --bg-elev: #ffffff; --card: #ffffff; --card-hi: #f4ecda;
    --hairline: rgba(60,40,20,0.10); --hairline-2: rgba(60,40,20,0.18);
    --text: #2a1f14; --muted: rgba(42,31,20,0.62); --faint: rgba(42,31,20,0.44);
    --brand: #c98a16; --accent: #c98a16; --accent-soft: rgba(201,138,22,0.12);
    --green: #16a85c; --amber: #cf6f1c; --red: #d8473a;
    --indigo: #5b5dd8; --indigo-soft: rgba(91,93,216,0.12);
    --grad-1: #f0a020; --grad-2: #fcc04a;
    --chart-up: #16a85c; --chart-up-glow: rgba(22,168,92,0.34);
    --chart-down: #d8473a; --chart-down-glow: rgba(216,71,58,0.34);
    --chart-grid: rgba(42,31,20,0.07);
    --shadow: 0 12px 32px rgba(70,50,20,0.14); --shadow-sm: 0 2px 12px rgba(70,50,20,0.09);
    --scrim: rgba(50,35,15,0.55);
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(1100px 600px at 12% -10%, rgba(252,185,50,0.10), transparent 60%),
      radial-gradient(900px 500px at 105% 115%, rgba(212,131,26,0.08), transparent 60%),
      var(--bg);
    color: var(--text); min-height: 100vh;
    font: 15px/1.5 -apple-system, "SF Pro Text", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    transition: background-color .3s ease, color .3s ease;
  }
  a { color: var(--accent); }

  /* --- Shell ------------------------------------------------------------- */
  #app { display: flex; flex-direction: column; min-height: 100vh;
    padding: 0 26px 48px; }

  header {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 12px;
    padding: 16px 0 14px; margin-bottom: 8px;
    background: var(--bg); border-bottom: 1px solid var(--hairline);
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  /* Logo badge — amber rounded square with a stylized Hebrew ה (heh, the
     first letter of הון / "wealth") whose top bar tilts upward as a subtle
     growth motif. A small dot at the upper-right tip reads as both the
     letter's natural geresh and a milestone marker on the trend line. */
  .brand-mark { width: 38px; height: 38px; border-radius: 11px;
    background:
      radial-gradient(120% 100% at 0% 0%, rgba(255,255,255,0.30), transparent 60%),
      linear-gradient(135deg, var(--grad-1), var(--grad-2));
    box-shadow: 0 4px 14px rgba(252,185,50,0.42),
                0 0 0 2px rgba(252,185,50,0.10),
                inset 0 1px 0 rgba(255,255,255,0.30);
    display: inline-flex; align-items: center; justify-content: center;
    padding: 5px; flex: 0 0 auto;
    transition: transform .25s cubic-bezier(.2,.8,.2,1); }
  .brand-mark svg { display: block; width: 100%; height: 100%; }
  .brand:hover .brand-mark { transform: rotate(-4deg) scale(1.05); }
  /* Wordmark — English "Hon" stacked over the Hebrew "הוֹן" so the bilingual
     signature reads as a unit and the Hebrew sits at the same x-height as
     the engine version label sitting to its right. */
  .brand-words { display: flex; flex-direction: column; gap: 1px;
    line-height: 1; }
  h1 { font: 800 22px/1 ui-rounded, "SF Pro Rounded", system-ui;
    color: var(--brand); letter-spacing: .3px; margin: 0; }
  /* Hebrew "הוֹן" sitting under the wordmark. Font stack picks SF Hebrew
     (macOS/iOS) first — it renders the precomposed vav-with-holam glyph
     (U+FB4B) correctly, sidestepping the combining-mark "tofu" box some
     fonts show. Falls back through Arial Hebrew (built into macOS) and
     Heebo (a modern Hebrew sans) for everywhere else. */
  .brand-he { font: 700 14px/1 -apple-system, BlinkMacSystemFont,
    "SF Hebrew", "Arial Hebrew", "Heebo", "Assistant",
    system-ui, sans-serif;
    color: var(--muted); letter-spacing: .3px; direction: rtl;
    margin-top: 3px; }
  #engine { color: var(--faint); font-size: 12px; }
  .spacer { margin-left: auto; }

  .shell { display: grid; grid-template-columns: 196px minmax(0,1fr) 340px;
    gap: 22px; align-items: start;
    transition: grid-template-columns .3s ease; }
  .shell.collapsed { grid-template-columns: 196px minmax(0,1fr) 0px; }
  .shell.collapsed #sidebar { opacity: 0; pointer-events: none; }
  .shell.bare { grid-template-columns: 1fr; }
  .shell.bare #nav, .shell.bare #sidebar { display: none; }
  #content { min-width: 0; }
  #sidebar { position: sticky; top: 78px; display: flex; flex-direction: column;
    gap: 14px; overflow: hidden; transition: opacity .22s ease; }
  @media (max-width: 860px) {
    .shell, .shell.collapsed { grid-template-columns: 1fr; }
    #nav, #sidebar { position: static; }
    .shell.collapsed #sidebar { display: none; }
  }

  /* --- Buttons ----------------------------------------------------------- */
  button {
    background: var(--card); color: var(--text);
    border: 1px solid var(--hairline-2); border-radius: 9px;
    padding: 8px 14px; font: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
    transition: transform .12s ease, border-color .15s, background .15s, opacity .15s;
  }
  button:hover { border-color: var(--accent); }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .42; cursor: default; transform: none; }
  button.primary { background: var(--accent); border-color: transparent;
    color: #fff; box-shadow: 0 4px 14px var(--accent-soft); }
  button.primary:hover { filter: brightness(1.08); }
  button.danger { color: var(--red); }
  button.danger:hover { border-color: var(--red); }
  button.mini { padding: 5px 11px; font-size: 12px; }
  button.block { width: 100%; padding: 11px; font-size: 14px; }
  .icon-btn { width: 36px; height: 36px; padding: 0; font-size: 15px;
    display: inline-flex; align-items: center; justify-content: center; }

  /* --- Nav --------------------------------------------------------------- */
  /* Left navigation rail */
  #nav { display: flex; flex-direction: column; gap: 5px;
    position: sticky; top: 78px; }
  #nav button {
    display: flex; align-items: center; gap: 11px; width: 100%;
    padding: 11px 13px; border-radius: 12px; text-align: left;
    background-color: transparent; border: 1px solid transparent;
    color: var(--muted); font-size: 14px; font-weight: 600; position: relative;
    transition: color .2s ease, background-color .2s ease, border-color .2s ease,
      transform .16s ease, box-shadow .2s ease;
  }
  #nav button .rn-ico { font-size: 17px; line-height: 1;
    transition: transform .26s cubic-bezier(.34,1.7,.6,1); }
  /* Accent bar that slides in from the left edge on hover. */
  #nav button::before {
    content: ""; position: absolute; left: 0; top: 50%;
    width: 3px; height: 0; border-radius: 0 3px 3px 0;
    background: var(--accent); transform: translateY(-50%);
    transition: height .24s ease;
  }
  #nav button:hover {
    color: var(--text); background-color: var(--card-hi);
    border-color: var(--hairline); transform: translateX(4px);
  }
  #nav button:hover .rn-ico { transform: scale(1.22) rotate(-7deg); }
  #nav button:hover::before { height: 54%; }
  #nav button.active {
    color: #fff; transform: none; border-color: transparent;
    background: linear-gradient(135deg, var(--accent), #d4831a);
    box-shadow: 0 8px 20px var(--accent-soft);
  }
  #nav button.active::before { height: 0; }
  #nav button.active .rn-ico { transform: scale(1.08); }

  /* --- Cards & sections -------------------------------------------------- */
  .label { font: 700 11px/1 system-ui; letter-spacing: 1.4px;
    color: var(--faint); text-transform: uppercase; }
  section { margin-bottom: 18px; }
  .card { background: var(--card); border: 1px solid var(--hairline);
    border-radius: 18px; padding: 18px 20px; box-shadow: var(--shadow-sm);
    transition: transform .16s ease, box-shadow .16s ease, background-color .3s; }
  .card h3 { font-size: 15px; font-weight: 700; }
  .card .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .card-head .spacer { margin-left: auto; }
  .ov-stack { display: flex; flex-direction: column; gap: 18px; }
  /* Big top-of-overview balance card: expected income minus actual spend.
   * Green when positive, red when over. The figure is the headline; income
   * and spent appear smaller below it. */
  .balance-card { text-align: center; padding: 22px 18px 20px; }
  .balance-head { font-size: 11px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .balance-num { font-size: 42px; font-weight: 800;
    font-variant-numeric: tabular-nums; letter-spacing: -0.5px; line-height: 1; }
  .balance-num.good { color: var(--green); }
  .balance-num.bad { color: var(--red); }
  .balance-cap { color: var(--muted); font-size: 13px; margin-top: 8px; }
  .balance-line { color: var(--muted); font-size: 12.5px; margin-top: 12px;
    display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
  .balance-line b { color: var(--text); font-weight: 700; }
  .balance-sep { opacity: 0.5; }
  /* Forward-look strip under the balance headline: end-of-cycle bank
   * projection + delta against the current balance. Sits inside the same
   * card with a hairline divider for visual separation. */
  .balance-sub { margin-top: 18px; padding-top: 16px;
    border-top: 1px solid var(--hairline); }
  .balance-sub-head { font-size: 11px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .balance-sub-row { display: flex; align-items: baseline;
    justify-content: center; gap: 12px; }
  .balance-sub-num { font-size: 22px; font-weight: 800;
    font-variant-numeric: tabular-nums; }
  .balance-sub-delta { font-size: 14px; font-weight: 700; }
  .balance-sub-delta.good { color: var(--green); }
  .balance-sub-delta.bad { color: var(--red); }
  .balance-sub-line { color: var(--muted); font-size: 12px; margin-top: 8px;
    line-height: 1.45; }
  .balance-sub-line b { color: var(--text); font-weight: 700; }
  /* Itemised breakdown of the projected change — one row per ±component,
     so a wrong projection is identifiable at a glance instead of just a
     mystery headline. */
  .balance-details { display: flex; flex-direction: column; gap: 4px;
    margin-top: 10px; padding-top: 10px;
    border-top: 1px dashed var(--hairline); }
  .balance-detail { display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted); }
  .balance-detail-amt { font-weight: 700; font-variant-numeric: tabular-nums; }
  .balance-detail-amt.good { color: var(--green); }
  .balance-detail-amt.bad { color: var(--red); }
  .ov-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
    align-items: start; }
  .ov-grid > section { margin-bottom: 0; }
  @media (max-width: 940px) { .ov-grid { grid-template-columns: 1fr; } }
  .sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .sec-head .spacer { margin-left: auto; }

  /* --- Fixed-bills view (Expected fixed visualised) ----------------------- */
  .rec-grand { font: 800 18px/1 ui-rounded, "SF Pro Rounded", system-ui;
    color: var(--text); font-variant-numeric: tabular-nums; }
  /* Essentials block on the Fixed-bills page — visually a sibling of the
     merchant sections, but slightly muted to read as "this is a budget, not
     a per-merchant rollup". A coloured dot keys each row to its category. */
  .rec-section-essentials { background: var(--card-hi);
    border-color: var(--hairline-2); }
  .rec-essential-dot { display: inline-block; width: 9px; height: 9px;
    border-radius: 50%; flex: none; }
  .rec-section-note { font-size: 11.5px; color: var(--muted); margin-top: 10px;
    padding-top: 9px; border-top: 1px dashed var(--hairline);
    line-height: 1.5; }
  /* Bottom totals strip: fixed + essentials = Overview headline, three
     boxes joined by + and = so the math reads at a glance. */
  .rec-totals { display: flex; align-items: stretch; gap: 6px;
    margin-top: 14px; flex-wrap: wrap; }
  .rec-totals-cell { display: flex; flex-direction: column; gap: 4px;
    padding: 12px 16px; border-radius: 12px; background: var(--bg-elev);
    border: 1px solid var(--hairline); flex: 1; min-width: 130px; }
  .rec-totals-final { border-color: var(--indigo); background: var(--indigo-soft); }
  .rec-totals-k { font-size: 10.5px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em; }
  .rec-totals-v { font: 800 17px/1 ui-rounded, "SF Pro Rounded", system-ui;
    color: var(--text); font-variant-numeric: tabular-nums; }
  .rec-totals-op { align-self: center; font: 700 18px/1 ui-rounded,
    "SF Pro Rounded", system-ui; color: var(--muted); padding: 0 4px; }
  /* Dual-total header: actual-this-cycle (the headline-matching figure)
     on the left, projected (merchant amortization) on the right, with the
     primary one slightly larger so the reconciliation number reads first. */
  .rec-grand-pair { display: flex; gap: 18px; align-items: flex-end; }
  .rec-grand-item { display: flex; flex-direction: column; align-items: flex-end;
    gap: 2px; }
  .rec-grand-num { font: 800 18px/1 ui-rounded, "SF Pro Rounded", system-ui;
    color: var(--text); font-variant-numeric: tabular-nums; }
  .rec-grand-num.muted { color: var(--muted); font-size: 14px; font-weight: 700; }
  .rec-grand-item.primary .rec-grand-num { font-size: 20px; }
  .rec-grand-lab { font-size: 10px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .rec-mismatch { background: rgba(245,181,74,0.10);
    border: 1px solid rgba(245,181,74,0.25);
    color: var(--amber); border-radius: 10px; padding: 10px 13px;
    font-size: 12px; line-height: 1.5; margin: -4px 0 12px; }
  .rec-grand .rec-unit, .rec-amount .rec-unit, .rec-cat-total .rec-unit {
    font-size: 10px; font-weight: 600; color: var(--muted);
    margin-left: 3px; text-transform: lowercase; letter-spacing: 0; }
  .rec-section { background: var(--bg-elev); border: 1px solid var(--hairline);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; }
  .rec-cat-head { display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px; padding-bottom: 9px;
    border-bottom: 1px dashed var(--hairline); }
  .rec-cat-icon { width: 26px; height: 26px; border-radius: 8px;
    background: color-mix(in srgb, var(--cat-color) 18%, transparent);
    color: var(--cat-color); display: flex; align-items: center;
    justify-content: center; font-size: 14px; line-height: 1;
    border: 1px solid color-mix(in srgb, var(--cat-color) 30%, transparent); }
  .rec-cat-name { font-size: 13px; font-weight: 700; color: var(--text);
    letter-spacing: 0.02em; }
  .rec-cat-count { font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 999px; background: var(--card-hi); color: var(--muted); }
  .rec-cat-total { margin-left: auto; font: 700 14px/1 ui-rounded,
    "SF Pro Rounded", system-ui; color: var(--text);
    font-variant-numeric: tabular-nums; }
  .rec-list { display: flex; flex-direction: column; gap: 2px; }
  /* A small "Billed / Not yet billed / Off-cycle" tag beside each recurring
   * fixed-bill merchant in the Fixed bills view. */
  .rec-tag { display: inline-block; font-size: 10px; font-weight: 700;
    letter-spacing: .03em; padding: 2px 7px; border-radius: 999px;
    margin-inline-start: 6px; vertical-align: 2px; white-space: nowrap; }
  .rec-tag-good { color: var(--green); background: rgba(61,220,132,0.16); }
  .rec-tag-warn { color: var(--amber); background: rgba(245,181,74,0.16); }
  .rec-tag-muted { color: var(--muted); background: var(--card-hi); }
  .rec-row { display: flex; align-items: center; gap: 12px;
    padding: 9px 10px; border-radius: 9px; cursor: pointer;
    transition: background-color .12s; }
  .rec-row:hover { background: var(--card-hi); }
  .rec-main { flex: 1; min-width: 0; }
  .rec-name { font-size: 14px; font-weight: 600; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rec-meta { font-size: 11.5px; color: var(--muted); margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rec-amount { font: 700 14px/1 ui-rounded, "SF Pro Rounded", system-ui;
    color: var(--text); font-variant-numeric: tabular-nums;
    white-space: nowrap; flex: none; }
  .rec-amount.good { color: var(--green); }
  .rec-tot-row b.good { color: var(--green); }
  /* ✕ removes a merchant from the Fixed-bills view (and from Expected fixed).
     Subtle until the row is hovered, then becomes a clear red affordance —
     same pattern as the categories ✕. */
  .rec-remove { width: 24px; height: 24px; border-radius: 50%;
    border: none; background: rgba(0,0,0,0.25); color: rgba(255,255,255,0.55);
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 11px; line-height: 1; padding: 0;
    opacity: 0; flex: none; margin-left: 4px;
    transition: opacity .14s, background-color .14s, color .14s, transform .12s; }
  .rec-row:hover .rec-remove { opacity: 1; color: #fff; }
  .rec-remove:hover { background: var(--red); color: #fff; transform: scale(1.1); }
  /* ÷N pill — click to set how many people split the bill. Lit up when the
     split is active (>1), muted-outline when 1 (no split). */
  .rec-split { padding: 4px 9px; border-radius: 999px; border: 1px solid var(--hairline-2);
    background: transparent; color: var(--muted); cursor: pointer;
    font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums;
    flex: none; margin-left: 6px; line-height: 1.2;
    transition: border-color .14s, color .14s, background-color .14s, transform .12s; }
  .rec-split:hover { border-color: var(--indigo); color: var(--text); }
  .rec-split.on { border-color: var(--indigo); background: var(--indigo-soft);
    color: var(--text); }
  .rec-amount-full { font-size: 10.5px; font-weight: 600; color: var(--muted);
    text-decoration: line-through; margin-top: 3px; }
  /* Section-total full-bill subline when a category split is active. */
  .rec-cat-total-full { display: block; font-size: 10.5px; font-weight: 600;
    color: var(--muted); text-decoration: line-through; margin-top: 3px;
    letter-spacing: 0; text-transform: none; text-align: right; }
  /* Split-modal preview line — appears below the people-count input. */
  .sp-preview { font-size: 12.5px; color: var(--muted); padding: 10px 12px;
    background: var(--card-hi); border-radius: 9px; margin: 4px 0 8px;
    line-height: 1.5; }

  /* --- Net worth banner -------------------------------------------------- */
  .networth { position: relative; overflow: hidden; isolation: isolate;
    background: linear-gradient(140deg, var(--grad-1) 0%, var(--grad-2) 100%);
    border-radius: 22px; padding: 24px 26px 22px; color: #fff;
    box-shadow: var(--shadow); margin-bottom: 18px; }
  /* Single soft top-right highlight instead of the dueling radials that
     left a diagonal band cutting the gradient in two. */
  .networth::before { content: ""; position: absolute; inset: 0;
    background: radial-gradient(80% 60% at 95% -20%,
      rgba(255,255,255,0.22), transparent 60%);
    pointer-events: none; z-index: 0; }
  .networth > * { position: relative; z-index: 1; }
  .networth .label { color: rgba(255,255,255,0.72); font-weight: 700;
    letter-spacing: 1.4px; text-transform: uppercase; font-size: 11px; }
  .nw-total { font: 800 48px/1.05 ui-rounded, "SF Pro Rounded", system-ui;
    margin-top: 8px; letter-spacing: -.5px; font-variant-numeric: tabular-nums; }
  .nw-total.neg { color: #ffd7d1; }
  /* Stacked allocation bar — one coloured segment per positive source.
     A single glance reveals how the net worth is composed. */
  .nw-alloc { position: relative; display: flex; height: 9px; margin-top: 18px;
    border-radius: 999px; overflow: hidden; background: rgba(0,0,0,0.18); }
  .nw-alloc-seg { height: 100%; transition: width .35s ease; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .chip { background: rgba(255,255,255,0.16); border-radius: 999px;
    padding: 5px 12px; font-size: 13px; font-weight: 600;
    backdrop-filter: blur(8px); }
  .nw-sub { color: rgba(255,255,255,0.78); font-size: 12.5px; margin-top: 16px;
    position: relative; }
  /* Breakdown rows — spacing-based rhythm, no horizontal rules. The earlier
     1px top-borders on each row read as harsh lines cutting the gradient. */
  .nw-breakdown { position: relative; margin-top: 14px;
    display: flex; flex-direction: column; gap: 2px; }
  .nw-bd-row { display: flex; align-items: center; gap: 10px;
    padding: 8px 4px; font-size: 13px; border-radius: 8px;
    transition: background .15s ease; }
  .nw-bd-row:hover { background: rgba(255,255,255,0.06); }
  .nw-bd-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .nw-bd-ico { font-size: 14px; width: 19px; flex: 0 0 auto; text-align: center;
    opacity: .9; }
  .nw-bd-name { flex: 1; min-width: 0; color: rgba(255,255,255,0.94);
    font-weight: 600; }
  .nw-bd-amt { font: 700 13.5px/1 ui-rounded, "SF Pro Rounded", system-ui;
    font-variant-numeric: tabular-nums; }
  .nw-bd-amt.neg { color: #ffd7d1; }
  .nw-bd-pct { width: 38px; text-align: right; font-size: 11.5px;
    font-weight: 700; color: rgba(255,255,255,0.65);
    font-variant-numeric: tabular-nums; }

  /* --- Generic rows ------------------------------------------------------ */
  .row { display: flex; justify-content: space-between; align-items: center;
    gap: 12px; padding: 10px 0; border-top: 1px solid var(--hairline); }
  .list .row:first-child { border-top: 0; }
  .row .name { font-size: 14px; font-weight: 500; }
  .row .secondary { color: var(--faint); font-size: 12px; margin-top: 2px; }
  .amount { font: 700 14px/1 ui-rounded, "SF Pro Rounded", system-ui;
    white-space: nowrap; }
  .bal-edit { cursor: pointer; border-radius: 6px; padding: 3px 6px;
    margin: -3px -6px; transition: background-color .14s; }
  .bal-edit:hover { background: var(--card-hi); }
  .row-end { display: flex; align-items: center; gap: 10px; flex: none; }
  .nw-pill { display: inline-flex; align-items: center; gap: 5px;
    font-size: 10.5px; font-weight: 600; color: var(--muted);
    padding: 3px 8px 3px 6px; border-radius: 999px; cursor: pointer;
    border: 1px solid var(--hairline-2); user-select: none;
    white-space: nowrap; flex: none;
    transition: border-color .14s, color .14s, background-color .14s; }
  .nw-pill:hover { border-color: var(--accent); color: var(--text); }
  .nw-pill.on { color: var(--text); border-color: var(--accent);
    background: var(--accent-soft); }
  .nw-pill .nw-tick { width: 12px; height: 12px; margin: 0; flex: none;
    cursor: pointer; accent-color: var(--accent); }
  .row.nw-off { opacity: 0.55; }
  .row.nw-off .amount { text-decoration: line-through; }
  .asset-card.nw-off .conn-total { text-decoration: line-through; opacity: 0.6; }
  /* Loan card — debt visualised with a progress bar, monthly payment, and
     a coloured pill for the rate track (fixed / prime / CPI-linked).
     Entry animations are scoped to `.tab-enter` so they fire once on tab
     navigation, not on every re-render — without the scope, sync polling
     would replay them every 1.5s and the card would flash. */
  @keyframes loan-card-in { from { opacity: 0; transform: translateY(8px); } }
  @keyframes loan-bar-fill { from { width: 0; } }
  .tab-enter .loan-card { animation: loan-card-in .35s ease-out; }
  .loan-card .conn-total { color: var(--red); }
  .loan-card.nw-off { opacity: 0.65; }
  .loan-card.nw-off .conn-total { text-decoration: line-through; opacity: 0.6; }
  .loan-bar { height: 8px; background: var(--card-hi); border-radius: 999px;
    overflow: hidden; margin: 14px 0 12px; }
  .loan-bar > span { display: block; height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--indigo), #5c51c4); }
  .tab-enter .loan-bar > span {
    animation: loan-bar-fill 1.1s cubic-bezier(.2,.7,.2,1); }
  .loan-stats { display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px 14px; margin-top: 4px; }
  .loan-stat label { display: block; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
  .loan-stat b { display: block; font-size: 14px; font-weight: 700;
    margin-top: 3px; }
  .loan-stat .muted { color: var(--muted); font-weight: 500; font-size: 12px; }
  /* A subtle "over the full term" summary under the stats grid — lifetime
   * cost and interest, computed from the current monthly payment, so they
   * follow CPI/prime as the rate moves. */
  .loan-life { display: flex; flex-wrap: wrap; gap: 4px 12px; margin-top: 10px;
    padding-top: 10px; border-top: 1px solid var(--hairline);
    font-size: 12px; color: var(--muted); }
  .loan-life b { color: var(--text); font-weight: 700; }
  .loan-pill { display: inline-block; font-size: 11px; font-weight: 700;
    padding: 2px 9px; border-radius: 999px; vertical-align: middle; }
  .loan-pill.fixed { color: var(--text); background: var(--card-hi); }
  .loan-pill.prime { color: var(--amber); background: rgba(245,181,74,0.16); }
  .loan-pill.cpi-fixed { color: var(--green); background: rgba(61,220,132,0.16); }
  .loan-pill.cpi-prime { color: #b97aff; background: rgba(185,122,255,0.16); }
  /* Loan form: side-by-side fields + a stack of selectable track cards. */
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .loan-tracks { display: grid; gap: 8px; }
  .loan-track { display: grid; grid-template-columns: 22px 1fr; align-items: start;
    gap: 10px; padding: 12px 14px; border: 1px solid var(--hairline-2);
    border-radius: 12px; cursor: pointer; transition: border-color .14s,
    background-color .14s; }
  .loan-track:hover { border-color: var(--indigo); }
  .loan-track:has(input:checked) { border-color: var(--indigo);
    background: var(--indigo-soft); }
  .loan-track input { margin: 2px 0 0; accent-color: var(--indigo); }
  .lt-title { display: block; font-weight: 700; font-size: 13px; }
  .lt-sub { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; }
  .pos { color: var(--green); }
  .empty { color: var(--muted); font-size: 13px; padding: 14px 2px;
    text-align: center; }
  .pill { display: inline-block; font-size: 11px; padding: 2px 8px;
    border-radius: 999px; background: var(--accent-soft); color: var(--accent);
    font-weight: 600; }

  .logo { position: relative; flex: 0 0 36px; width: 36px; height: 36px;
    border-radius: 10px; background: var(--card-hi); display: inline-flex;
    align-items: center; justify-content: center; font-size: 18px; overflow: hidden; }
  .logo img { position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; background: #fff; }

  /* --- Connection cards -------------------------------------------------- */
  .conn-accounts { margin-top: 12px; }
  .conn-foot { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 13px;
    padding-top: 13px; border-top: 1px solid var(--hairline); }
  .conn-total { margin-left: auto; align-self: center; font-weight: 700;
    font-family: ui-rounded, "SF Pro Rounded", system-ui; }
  .neg, .amount.neg, .conn-total.neg { color: var(--red); }
  .conn-spend { display: flex; justify-content: space-between;
    font-size: 12.5px; font-weight: 600; color: var(--muted);
    margin-top: 13px; padding-top: 13px; border-top: 1px solid var(--hairline); }
  .conn-spend .conn-spend-amt { font-weight: 800; color: var(--text);
    font-family: ui-rounded, "SF Pro Rounded", system-ui; }

  /* --- Activity ---------------------------------------------------------- */
  .act-bar { display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    margin-bottom: 18px; }
  .month-pick { display: flex; align-items: center; background: var(--card-hi);
    border-radius: 11px; padding: 3px; }
  .month-pick .icon-btn { width: 30px; height: 30px; font-size: 19px;
    background: transparent; border: 0; border-radius: 8px; color: var(--muted); }
  .month-pick .icon-btn:hover:not(:disabled) { background: var(--bg-elev);
    color: var(--text); border: 0; }
  .month-pick .icon-btn:disabled { opacity: .26; cursor: default; }
  .month-label { font: 700 13.5px/1.15 ui-rounded, "SF Pro Rounded", system-ui;
    min-width: 134px; text-align: center; padding: 0 4px; }
  .act-meta { display: flex; flex-direction: column; gap: 1px; line-height: 1.25; }
  .act-count { color: var(--muted); font-size: 12.5px; font-weight: 600; }
  .act-hidden { color: var(--faint); font-size: 11px; font-weight: 600; }
  .act-cat { color: var(--amber); font-size: 11px; font-weight: 700; }
  .act-cat .spin { display: inline-block; animation: spin 1s linear infinite; }
  /* Activity search box — a pill that lives in the act-bar; typing in it
   * switches the tab to a cross-month flat list of matches. */
  .act-search { display: flex; align-items: center; gap: 6px;
    background: var(--card-hi); border-radius: 999px; padding: 5px 12px;
    flex: 0 1 240px; min-width: 0; }
  .act-search-ico { color: var(--muted); font-size: 14px; line-height: 1; }
  .act-search input { width: 100%; background: transparent; border: 0;
    color: var(--text); font-size: 12.5px; outline: none; padding: 0; }
  .act-search input::placeholder { color: var(--muted); }
  .act-search input::-webkit-search-cancel-button { display: none; }
  .act-search-clear { background: transparent; border: 0; color: var(--muted);
    cursor: pointer; padding: 0; font-size: 16px; line-height: 1; }
  .act-search-clear:hover { color: var(--text); }
  /* Per-type section on the Assets page. Sections sit side-by-side in a grid
     so each kind (Banks, Credit cards, ...) takes its own column instead of
     stacking down the page. The grid wraps to one column on narrow screens. */
  .assets-grid { display: grid; gap: 22px; align-items: start;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); }
  .assets-stack { display: flex; flex-direction: column; gap: 14px; }
  .assets-sub-head { display: flex; align-items: center; gap: 8px;
    margin: 0 2px 10px; color: var(--muted); font-size: 11px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; }
  .assets-sub-head .ash-emoji { font-size: 14px; line-height: 1; }
  .assets-sub-head .ash-label { color: var(--text); }
  .assets-sub-head .ash-count { margin-left: auto; opacity: 0.7;
    font-size: 10px; padding: 2px 7px; border-radius: 999px;
    background: var(--card-hi); letter-spacing: 0; }
  .act-cols { display: flex; align-items: flex-start; gap: 18px; }
  .act-col { flex: 1 1 0; min-width: 0; display: flex;
    flex-direction: column; gap: 18px; }
  .act-section.gap { margin-top: 26px; }
  .umbrella { display: flex; align-items: baseline; gap: 10px;
    margin: 0 2px 12px; }
  .umbrella-name { font-size: 12px; font-weight: 700; letter-spacing: .6px;
    text-transform: uppercase; color: var(--faint); }
  /* Spacer between the umbrella name and total — invisible; the wide
     multi-column layout made an actual stroke read as a page divider. */
  .umbrella-line { flex: 1; height: 0; }
  .umbrella-total { font: 800 13px/1 ui-rounded, "SF Pro Rounded", system-ui; }

  /* --- Subscriptions ----------------------------------------------------- */
  .sub-summary, .sub-list { margin-bottom: 14px; }
  .sub-summary { text-align: center; padding: 22px 16px; }
  .sub-big { font: 800 34px/1 ui-rounded, "SF Pro Rounded", system-ui; }
  .sub-per { color: var(--faint); font-size: 14px; font-weight: 600; }
  .sub-summary .meta { margin-top: 6px; }
  .sub-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; }
  .sub-row + .sub-row { border-top: 1px solid var(--hairline); }
  .sub-row.faded { opacity: .55; }
  .sub-list .label { margin-bottom: 8px; }
  .sub-amt { font: 800 14.5px/1 ui-rounded, "SF Pro Rounded", system-ui;
    white-space: nowrap; }
  .sub-amt .sub-per { font-size: 10.5px; margin-left: 1px; }
  .cat-card { padding: 13px 15px 7px; }
  .cat-card.collapsed { padding: 13px 15px; }
  .cat-head { display: flex; align-items: center; gap: 9px; cursor: pointer;
    user-select: none; border-radius: 9px; padding: 4px 6px; margin: -4px -6px;
    transition: background-color .14s; }
  .cat-head:hover { background: var(--card-hi); }
  .cat-card.collapsed .cat-head:hover { background: var(--card-hi); }
  .cat-chev { font-size: 10px; color: var(--faint); flex: 0 0 auto;
    transition: transform .2s ease; }
  .cat-chev.col { transform: rotate(-90deg); }
  .cat-dot { width: 11px; height: 11px; border-radius: 4px; flex: 0 0 auto; }
  .cat-name { font-size: 14px; font-weight: 700; }
  .cat-count { font-size: 11px; font-weight: 700; color: var(--faint);
    background: var(--card-hi); padding: 2px 8px; border-radius: 999px; }
  .cat-head:hover .cat-count { background: var(--bg-elev); }
  .cat-count.has { background: var(--accent-soft); color: var(--accent); }
  .cat-total { margin-left: auto; font: 800 14.5px/1 ui-rounded,
    "SF Pro Rounded", system-ui; }
  .cat-list { margin-top: 5px; }
  .txn { display: flex; align-items: center; gap: 12px; padding: 9px 7px;
    border-radius: 11px; cursor: pointer;
    transition: background .14s ease; }
  .txn + .txn { border-top: 1px solid var(--hairline); }
  .txn:hover { background: var(--card-hi); }
  .txn:hover + .txn { border-top-color: transparent; }
  .txn.sel { background: var(--accent-soft);
    box-shadow: inset 0 0 0 1.5px var(--accent); }
  .txn-icon { flex: 0 0 38px; width: 38px; height: 38px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .txn-main { flex: 1; min-width: 0; }
  .txn-name { font-size: 13.5px; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .txn-sub { color: var(--faint); font-size: 11.5px; margin-top: 2px; }
  .txn-amt { font: 800 14.5px/1 ui-rounded, "SF Pro Rounded", system-ui;
    white-space: nowrap; }
  .txn-amt.pos { color: var(--green); }
  /* Pending charges: the bank hasn't finalised the amount yet, so a "Pending"
     pill stands in for the figure. Subtle so it doesn't shout. */
  .txn-pending { font-size: 11px; font-weight: 700; padding: 4px 9px;
    border-radius: 999px; color: var(--amber);
    background: rgba(245,181,74,0.14); white-space: nowrap; }
  .txn-check { flex: 0 0 21px; width: 21px; height: 21px; border-radius: 7px;
    border: 1.6px solid var(--hairline-2); display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 800; color: #fff;
    transition: background-color .14s, border-color .14s, transform .12s; }
  .txn-check.on { background: var(--accent); border-color: var(--accent);
    transform: scale(1.06); }
  .txn.picked { background: var(--accent-soft); }

  /* --- Batch action bar -------------------------------------------------- */
  .batch-bar { position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%); display: flex; align-items: center; gap: 14px;
    padding: 12px 14px; background: var(--card);
    border: 1px solid var(--hairline-2); border-radius: 16px;
    box-shadow: var(--shadow); z-index: 55; }
  .batch-n { font-weight: 700; font-size: 13px; white-space: nowrap;
    padding-left: 4px; }
  .batch-sep { color: var(--faint); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .4px; margin: 0 -6px; }
  /* Custom category dropdown */
  .bcat { position: relative; }
  .bcat-btn { display: flex; align-items: center; gap: 8px; padding: 8px 11px;
    background: var(--card-hi); border: 1.5px solid var(--hairline-2);
    border-radius: 11px; font-size: 13px; font-weight: 700; min-width: 168px;
    transition: border-color .14s; }
  .bcat-btn:hover, .bcat-btn.open { border-color: var(--accent); }
  .bcat-em { width: 24px; height: 24px; flex: none; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .bcat-chev { margin-left: auto; font-size: 10px; color: var(--faint);
    transition: transform .18s; }
  .bcat-btn.open .bcat-chev { transform: rotate(180deg); }
  .bcat-menu { position: absolute; bottom: calc(100% + 8px); left: 0; right: 0;
    background: var(--card); border: 1px solid var(--hairline-2);
    border-radius: 13px; box-shadow: var(--shadow); padding: 5px;
    max-height: 320px; overflow-y: auto; z-index: 60;
    animation: pop .15s cubic-bezier(.2,.8,.2,1); }
  .bcat-opt { display: flex; align-items: center; gap: 9px; padding: 8px 9px;
    border-radius: 9px; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: background-color .12s; }
  .bcat-opt:hover { background: var(--card-hi); }
  .bcat-opt.on { background: var(--accent-soft); color: var(--accent); }
  .bcat-opt .bcat-check { margin-left: auto; font-weight: 800; }

  /* --- Sidebar ----------------------------------------------------------- */
  .move-cats { display: flex; flex-direction: column; gap: 4px;
    margin: 11px 0; max-height: 320px; overflow-y: auto; }
  .move-cat { display: flex; align-items: center; gap: 9px; width: 100%;
    text-align: left; padding: 9px 11px; border-radius: 10px; font-size: 13px;
    border: 1.5px solid transparent; background: var(--card-hi); }
  .move-cat:hover { border-color: var(--hairline-2); }
  .move-cat.active { border-color: currentColor; font-weight: 700; }
  .move-cat .mc-em { font-size: 15px; }
  .move-cat .mc-check { margin-left: auto; font-weight: 800; opacity: 0;
    transition: opacity .12s; }
  .move-cat.active .mc-check { opacity: 1; }
  .move-txn { display: flex; align-items: center; gap: 11px;
    padding: 11px; background: var(--card-hi); border-radius: 12px;
    margin-bottom: 4px; }
  .always { display: flex; align-items: flex-start; gap: 9px; margin: 4px 0 13px;
    font-size: 12.5px; color: var(--muted); cursor: pointer; }
  .always input { width: auto; margin-top: 1px; flex: 0 0 auto;
    accent-color: var(--accent); }
  .freq-pick { display: flex; gap: 8px; margin: 4px 0 13px; }
  .freq-opt { flex: 1; padding: 8px 6px; font-size: 12.5px; font-weight: 600;
    background: var(--card-hi); border: 1.5px solid transparent;
    border-radius: 9px; color: var(--muted); }
  .freq-opt:hover { border-color: var(--hairline-2); }
  .freq-opt.active { background: var(--accent); border-color: transparent;
    color: #fff; }
  /* Reimbursement / refund linking */
  .sb-label { margin: 13px 0 7px; }
  .rf-hint { font-size: 12px; color: var(--muted); line-height: 1.45;
    margin: 2px 0 9px; }
  .rf-add { background: var(--card-hi); border: 1.5px dashed var(--hairline-2);
    color: var(--muted); font-weight: 600; }
  .rf-add:hover { border-color: var(--accent); color: var(--accent); }
  .rf-list { display: flex; flex-direction: column; gap: 3px;
    max-height: 340px; overflow-y: auto; margin-bottom: 6px; }
  .rf-opt { display: flex; align-items: center; gap: 10px; width: 100%;
    text-align: left; padding: 8px 9px; border-radius: 10px;
    border: 1.5px solid transparent; background: var(--card-hi); }
  .rf-opt:hover { border-color: var(--accent); }
  .txn-icon.sm { flex: 0 0 30px; width: 30px; height: 30px; font-size: 14px;
    border-radius: 9px; }
  .rf-linked { background: var(--card-hi); border-radius: 12px;
    padding: 10px 11px; }
  .rf-linked-row { display: flex; align-items: center; gap: 9px; }
  /* Amount-allocation input on the linked refund card — one transfer can
     split across several expenses, so the user dials in exactly how much
     applies here. */
  .rf-amount-row { display: flex; align-items: center; gap: 10px;
    margin-top: 9px; }
  .rf-amount-lbl { font-size: 11.5px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .4px; }
  .rf-amount-input { flex: 1; display: flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--hairline-2);
    border-radius: 9px; padding: 5px 9px;
    font-variant-numeric: tabular-nums; }
  .rf-amount-input:focus-within { border-color: var(--accent); }
  .rf-amount-input span { color: var(--muted); font-weight: 700; }
  .rf-amount-input input { flex: 1; border: 0; background: transparent;
    padding: 0; font: inherit; color: var(--text); outline: none;
    width: 100%; min-width: 0; }
  .rf-amount-cap { font-size: 11px; color: var(--faint); white-space: nowrap; }
  /* Per-row tag on the picker rows showing the remaining balance / already-
     linked amount, so the user picks the right transfer at a glance. */
  .rf-opt-end { display: flex; flex-direction: column; align-items: flex-end;
    gap: 3px; flex: 0 0 auto; }
  .rf-opt-tag { font-size: 10.5px; font-weight: 700; color: var(--faint);
    letter-spacing: .3px; }
  .rf-opt-tag.on { color: var(--accent); }
  .rf-eff { margin-top: 8px; padding-top: 8px; font-size: 12.5px;
    font-weight: 700; color: var(--green);
    border-top: 1px solid var(--hairline-2); }
  .txn-refund { color: var(--green); font-weight: 600; }
  .ins-body { font-size: 13px; white-space: pre-wrap; color: var(--text);
    line-height: 1.55; }

  /* --- Analytics: spending pie, trend, mini chart ------------------------ */
  .spend-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 4px; }
  .spend-num { font: 800 30px/1 ui-rounded, "SF Pro Rounded", system-ui; }
  .delta { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 999px; }
  .delta.good { color: var(--green); background: rgba(61,220,132,0.15); }
  .delta.bad { color: var(--red); background: rgba(244,104,90,0.15); }

  .pie-wrap { display: flex; justify-content: center; margin: 14px 0 16px; }
  /* SVG donut: each slice animates in with a long, gentle stagger; hovering
     pushes the slice outward along its own mid-angle (Apple-Charts style)
     while siblings softly dim. Click drills in. */
  .pie-svg { width: 240px; height: 240px; overflow: visible;
    filter: drop-shadow(0 14px 32px rgba(0,0,0,.42)); }
  /* Slices stroke with the card background so the colours don't bleed into
     each other — a thin gap reads as "separated", not "stitched". */
  .pie-slice {

    stroke: var(--card); stroke-width: 2.25; stroke-linejoin: round;
    transform: translate(0,0);
    transition: transform .42s cubic-bezier(.22,1,.36,1),
                filter .25s ease, opacity .25s ease;
    animation: pie-slice-in .85s cubic-bezier(.16,1,.3,1) both;

  @keyframes pie-slice-in {
    0%   { opacity: 0; transform: scale(.86); }
    60%  { opacity: 1; }

     and pushes outward by ~9px along its own mid-angle (var(--mx,--my)). */
  .pie-slices:hover .pie-slice { opacity: .58; filter: saturate(.78); }
  .pie-slices:hover .pie-slice:hover {
    opacity: 1; filter: brightness(1.06) saturate(1.08);
    transform: translate(var(--mx,0), var(--my,0));

  /* --- Line chart (SVG) -------------------------------------------------- */
  .lc-wrap { position: relative; width: 100%; cursor: crosshair;
    overflow: visible; }
  /* Soft fade only on the chart line/area itself — applying the mask to the
     wrap clipped the tooltip too (which sits at translate(-50%, -118%), well
     outside the wrap's box, where the mask gradient is transparent). */
  .lc-svg { display: block; width: 100%; height: 100%; overflow: visible;
    -webkit-mask-image: linear-gradient(to right, transparent, #000 4%, #000 96%, transparent);
            mask-image: linear-gradient(to right, transparent, #000 4%, #000 96%, transparent); }
  .lc-glow { opacity: 0; animation: lc-glow .35s .1s ease forwards; }
  .lc-line { stroke-dasharray: 1000; stroke-dashoffset: 1000;
    animation: lc-draw .55s cubic-bezier(.65,0,.25,1) .02s forwards; }
  .lc-area { opacity: 0; transform: translateY(8%); transform-origin: bottom;
    animation: lc-fade .4s cubic-bezier(.4,0,.2,1) .1s forwards; }
  @keyframes lc-draw { to { stroke-dashoffset: 0; } }
  @keyframes lc-fade { to { opacity: 1; transform: translateY(0); } }
  @keyframes lc-glow { to { opacity: .9; } }

  /* Crosshair — soft vertical line with a tiny halo so it reads on a busy
     chart without being heavy-handed. */
  .lc-cross { position: absolute; top: 0; bottom: 0; width: 1px;
    background: linear-gradient(to bottom, transparent, var(--hairline-2) 12%,
      var(--hairline-2) 88%, transparent);
    opacity: 0; pointer-events: none; transform: translateX(-0.5px);
    transition: opacity .15s ease, left .08s cubic-bezier(.2,.8,.2,1); }
  .lc-cross.on { opacity: 1; }

  /* The hovered-point dot — a colored core with a continuously breathing
     halo that softens the click target without distracting from the line. */
  .lc-dot { position: absolute; width: 14px; height: 14px; border-radius: 50%;
    border: 2.5px solid var(--card); opacity: 0; pointer-events: none;
    transform: translate(-50%, -50%);
    transition: opacity .18s ease,
                left .08s cubic-bezier(.2,.8,.2,1),
                top .08s cubic-bezier(.2,.8,.2,1); }
  .lc-dot.lc-good { background: var(--chart-up);
    box-shadow: 0 0 0 4px var(--chart-up-glow); }
  .lc-dot.lc-bad  { background: var(--chart-down);
    box-shadow: 0 0 0 4px var(--chart-down-glow); }
  .lc-dot.on { opacity: 1; }
  .lc-dot.on .lc-dot-pulse { animation: lc-pulse 1.8s ease-out infinite; }
  .lc-dot-pulse { position: absolute; inset: -4px; border-radius: 50%;
    border: 2px solid currentColor; opacity: 0; pointer-events: none; }
  .lc-dot.lc-good .lc-dot-pulse { color: var(--chart-up); }
  .lc-dot.lc-bad  .lc-dot-pulse { color: var(--chart-down); }
  @keyframes lc-pulse {
    0% { transform: scale(0.7); opacity: 0.65; }
    100% { transform: scale(2.6); opacity: 0; }
  }

  /* Tooltip — small, high-contrast, with a tonal accent stripe down the side.
     Pops in with a quick scale + opacity, then follows the cursor along the
     x-axis via the `left` transition. The transform-origin sits at the dot
     so the pop-in feels anchored to the data point. */
  .lc-tip { position: absolute; top: 0; padding: 8px 12px 9px;
    background: var(--bg-elev); border: 1px solid var(--hairline-2);
    border-radius: 10px;
    transform: translate(-50%, -118%) scale(0.88);
    transform-origin: 50% calc(100% + 18px);
    box-shadow: 0 14px 28px rgba(0,0,0,0.38);
    opacity: 0; pointer-events: none; white-space: nowrap;
    transition: opacity .18s ease,
                transform .22s cubic-bezier(.2,1.1,.25,1),
                left .09s cubic-bezier(.2,.8,.2,1); }
  .lc-tip::before { content: ""; position: absolute; left: 0; top: 7px;
    bottom: 7px; width: 3px; border-radius: 0 3px 3px 0; }
  .lc-tip.lc-good::before { background: var(--chart-up); }
  .lc-tip.lc-bad::before { background: var(--chart-down); }
  .lc-tip.on { opacity: 1; transform: translate(-50%, -118%) scale(1); }
  .lc-tip.right { transform: translate(-100%, -118%) scale(0.88);
    transform-origin: 100% calc(100% + 18px); }
  .lc-tip.on.right { transform: translate(-100%, -118%) scale(1); }
  .lc-tip.left { transform: translate(0, -118%) scale(0.88);
    transform-origin: 0 calc(100% + 18px); }
  .lc-tip.on.left { transform: translate(0, -118%) scale(1); }
  .lc-tip-val { font: 800 14.5px/1 ui-rounded, "SF Pro Rounded", system-ui;
    color: var(--text); font-variant-numeric: tabular-nums; padding-left: 8px; }
  .lc-tip-date { font-size: 10.5px; color: var(--faint); margin-top: 4px;

  @media (prefers-reduced-motion: reduce) {

    .lc-dot.on .lc-dot-pulse { animation: none; }
