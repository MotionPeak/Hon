      + '"><div class="mb-fill" style="height:' + h
      + "%;animation-delay:" + i * 34 + 'ms"></div>'
      + '<div class="mb-x">' + monthLetter(m.month) + "</div></div>";
  }).join("");
  return '<div class="mb-wrap"><div class="mb">' + bars + "</div></div>";
}

// --- Modals ----------------------------------------------------------------

function closeOverlay() { document.getElementById("overlays").innerHTML = ""; }

function openModal(buildBody) {
  const overlay = document.createElement("div");
  overlay.className = "overlay";
  const modal = document.createElement("div");
  modal.className = "modal";
  overlay.appendChild(modal);
  overlay.addEventListener("mousedown", (e) => { if (e.target === overlay) closeOverlay(); });
  document.getElementById("overlays").appendChild(overlay);
  buildBody(modal);
  return modal;
}

// Maps the government registry's Hebrew ownership label to our select values.
function ownershipKey(baalut) {
  const s = String(baalut || "");
  if (s.indexOf("פרטי") >= 0) return "private";
  if (s.indexOf("השכר") >= 0) return "rental";
  if (s.indexOf("ליסינג") >= 0 || s.indexOf("ליס") >= 0) return "lease";
  if (s.indexOf("חבר") >= 0) return "company";
  return "";
}

        + '<div class="ch-type">' + categoryLabel(company.type) + "</div></div></div>";
      fields += company.loginFields.map((key) => {
        const lbl = FIELD_LABELS[key] || (key[0].toUpperCase() + key.slice(1));
        const type = SECURE_FIELDS.has(key) ? "password" : "text";
        return '<div class="field"><label>' + esc(lbl) + "</label>"
          + '<input data-cred="' + esc(key) + '" type="' + type + '" autocomplete="off"></div>';
      }).join("")
      + '<div class="field"><label>Display name</label>'
      + '<input id="ac-name" type="text" value="' + esc(company.name) + '"></div>';
      if (company.id === SNAPTRADE_ID) {
        fields += '<p class="hint">To get a Client ID and Consumer Key:</p>'
          + '<ol class="hint">'
          + "<li>Sign up at dashboard.snaptrade.com</li>"
          + "<li>Open the API Keys page and copy the Client ID</li>"
          + "<li>Click the regenerate icon next to Consumer Key, then copy the revealed key</li>"
          + "<li>Paste both above. After connecting, use “Link brokerage” on the card "
          + "to link up to 5 brokerages.</li></ol>";
      }
      modal.innerHTML = "<h2>Add an account</h2>"
        + '<button class="back-btn" data-x="back">‹ ' + esc(categoryLabel(company.type))
        + "s</button>"
        + '<p class="hint">' + (company.interactive
            ? esc(company.name) + " is behind a security check that needs a "
              + "person. Enter your ID and phone — stored encrypted in your "
              + "local vault. On sync, a browser window opens: you clear the "
              + "security check, Hon fills your details, you finish the SMS code."
            : "Credentials are encrypted in your local vault.")
        + "</p>"
        + fields
        + '<div class="modal-err" id="ac-err" hidden></div>'
        + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
        + '<button class="primary" data-x="connect">Connect</button></div>';
      modal.querySelector('[data-x="back"]')
        .addEventListener("click", () => { selected = ""; render2(); });
      modal.querySelector('[data-x="connect"]')
        .addEventListener("click", () => submit(company));
      bindCancel();
    };

    const renderSnapKeysStep = () => {
      const snap = state.companies.find((c) => c.id === SNAPTRADE_ID);
      if (!snap) {
        modal.innerHTML = '<h2>Brokerages</h2><p class="hint">SnapTrade is unavailable.</p>'
          + '<div class="modal-actions"><button data-x="cancel">Cancel</button></div>';
        bindCancel();
        return;
      }
      let fields = '<div class="company-head">' + companyLogo(snap)
        + '<div><div class="ch-name">' + esc(snap.name) + "</div>"
        + '<div class="ch-type">Brokerage</div></div></div>';
      fields += snap.loginFields.map((key) => {
        const lbl = FIELD_LABELS[key] || (key[0].toUpperCase() + key.slice(1));
        const type = SECURE_FIELDS.has(key) ? "password" : "text";
        return '<div class="field"><label>' + esc(lbl) + "</label>"
          + '<input data-cred="' + esc(key) + '" type="' + type + '" autocomplete="off"></div>';
      }).join("")
      + '<div class="field"><label>Display name</label>'
      + '<input id="ac-name" type="text" value="' + esc(snap.name) + '"></div>'
      + '<p class="hint">To get a Client ID and Consumer Key:</p>'
      + '<ol class="hint">'
      + "<li>Sign up at dashboard.snaptrade.com</li>"
      + "<li>Open the API Keys page and copy the Client ID</li>"
      + "<li>Click the regenerate icon next to Consumer Key, then copy the revealed key</li>"
      + "<li>Paste both above to continue.</li></ol>";
      modal.innerHTML = "<h2>Connect a brokerage</h2>"
        + '<button class="back-btn" data-x="back">‹ All categories</button>'
        + '<p class="hint">First, enter your SnapTrade developer keys (one time).</p>'
        + fields
        + '<div class="modal-err" id="ac-err" hidden></div>'
        + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
        + '<button class="primary" data-x="savekeys">Continue</button></div>';
      modal.querySelector('[data-x="back"]')
        .addEventListener("click", () => { category = ""; render2(); });
      modal.querySelector('[data-x="savekeys"]')
        .addEventListener("click", () => saveSnapKeys(snap));
      bindCancel();
    };

    const saveSnapKeys = async (snap) => {
      const creds = {};
      let missing = false;
      modal.querySelectorAll("[data-cred]").forEach((inp) => {
        const v = inp.value.trim();
        if (!v) missing = true;
        creds[inp.dataset.cred] = v;
      });
      const err = modal.querySelector("#ac-err");
      if (missing) { err.textContent = "Please fill in every field."; err.hidden = false; return; }
      const name = modal.querySelector("#ac-name").value.trim() || snap.name;
      try {
        await api("/connections", "POST",
          { companyId: snap.id, displayName: name, credentials: creds });
        await loadAll();
        brokerages = null;
        render2();
      } catch (e) {
        if (e instanceof VaultLocked) { closeOverlay(); return showGate(); }
        err.textContent = e.message; err.hidden = false;
      }
    };

    const renderBrokerageStep = () => {
      const snapConn = state.connections.find((c) => c.companyId === SNAPTRADE_ID);
      if (!snapConn) return renderSnapKeysStep();
      if (brokerages === null) {
        modal.innerHTML = "<h2>Brokerages</h2>"
          + '<button class="back-btn" data-x="back">‹ All categories</button>'
          + '<p class="hint">Loading brokerages…</p>'
          + '<div class="modal-actions"><button data-x="cancel">Cancel</button></div>';
        modal.querySelector('[data-x="back"]')
          .addEventListener("click", () => { category = ""; render2(); });
        bindCancel();
        api("/snaptrade/brokerages", "POST", { connectionId: snapConn.id })
          .then((r) => { brokerages = r.brokerages || []; brokeragesError = ""; render2(); })
          .catch((e) => {
            if (e instanceof VaultLocked) { closeOverlay(); return showGate(); }
            brokerages = []; brokeragesError = e.message; render2();
          });
        return;
      }
      const rows = brokerages.map((b) =>
        '<div class="pick-row" data-slug="' + esc(b.slug) + '">'
        + brokerageLogo(b) + "<div>" + esc(b.name) + "</div></div>").join("")
        || '<p class="hint">' + esc(brokeragesError || "No brokerages available.") + "</p>";
      modal.innerHTML = "<h2>Brokerages</h2>"
        + '<button class="back-btn" data-x="back">‹ All categories</button>'
        + '<p class="hint">Pick a brokerage to connect.</p>'
        + '<div class="pick-list">' + rows + "</div>"
        + '<div class="modal-actions"><button data-x="cancel">Cancel</button></div>';
      modal.querySelectorAll(".pick-row").forEach((el) => {
        el.addEventListener("click", () => openBrokerPortal(snapConn, el.dataset.slug));
      });
      modal.querySelector('[data-x="back"]')
        .addEventListener("click", () => { category = ""; brokerages = null; render2(); });
      bindCancel();
    };

    const openBrokerPortal = async (snapConn, slug) => {
      try {
        const { portal } = await api("/snaptrade/portal", "POST", {
          connectionId: snapConn.id,
          broker: slug,
          customRedirect: location.origin + "/snaptrade/done",
        });
        closeOverlay();
        await loadAll();
        if (portal.redirectURI) {
          window.open(portal.redirectURI, "_blank");
          toast("Opening SnapTrade's connection portal in a new tab…");
        } else {
          toast(portal.error || "Could not open the connection portal.", true);
        }
      } catch (e) {
        if (e instanceof VaultLocked) { closeOverlay(); return showGate(); }
        toast(e.message, true);
      }
    };

    const renderCarStep = () => {
      modal.innerHTML = "<h2>Add a car</h2>"
        + '<button class="back-btn" data-x="back">‹ All options</button>'
        + '<p class="hint">Look the car up by its plate, then check its market '
        + 'price on Yad2 — or set the value yourself.</p>'
        + '<div class="field"><label>Licence plate</label><div class="plate-row">'
        + '<input id="car-plate" type="text" inputmode="numeric" '
        + 'placeholder="e.g. 12345678" autocomplete="off">'
        + '<button data-x="lookup">Look up</button></div></div>'
        + '<div class="field"><label>Make &amp; model</label>'
        + '<input id="car-name" type="text" placeholder="Toyota Corolla" '
        + 'autocomplete="off"></div>'
        + '<div class="grid2">'
        + '<div class="field"><label>Year</label>'
        + '<input id="car-year" type="number" min="1980" max="2030" '
        + 'placeholder="2020"></div>'
        + '<div class="field"><label>Mileage (km)</label>'
        + '<input id="car-km" type="number" min="0" step="1000" '
        + 'placeholder="60000"></div></div>'
        + '<div class="field"><label>Ownership</label><select id="car-own">'
        + '<option value="private">Private</option>'
        + '<option value="company">Company</option>'
        + '<option value="lease">Lease</option>'
        + '<option value="rental">Ex-rental</option></select></div>'
        + '<div class="field"><label>Current value (₪)</label>'
        + '<input id="car-value" type="number" min="0" step="500" '
        + 'placeholder="0"></div>'
        + '<button class="block" data-x="mehiron" style="margin-bottom:11px">'
        + 'Look up the price on Yad2 ↗</button>'
        + '<div class="est-note" id="car-official" hidden></div>'
        + '<div class="modal-err" id="ac-err" hidden></div>'
        + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
        + '<button class="primary" data-x="addcar">Add car</button></div>';

      const get = (sel) => modal.querySelector(sel);

      get('[data-x="lookup"]').addEventListener("click", async () => {
        const plate = get("#car-plate").value.replace(/\D/g, "");
        const err = get("#ac-err");
        if (plate.length < 5) {
          err.textContent = "Enter a valid plate number.";
          err.hidden = false;
          return;
        }
        err.hidden = true;
        const btn = get('[data-x="lookup"]');
        btn.disabled = true;
        btn.textContent = "…";
        try {
          const r = await api("/vehicle/" + plate);
          if (r && r.found) {
            const v = r.vehicle;
            const nm = [v.make, v.model].filter(Boolean).join(" ");
            if (nm) get("#car-name").value = nm;
            if (v.year) get("#car-year").value = v.year;
            const own = ownershipKey(v.ownership);
            if (own) get("#car-own").value = own;
            toast("Found " + (nm || "vehicle") + (v.year ? " · " + v.year : "") + ".");
          } else {
            toast("No car found for that plate — enter the details by hand.", true);
          }
        } catch (e) {
          toast("Lookup failed — enter the details by hand.", true);
        } finally {
          btn.disabled = false;
          btn.textContent = "Look up";
        }
      });

      get('[data-x="mehiron"]').addEventListener("click", () => {
        const name = get("#car-name").value.trim();
        const note = get("#car-official");
        window.open("https://www.yad2.co.il/price-list", "_blank");
        note.hidden = false;
        note.innerHTML = "Opened the Yad2 price list in a new tab — "
          + (name
              ? "find <strong>" + esc(name) + "</strong> there"
              : "find your car's make and model there")
          + " to see its price, then enter it in Current value above.";
      });

      get('[data-x="addcar"]').addEventListener("click", async () => {
        const err = get("#ac-err");
        const name = get("#car-name").value.trim();
        const value = Number(get("#car-value").value);
        if (!name) {
          err.textContent = "Enter the car's make and model.";
          err.hidden = false;
          return;
        }
        if (!Number.isFinite(value) || value <= 0) {
          err.textContent = "Enter the car's current value.";
          err.hidden = false;
          return;
        }
        const details = {
          plate: get("#car-plate").value.replace(/\D/g, "") || null,
          year: Number(get("#car-year").value) || null,
          km: Number(get("#car-km").value) || null,
          ownership: get("#car-own").value,
        };
        try {
          await api("/assets", "POST", {
            kind: "car", name: name, value: value, currency: "ILS", details: details,
          });
          closeOverlay();
          await loadAll();
          toast("Car added.");
        } catch (e) {
          if (e instanceof VaultLocked) { closeOverlay(); return showGate(); }
          err.textContent = e.message;
          err.hidden = false;
        }
      });

      modal.querySelector('[data-x="back"]')
        .addEventListener("click", () => { category = ""; render2(); });
      bindCancel();
    };

    const renderAssetStep = () => {
      const isPension = category === "pension";
      modal.innerHTML = "<h2>Add " + (isPension ? "a pension" : "an asset") + "</h2>"
        + '<button class="back-btn" data-x="back">‹ '
        + (isPension ? "Pension funds" : "All options") + "</button>"
        + '<p class="hint">' + (isPension
            ? "Track a retirement fund — the amount accumulated counts toward "
              + "your net worth."
            : "Anything you own with a value — it counts toward your net worth.")
        + "</p>"
        + (isPension ? ""
            : '<div class="field"><label>Type</label><select id="as-kind">'
              + '<option value="cash">Cash / savings</option>'
              + '<option value="property">Property</option>'
              + '<option value="crypto">Crypto</option>'
              + '<option value="other">Other</option></select></div>')
        + '<div class="field"><label>Name</label>'
        + '<input id="as-name" type="text" placeholder="'
        + (isPension ? "Altshuler, Meitav, Menora…" : "Apartment, emergency fund…")
        + '" autocomplete="off"></div>'
        + '<div class="grid2">'
        + '<div class="field"><label>'
        + (isPension ? "Amount accumulated" : "Value") + "</label>"
        + '<input id="as-value" type="number" min="0" step="100" '
        + 'placeholder="0"></div>'
        + '<div class="field"><label>Currency</label><select id="as-cur">'
        + '<option>ILS</option><option>USD</option><option>EUR</option>'
        + '<option>GBP</option></select></div></div>'
        + '<div class="modal-err" id="ac-err" hidden></div>'
        + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
        + '<button class="primary" data-x="addasset">Add '
        + (isPension ? "pension" : "asset") + "</button></div>";
      modal.querySelector('[data-x="addasset"]').addEventListener("click", async () => {
        const err = modal.querySelector("#ac-err");
        const name = modal.querySelector("#as-name").value.trim();
        const value = Number(modal.querySelector("#as-value").value);
        if (!name) {
          err.textContent = isPension
            ? "Name the pension provider or plan."
            : "Give the asset a name.";
          err.hidden = false;
          return;
        }
        if (!Number.isFinite(value) || value <= 0) {
          err.textContent = isPension
            ? "Enter the amount accumulated."
            : "Enter the asset's value.";
          err.hidden = false;
          return;
        }
        try {
          await api("/assets", "POST", {
            kind: isPension ? "pension" : modal.querySelector("#as-kind").value,
            name: name,
            value: value,
            currency: modal.querySelector("#as-cur").value,
          });
          closeOverlay();
          await loadAll();
          toast(isPension ? "Pension added." : "Asset added.");
        } catch (e) {
          if (e instanceof VaultLocked) { closeOverlay(); return showGate(); }
          err.textContent = e.message;
          err.hidden = false;
        }
      });
      modal.querySelector('[data-x="back"]')
        .addEventListener("click", () => {
          if (isPension) return renderPensionStep();
          category = ""; render2();
        });
      bindCancel();
    };

    const render2 = () => {
      if (!category) return renderCategoryStep();
      if (category === "car") return renderCarStep();
      if (category === "asset") return renderAssetStep();
      if (category === "loan") return renderLoanStep();
      if (category === "brokerage") return renderBrokerageStep();
      if (category === "pension" && !selected) return renderPensionStep();
      if (!selected) return renderInstitutionStep();
      return renderCredentialStep();
    };

    // The loan form: name, principal, start date, term (years + months),
    // track radio (fixed / prime / CPI-fixed / CPI-prime) and rate value.
    // The "rate" label changes with the track so prime tracks ask for a
    // margin over prime, not an absolute rate.
    const renderLoanStep = () => {
      const todayIso = new Date().toISOString().slice(0, 10);
      modal.innerHTML = "<h2>Add a loan</h2>"
        + '<button class="back-btn" data-x="back">‹ All categories</button>'
        + '<p class="hint">Enter the original terms. Hon recomputes the current '
        + "outstanding from a Spitzer schedule, the Bank of Israel prime rate "
        + "and the CBS consumer price index — so the figure stays current "
        + "without a manual update.</p>"
        + '<div class="field"><label>Name</label>'
        + '<input id="ln-name" type="text" placeholder="Mortgage track A"></div>'
        + '<div class="field-row">'
        + '<div class="field"><label>Amount taken</label>'
        + '<input id="ln-principal" type="number" inputmode="decimal" min="0" step="100"></div>'
        + '<div class="field"><label>Start date</label>'
        + '<input id="ln-start" type="date" value="' + todayIso + '" max="' + todayIso + '"></div>'
        + "</div>"
        + '<div class="field-row">'
        + '<div class="field"><label>Term — years</label>'
        + '<input id="ln-yrs" type="number" inputmode="numeric" min="0" step="1" value="20"></div>'
        + '<div class="field"><label>Term — months</label>'
        + '<input id="ln-mos" type="number" inputmode="numeric" min="0" max="11" step="1" value="0"></div>'
        + "</div>"
        + '<div class="field"><label>Track</label>'
        + '<div class="loan-tracks">'
        + '<label class="loan-track" data-track="fixed"><input type="radio" name="ln-track" value="fixed" checked>'
        + '<span class="lt-title">Fixed</span><span class="lt-sub">A set rate, not linked to anything.</span></label>'
        + '<label class="loan-track" data-track="prime"><input type="radio" name="ln-track" value="prime">'
        + '<span class="lt-title">Prime + margin</span><span class="lt-sub">Tracks the Bank of Israel prime rate.</span></label>'
        + '<label class="loan-track" data-track="cpi-fixed"><input type="radio" name="ln-track" value="cpi-fixed">'
        + '<span class="lt-title">CPI-linked · Fixed (צמודה קבועה)</span><span class="lt-sub">Set rate, principal tracks the CPI.</span></label>'
        + '<label class="loan-track" data-track="cpi-prime"><input type="radio" name="ln-track" value="cpi-prime">'
        + '<span class="lt-title">CPI-linked · Prime (צמודה משתנה)</span><span class="lt-sub">Prime + margin, principal tracks the CPI.</span></label>'
        + "</div></div>"
        + '<div class="field"><label id="ln-rate-label">Annual rate %</label>'
        + '<input id="ln-rate" type="number" inputmode="decimal" step="0.01" placeholder="4.50"></div>'
        + '<p class="hint" id="ln-rate-hint">For example, 4.5 = 4.5% per year.</p>'
        + '<div class="modal-err" id="ln-err" hidden></div>'
        + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
        + '<button class="primary" id="ln-save">Add loan</button></div>';

      const $ = (id) => modal.querySelector("#" + id);
      const refreshRateLabel = () => {
        const track = modal.querySelector('input[name="ln-track"]:checked').value;
        const isPrime = track === "prime" || track === "cpi-prime";
        $("ln-rate-label").textContent = isPrime ? "Margin over prime — annual %" : "Annual rate %";
        $("ln-rate-hint").textContent = isPrime
          ? "Prime is fetched live from the Bank of Israel. Enter the margin your bank quoted (e.g. 0.5 for prime + 0.5%, or -0.25 for prime − 0.25%)."
          : "For example, 4.5 = 4.5% per year. CPI-linked tracks have their principal scaled by the index since the loan started.";
      };
      modal.querySelectorAll('input[name="ln-track"]').forEach((r) =>
        r.addEventListener("change", refreshRateLabel));
      refreshRateLabel();

      $("ln-save").addEventListener("click", async () => {
        const err = $("ln-err");
        const name = $("ln-name").value.trim();
        const principal = Number($("ln-principal").value);
        const startDate = $("ln-start").value;
        const yrs = Math.max(0, Math.round(Number($("ln-yrs").value) || 0));
        const mos = Math.max(0, Math.round(Number($("ln-mos").value) || 0));
        const termMonths = yrs * 12 + mos;
        const rateType = modal.querySelector('input[name="ln-track"]:checked').value;
        const rateValue = Number($("ln-rate").value);
        const showErr = (msg) => { err.textContent = msg; err.hidden = false; };
        err.hidden = true;
        if (!name) return showErr("Name the loan.");
        if (!Number.isFinite(principal) || principal <= 0) return showErr("Amount must be a positive number.");
        if (!startDate) return showErr("Pick a start date.");
        if (termMonths <= 0) return showErr("Term must be at least one month.");
        if (!Number.isFinite(rateValue)) return showErr("Enter a rate (or margin) number.");

        try {
          await api("/loans", "POST", {
            name, principal, startDate, termMonths, rateType, rateValue,
          });
          toast("Loan added.");
          closeOverlay();
          await loadAll();
          render();
        } catch (e) {
          showErr(e && e.message ? e.message : "Could not save the loan.");
        }
      });

      modal.querySelector('[data-x="back"]')
        .addEventListener("click", () => { category = ""; render2(); });
      bindCancel();
    };
    const submit = async (company) => {
      const creds = {};
      let missing = false;
      modal.querySelectorAll("[data-cred]").forEach((inp) => {
        const v = inp.value.trim();
        if (!v) missing = true;
        creds[inp.dataset.cred] = v;
      });
      const err = modal.querySelector("#ac-err");
      if (missing) { err.textContent = "Please fill in every field."; err.hidden = false; return; }
      const name = modal.querySelector("#ac-name").value.trim() || company.name;
      try {
        const { connection } = await api("/connections", "POST",
          { companyId: company.id, displayName: name, credentials: creds });
        closeOverlay();
        await loadAll();
        if (company.id !== SNAPTRADE_ID) scrape(connection);
        else toast("Connected. Use “Link brokerage” to link your brokerages.");
      } catch (e) {
        if (e instanceof VaultLocked) { closeOverlay(); return showGate(); }
        err.textContent = e.message; err.hidden = false;
      }
    };
    render2();
  });
}

function editAssetModal(asset) {
  openModal((modal) => {
    const d = asset.details || {};
    const isCar = asset.kind === "car";
    modal.innerHTML = "<h2>Edit " + esc(asset.name) + "</h2>"
      + '<div class="field"><label>Name</label>'
      + '<input id="ea-name" type="text" value="' + esc(asset.name) + '"></div>'
      + (isCar
          ? '<div class="field"><label>Mileage (km)</label>'
            + '<input id="ea-km" type="number" min="0" step="1000" value="'
            + (d.km != null ? d.km : "") + '"></div>'
          : "")
      + '<div class="field"><label>'
      + (asset.kind === "pension" ? "Amount accumulated" : "Value")
      + " (" + esc(asset.currency) + ")</label>"
      + '<input id="ea-value" type="number" min="0" step="100" value="'
      + asset.value + '"></div>'
      + '<div class="modal-err" id="ea-err" hidden></div>'
      + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
      + '<button class="primary" data-x="save">Save</button></div>';
    const get = (s) => modal.querySelector(s);

    get('[data-x="cancel"]').addEventListener("click", closeOverlay);
    get('[data-x="save"]').addEventListener("click", async () => {
      const err = get("#ea-err");
      const name = get("#ea-name").value.trim();
      const value = Number(get("#ea-value").value);
      if (!name) {
        err.textContent = "Give the asset a name.";
        err.hidden = false;
        return;
      }
      if (!Number.isFinite(value) || value <= 0) {
        err.textContent = "Enter a value.";
        err.hidden = false;
        return;
      }
      const body = { name: name, value: value };
      if (isCar) {
        body.details = Object.assign({}, d, { km: Number(get("#ea-km").value) || null });
      }
      try {
        await api("/assets/" + asset.id, "PUT", body);
        closeOverlay();
        await loadAll();
        toast("Asset updated.");

function budgetModal() {
  openModal((modal) => {
    const b = state.budget || {};
    const cur = b.currency || "ILS";
    const symbol = SYMBOLS[cur.toUpperCase()] || "";
    // Average monthly spend per category — a baseline for picking a limit.
    const avg = categoryStats().avgByCat;
    const current = {}, spent = {};
    (b.essentials || []).forEach((l) => {
      if (l.budget != null) current[l.category] = l.budget;
      spent[l.category] = l.spent || 0;
    });
    const row = (key, label, emoji, color) => {
      const sp = spent[key] || 0;
      const overNow = current[key] != null && sp > current[key];
      return '<div class="bm-row">'
        + '<span class="bm-ico" style="background:' + color + '22;color:'
        + color + '">' + emoji + "</span>"
        + '<div class="bm-info"><div class="bm-name">' + esc(label) + "</div>"
        + '<div class="bm-spent' + (overNow ? " over" : "") + '">Spent '
        + money(sp, cur) + " this month"
        + (avg[key] != null ? " · avg " + money(avg[key], cur) + "/mo" : "")
        + "</div>"
        + '<div class="bm-mini"><div data-mini="' + esc(key) + '"></div></div></div>'
        + '<div class="bm-input"><span class="bm-cur">' + symbol + "</span>"
        + '<input data-budget="' + esc(key) + '" data-spent="' + sp
        + '" type="number" min="0" step="50" placeholder="0" value="'
        + (current[key] != null ? current[key] : "") + '"></div></div>';
    };
    const catRows = (list) => list
      .map((c) => row(c, c, catStyle(c)[0], catStyle(c)[1])).join("");

    const v = projectedVariable(b.variable
      || { income: 0, committed: 0, spent: 0, allowed: 0 });
    const inWord = v.projected ? "expected" : "came in";
    const varNote = v.allowed > 0
      ? "Worked out automatically — " + money(v.income, cur) + " " + inWord + ", "
        + money(v.committed, cur) + " covers fixed bills and essentials, and "
        + money(v.spent, cur) + " is already spent."
      : "There's no room for variable spending this month — income is fully "
        + "taken up by fixed bills, essentials, and what's been spent already.";

    // Manual override for the auto-averaged income. Placeholder shows the
    // average so the user can compare; clearing the field restores the auto.
    const overrideVal = state.incomeOverride != null ? String(state.incomeOverride) : "";
    const computedIncomePlaceholder = Math.round(v.income || 0);
    // This-month savings reserve (per cycle), not a piggy bank — the budget
    // engine deducts it from the variable pool, capped at what's available.
    // `transferred` toggles whether it leaves the checking account or just
    // earmarks it: the bank-balance projection deducts only when transferred.
    const thisMonthKey = currentCycleKey();
    const savingsEntry = state.monthlySavings[thisMonthKey] || {};
    const savingsVal = savingsEntry.amount != null && savingsEntry.amount > 0
      ? String(savingsEntry.amount) : "";
    const transferredInit = !!savingsEntry.transferred;

    modal.innerHTML = "<h2>Monthly budgets</h2>"
      + '<p class="hint">Give each essential category a monthly limit. Fixed '
      + "bills aren't budgeted, and variable spending is worked out "
      + "automatically from whatever's left. Leave blank for no limit.</p>"
      + '<div class="bgt-group">This month</div>'
      + '<div class="bm-row">'
        + '<span class="bm-ico" style="background:#4CD18022;color:#4CD180">💰</span>'
        + '<div class="bm-info"><div class="bm-name">Expected income</div>'
        + '<div class="bm-spent">Override the auto-averaged figure with a '
        + "known amount. Leave blank to use the average.</div></div>"
        + '<div class="bm-input"><span class="bm-cur">' + symbol + "</span>"
        + '<input id="bm-income-override" type="number" min="0" step="100" placeholder="'
        + computedIncomePlaceholder + '" value="' + esc(overrideVal) + '"></div></div>'
      + '<div class="bm-row">'
        + '<span class="bm-ico" style="background:#5C9EF522;color:#5C9EF5">🏦</span>'
        + '<div class="bm-info"><div class="bm-name">Set aside for savings</div>'
        + '<div class="bm-spent" id="bm-savings-cap">A one-off reserve for this '
        + "month — not a piggy bank.</div>"
        + '<label class="bm-toggle"><input type="checkbox" id="bm-savings-transferred"'
        + (transferredInit ? " checked" : "") + ">"
        + '<span>Transfer out of checking — when off, the reserve is just '
        + "earmarked and stays in the account.</span></label></div>"
        + '<button type="button" id="bm-savings-max" class="bm-max-btn" '
        + 'title="Set this month\'s reserve to every shekel left over">Max</button>'
        + '<div class="bm-input"><span class="bm-cur">' + symbol + "</span>"
        + '<input id="bm-savings" type="number" min="0" step="100" placeholder="0" value="'
        + esc(savingsVal) + '"></div></div>'
      + '<div class="bm-summary"><span>Total budgeted</span>'
      + '<span id="bm-total">—</span></div>'
      + '<div class="bgt-group">Essentials</div>'
      + catRows((state.categories || [])
          .filter((c) => c.catGroup === "essential")
          .sort((a, x) => (a.sortOrder ?? 100) - (x.sortOrder ?? 100))
          .map((c) => c.name))
      + '<div class="bgt-group">Variable spending · allowed right now</div>'
      + '<div class="bm-var"><div class="bm-var-amt">'
      + money(v.allowed > 0 ? v.allowed : 0, cur) + "</div>"
      + '<div class="bm-var-note">' + varNote + "</div></div>"
      + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
      + '<button class="primary" data-x="save">Save budgets</button></div>';

    const totalEl = modal.querySelector("#bm-total");
    const inputs = [...modal.querySelectorAll("[data-budget]")];
    const incomeInputEl = modal.querySelector("#bm-income-override");
    const savingsInputEl = modal.querySelector("#bm-savings");
    const savingsCapEl = modal.querySelector("#bm-savings-cap");
    // The room left for a savings reserve, computed from the values currently
    // in the modal — so editing the income override or an essential budget
    // updates the cap immediately, no save-and-reopen needed. Subtracts the
    // variable spent so far this cycle too: that money is already gone, so
    // it can't also be set aside.
    function savingsCap() {
      const incomeRaw = incomeInputEl.value.trim();
      const income = incomeRaw === "" ? (v.income || 0) : (Number(incomeRaw) || 0);
      // Essentials reserve max(budget, already-spent) — matches projectedVariable.
      let essential = 0;
      inputs.forEach((inp) => {
        const amount = inp.value.trim() === "" ? 0 : Number(inp.value) || 0;
        const sp = Number(inp.dataset.spent) || 0;
        essential += amount > 0 ? Math.max(amount, sp) : sp;
      });
      const fixed = v.fixedSpent || 0;
      const piggy = v.piggyFunded || 0;
      const variableSpent = v.spent || 0;
      return Math.max(0, income - fixed - essential - piggy - variableSpent);
    }
    function refresh() {
      let total = 0;
      inputs.forEach((inp) => {
        const amount = inp.value.trim() === "" ? 0 : Number(inp.value) || 0;
        total += amount;
        const sp = Number(inp.dataset.spent) || 0;
        const mini = modal.querySelector('[data-mini="' + inp.dataset.budget + '"]');
        if (!amount) { mini.style.width = "0"; return; }
        const ratio = sp / amount;
        mini.style.width = Math.min(100, ratio * 100) + "%";
        mini.style.background = ratio > 1 ? "var(--red)"
          : ratio > 0.85 ? "var(--amber)" : "var(--green)";
      });
      totalEl.textContent = money(total, cur);
      const cap = Math.floor(savingsCap());
      const wishRaw = savingsInputEl.value.trim();
      const wish = wishRaw === "" ? 0 : Number(wishRaw) || 0;
      // Hard clamp — a wish above the cap is meaningless, so just snap the
      // input down to the cap rather than accepting a value that the budget
      // engine would reduce anyway.
      if (wish > cap) savingsInputEl.value = String(cap);
      savingsCapEl.textContent =
        "A one-off reserve for this month — not a piggy bank. Up to "
        + money(cap, cur) + " free to set aside right now.";
      savingsInputEl.max = String(cap);
      savingsInputEl.placeholder = "max " + cap;
    }
    inputs.forEach((inp) => inp.addEventListener("input", refresh));
    incomeInputEl.addEventListener("input", refresh);
    savingsInputEl.addEventListener("input", refresh);
    // "Max" snaps the reserve to whatever's free after this month's fixed
    // bills, essentials and piggy funding — recomputed live, so toggling
    // an essential budget and then tapping Max picks up the latest cap.
    modal.querySelector("#bm-savings-max").addEventListener("click", () => {
      savingsInputEl.value = String(Math.floor(savingsCap()));
      refresh();
    });
    refresh();

    modal.querySelector('[data-x="cancel"]').addEventListener("click", closeOverlay);
    modal.querySelector('[data-x="save"]').addEventListener("click", async () => {
      const updates = [];
      inputs.forEach((inp) => {
        const cat = inp.dataset.budget;
        const raw = inp.value.trim();
        const amount = raw === "" ? 0 : Number(raw);
        const was = current[cat] != null ? current[cat] : 0;
        if (amount !== was) updates.push({ category: cat, monthlyAmount: amount });
      });
      // Income override + this-month savings — each PUT only if the user
      // actually changed it, so the dev console stays quiet on a no-op save.
      const incomeInput = modal.querySelector("#bm-income-override");
      const savingsInput = modal.querySelector("#bm-savings");
      const incomeRaw = incomeInput.value.trim();
      const incomeNext = incomeRaw === "" ? null : Number(incomeRaw);
      const incomePrev = state.incomeOverride;
      const incomeChanged = (incomeNext == null) !== (incomePrev == null)
        || (incomeNext != null && incomeNext !== incomePrev);
      const savingsRaw = savingsInput.value.trim();
      const savingsNext = savingsRaw === "" ? 0 : Number(savingsRaw) || 0;
      const transferredNext = modal.querySelector("#bm-savings-transferred").checked;
      const savingsPrevEntry = state.monthlySavings[thisMonthKey] || {};
      const savingsPrev = savingsPrevEntry.amount || 0;
      const transferredPrev = !!savingsPrevEntry.transferred;
      const savingsChanged = savingsNext !== savingsPrev
        || transferredNext !== transferredPrev;
      try {
        for (const u of updates) await api("/budgets", "PUT", u);
        if (incomeChanged) {
          await api("/budget/income-override", "PUT", { value: incomeNext });
          state.incomeOverride = incomeNext;
        }
        if (savingsChanged) {
          await api("/budget/savings", "PUT",
            { month: thisMonthKey, amount: savingsNext, transferred: transferredNext });
          if (savingsNext > 0) {
            state.monthlySavings[thisMonthKey] = {
              amount: savingsNext, transferred: transferredNext,
            };
          } else {
            delete state.monthlySavings[thisMonthKey];
          }
        }
        closeOverlay();
        state.budget = await api(budgetUrl());
        render();
        const changed = updates.length + (incomeChanged ? 1 : 0) + (savingsChanged ? 1 : 0);
        toast(changed ? "Budgets saved." : "No changes.");
      } catch (e) { toast(e.message, true); }
    });
  });
}

// Categories panel inside Settings. Lists every category grouped by umbrella,
// each row clickable to edit. The "+ Add" button opens the same modal with
// empty defaults. Built-ins are edit-only — Delete is hidden for them. A
// re-fetch + re-render runs after every change so the new category lands
// everywhere immediately.
function categoriesPanelHtml() {
  const byGroup = { income: [], essential: [], fixed: [], variable: [] };
  (state.categories || [])
    .slice()
    .sort((a, b) => a.sortOrder - b.sortOrder || a.name.localeCompare(b.name))
    .forEach((c) => { (byGroup[c.catGroup] || byGroup.variable).push(c); });

  const groupBlock = (g) => {
    const list = byGroup[g] || [];
    if (!list.length) return "";
    return '<div class="cat-section">'
      + '<div class="cat-section-head">'
      + '<span class="cat-section-name">' + esc(GROUP_LABEL[g]) + "</span>"
      + '<span class="cat-section-count">' + list.length + "</span>"
      + "</div>"
      + '<div class="cat-grid">' + list.map(catSettingsTile).join("") + "</div>"
      + "</div>";
  };

  return '<p class="set-hint">Tap any category to change its icon, colour, or '
    + "whether it counts as an essential, fixed bill, or variable expense. "
    + "Add your own — they apply everywhere, including the auto-categorizer.</p>"
    + '<div id="set-categories">' + GROUP_ORDER.map(groupBlock).join("") + "</div>"
    + '<button type="button" class="cat-add" data-action="new-category">'
    + '<span class="cat-add-icon">+</span>'
    + '<span class="cat-add-text">Add category</span></button>';
}

// One category as a clickable tile in the grid. The whole tile is the Edit
// affordance; user-created tiles also carry a small ✕ in the corner. The
// delegated click handler matches the inner ✕ button first (since closest()
// returns the nearest [data-action]), so Edit only fires on the tile body.
function catSettingsTile(c) {
  // The whole tile is clickable for Edit; the ✕ button carries its own
  // data-action so the delegated click handler matches it before reaching
  // the tile's edit action. Every category is deletable except "Other" —
  // it's the fallback target for removed categories' transactions.
  const removeBtn = c.name === "Other"
    ? ""
    : '<button type="button" class="cat-tile-del" data-action="remove-category"'
      + ' data-arg="' + esc(c.name) + '" title="Remove" aria-label="Remove">✕</button>';
  return '<div class="cat-tile" data-action="edit-category" data-arg="'
    + esc(c.name) + '" style="--cat-color:' + esc(c.color) + '" role="button" tabindex="0">'
    + '<div class="cat-tile-icon">' + esc(c.emoji) + "</div>"
    + '<div class="cat-tile-name">' + esc(c.name) + "</div>"
    + removeBtn
    + "</div>";
}

      isBuiltin: false,

    const emojis = CATEGORY_EMOJI_CHOICES.map((e) =>
      '<button type="button" class="ce-emoji' + (e === cur.emoji ? " on" : "")
      + '" data-emoji="' + esc(e) + '">' + e + "</button>").join("");
    const colors = CATEGORY_COLOR_CHOICES.map((c) =>
      '<button type="button" class="ce-color' + (c === cur.color ? " on" : "")
      + '" data-color="' + esc(c) + '" style="background:' + esc(c)
      + '" aria-label="' + esc(c) + '"></button>').join("");
    const groups = [
      ["income", "Income", "Inflow — counted as money in, never spending"],
      ["essential", "Essential", "Day-to-day, budgeted per category"],
      ["fixed", "Fixed", "Recurring bill, tracked but not budgeted"],
      ["variable", "Variable", "Discretionary, pools into the variable allowance"],
    ];
    const groupCards = groups.map(([g, label, sub]) =>
      '<label class="ce-group' + (cur.catGroup === g ? " on" : "")
      + '"><input type="radio" name="ce-group" value="' + g + '"'
      + (cur.catGroup === g ? " checked" : "") + ">"
      + '<span class="ce-group-name">' + esc(label) + "</span>"
      + '<span class="ce-group-sub">' + esc(sub) + "</span></label>").join("");

    modal.innerHTML = "<h2>" + (isEdit ? "Edit category" : "Add a category") + "</h2>"
      + '<div class="field"><label>Name</label>'
      + '<input id="ce-name" type="text" maxlength="40" value="' + esc(cur.name) + '"'
      + (isEdit ? " disabled" : "") + "></div>"
      + (isEdit && cur.isBuiltin
          ? '<p class="hint">Built-in — name is fixed; everything else is editable.</p>'
          : "")
      + '<div class="field"><label>Icon</label>'
      + '<div class="ce-emoji-grid">' + emojis + "</div></div>"
      + '<div class="field"><label>Colour</label>'
      + '<div class="ce-color-grid">' + colors + "</div></div>"
      + '<div class="field"><label>Group</label>'
      + '<div class="ce-groups">' + groupCards + "</div></div>"
      + '<div class="modal-err" id="ce-err" hidden></div>'
      + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
      + '<button class="primary" id="ce-save">' + (isEdit ? "Save" : "Add") + "</button></div>";

    let pickedEmoji = cur.emoji;
    let pickedColor = cur.color;
    modal.querySelectorAll(".ce-emoji").forEach((b) => {
      b.addEventListener("click", () => {
        pickedEmoji = b.dataset.emoji;
        modal.querySelectorAll(".ce-emoji").forEach((x) => x.classList.toggle("on", x === b));
      });
    });
    modal.querySelectorAll(".ce-color").forEach((b) => {
      b.addEventListener("click", () => {
        pickedColor = b.dataset.color;
        modal.querySelectorAll(".ce-color").forEach((x) => x.classList.toggle("on", x === b));
      });
    });
    modal.querySelectorAll(".ce-group input").forEach((r) => {
      r.addEventListener("change", () => {
        modal.querySelectorAll(".ce-group").forEach((g) =>
          g.classList.toggle("on", g.querySelector("input").checked));
      });
    });
    modal.querySelector('[data-x="cancel"]').addEventListener("click", closeOverlay);

    modal.querySelector("#ce-save").addEventListener("click", async () => {
      const err = modal.querySelector("#ce-err");
      const name = (modal.querySelector("#ce-name").value || "").trim();
      const group = modal.querySelector('input[name="ce-group"]:checked').value;
      const showErr = (m) => { err.textContent = m; err.hidden = false; };
      err.hidden = true;
      if (!isEdit) {
        if (!name) return showErr("Name the category.");
        if (state.categories.some((c) => c.name === name)) {
          return showErr("A category with that name already exists.");
        }
      }
      try {
        if (isEdit) {
          await api("/categories/" + encodeURIComponent(cur.name), "PUT", {
            emoji: pickedEmoji, color: pickedColor, catGroup: group,
          });
          toast("Category updated.");
        } else {
          await api("/categories", "POST", {
            name, emoji: pickedEmoji, color: pickedColor, catGroup: group,
            sortOrder: 500,
          });
          toast("Category added.");
        }
        closeOverlay();
        const fresh = await api("/categories").catch(() => ({ categories: state.categories }));
        state.categories = fresh.categories || state.categories;
        render();
      } catch (e) {
        showErr((e && e.message) || "Could not save the category.");
      }
    });
  });
}

// Opens a small confirmation modal before deleting a category. The body
// shows the category's own emoji + name, plus the count of transactions
// that will be reassigned to Other — so the user sees the impact before
// committing. Count is computed client-side from state.transactions (the
// same data /summary etc. read from), so it doesn't need an API round-trip.
function removeCategoryByName(name) {
  const cat = (state.categories || []).find((c) => c.name === name);
  if (!cat) return;
  const count = (state.transactions || []).filter((t) => t.category === name).length;
  const txnLine = count === 0
    ? "No transactions are currently tagged with it — clean delete."
    : count + " transaction" + (count === 1 ? "" : "s")
      + " will move to Other.";
  openModal((modal) => {
    modal.innerHTML = '<h2>Remove "' + esc(cat.name) + '"?</h2>'
      + '<div class="cat-del-preview" style="--cat-color:' + esc(cat.color) + '">'
      + '<div class="cat-tile-icon">' + esc(cat.emoji) + "</div>"
      + '<div class="cat-del-name">' + esc(cat.name) + "</div></div>"
      + '<p class="hint">' + esc(txnLine)
      + " Merchant rules and the cached categorizer hits for this category "
      + "will also reset to Other. You can re-create it later if needed.</p>"
      + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
      + '<button class="danger" id="cat-del-go">Remove category</button></div>';
    modal.querySelector('[data-x="cancel"]').addEventListener("click", closeOverlay);
    modal.querySelector("#cat-del-go").addEventListener("click", async () => {
      try {
        await api("/categories/" + encodeURIComponent(name), "DELETE");
        closeOverlay();
        await loadAll();
        render();
        toast(count > 0
          ? 'Removed "' + name + '" — ' + count + " transaction"
            + (count === 1 ? "" : "s") + " moved to Other."
          : 'Removed "' + name + '".');
      } catch (e) {
        toast((e && e.message) || "Could not remove the category.", true);
      }
    });
  });
}

// Removes a merchant from the Fixed-bills view by tagging its frequency as
// Sum of the roommates' (not-yours) share of every fixed-category charge
// this cycle, using the per-CATEGORY split (Utilities ÷ 3 etc.). Subtracted
// from the server's raw fixedSpent so totals reflect the user's pocket cost.
function roommateShareThisCycle() {
  const splits = state.categorySplits || {};
  if (!Object.keys(splits).length) return 0;
  const key = currentCycleKey();
  let share = 0;
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || isCardTotal(t) || t.refundForId) return;
    if (catGroup(t.category) !== "fixed") return;
    if (cycleKey(t.date) !== key) return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt >= 0) return;
    const n = splits[t.category] || 1;
    if (n <= 1) return;
    share += -amt * (n - 1) / n;
  });
  return share;
}

// Opens the per-category split modal: pick how many people share every
// charge in that whole category (Utilities ÷ 3 for the user + 2 roommates,
// rent the same way for Housing). Setting to 1 / Remove clears the split.
function splitCategoryModal(category) {
  const current = (state.categorySplits || {})[category] || 1;
  // Preview math from the existing per-merchant rollup for this category,
  // reduced to the section's full monthly equivalent.
  let fullMonthly = 0;
  const merch = {};
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || isCardTotal(t) || t.refundForId) return;
    if (t.category !== category) return;
    if (catGroup(t.category) !== "fixed") return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt >= 0) return;
    const mk = merchantKey(t.description);
    const r = merch[mk] || (merch[mk] = { cycles: {}, lastT: 0, charge: 0 });
    r.cycles[cycleKey(t.date)] = true;
    const ts = new Date(t.date).getTime();
    if (ts >= r.lastT) { r.lastT = ts; r.charge = -amt; }
  });
  Object.keys(merch).forEach((mk) => {
    const r = merch[mk];
    const freq = state.merchantFreq[mk];
    if (freq === "ignore") return;
    if (!freq && Object.keys(r.cycles).length < 2) return;
    fullMonthly += monthlyEquivalent(r.charge, freq || "monthly");
  });
  openModal((modal) => {
    modal.innerHTML = '<h2>Split ' + esc(category) + " with roommates</h2>"
      + '<p class="hint">Every bill inside <b>' + esc(category)
      + "</b> will be shown at your share — set how many people split it. "
      + "Underlying transactions stay untouched so the bank figures still "
      + "reconcile; only the displayed amounts and the Fixed-bills / "
      + "Overview totals change.</p>"
      + '<div class="field"><label>Total people splitting (including you)</label>'
      + '<input id="sp-count" type="number" min="1" max="50" step="1" value="'
      + current + '"></div>'
      + '<div class="sp-preview" id="sp-preview"></div>'
      + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
      + (current > 1
          ? '<button class="danger" id="sp-clear">Remove split</button>'
          : "")
      + '<button class="primary" id="sp-save">Save</button></div>';
    const input = modal.querySelector("#sp-count");
    const preview = modal.querySelector("#sp-preview");
    const refresh = () => {
      const n = Math.max(1, Math.round(Number(input.value) || 1));
      if (fullMonthly > 0 && n > 1) {
        preview.innerHTML = "Full category bill: <b>" + money(fullMonthly, "ILS")
          + "/mo</b><br>Your share: <b>" + money(fullMonthly / n, "ILS")
          + "/mo</b> · roommates pay <b>"
          + money(fullMonthly * (n - 1) / n, "ILS") + "/mo</b>";
      } else if (fullMonthly > 0) {
        preview.innerHTML = "No split — full <b>" + money(fullMonthly, "ILS")
          + "/mo</b> counts as yours.";
      } else {
        preview.innerHTML = "No recurring bills in this category yet.";
      }
    };
    input.addEventListener("input", refresh);
    refresh();
    const save = async (n) => {
      try {
        await api("/category-split", "PUT", { category, splitCount: n });
        const fresh = await api("/category-splits")
          .catch(() => ({ splits: state.categorySplits }));
        state.categorySplits = fresh.splits || state.categorySplits;
        closeOverlay();
        render();
        toast(n > 1
          ? esc(category) + " split ÷" + n + " saved."
          : "Split removed from " + esc(category) + ".");
      } catch (e) {
        toast((e && e.message) || "Could not save the split.", true);
      }
    };
    modal.querySelector('[data-x="cancel"]').addEventListener("click", closeOverlay);
    modal.querySelector("#sp-save").addEventListener("click", () => {
      save(Math.max(1, Math.round(Number(input.value) || 1)));
    });
    const clear = modal.querySelector("#sp-clear");
    if (clear) clear.addEventListener("click", () => save(1));
  });
}

// Reads every control inside `root` into the `settings` object, persists, and
// re-renders. Centralised so both auto-save (the full-page view) and the
// modal's Save button stay in lockstep.
async function commitSettings(root) {
  settings.monthStartDay = Number(root.querySelector("#set-startday").dataset.value) || 1;
  settings.projectRecurring = root.querySelector("#set-project").checked;
  const segOn = root.querySelector("#set-incomescope button.on");
  settings.incomeAvgMonths = segOn ? Number(segOn.dataset.scope) : 3;
  settings.hideCardTotals = root.querySelector("#set-hidecards").checked;
  // settings.cardProviders is maintained in place by the chip picker — chip
  // toggles and custom-matcher edits mutate the array directly, so there is
  // nothing to read out of the DOM here.
  saveSettings();
  state.activityMonth = null;   // re-pick against the new cycle
  try { state.budget = await api(budgetUrl()); } catch (e) {}
}

// Wires up controls inside the Settings view: segmented toggle, model section,
// Splitwise section, and an auto-save listener on every change. The "Saved"
// chip pulses each time a change lands so it's obvious work persisted.
function bindSettings(root) {
  llmPanelMode = null;
  fillModelSection();
  fillSplitwiseSection();

  const seg = root.querySelector("#set-incomescope");
  if (seg) {
    seg.addEventListener("click", (e) => {
      const b = e.target.closest("button");
      if (!b) return;
      seg.querySelectorAll("button").forEach((x) => x.classList.remove("on"));
      b.classList.add("on");
      autoSave();
    });
  }

  const saveChip = root.querySelector("#set-saved");
  let saveTimer = null;
  async function autoSave() {
    await commitSettings(root);
    if (saveChip) {
      saveChip.classList.add("on");
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => saveChip.classList.remove("on"), 1400);
    }
    // Re-render so the rest of the app reflects the new settings, but do
    // it from the next tick so the input's own change handler can finish.
    setTimeout(() => {
      if (state.tab === "settings") {
        // Avoid full re-render — it would tear down the controls mid-edit.
        // Other tabs pick up the new settings on their next visit.
      } else {
        render();
      }
    }, 0);
  }

  // Auto-save on every control change (the switches and the dropdown).
  root.querySelectorAll("#set-project, #set-hidecards")
    .forEach((el) => el.addEventListener("change", autoSave));

  // Custom dropdown for the billing-cycle day — opens its own styled popover,
  // closes on outside click or Escape, and writes back via dataset.value.
  const dd = root.querySelector("#set-startday");
  if (dd) {
    const trigger = dd.querySelector(".dd-trigger");
    const menu = dd.querySelector(".dd-menu");
    const close = () => {
      dd.classList.remove("open");
      trigger.setAttribute("aria-expanded", "false");
    };
    trigger.addEventListener("click", (e) => {
      e.stopPropagation();
      const opening = !dd.classList.contains("open");
      if (opening) {
        // Open upward when there isn't enough room below — keeps the list
        // from clipping past the bottom of the viewport on shorter windows.
        const rect = dd.getBoundingClientRect();
        const spaceBelow = window.innerHeight - rect.bottom;
        const spaceAbove = rect.top;
        const opts = menu.querySelectorAll(".dd-opt").length;
        const estimated = Math.min(opts * 42 + 14, 320);
        dd.classList.toggle("up",
          spaceBelow < estimated + 12 && spaceAbove > spaceBelow);
      }
      dd.classList.toggle("open", opening);
      trigger.setAttribute("aria-expanded", String(opening));
    });
    menu.addEventListener("click", (e) => {
      const opt = e.target.closest(".dd-opt");
      if (!opt) return;
      const v = opt.dataset.value;
      dd.dataset.value = v;
      dd.querySelector(".dd-label").textContent = opt.querySelector("span").textContent;
      dd.querySelectorAll(".dd-opt").forEach((o) => o.classList.toggle("on", o === opt));
      close();
      autoSave();
    });
    document.addEventListener("click", (e) => {
      if (!dd.contains(e.target)) close();
    });
    dd.addEventListener("keydown", (e) => {
      if (e.key === "Escape") { close(); trigger.focus(); }
    });
  }

  // Card-provider chip picker — toggle a brand, type a custom matcher, or
  // remove one. Each interaction mutates settings.cardProviders in place,
  // re-renders the picker so the chip states stay in sync, then auto-saves.
  function refreshPicker() {
    const host = root.querySelector("#set-providers-picker");
    if (host) host.outerHTML = providerPickerHtml();
  }
  function termsEqual(a, b) {
    return a.toLowerCase() === b.toLowerCase();
  }
  root.addEventListener("click", (e) => {
    const chip = e.target.closest(".chip[data-provider]");
    if (chip && root.contains(chip)) {
      const id = chip.dataset.provider;
      const provider = CARD_PROVIDERS_CATALOG.find((p) => p.id === id);
      if (!provider) return;
      const cur = settings.cardProviders || [];
      const lower = new Set(cur.map((t) => t.toLowerCase()));
      const on = provider.terms.every((t) => lower.has(t.toLowerCase()));
      settings.cardProviders = on
        ? cur.filter((t) => !provider.terms.some((p) => termsEqual(p, t)))
        : cur.concat(provider.terms.filter((t) => !lower.has(t.toLowerCase())));
      refreshPicker();
      autoSave();
      return;
    }
    const rm = e.target.closest("[data-remove-term]");
    if (rm && root.contains(rm)) {
      const term = rm.dataset.removeTerm;
      settings.cardProviders = (settings.cardProviders || [])
        .filter((t) => !termsEqual(t, term));
      refreshPicker();
      autoSave();
    }
  });
  root.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    const input = e.target.closest("#set-providers-add");
    if (!input) return;
    e.preventDefault();
    const v = input.value.trim();
    if (!v) return;
    const cur = settings.cardProviders || [];
    const exists = cur.some((t) => termsEqual(t, v));
    if (!exists) settings.cardProviders = cur.concat([v]);
    input.value = "";
    refreshPicker();
    autoSave();
    // Refocus the (newly-rendered) input so the user can keep adding.
    const next = root.querySelector("#set-providers-add");
    if (next) next.focus();
  });
}

        + '<div class="field"><input id="otp-code" type="text" inputmode="numeric" '
        + 'autocomplete="one-time-code" placeholder="123456"></div>'
        + '<div class="modal-actions"><button class="primary" data-x="submit">Submit</button></div>';
      const input = modal.querySelector("#otp-code");
      input.focus();
      const done = () => {
        const code = input.value.trim();
        if (!code) return;
        closeOverlay();
        resolve(code);
      };
      modal.querySelector('[data-x="submit"]').addEventListener("click", done);
      input.addEventListener("keydown", (e) => { if (e.key === "Enter") done(); });
    });
  });
}

// Always runs the 2FA-aware path: if the bank asks for a one-time code, the
// OTP prompt starts automatically.
async function scrape(conn) {
  if (state.scrapes[conn.id] && state.scrapes[conn.id].phase === "running") return;
  state.scrapes[conn.id] = {
    phase: "running",
    // Placeholder — the engine overwrites this within a beat with the live
    // progress (e.g. "Reconnecting with your saved session…" when cookies
    // are still valid, or "Logging in…" for a fresh sign-in).
    message: "Starting sync…",
  };
  render();
  try {
    const { runId } = await api("/connections/" + conn.id + "/scrape", "POST",
      { interactive: true, monthsBack: 24 });
    while (true) {
      await sleep(1500);
      const { run } = await api("/scrape/" + runId);
      if (run.status === "needs-otp") {
        state.scrapes[conn.id] = { phase: "running", message: "Waiting for your code…" };
        render();
        const code = await promptOtp(run.message);
        await api("/scrape/" + runId + "/otp", "POST", { code });
        state.scrapes[conn.id] = { phase: "running", message: "Submitting code…" };
        render();
      } else if (run.status === "running") {
        state.scrapes[conn.id] = { phase: "running", message: run.message };
        render();
      } else {
        state.scrapes[conn.id] = {
          phase: run.status === "success" ? "done" : "failed", message: run.message,
        };
        render();
        break;
      }
    }
    await loadAll();
    await maybeAutoCategorize();
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    state.scrapes[conn.id] = { phase: "failed", message: e.message };
    render();
  }
}

async function syncAll() {
  for (const conn of state.connections) {
    if (conn.companyId !== SNAPTRADE_ID || conn.lastScrapeAt) await scrape(conn);
  }
}

  if (!state.transactions.some((t) => !t.category)) return;

// Saves the transaction panel: applies a category change (optionally as a
// merchant rule) and any change to the linked refund/reimbursement.
async function saveMove() {
  if (!state.move) return;
  const m = state.move;
  const txn = state.transactions.find((t) => t.id === m.txnId);
  if (!txn) { state.move = null; render(); return; }
  const refundChanged = (m.refundId || null) !== (txn.refundId || null);
  const mKey = merchantKey(txn.description);
  const isIncome = txn.amount > 0 && !txn.refundForId;
  const incomeWant = isIncome && m.frequency === "income" ? "income" : "none";
  const incomeChanged = isIncome
    && incomeWant !== (state.merchantFreq[mKey] === "income" ? "income" : "none");
  if (!m.picked && !refundChanged && !incomeChanged) return;
  try {
    if (m.picked && (m.picked !== (txn.category || "") || m.always)) {
      await api("/transactions/" + m.txnId + "/category", "PATCH",
        { category: m.picked, applyToMerchant: m.always });
    }
    // Remember the billing frequency per merchant when it is a recurring bill.
    if (m.picked && recurrenceChoices(m.picked)) {
      const freq = m.frequency || "monthly";
      if (freq !== (state.merchantFreq[mKey] || "monthly")) {
        await api("/merchant-frequency", "PUT", { key: mKey, frequency: freq });
      }
    }
    // Mark or un-mark this source as recurring (salary-type) income.
    if (incomeChanged) {
      await api("/merchant-frequency", "PUT", { key: mKey, frequency: incomeWant });
    }
    // Refund link save: PUT now carries the per-allocation amount, so a
    // single transfer can split across multiple expenses with each leg
    // tracked individually. An omitted amount lets the server default to
    // "the unallocated balance, capped at the expense's magnitude" — the
    // common single-refund-single-expense behaviour.
    const linkAmount = typeof m.linkAmount === "number" && m.linkAmount > 0
      ? m.linkAmount : undefined;
    if (refundChanged) {
      if (m.refundId) {
        await api("/transactions/" + m.txnId + "/link", "PUT",
          { refundId: m.refundId, amount: linkAmount });
      } else {
        await api("/transactions/" + m.txnId + "/link", "DELETE");
      }
    } else if (m.refundId && linkAmount !== undefined) {
      // The refund pick didn't change but the amount input did — re-issue
      // the link with the new amount so the allocation reflects what the
      // user typed.
      const existing = transactionLinkFor(m.txnId, m.refundId);
      if (!existing || Math.abs(existing.amount - linkAmount) > 0.005) {
        await api("/transactions/" + m.txnId + "/link", "PUT",
          { refundId: m.refundId, amount: linkAmount });
      }
    }
    const movedCat = m.picked && (m.picked !== (txn.category || "") || m.always);
    state.move = null;
    await loadAll();
    toast(refundChanged && m.refundId ? "Reimbursement linked."
      : refundChanged ? "Reimbursement removed."
      : movedCat && m.always
          ? "Moved to " + m.picked + " — saved as a rule for this business."
      : movedCat ? "Moved to " + m.picked + "."
      : incomeChanged ? (incomeWant === "income"
          ? "Marked as recurring income." : "No longer recurring income.")
      : "Saved.");
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast(e.message, true);
  }
}

// Steps the Activity month picker: delta +1 = older, -1 = newer.
function shiftMonth(delta) {
  const months = activityMonths();
  const i = months.indexOf(state.activityMonth);
  const next = i + delta;
  if (i < 0 || next < 0 || next >= months.length) return;
  state.activityMonth = months[next];
  state.batch = {};
  render();
}

// Moves every batch-selected transaction to one category.
async function saveBatch() {
  const ids = Object.keys(state.batch);
  if (!ids.length) return;
  const cat = state.batchCat || categoryNames()[0] || "Other";
  try {
    for (const id of ids) {
      await api("/transactions/" + id + "/category", "PATCH",
        { category: cat, applyToMerchant: false });
    }
    state.batch = {};
    state.selectMode = false;
    await loadAll();
    toast("Moved " + ids.length + (ids.length === 1 ? " transaction" : " transactions")
      + " to " + cat + ".");
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast(e.message, true);
  }
}

// The Splitwise link for a transaction, if it has been split (else undefined).
function splitwiseLink(txnId) {
  return state.splitwise.links.find((l) => l.transactionId === txnId);
}

// The "· ₪X owed to you" / "· paid back" note shown under a split transaction.
function splitwiseNote(t) {
  const link = splitwiseLink(t.id);
  if (!link) return "";
  if (link.paidState === "paid") {
    return ' · <span class="txn-sw paid">paid back</span>';
  }
  const remaining = Math.max(0, link.owedToMe - (link.paidAmount || 0));
  return ' · <span class="txn-sw">' + money(remaining, link.currency)
    + " owed to you</span>";
}

// Loads Splitwise connection state and links, then refreshes balances and
// paid state. Optional — a failure never blocks the rest of the dashboard.
async function loadSplitwise() {
  try {
    const [status, links] = await Promise.all([
      api("/splitwise/status"), api("/splitwise/links"),
    ]);
    state.splitwise.connected = !!status.connected;
    state.splitwise.user = status.user || null;
    state.splitwise.links = links.links || [];
    state._sidebarSig = null;
    render();
  } catch (e) { return; }
  if (!state.splitwise.connected) return;
  try {
    const r = await api("/splitwise/refresh", "POST");
    state.splitwise.friends = r.friends || [];
    state.splitwise.links = r.links || state.splitwise.links;
    state._sidebarSig = null;
    render();
  } catch (e) { /* balances are best-effort */ }
}

// The Overview "Owed to you" card — friends who currently owe the user.
function splitwiseCard() {
  const sw = state.splitwise;
  if (!sw.connected) return "";
  const owing = (sw.friends || [])
    .map((f) => ({ name: f.name,
      owed: (f.balances || []).filter((b) => b.amount > 0) }))
    .filter((f) => f.owed.length);
  let body;
  if (owing.length) {
    body = '<div class="list">' + owing.map((f) =>
      '<div class="row"><div class="name">' + esc(f.name) + "</div>"
      + '<span class="amount pos">'
      + f.owed.map((b) => money(b.amount, b.currency)).join(" · ")
      + "</span></div>").join("") + "</div>";
  } else {
    body = '<div class="empty">You\'re all settled up on Splitwise.</div>';
  }
  return '<section class="card"><div class="card-head"><h3>Owed to you</h3>'
    + '<span class="spacer"></span><span class="meta">via Splitwise</span>'
    + "</div>" + body + "</section>";
}

// The sheet for splitting one transaction onto Splitwise: pick a friend or
// group, set the split, and create the expense.
function splitwiseSheet(txn) {
  const cost = Math.abs(txn.amount);
  openModal((modal) => {
    let data = null;   // { friends, groups, me }
    let pick = null;   // { kind, id, name, members? }

    const cancelRow = '<div class="modal-actions">'
      + '<button data-x="cancel">Cancel</button></div>';
    const bindCancel = () => {
      const c = modal.querySelector('[data-x="cancel"]');
      if (c) c.addEventListener("click", closeOverlay);
    };

    const renderLoading = () => {
      modal.innerHTML = "<h2>Split on Splitwise</h2>"
        + '<p class="hint">Loading your friends and groups…</p>' + cancelRow;
      bindCancel();
    };

    const renderError = (msg) => {
      modal.innerHTML = "<h2>Split on Splitwise</h2>"
        + '<p class="hint">' + esc(msg) + "</p>" + cancelRow;
      bindCancel();
    };

    const renderPick = () => {
      const friends = (data.friends || []).map((f) =>
        '<div class="pick-row" data-sw-friend="' + esc(String(f.id)) + '">'
        + '<span class="logo">🧑</span><div>' + esc(f.name)
        + "</div></div>").join("");
      const groups = (data.groups || []).map((g) =>
        '<div class="pick-row" data-sw-group="' + esc(String(g.id)) + '">'
        + '<span class="logo">👥</span><div>' + esc(g.name)
        + "</div></div>").join("");
      if (!friends && !groups) {
        return renderError("No Splitwise friends or groups found — add some in "
          + "the Splitwise app first.");
      }
      modal.innerHTML = "<h2>Split on Splitwise</h2>"
        + '<p class="hint">' + esc(txn.description) + " · "
        + money(cost, txn.currency) + " · " + fmtDate(txn.date) + "</p>"
        + (friends ? '<div class="label sb-label">Friends</div>'
            + '<div class="pick-list">' + friends + "</div>" : "")
        + (groups ? '<div class="label sb-label">Groups</div>'
            + '<div class="pick-list">' + groups + "</div>" : "")
        + cancelRow;
      bindCancel();
      modal.querySelectorAll("[data-sw-friend]").forEach((el) =>
        el.addEventListener("click", () => {
          const f = data.friends.find((x) => String(x.id) === el.dataset.swFriend);
          if (f) { pick = { kind: "friend", id: f.id, name: f.name }; renderConfigure(); }
        }));
      modal.querySelectorAll("[data-sw-group]").forEach((el) =>
        el.addEventListener("click", () => {
          const g = data.groups.find((x) => String(x.id) === el.dataset.swGroup);
          if (g) {
            pick = { kind: "group", id: g.id, name: g.name, members: g.members || [] };
            renderConfigure();
          }
        }));
    };

    const renderConfigure = () => {
      if (pick.kind === "friend") return renderFriend();
      return renderGroup();
    };

    const renderFriend = () => {
      modal.innerHTML = "<h2>Split with " + esc(pick.name) + "</h2>"
        + '<p class="hint">' + esc(txn.description) + " · "
        + money(cost, txn.currency) + "</p>"
        + '<div class="field"><label>How much does ' + esc(pick.name)
        + " owe you?</label>"
        + '<input id="sw-owed" type="number" min="0" step="0.01" value="'
        + (cost / 2).toFixed(2) + '"></div>'
        + '<p class="sub-hint" id="sw-hint"></p>'
        + '<div class="modal-err" id="sw-err" hidden></div>'
        + '<div class="modal-actions"><button data-x="back">‹ Back</button>'
        + '<button class="primary" data-x="create">Add to Splitwise</button></div>';
      const owed = modal.querySelector("#sw-owed");
      const hint = modal.querySelector("#sw-hint");
      const refreshHint = () => {
        const v = Math.min(cost, Math.max(0, Number(owed.value) || 0));
        hint.textContent = "You keep " + money(cost - v, txn.currency)
          + "; " + pick.name + " owes you " + money(v, txn.currency) + ".";
      };
      owed.addEventListener("input", refreshHint);
      refreshHint();
      modal.querySelector('[data-x="back"]')
        .addEventListener("click", () => { pick = null; renderPick(); });
      modal.querySelector('[data-x="create"]').addEventListener("click", () => {
        const v = Number(owed.value);
        const err = modal.querySelector("#sw-err");
        if (!Number.isFinite(v) || v <= 0) {
          err.textContent = "Enter how much " + pick.name + " owes you.";
          err.hidden = false;
          return;
        }
        if (v > cost + 0.001) {
          err.textContent = "That is more than the expense.";
          err.hidden = false;
          return;
        }
        create(null, [{ userId: pick.id, name: pick.name, owed: v }]);
      });
    };

    const renderGroup = () => {
      const others = (pick.members || [])
        .filter((m) => !data.me || m.id !== data.me.id);
      if (!others.length) {
        return renderError("That group has no one else in it to split with.");
      }
      modal.innerHTML = "<h2>Split with " + esc(pick.name) + "</h2>"
        + '<p class="hint">' + esc(txn.description) + " · "
        + money(cost, txn.currency)
        + " — split equally among everyone ticked, including you.</p>"
        + '<div class="sw-members">' + others.map((m) =>
            '<label class="sw-member"><input type="checkbox" data-sw-mem="'
            + esc(String(m.id)) + '" checked><span>' + esc(m.name)
            + "</span></label>").join("") + "</div>"
        + '<p class="sub-hint" id="sw-hint"></p>'
        + '<div class="modal-err" id="sw-err" hidden></div>'
        + '<div class="modal-actions"><button data-x="back">‹ Back</button>'
        + '<button class="primary" data-x="create">Add to Splitwise</button></div>';
      const hint = modal.querySelector("#sw-hint");
      const checks = [...modal.querySelectorAll("[data-sw-mem]")];
      const checked = () => checks.filter((c) => c.checked);
      const refreshHint = () => {
        const n = checked().length + 1;   // +1 for you
        const share = cost / n;
        hint.textContent = "Each of " + n + " pays " + money(share, txn.currency)
          + "; you're owed " + money(cost - share, txn.currency) + ".";
      };
      checks.forEach((c) => c.addEventListener("change", refreshHint));
      refreshHint();
      modal.querySelector('[data-x="back"]')
        .addEventListener("click", () => { pick = null; renderPick(); });
      modal.querySelector('[data-x="create"]').addEventListener("click", () => {
        const on = checked();
        const err = modal.querySelector("#sw-err");
        if (!on.length) {
          err.textContent = "Tick at least one person.";
          err.hidden = false;
          return;
        }
        const share = cost / (on.length + 1);
        const shares = on.map((c) => {
          const m = others.find((x) => String(x.id) === c.dataset.swMem);
          return { userId: m.id, name: m.name, owed: share };
        });
        create(pick.id, shares);
      });
    };

    const create = async (groupId, shares) => {
      const err = modal.querySelector("#sw-err");
      try {
        const r = await api("/splitwise/expense", "POST", {
          transactionId: txn.id, groupId: groupId, shares: shares,
        });
        if (r && r.link) {
          state.splitwise.links = state.splitwise.links
            .filter((l) => l.transactionId !== txn.id).concat([r.link]);
        }
        closeOverlay();
        state._sidebarSig = null;
        render();
        toast("Added to Splitwise.");
        loadSplitwise();
      } catch (e) {
        if (e instanceof VaultLocked) { closeOverlay(); return showGate(); }
        if (err) { err.textContent = e.message; err.hidden = false; }
        else toast(e.message, true);
      }
    };

    renderLoading();
    api("/splitwise/groups")
      .then((r) => {
        data = { friends: r.friends || [], groups: r.groups || [], me: r.me || null };
        renderPick();
      })
      .catch((e) => {
        if (e instanceof VaultLocked) { closeOverlay(); return showGate(); }
        renderError(e.message);
      });
  });
}
