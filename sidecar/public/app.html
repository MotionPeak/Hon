    if (d.km) bits.push(Number(d.km).toLocaleString() + " km");
    if (bits.length) sub = bits.join(" · ");
  }
  return '<div class="card asset-card' + (a.excluded ? " nw-off" : "")
    + '"><div class="card-head">'
    + '<span class="logo">' + meta[0] + "</span>"
    + '<div style="min-width:0"><h3>' + esc(a.name) + "</h3>"
    + '<div class="meta">' + esc(sub) + "</div></div>"
    + '<span class="conn-total">' + money(a.value, a.currency) + "</span></div>"
    + '<div class="conn-foot actions">'
    + nwTick("asset", a.id, a.excluded)
    + '<button class="mini" data-action="edit-asset" data-id="' + esc(a.id)
    + '">Edit</button>'
    + '<button class="mini danger" data-action="remove-asset" data-id="' + esc(a.id)
    + '">Remove</button></div></div>';
}

/* --- Activity ------------------------------------------------------------ */

// Billing-cycle months (newest first) that have at least one transaction.
function activityMonths() {
  const set = {};
  state.transactions.forEach((t) => {
    if (isCardTotal(t) || t.refundForId) return;
    const k = cycleKey(t.date);
    if (k && k.length === 7) set[k] = true;
  });
  return Object.keys(set).sort().reverse();
}

function batchBar() {
  if (!state.selectMode) return "";
  const n = Object.keys(state.batch).length;
  const cur = state.batchCat || CATEGORIES[0];
  const [curEm, curColor] = catStyle(cur);
  let menu = "";
  if (state.batchOpen) {
    menu = '<div class="bcat-menu">' + CATEGORIES.map((c) => {
      const [em, color] = catStyle(c);
      return '<div class="bcat-opt' + (c === cur ? " on" : "")
        + '" data-batch-cat="' + esc(c) + '">'
        + '<span class="bcat-em" style="background:' + color + '22">' + em + "</span>"
        + "<span>" + esc(c) + "</span>"
        + (c === cur ? '<span class="bcat-check">✓</span>' : "") + "</div>";
    }).join("") + "</div>";
  }
  return '<div class="batch-bar">'
    + '<span class="batch-n">' + (n ? n + " selected" : "Tap rows to select")
    + "</span><span class=\"batch-sep\">move to</span>"
    + '<div class="bcat">'
    + '<button class="bcat-btn' + (state.batchOpen ? " open" : "")
    + '" data-action="batch-toggle">'
    + '<span class="bcat-em" style="background:' + curColor + '22">' + curEm + "</span>"
    + "<span>" + esc(cur) + '</span><span class="bcat-chev">▾</span></button>'
    + menu + "</div>"
    + '<button class="primary" data-action="batch-move"'
    + (n ? "" : " disabled") + ">Move</button>"
    + '<button data-action="batch-clear"' + (n ? "" : " disabled")
    + ">Clear</button></div>";
}

function activityView() {
  if (!state.transactions.length) {
    return '<div class="card empty">No transactions yet — '
      + "sync an account to see activity.</div>";
  }
  const byId = {};
  state.accounts.forEach((a) => { byId[a.id] = a; });

  const months = activityMonths();
  if (!months.length) months.push(new Date().toISOString().slice(0, 7));
  if (!state.activityMonth || months.indexOf(state.activityMonth) < 0) {
    state.activityMonth = months[0];
  }
  const mi = months.indexOf(state.activityMonth);
  const inCycle = state.transactions.filter(
    (t) => cycleKey(t.date) === state.activityMonth);
  const hidden = inCycle.filter(isCardTotal).length;
  // Refunds are folded into their expense, so they don't show as their own row.
  const folded = inCycle.filter((t) => t.refundForId && !isCardTotal(t)).length;
  const monthTxns = inCycle.filter((t) => !isCardTotal(t) && !t.refundForId);

  // Group the month's transactions under their spending category.
  const groups = {};
  monthTxns.forEach((t) => {
    const cat = t.category || "Uncategorized";
    (groups[cat] || (groups[cat] = [])).push(t);
  });
  const order = CATEGORIES.concat(["Uncategorized"]);
  const cats = Object.keys(groups).sort((a, b) => {
    const ia = order.indexOf(a), ib = order.indexOf(b);
    return ((ia < 0 ? 999 : ia) - (ib < 0 ? 999 : ib)) || a.localeCompare(b);
  });
  state._actCats = cats;
  const allCollapsed = cats.length && cats.every((c) => state.collapsed[c]);
  const catRunning = state.categorize && state.categorize.state === "running";

  const header = '<div class="card act-bar">'
    + '<div class="month-pick">'
    + '<button class="icon-btn" data-action="month-prev"'
    + (mi >= months.length - 1 ? " disabled" : "") + ">‹</button>"
    + '<span class="month-label">' + esc(cycleLabel(state.activityMonth)) + "</span>"
    + '<button class="icon-btn" data-action="month-next"'
    + (mi <= 0 ? " disabled" : "") + ">›</button></div>"
    + '<div class="act-meta"><span class="act-count">' + monthTxns.length
    + (monthTxns.length === 1 ? " transaction" : " transactions") + "</span>"
    + (catRunning
        ? '<span class="act-cat"><span class="spin">⟳</span> Categorizing… '
          + (state.categorize.done || 0) + "/" + (state.categorize.total || 0)
          + "</span>"
        : hidden ? '<span class="act-hidden">' + hidden + " card-bill line"
            + (hidden === 1 ? "" : "s") + " hidden</span>" : "")
    + (folded ? '<span class="act-hidden">' + folded + " reimbursement"
        + (folded === 1 ? "" : "s") + " applied</span>" : "")
    + "</div><span class=\"spacer\"></span>"
    + (cats.length > 1
        ? '<button class="mini" data-action="collapse-all">'
          + (allCollapsed ? "Expand all" : "Collapse all") + "</button>" : "")
    + '<button class="mini' + (state.selectMode ? " primary" : "")
    + '" data-action="toggle-select">'
    + (state.selectMode ? "Done" : "Select") + "</button></div>";

  if (!monthTxns.length) {
    return header + '<div class="card empty">No transactions in '
      + esc(cycleLabel(state.activityMonth)) + ".</div>";
  }

  const txnRow = (t, i) => {
    const acct = byId[t.accountId];
    const place = acct ? " · " + esc(acct.label || acct.connectionName) : "";
    const [em, color] = catStyle(t.category || "Other");
    const picked = !!state.batch[t.id];
    const sel = !state.selectMode && state.move && state.move.txnId === t.id
      ? " sel" : "";
    const check = state.selectMode
      ? '<span class="txn-check' + (picked ? " on" : "") + '">'
        + (picked ? "✓" : "") + "</span>" : "";
    const refund = txnRefundAmount(t);
    const note = refund
      ? '<span class="txn-refund"> · ' + money(refund, t.currency)
        + " reimbursed</span>" : "";
    const swNote = splitwiseNote(t);
    const shown = t.amount + refund;
    return '<div class="txn' + sel + (picked ? " picked" : "")
      + '" data-txn="' + esc(t.id)
      + '" style="animation-delay:' + Math.min(i, 16) * 20 + 'ms">'
      + check
      + '<span class="txn-icon" style="background:' + color + '26;color:' + color
      + '">' + em + "</span>"
      + '<div class="txn-main"><div class="txn-name">' + esc(t.description) + "</div>"
      + '<div class="txn-sub">' + fmtDate(t.date) + place + note + swNote
      + "</div></div>"
      + '<div class="txn-amt' + (shown > 0 ? " pos" : "") + '">'
      + money(shown, t.currency, true) + "</div></div>";
  };
  const buildCard = (cat) => {
    const [, color] = catStyle(cat === "Uncategorized" ? "Other" : cat);
    const list = groups[cat].slice().sort((a, b) => new Date(b.date) - new Date(a.date));
    const collapsed = !!state.collapsed[cat];
    let total = 0, cur = "ILS";
    list.forEach((t) => { total += t.amount + txnRefundAmount(t); cur = t.currency; });
    const picks = list.filter((t) => state.batch[t.id]).length;
    const count = picks ? picks + " / " + list.length : String(list.length);
    const html = '<div class="card cat-card' + (collapsed ? " collapsed" : "") + '">'
      + '<div class="cat-head" data-collapse="' + esc(cat) + '">'
      + '<span class="cat-chev' + (collapsed ? " col" : "") + '">▾</span>'
      + '<span class="cat-dot" style="background:' + color + '"></span>'
      + '<span class="cat-name">' + esc(cat) + "</span>"
      + '<span class="cat-count' + (picks ? " has" : "") + '">' + count + "</span>"
      + '<span class="cat-total" style="color:' + (total < 0 ? "var(--text)" : "var(--green)")
      + '">' + money(total, cur, true) + "</span></div>"
      + (collapsed ? ""
          : '<div class="cat-list">' + list.map(txnRow).join("") + "</div>")
      + "</div>";
    // Rough rendered height, used only to balance the columns.
    return { html, h: collapsed ? 56 : 70 + list.length * 57, total, cur };
  };
  // Columns are height-balanced so each column's first card lines up at the
  // top (a CSS multi-column layout leaves a ragged gap above later columns).
  const contentEl = document.getElementById("content");
  const colW = (contentEl && contentEl.clientWidth) || 880;
  const baseCols = allCollapsed ? 1 : Math.max(1, Math.min(3, Math.floor(colW / 380)));

  // Group the category cards under the Fixed / Variable / Other umbrellas.
  let firstShown = true;
  const sections = GROUP_ORDER.map((g) => {
    const ucats = cats.filter((c) => catGroup(c) === g);
    if (!ucats.length) return "";
    const data = ucats.map(buildCard);
    let total = 0, cur = "ILS";
    data.forEach((d) => { total += d.total; cur = d.cur; });
    // Always pack into the same number of columns so card widths stay
    // consistent between umbrellas, even when one has a single card.
    const cols = packColumns(data, (c) => c.h, baseCols);
    const grid = '<div class="act-cols">' + cols.map((col) =>
      '<div class="act-col">' + col.map((c) => c.html).join("") + "</div>").join("")
      + "</div>";
    const head = '<div class="umbrella"><span class="umbrella-name">'
      + GROUP_LABEL[g] + '</span><span class="umbrella-line"></span>'
      + '<span class="umbrella-total" style="color:'
      + (total < 0 ? "var(--text)" : "var(--green)") + '">'
      + money(total, cur, true) + "</span></div>";
    const cls = "act-section" + (firstShown ? "" : " gap");
    firstShown = false;
    return '<div class="' + cls + '">' + head + grid + "</div>";
  }).join("");

  return header + sections
    + (state.selectMode ? '<div style="height:88px"></div>' : "")
    + batchBar();
}

// Greedy bin-packing: places each item in the currently shortest column.
function packColumns(items, getHeight, colCount) {
  const cols = [];
  for (let i = 0; i < colCount; i++) cols.push({ h: 0, items: [] });
  items.forEach((it) => {
    let best = cols[0];
    for (const c of cols) if (c.h < best.h) best = c;
    best.items.push(it);
    best.h += getHeight(it);
  });
  return cols.map((c) => c.items);
}

// One essential-category budget row: emoji, spent / limit, and a usage bar.
function essentialLineHtml(l, currency) {
  const [emoji, color] = catStyle(l.category);
  const ratio = l.budget ? l.spent / l.budget : null;
  const pct = ratio == null ? 100 : Math.min(100, ratio * 100);
  const over = ratio != null && ratio > 1;
  const barColor = ratio == null ? color
    : over ? "var(--red)" : ratio > 0.85 ? "var(--amber)" : "var(--green)";
  let foot = "";
  if (ratio != null) {
    const left = l.budget - l.spent;
    const cls = over ? "over" : ratio > 0.85 ? "warn" : "ok";
    const txt = over ? money(-left, currency) + " over"
      : money(left, currency) + " left";
    foot = '<div class="bgt-foot"><span class="bgt-pct">'
      + Math.round(ratio * 100) + '% used</span>'
      + '<span class="bgt-left ' + cls + '">' + txt + "</span></div>";
  }
  return '<div class="bgt-line" data-action="edit-budgets">'
    + '<div class="bgt-head"><span class="bgt-emoji">' + emoji + "</span>"
    + '<span class="bgt-cat">' + esc(l.category) + "</span>"
    + (l.budget
        ? '<span class="bgt-amt">' + money(l.spent, currency)
          + ' <span class="bgt-cap">/ ' + money(l.budget, currency)
          + "</span></span>"
        : '<span class="bgt-nolimit">' + money(l.spent, currency)
          + " · set limit</span>")
    + "</div>"
    + '<div class="bgt-track"><div class="bgt-fill' + (over ? " over" : "")
    + '" style="width:' + pct + "%;background:" + barColor + '"></div></div>'
    + foot + "</div>";
}

// Expected recurring income and fixed-bill commitment for the projected
// budget. Only recurring income is averaged — a source seen in two or more
// cycles — so a one-off windfall does not inflate it; each fixed bill is
// reduced to a monthly-equivalent so a bimonthly bill is reserved every cycle.
// Returns null when projection is switched off in Settings.
function budgetProjection() {
  if (!settings.projectRecurring) return null;
  const n = settings.incomeAvgMonths || 3;

  // Detect recurring income: a source (merchant) that has deposited in two or
  // more distinct cycles. A one-off deposit — a windfall, a gift — is ignored.
  const incomeSeen = {}; // merchantKey -> { cycleKey: true }
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || t.refundForId || t.category === "Transfers") return;
    if (t.amount + txnRefundAmount(t) <= 0) return;
    const key = merchantKey(t.description);
    (incomeSeen[key] || (incomeSeen[key] = {}))[cycleKey(t.date)] = true;
  });
  const recurringIncome = {};
  Object.keys(incomeSeen).forEach((key) => {
    if (Object.keys(incomeSeen[key]).length >= 2) recurringIncome[key] = true;
  });
  // A source the user marked as recurring income always counts — even before
  // it has repeated enough to be detected automatically.
  Object.keys(state.merchantFreq).forEach((key) => {
    if (state.merchantFreq[key] === "income") recurringIncome[key] = true;
  });

  // Expected income: average that recurring income over the chosen window of
  // completed cycles that actually saw it.
  const win = {};
  let k = prevCycleKey(currentCycleKey()); // start at the last completed cycle
  for (let i = 0; i < n; i++) { win[k] = 0; k = prevCycleKey(k); }
  const cur = currentCycleKey();
  let cycleIncome = 0; // fallback: this cycle's own non-transfer income
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || t.refundForId || t.category === "Transfers") return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt <= 0) return;
    const ck = cycleKey(t.date);
    if (ck === cur) cycleIncome += amt;
    if (ck in win && recurringIncome[merchantKey(t.description)]) win[ck] += amt;
  });
  const earned = Object.keys(win).filter((c) => win[c] > 0);
  // No recurring income known yet — fall back to this cycle's actual income
  // (internal transfers excluded), never the raw server figure which counts
  // transfers as income.
  const expectedIncome = earned.length
    ? earned.reduce((s, c) => s + win[c], 0) / earned.length : cycleIncome;

  // Expected fixed commitment: every recurring fixed-group merchant reduced to
  // a monthly-equivalent. "Recurring" = a frequency is set, or it has charged
  // in two or more distinct cycles (a one-off fixed expense is not reserved).
  const merch = {};
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || isCardTotal(t) || t.refundForId) return;
    if (catGroup(t.category) !== "fixed") return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt >= 0) return;
    const key = merchantKey(t.description);
    const r = merch[key] || (merch[key] = { cycles: {}, lastT: 0, charge: 0 });
    r.cycles[cycleKey(t.date)] = true;
    const ts = new Date(t.date).getTime();
    if (ts >= r.lastT) { r.lastT = ts; r.charge = -amt; }
  });
  let expectedFixed = 0;
  Object.keys(merch).forEach((key) => {
    const r = merch[key];
    const freq = state.merchantFreq[key];
    if (!freq && Object.keys(r.cycles).length < 2) return; // one-off — skip
    expectedFixed += monthlyEquivalent(r.charge, freq || "monthly");
  });

  return { expectedIncome: expectedIncome, expectedFixed: expectedFixed };
}

// The variable-budget figures with recurring projection applied — income as a
// multi-month average, fixed bills smoothed to a monthly-equivalent. Falls back
// to the actual figures when projection is off.
function projectedVariable(v) {
  const p = budgetProjection();
  if (!p) return v;
  const income = p.expectedIncome != null ? p.expectedIncome : v.income;
  const essential = v.essentialSpent || 0;
  const committed = p.expectedFixed + essential;
  const piggy = v.piggyFunded || 0;
  const disposable = income - committed - piggy;
  return { spent: v.spent, income: income, fixedSpent: p.expectedFixed,
    essentialSpent: essential, committed: committed, piggyFunded: piggy,
    disposable: disposable, allowed: disposable - v.spent, projected: true };
}

// The computed variable / discretionary allowance: whatever this month's
// income leaves once fixed bills and essentials are paid, less the variable
// spending already made. Goes to zero once outgoings outpace income.
function variableCardHtml(v, currency) {
  const pool = v.disposable > 0 ? v.disposable : 0;
  const pct = pool > 0 ? Math.max(0, Math.min(100, (v.allowed / pool) * 100)) : 0;
  let cls = "", fillColor = "var(--green)", cap;
  if (!v.income && !v.committed && !v.spent) {
    cap = "No income or spending recorded this month yet.";
    fillColor = "var(--hairline-2)";
  } else if (v.disposable <= 0) {
    cls = "none"; fillColor = "var(--red)";
    cap = "You're spending more than you're bringing in — there's no room "
      + "for variable spending this month.";
  } else if (v.allowed <= 0) {
    cls = "none"; fillColor = "var(--red)";
    cap = "This month's discretionary room is used up — anything more eats "
      + "into money meant for fixed bills and essentials.";
  } else {
    cls = pct <= 20 ? "low" : "ok";
    fillColor = pct <= 20 ? "var(--amber)" : "var(--green)";
    cap = "Free to spend on shopping, entertainment, travel and the like.";
  }
  const row = (k, val, out) => '<div class="bgt-var-row"><span class="k">' + k
    + '</span><span class="v' + (out ? " out" : "") + '">' + val + "</span></div>";
  return '<div class="bgt-group">Variable spending · allowed right now</div>'
    + '<div class="bgt-var ' + cls + '">'
    + '<div class="bgt-var-top"><span class="bgt-var-amt">'
    + money(v.allowed > 0 ? v.allowed : 0, currency)
    + '</span><span class="bgt-var-unit">left to spend</span></div>'
    + '<div class="bgt-var-cap">' + cap + "</div>"
    + '<div class="bgt-var-track"><div class="bgt-var-fill" style="width:'
    + pct + "%;background:" + fillColor + '"></div></div>'
    + '<div class="bgt-var-rows">'
    + row(v.projected ? "Expected income" : "Money in", money(v.income, currency))
    + row(v.projected ? "Expected fixed + essentials" : "Fixed + essential spend",
        "− " + money(v.committed, currency), true)
    + (v.piggyFunded
        ? row("Piggy banks", "− " + money(v.piggyFunded, currency), true) : "")
    + row("Variable spent", "− " + money(v.spent, currency), true)
    + "</div>"
    + (v.projected ? '<div class="bgt-var-note">Projected — fixed bills '
        + "reserved every cycle and income averaged over recent months. "
        + "Turn off in Settings.</div>" : "")
    + "</div>";
}

function budgetSection() {
  const b = state.budget;
  if (!b) return "";
  const essentials = b.essentials || [];
  const v = b.variable
    || { income: 0, committed: 0, spent: 0, disposable: 0, allowed: 0 };

  let body = variableCardHtml(projectedVariable(v), b.currency);
  if (essentials.length) {
    const sortRatio = (a, b2) => {
      const ra = a.budget ? a.spent / a.budget : -1;
      const rb = b2.budget ? b2.spent / b2.budget : -1;
      return rb - ra || b2.spent - a.spent;
    };
    body += '<div class="bgt-group">Essentials</div>'
      + essentials.slice().sort(sortRatio)
          .map((l) => essentialLineHtml(l, b.currency)).join("");
  }
  body += '<div class="bgt-tot"><span>Spent this month</span><span>'
    + money(b.totalSpent || 0, b.currency) + "</span></div>";

  return '<section class="card"><div class="card-head"><h3>Budget · '
    + esc(b.month) + '</h3><span class="spacer"></span>'
    + '<button class="mini" data-action="edit-budgets">Edit</button></div>'
    + body + "</section>";
}

/* --- Piggy banks --------------------------------------------------------- */

// The piggy-bank screen. The settled per-bank status (saved so far, whether
// this month's set-aside fit the budget) rides along in the budget report.
function piggyView() {
  const rep = (state.budget && state.budget.piggy)
    || { banks: [], fundedTotal: 0, headroom: 0 };
  const banks = rep.banks || [];
  const cur = (state.budget && state.budget.currency) || "ILS";

  if (!banks.length) {
    return '<div class="blank"><div class="be">🐷</div>'
      + "<h2>No piggy banks yet</h2>"
      + "<p>Create one for something you're saving toward — a trip, a new "
      + "camera, a rainy-day fund — and Hon sets a little aside each month, "
      + "counting it as an expense against your budget.</p>"
      + '<button class="primary" data-action="new-piggy">'
      + "+ Create your first piggy bank</button></div>";
  }

  const head = '<div class="pgy-head"><div><h2>Piggy banks</h2>'
    + '<div class="pgy-sub">Money set aside each month for what you\'re saving '
    + "up for. It counts as an expense — and pauses automatically on any month "
    + "it doesn't fit your budget.</div></div><span class=\"spacer\"></span>"
    + '<button class="primary" data-action="new-piggy">+ New piggy bank</button>'
    + "</div>";

  const skipped = banks.filter((b) => !b.complete && b.thisMonth.status === "skipped").length;
  const incomeWord = rep.projected ? "your expected income" : "income";
  const room = rep.headroom > 0
    ? "Saving room this month — " + incomeWord + " less fixed bills and "
      + "essentials: <b>" + money(rep.headroom, cur) + "</b>."
      + (rep.projected ? " Projected from your recurring income." : "")
    : "There's no saving room this month — " + incomeWord + " is fully taken "
      + "up by fixed bills and essentials.";
  const set = rep.fundedTotal > 0
    ? " <b>" + money(rep.fundedTotal, cur) + "</b> set aside so far." : "";
  const pause = skipped
    ? " " + skipped + (skipped === 1 ? " bank is" : " banks are")
      + " paused — they don't fit right now." : "";
  const onHoldCount = banks.filter((b) => b.onHold && !b.complete).length;
  const held = onHoldCount
    ? " " + onHoldCount + " on hold." : "";
  const strip = '<div class="pgy-headroom"><span>🪙</span><span>'
    + room + set + pause + held + "</span></div>";

  return head + strip + '<div class="pgy-grid">'
    + banks.map(piggyCard).join("") + "</div>";
}

function piggyCard(b) {
  const cur = b.currency || "ILS";
  const pct = Math.round((b.progress || 0) * 100);
  const deg = Math.max(0, Math.min(360, (b.progress || 0) * 360));
  const ringColor = b.complete ? "var(--green)"
    : b.onHold ? "var(--hairline-2)"
    : b.thisMonth.status === "skipped" ? "var(--amber)" : "var(--indigo)";
  const ring = '<div class="pgy-ring" style="background:conic-gradient('
    + ringColor + " " + deg.toFixed(1) + "deg, var(--card-hi) 0)\">"
    + '<div class="pgy-hole"><div class="pgy-pct">' + pct + "%</div>"
    + '<div class="pgy-pct-lbl">saved</div></div></div>';

  let badge;
  if (b.complete) {
    badge = '<div class="pgy-badge done"><span>🎉</span><span>Goal reached — '
      + money(b.targetAmount, cur) + " saved.</span></div>";
  } else if (b.onHold) {
    badge = '<div class="pgy-badge onhold"><span>⏸</span><span>On hold — you\'ve '
      + "paused this piggy bank. Resume it any time to start saving again."
      + "</span></div>";
  } else if (b.thisMonth.status === "funded") {
    badge = '<div class="pgy-badge funded"><span>✓</span><span>'
      + money(b.thisMonth.amount, cur) + " set aside this month.</span></div>";
  } else {
    badge = '<div class="pgy-badge skipped"><span>⏸</span><span>Paused this '
      + "month — the set-aside doesn't fit your budget right now.</span></div>";
  }

  let eta = "";
  if (!b.complete && b.monthsLeft != null) {
    eta = '<div class="pgy-eta">'
      + (b.monthsLeft <= 1 ? "About a month to go"
          : "About " + b.monthsLeft + " months to go")
      + " · " + money(b.monthlyAmount, cur) + "/mo</div>";
  }

  return '<div class="pgy-card' + (b.complete ? " done" : "")
    + (b.onHold && !b.complete ? " onhold" : "") + '">'
    + '<div class="pgy-card-top"><div class="pgy-emoji">' + esc(b.emoji)
    + '</div><div style="flex:1;min-width:0"><div class="pgy-name">'
    + esc(b.name) + '</div><div class="pgy-monthly">'
    + money(b.monthlyAmount, cur) + " a month</div></div></div>"
    + '<div class="pgy-body">' + ring
    + '<div class="pgy-figs"><div class="pgy-saved">' + money(b.saved, cur)
    + '</div><div class="pgy-target">of ' + money(b.targetAmount, cur)
    + " goal · " + money(b.remaining, cur) + " to go</div>" + eta + "</div></div>"
    + badge
    + '<div class="pgy-actions">'
    + '<button class="mini" data-action="edit-piggy" data-id="' + esc(b.id)
    + '">Edit</button>'
    + (b.complete ? ""
        : '<button class="mini" data-action="toggle-hold" data-id="' + esc(b.id)
          + '">' + (b.onHold ? "Resume" : "Hold") + "</button>")
    + '<span class="spacer"></span>'
    + '<button class="mini danger" data-action="remove-piggy" data-id="'
    + esc(b.id) + '">Delete</button></div></div>';
}

// Create / edit a piggy bank. The target amount drives a few "ready in N
// months" plans; picking one fills in the monthly set-aside, or type a custom.
function piggyModal(bank) {
  openModal((modal) => {
    const editing = !!bank;
    const cur = "ILS";
    const sym = SYMBOLS.ILS;
    let emoji = bank ? bank.emoji : "🐷";
    let planSel = "custom"; // a PIGGY_PLANS month count, or "custom"

    const emojiRow = PIGGY_EMOJI.map((e) =>
      '<button type="button" class="pgy-em' + (e === emoji ? " on" : "")
      + '" data-emoji="' + esc(e) + '">' + e + "</button>").join("");

    modal.innerHTML = "<h2>" + (editing ? "Edit piggy bank" : "New piggy bank")
      + "</h2><p class=\"hint\">What are you saving up for? Set a goal, choose "
      + "how fast to get there, and Hon sets that much aside each month.</p>"
      + '<label class="fld-lbl">Icon</label>'
      + '<div class="pgy-em-row">' + emojiRow + "</div>"
      + '<label class="fld-lbl">Name</label>'
      + '<input id="pgy-name" type="text" maxlength="40" '
      + 'placeholder="New camera, summer trip…" value="'
      + esc(bank ? bank.name : "") + '">'
      + '<label class="fld-lbl" style="margin-top:13px">Goal amount</label>'
      + '<div class="pgy-amt"><span>' + sym + '</span>'
      + '<input id="pgy-target" type="number" min="0" step="50" placeholder="0" '
      + 'value="' + (bank ? bank.targetAmount : "") + '"></div>'
      + '<label class="fld-lbl">Monthly set-aside</label>'
      + '<div id="pgy-plans"></div>'
      + '<div class="pgy-custom"><span>' + sym + '</span>'
      + '<input id="pgy-monthly" type="number" min="0" step="10" '
      + 'placeholder="Custom amount" value="'
      + (bank ? bank.monthlyAmount : "") + '"></div>'
      + '<div id="pgy-eta" class="pgy-modal-eta" hidden></div>'
      + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
      + '<button class="primary" data-x="save">'
      + (editing ? "Save changes" : "Create piggy bank") + "</button></div>";

    const targetInp = modal.querySelector("#pgy-target");
    const monthlyInp = modal.querySelector("#pgy-monthly");
    const plansEl = modal.querySelector("#pgy-plans");
    const etaEl = modal.querySelector("#pgy-eta");

    // The suggested monthly amount to clear `target` in `months`, rounded up
    // to a tidy multiple of 10.
    function presetFor(months) {
      const t = Number(targetInp.value);
      if (!Number.isFinite(t) || t <= 0) return null;
      return Math.max(10, Math.ceil(t / months / 10) * 10);
    }
    function refreshEta() {
      const t = Number(targetInp.value);
      const mo = Number(monthlyInp.value);
      if (t > 0 && mo > 0) {
        const months = Math.ceil(t / mo);
        etaEl.textContent = "At " + money(mo, cur) + " a month you'll reach "
          + money(t, cur) + " in about " + months
          + (months === 1 ? " month." : " months.");
        etaEl.hidden = false;
      } else {
        etaEl.hidden = true;
      }
    }
    function refreshPlans() {
      const t = Number(targetInp.value);
      if (!Number.isFinite(t) || t <= 0) {
        plansEl.innerHTML = '<div class="pgy-plan-hint">'
          + "Enter a goal amount to see monthly options.</div>";
      } else {
        plansEl.innerHTML = PIGGY_PLANS.map((m) => {
          return '<button type="button" class="pgy-plan'
            + (planSel === m ? " on" : "") + '" data-plan="' + m + '">'
            + '<span class="pgy-plan-amt">' + money(presetFor(m), cur) + "</span>"
            + '<span class="pgy-plan-sub">a month · ready in ' + m
            + " months</span></button>";
        }).join("");
      }
      refreshEta();
    }
    refreshPlans();

    targetInp.addEventListener("input", () => {
      // The presets follow the goal; if one was picked, keep its amount in step.
      if (typeof planSel === "number") {
        const pm = presetFor(planSel);
        if (pm != null) monthlyInp.value = pm;
      }
      refreshPlans();
    });
    monthlyInp.addEventListener("input", () => {
      planSel = "custom";
      plansEl.querySelectorAll(".pgy-plan.on")
        .forEach((x) => x.classList.remove("on"));
      refreshEta();
    });
    modal.querySelector(".pgy-em-row").addEventListener("click", (e) => {
      const btn = e.target.closest("[data-emoji]");
      if (!btn) return;
      emoji = btn.dataset.emoji;
      modal.querySelectorAll(".pgy-em")
        .forEach((x) => x.classList.toggle("on", x === btn));
    });
    plansEl.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-plan]");
      if (!btn) return;
      planSel = Number(btn.dataset.plan);
      const pm = presetFor(planSel);
      if (pm != null) monthlyInp.value = pm;
      plansEl.querySelectorAll(".pgy-plan")
        .forEach((x) => x.classList.toggle("on", x === btn));
      refreshEta();
    });

    modal.querySelector('[data-x="cancel"]').addEventListener("click", closeOverlay);
    modal.querySelector('[data-x="save"]').addEventListener("click", async () => {
      const name = modal.querySelector("#pgy-name").value.trim();
      const target = Number(targetInp.value);
      const monthly = Number(monthlyInp.value);
      if (!name) return toast("Give your piggy bank a name.", true);
      if (!(target > 0)) return toast("Enter a goal amount.", true);
      if (!(monthly > 0)) return toast("Choose a monthly set-aside.", true);
      const body = { name: name, emoji: emoji,
        targetAmount: target, monthlyAmount: monthly };
      try {
        if (editing) await api("/piggy/" + bank.id, "PUT", body);
        else await api("/piggy", "POST", body);
        closeOverlay();
        state.budget = await api(budgetUrl());
        render();
        toast(editing ? "Piggy bank updated." : "Piggy bank created — happy saving!");
      } catch (e) {
        if (e instanceof VaultLocked) { closeOverlay(); return showGate(); }
        toast(e.message, true);
      }
    });
  });
}

// Manually pause or resume a piggy bank. On hold it gets no monthly set-aside
// and stops counting against the budget, whatever the headroom.
async function togglePiggyHold(id) {
  const bank = (((state.budget || {}).piggy || {}).banks || [])
    .find((b) => b.id === id);
  if (!bank) return;
  const onHold = !bank.onHold;
  try {
    await api("/piggy/" + id, "PUT", { onHold: onHold });
    state.budget = await api(budgetUrl());
    render();
    toast(onHold
      ? '"' + bank.name + '" is on hold — no set-aside until you resume it.'
      : '"' + bank.name + '" resumed — back to saving each month.');
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast(e.message, true);
  }
}

async function removePiggy(id) {
  const bank = (((state.budget || {}).piggy || {}).banks || [])
    .find((b) => b.id === id);
  const label = bank ? '"' + bank.name + '"' : "this piggy bank";
  if (!confirm("Delete " + label + "? Its saved progress will be lost."))
    return;
  try {
    await api("/piggy/" + id, "DELETE");
    state.budget = await api(budgetUrl());
    render();
    toast("Piggy bank deleted.");
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast(e.message, true);
  }
}

function renderSidebar() {
  // The sidebar only hosts the move-transaction panel now; it slides away
  // (collapsing the shell) whenever nothing is being moved.
  const sig = JSON.stringify(state.move);
  if (sig === state._sidebarSig) return;
  state._sidebarSig = sig;
  const shell = document.getElementById("shell");
  if (state.move) {
    document.getElementById("sidebar").innerHTML = movePanel();
    shell.classList.remove("collapsed");
  } else {
    document.getElementById("sidebar").innerHTML = "";
    shell.classList.add("collapsed");
  }
}

function movePanel() {
  const txn = state.transactions.find((t) => t.id === state.move.txnId);
  if (!txn) { state.move = null; return ""; }
  const [em, color] = catStyle(txn.category || "Other");
  const header = '<div class="card move-card"><div class="card-head">'
    + '<div class="label">Transaction</div>'
    + '<span class="spacer"></span>'
    + '<button class="icon-btn mini" data-x="move-cancel">✕</button></div>'
    + '<div class="move-txn"><span class="txn-icon" style="background:' + color
    + '26;color:' + color + '">' + em + "</span>"
    + '<div class="txn-main"><div class="txn-name">' + esc(txn.description) + "</div>"
    + '<div class="txn-sub">' + money(txn.amount, txn.currency, true) + " · "
    + fmtDate(txn.date) + "</div></div></div>";

  // Refund-picker mode: choose the transaction that reimburses this expense.
  if (state.move.linkMode) {
    const picks = state.transactions
      .filter((t) => t.id !== txn.id && t.amount > 0
        && (!t.refundForId || t.id === state.move.refundId))
      .slice(0, 80);
    const list = picks.length
      ? picks.map((t) => {
          const [ce, cc] = catStyle(t.category || "Income");
          return '<button class="rf-opt" data-pick-refund="' + esc(t.id) + '">'
            + '<span class="txn-icon sm" style="background:' + cc + '26;color:' + cc
            + '">' + ce + "</span>"
            + '<div class="txn-main"><div class="txn-name">' + esc(t.description)
            + '</div><div class="txn-sub">' + fmtDate(t.date) + "</div></div>"
            + '<div class="txn-amt pos">' + money(t.amount, t.currency, true)
            + "</div></button>";
        }).join("")
      : '<div class="empty">No incoming transactions found to link.</div>';
    return header
      + '<button class="back-btn" data-x="link-back">‹ Back</button>'
      + '<div class="rf-hint">Pick the transaction that paid you back for this '
      + "expense — its amount is deducted from your spending.</div>"
      + '<div class="rf-list">' + list + "</div></div>";
  }

  const cats = CATEGORIES.map((cat) => {
    const [ce] = catStyle(cat);
    const on = cat === state.move.picked;
    return '<button class="move-cat' + (on ? " active" : "") + '" data-move-cat="'
      + esc(cat) + '" style="color:' + catStyle(cat)[1] + '">'
      + '<span class="mc-em">' + ce + "</span>"
      + '<span style="color:var(--text);font-weight:inherit">' + esc(cat) + "</span>"
      + '<span class="mc-check">✓</span></button>';
  }).join("");

  let refund;
  const r = state.move.refundId
    && state.transactions.find((t) => t.id === state.move.refundId);
  if (r) {
    refund = '<div class="rf-linked"><div class="rf-linked-row">'
      + '<div class="txn-main"><div class="txn-name">' + esc(r.description)
      + '</div><div class="txn-sub">' + money(r.amount, r.currency, true) + " · "
      + fmtDate(r.date) + "</div></div>"
      + '<button class="icon-btn mini" data-x="link-remove">✕</button></div>'
      + '<div class="rf-eff">Effective spend · '
      + money(txn.amount + r.amount, txn.currency, true) + "</div></div>";
  } else {
    refund = '<button class="block rf-add" data-x="link-add">'
      + "+ Link a refund or reimbursement</button>";
  }

  // Billing frequency — only for recurring-bill categories. Used to show a
  // monthly-equivalent cost (a yearly charge ÷ 12, a bimonthly one ÷ 2).
  const choices = recurrenceChoices(state.move.picked);
  let freqSection = "";
  if (choices) {
    let freq = state.move.frequency;
    if (!choices.some((c) => c[0] === freq)) {
      freq = "monthly";
      state.move.frequency = freq;
    }
    const btns = choices.map((c) =>
      '<button class="freq-opt' + (c[0] === freq ? " active" : "")
      + '" data-freq="' + c[0] + '">' + c[1] + "</button>").join("");
    freqSection = '<div class="label sb-label">Billing frequency</div>'
      + '<div class="freq-pick">' + btns + "</div>";
  }

  // Recurring income — for an incoming transaction, lets a salary be marked so
  // the budget projection anchors its expected income on it.
  let incomeSection = "";
  if (txn.amount > 0 && !txn.refundForId) {
    incomeSection = '<div class="label sb-label">Income</div>'
      + '<label class="set-row" style="padding:2px 0">'
      + '<div class="set-row-main"><div class="set-row-name">Recurring income</div>'
      + '<div class="set-row-sub">Count this as regular salary-type income in '
      + "the budget projection — even before it has repeated enough to be "
      + "detected on its own.</div></div>"
      + setSwitch("move-income", state.move.frequency === "income") + "</label>";
  }

  const refundChanged = (state.move.refundId || null) !== (txn.refundId || null);
  const canSave = !!state.move.picked || refundChanged;

  // Splitwise — split this transaction, or show its linked expense's status.
  let swSection = "";
  if (state.splitwise.connected) {
    const link = splitwiseLink(txn.id);
    if (link) {
      const paid = link.paidState === "paid";
      const remaining = Math.max(0, link.owedToMe - (link.paidAmount || 0));
      const who = (link.counterparties || []).map((c) => esc(c.name)).join(", ");
      swSection = '<div class="label sb-label">Splitwise</div>'
        + '<div class="rf-linked"><div class="rf-linked-row">'
        + '<div class="txn-main"><div class="txn-name">'
        + (paid ? "Paid back" : money(remaining, link.currency) + " owed to you")
        + '</div><div class="txn-sub">' + (who || "On Splitwise") + "</div></div>"
        + '<button class="icon-btn mini" data-x="sw-unlink" title="Delete from Splitwise">✕</button>'
        + "</div></div>";
    } else {
      swSection = '<div class="label sb-label">Splitwise</div>'
        + '<button class="block rf-add" data-x="sw-split">'
        + "+ Split on Splitwise</button>";
    }
  }

  return header
    + '<div class="label sb-label">Category</div>'
    + '<div class="move-cats">' + cats + "</div>"
    + '<label class="always"><input type="checkbox" id="move-always"'
    + (state.move.always ? " checked" : "") + ">"
    + "<span>Always categorize transactions from this business this way</span></label>"
    + freqSection
    + incomeSection
    + '<div class="label sb-label">Reimbursement</div>' + refund
    + swSection
    + '<button class="primary block" data-x="move-save" style="margin-top:13px"'
    + (canSave ? "" : " disabled") + ">Save</button></div>";
}

// Spending and income for the trailing 12 billing cycles, computed the same
// way as the Overview and Activity tabs (cycleKey, card-bill totals excluded,
// refund offsets applied) so every tab agrees on what a "month" is.
function cycleAnalytics() {
  const keys = [];
  let k = currentCycleKey();
  for (let i = 0; i < 12; i++) { keys.unshift(k); k = prevCycleKey(k); }
  const agg = {};
  keys.forEach((key) => { agg[key] = { spending: 0, income: 0 }; });
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || isCardTotal(t) || t.refundForId) return;
    const bucket = agg[cycleKey(t.date)];
    if (!bucket) return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt < 0) bucket.spending += -amt;
    else bucket.income += amt;
  });
  return keys.map((key) => ({ month: key, spending: agg[key].spending,
    income: agg[key].income }));
}

// Per-cycle, per-category spend over the trailing 12 billing cycles, plus the
// average over *completed* cycles that had activity — the baseline the Insights
// and Budget screens compare against. Averages are null until there is at least
// one completed cycle with spending. byCatCycle/totalCycle index 11 is current.
function categoryStats() {
  const keys = [];
  let k = currentCycleKey();
  for (let i = 0; i < 12; i++) { keys.unshift(k); k = prevCycleKey(k); }
  const idx = {};
  keys.forEach((key, i) => { idx[key] = i; });
  const byCatCycle = {};
  const totalCycle = new Array(12).fill(0);
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || isCardTotal(t) || t.refundForId) return;
    const ci = idx[cycleKey(t.date)];
    if (ci === undefined) return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt >= 0) return;
    const cat = t.category || "Other";
    (byCatCycle[cat] || (byCatCycle[cat] = new Array(12).fill(0)))[ci] += -amt;
    totalCycle[ci] += -amt;
  });
  // Average over completed cycles (every cycle but the current, partial one)
  // that actually had spending — an empty cycle would drag the baseline down.
  const done = [];
  for (let i = 0; i < 11; i++) if (totalCycle[i] > 0) done.push(i);
  const avg = (arr) => done.length
    ? done.reduce((s, i) => s + (arr[i] || 0), 0) / done.length : null;
  const avgByCat = {};
  Object.keys(byCatCycle).forEach((c) => { avgByCat[c] = avg(byCatCycle[c]); });
  return { keys: keys, idx: idx, byCatCycle: byCatCycle, totalCycle: totalCycle,
    avgTotal: avg(totalCycle), avgByCat: avgByCat };
}

// A small coloured delta chip — more spending reads as "bad", less as "good".
// `baseline` null (no data to compare) yields an empty string.
function deltaChip(current, baseline, label) {
  if (baseline == null) return "";
  const diff = Math.round(current - baseline);
  const cls = diff > 0 ? "bad" : diff < 0 ? "good" : "flat";
  const arrow = diff > 0 ? "↑" : diff < 0 ? "↓" : "±";
  return '<span class="md-d ' + cls + '">' + arrow
    + moneyShort(Math.abs(diff), "ILS") + " " + label + "</span>";
}

function insightsView() {
  const hasBrokerage = (state.brokerage.holdings || []).length > 0
    || (state.brokerage.snapshots || []).length > 0;
  const tab = state.insightsTab === "brokerage" ? "brokerage" : "spending";

  let toggle = "";
  if (hasBrokerage) {
    const pill = (key, label) => '<button class="ins-pill'
      + (tab === key ? " on" : "") + '" data-action="insights-tab" data-arg="'
      + key + '">' + label + "</button>";
    toggle = '<div class="ins-toggle">' + pill("spending", "Spending")
      + pill("brokerage", "Brokerage") + "</div>";
  }
  const head = '<div class="sec-head"><div class="label">Insights</div>'
    + toggle + "</div>";

  if (tab === "brokerage" && hasBrokerage) {
    return head + '<div class="ins-stack">' + brokerageView() + "</div>";
  }

  const months = cycleAnalytics();
  if (!months.some((m) => m.spending || m.income)) {
    return head + '<div class="card empty">No analytics yet — sync an account '
      + "to see your spending trends.</div>";
  }
  const keys = months.map((m) => m.month);
  let sel = state.insightsMonth;
  if (keys.indexOf(sel) < 0) sel = keys[keys.length - 1];

  const chart = '<div class="card"><div class="label">Spending</div>'
    + '<div class="ins-sub">Last 12 months · tap a month for its breakdown</div>'
    + miniBars(months, sel) + "</div>";

  return head + '<div class="ins-stack">' + chart
    + monthDetailCard(months, sel) + aiInsightsCard(state.insights) + "</div>";
}

// The brokerage stats view: portfolio value with its trend, total unrealized
// gain, a value-over-time chart, and the consolidated holdings allocation.
function brokerageView() {
  const holdings = state.brokerage.holdings || [];
  const snaps = state.brokerage.snapshots || [];
  const brkAccts = state.accounts.filter((a) => a.companyId === SNAPTRADE_ID);

  // Headline currency — the one most brokerage accounts report in.
  const curCount = {};
  brkAccts.forEach((a) => { curCount[a.currency] = (curCount[a.currency] || 0) + 1; });
  const cur = Object.keys(curCount).sort((x, y) => curCount[y] - curCount[x])[0] || "USD";

  // Total value: brokerage account balances (includes cash). Gain and cost
  // come from the priced positions only.
  let totalValue = 0, haveValue = false;
  brkAccts.forEach((a) => {
    if (a.balance != null) { totalValue += a.balance; haveValue = true; }
  });
  let totalCost = 0, totalGain = 0, haveGain = false;
  holdings.forEach((h) => {
    const s = holdingStats(h);
    if (s.cost != null) totalCost += s.cost;
    if (s.gain != null) { totalGain += s.gain; haveGain = true; }
  });
  const gainPct = haveGain && totalCost ? (totalGain / Math.abs(totalCost)) * 100 : null;

  // Value-over-time: snapshots summed across all brokerage accounts per day.
  const byDate = {};
  snaps.forEach((s) => { byDate[s.date] = (byDate[s.date] || 0) + s.value; });
  const series = Object.keys(byDate).sort().map((d) => ({ date: d, value: byDate[d] }));
  const first = series.length ? series[0].value : null;
  const last = series.length ? series[series.length - 1].value : null;
  const periodPct = first ? ((last - first) / Math.abs(first)) * 100 : null;

  const tiles = '<div class="md-tiles">'
    + statTile(haveValue ? money(totalValue, cur) : "—", "Portfolio value", "")
    + statTile(haveGain ? money(totalGain, cur, true) : "—", "Unrealized gain",
        haveGain ? (totalGain >= 0 ? "good" : "bad") : "")
    + statTile(gainPct == null ? "—"
        : (gainPct >= 0 ? "+" : "") + gainPct.toFixed(1) + "%",
        "Return on cost", gainPct == null ? "" : gainPct >= 0 ? "good" : "bad")
    + statTile(String(holdings.length),
        holdings.length === 1 ? "Holding" : "Holdings", "")
    + "</div>";

  let trendCard;
  if (series.length >= 2) {
    const down = periodPct != null && periodPct < 0;
    const pill = periodPct == null ? ""
      : '<span class="md-trend ' + (down ? "bad" : "good") + '">'
        + (down ? "↓ " : "↑ ") + Math.abs(periodPct).toFixed(1) + "% since "
        + fmtDate(series[0].date) + "</span>";
    trendCard = '<div class="card"><div class="md-head">'
      + '<span class="md-month">Value over time</span>' + pill + "</div>"
      + valueChart(series, cur) + "</div>";
  } else {
    trendCard = '<div class="card"><div class="label">Value over time</div>'
      + '<div class="ins-sub">The trend graph builds up as you sync — '
      + "one point is recorded per sync.</div></div>";
  }

  // Holdings allocation, consolidated by symbol across accounts.
  const bySym = {};
  holdings.forEach((h) => {
    const s = holdingStats(h);
    const e = bySym[h.symbol] || (bySym[h.symbol] = {
      symbol: h.symbol, description: h.description, units: 0,
      value: 0, cost: 0, gain: 0, currency: h.currency, haveGain: false,
    });
    e.units += h.units;
    if (s.value != null) e.value += s.value;
    if (s.cost != null) e.cost += s.cost;
    if (s.gain != null) { e.gain += s.gain; e.haveGain = true; }
  });
  const rows = Object.keys(bySym).map((k) => bySym[k])
    .sort((a, b) => b.value - a.value);
  const allocTotal = rows.reduce((sum, r) => sum + r.value, 0) || 1;

  let alloc = '<div class="card"><div class="label">Holdings</div>';
  if (rows.length) {
    alloc += '<div class="ins-sub">' + rows.length + " position"
      + (rows.length === 1 ? "" : "s") + " across " + brkAccts.length
      + " account" + (brkAccts.length === 1 ? "" : "s") + "</div>";
    alloc += rows.map((r) => {
      const pct = Math.round((r.value / allocTotal) * 100);
      const gPct = r.haveGain && r.cost ? (r.gain / Math.abs(r.cost)) * 100 : null;
      const gCls = gPct == null ? "flat" : gPct >= 0 ? "good" : "bad";
      return '<div class="md-cat"><div class="md-cat-main">'
        + '<div class="md-cat-top"><span class="md-cat-name">' + esc(r.symbol)
        + (r.description ? ' <span class="hold-desc">' + esc(r.description)
          + "</span>" : "")
        + '</span><span class="md-cat-amt">' + money(r.value, r.currency)
        + "</span></div>"
        + '<div class="md-cat-track"><div class="md-cat-fill" style="width:'
        + Math.max(4, pct) + '%"></div></div>'
        + '<div class="md-cat-d"><span class="hold-units">' + fmtUnits(r.units)
        + " units</span>"
        + (gPct == null ? "" : '<span class="hold-gain ' + gCls + '">'
          + (gPct >= 0 ? "↑" : "↓") + " " + Math.abs(gPct).toFixed(1) + "%</span>")
        + "</div></div>"
        + '<span class="md-cat-pct">' + pct + "%</span></div>";
    }).join("");
  } else {
    alloc += '<div class="empty" style="padding:6px 0">No positions found — '
      + "sync your brokerage to pull holdings.</div>";
  }
  alloc += "</div>";

  return tiles + trendCard + alloc;
}

// A bar chart of brokerage value over time, one bar per recorded snapshot.
function valueChart(series, cur) {
  const max = series.reduce((m, p) => Math.max(m, p.value), 0) || 1;
  const min = series.reduce((m, p) => Math.min(m, p.value), max);
  const span = max - min || max || 1;
  const bars = series.map((p) => {
    const h = 12 + Math.round(((p.value - min) / span) * 88);
    return '<div class="vc-bar" title="' + esc(fmtDate(p.date)) + " · "
      + esc(money(p.value, cur)) + '"><div class="vc-fill" style="height:'
      + h + '%"></div></div>';
  }).join("");
  return '<div class="vc-chart">' + bars + "</div>"
    + '<div class="vc-axis"><span>' + fmtDate(series[0].date) + "</span><span>"
    + fmtDate(series[series.length - 1].date) + "</span></div>";
}

// One billing cycle's spend breakdown — category split, transaction count and
// the single biggest expense — filtered the same way as cycleSpending so it
// matches the headline figure.
function monthMetrics(key) {
  const byCat = {};
  let biggest = null;
  let count = 0;
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || isCardTotal(t) || t.refundForId) return;
    if (cycleKey(t.date) !== key) return;
    count += 1;
    const amt = t.amount + txnRefundAmount(t);
    if (amt >= 0) return;
    const spent = -amt;
    const cat = t.category || "Other";
    byCat[cat] = (byCat[cat] || 0) + spent;
    if (!biggest || spent > biggest.amount) {
      biggest = { amount: spent, desc: t.description, date: t.date, cat: cat };
    }
  });
  const cats = Object.keys(byCat)
    .map((c) => ({ category: c, amount: byCat[c] }))
    .sort((x, y) => y.amount - x.amount);
  return { count: count, cats: cats, biggest: biggest };
}

// The drill-down card for one selected month: a headline trend, four stat
// tiles, the category breakdown, and the biggest single expense.
function monthDetailCard(months, sel) {
  const idx = months.findIndex((m) => m.month === sel);
  const m = months[idx];
  const prev = idx > 0 ? months[idx - 1] : null;
  const net = m.income - m.spending;
  const det = monthMetrics(sel);
  const stats = categoryStats();

  // Headline pills: this cycle's spending vs the previous cycle and vs the
  // trailing average.
  const pctPill = (base, label) => {
    if (base == null || base <= 0) return "";
    const pct = ((m.spending - base) / base) * 100;
    const down = pct < 0;
    return '<span class="md-trend ' + (down ? "good" : "bad") + '">'
      + (down ? "↓ " : "↑ ") + Math.abs(pct).toFixed(0) + "% " + label + "</span>";
  };
  let trend = pctPill(prev ? prev.spending : null,
      prev ? "vs " + cycleLabel(prev.month).split(" ")[0] : "")
    + pctPill(stats.avgTotal, "vs avg");
  if (!trend) trend = '<span class="md-trend flat">earliest month</span>';

  const tiles = '<div class="md-tiles">'
    + statTile(money(m.spending, "ILS"), "Spent", "bad")
    + statTile(money(m.income, "ILS"), "Income", "good")
    + statTile(money(Math.abs(net), "ILS"), net >= 0 ? "Saved" : "Overspent",
        net >= 0 ? "good" : "bad")
    + statTile(String(det.count),
        det.count === 1 ? "Transaction" : "Transactions", "")
    + "</div>";

  let breakdown = '<div class="md-label">Where it went</div>';
  if (det.cats.length) {
    const top = det.cats.slice(0, 6);
    const max = top[0].amount || 1;
    const total = det.cats.reduce((s, c) => s + c.amount, 0) || 1;
    breakdown += top.map((c) => {
      const st = catStyle(c.category);
      const w = Math.max(5, Math.round((c.amount / max) * 100));
      const pct = Math.round((c.amount / total) * 100);
      const hist = stats.byCatCycle[c.category];
      const prevAmt = prev && hist ? hist[idx - 1] : null;
      const deltas = deltaChip(c.amount, prevAmt, "vs last")
        + deltaChip(c.amount, stats.avgByCat[c.category], "vs avg");
      return '<div class="md-cat">'
        + '<span class="md-cat-ico" style="background:' + st[1] + '22">'
        + st[0] + "</span>"
        + '<div class="md-cat-main"><div class="md-cat-top">'
        + '<span class="md-cat-name">' + esc(c.category) + "</span>"
        + '<span class="md-cat-amt">' + money(c.amount, "ILS") + "</span></div>"
        + '<div class="md-cat-track"><div class="md-cat-fill" style="width:'
        + w + "%;background:" + st[1] + '"></div></div>'
        + (deltas ? '<div class="md-cat-d">' + deltas + "</div>" : "")
        + "</div>"
        + '<span class="md-cat-pct">' + pct + "%</span></div>";
    }).join("");
  } else {
    breakdown += '<div class="empty" style="padding:6px 0">'
      + "No spending recorded this month.</div>";
  }

  let big = "";
  if (det.biggest) {
    const st = catStyle(det.biggest.cat);
    big = '<div class="md-big">'
      + '<span class="md-big-ico" style="background:' + st[1] + '22">'
      + st[0] + "</span>"
      + '<div class="md-big-main"><div class="md-big-cap">Biggest expense</div>'
      + '<div class="md-big-desc">' + esc(det.biggest.desc || det.biggest.cat)
      + "</div></div><div>"
      + '<div class="md-big-amt">' + money(det.biggest.amount, "ILS") + "</div>"
      + '<div class="md-big-date">' + fmtDate(det.biggest.date) + "</div>"
      + "</div></div>";
  }

  const viewBtn = '<button class="block" data-action="view-month-activity"'
    + ' data-arg="' + sel + '" style="margin-top:14px">'
    + "View transactions</button>";

  return '<div class="card"><div class="md-head">'
    + '<span class="md-month">' + cycleLabel(sel) + "</span>" + trend
    + "</div>" + tiles + breakdown + big + viewBtn + "</div>";
}

function statTile(value, label, tone) {
  return '<div class="md-tile"><div class="md-tile-val' + (tone ? " " + tone : "")
    + '">' + value + '</div><div class="md-tile-cap">' + label + "</div></div>";
}

const AI_ICON = { win: "🎉", watch: "⚠️", trend: "📈", tip: "💡", info: "✨" };
const AI_TAGS = { WIN: "win", WATCH: "watch", TREND: "trend", TIP: "tip" };

// The AI analysis card: a shimmer while the model runs, then one coloured
// card per tagged insight line.
function aiInsightsCard(ins) {
  const generating = ins && ins.state === "generating";
  const ready = ins && ins.state === "ready" && ins.text;
  const btn = '<button class="mini primary" data-action="generate-insights"'
    + (generating ? " disabled" : "") + ">"
    + (ready ? "Regenerate" : "Generate") + "</button>";
  const head = '<div class="ai-head"><div class="label">AI analysis</div>'
    + '<span class="spacer"></span>' + btn + "</div>";

  let body;
  if (generating) {
    body = '<div class="ai-skel"><div class="ai-skel-row"></div>'
      + '<div class="ai-skel-row"></div><div class="ai-skel-row"></div>'
      + '<div class="ai-skel-row"></div></div>';
  } else if (ready) {
    const cards = parseInsights(ins.text);
    body = cards.length
      ? '<div class="ai-list">' + cards.map((c, i) =>
          '<div class="ai-card ' + c.kind + '" style="animation-delay:'
          + (i * 70) + 'ms"><span class="ai-ico">' + AI_ICON[c.kind]
          + '</span><span class="ai-text">' + esc(c.text)
          + "</span></div>").join("") + "</div>"
      : '<div class="ai-empty">' + esc(ins.text) + "</div>";
  } else if (ins && ins.state === "error") {
    body = '<div class="ai-empty">' + esc(ins.message) + "</div>";
  } else {
    body = '<div class="ai-empty">No analysis yet — tap Generate for an AI '
      + "read on this month's spending, budgets and trends.</div>";
  }
  return '<div class="card">' + head + body + "</div>";
}

// Splits the model's tagged lines into styled insight cards; falls back to
// keyword sentiment when a line carries no explicit WIN/WATCH/TREND/TIP tag.
function parseInsights(text) {
  return String(text).split(/\n+/).map((raw) => {
    const s = raw.trim().replace(/^[-•*\d.)\s]+/, "").trim();
    if (!s) return null;
    const m = s.match(/^([A-Za-z]{3,6})\s*[:.—-]\s+(.+)$/);
    if (m && AI_TAGS[m[1].toUpperCase()]) {
      return { kind: AI_TAGS[m[1].toUpperCase()], text: m[2].trim() };
    }
    return { kind: inferInsightKind(s), text: s };
  }).filter(Boolean);
}

function inferInsightKind(s) {
  const t = s.toLowerCase();
  if (/over budget|overspent|overspend|exceeded|spike|jumped|climbed|increase|higher|rose|watch out/.test(t))
    return "watch";
  if (/under budget|saved|still left|on track|good job|well done|nicely|great|dropped|reduced|lower than|less than/.test(t))
    return "win";
  if (/try |consider|could |suggest|recommend|set a budget|cut back|aim to/.test(t))
    return "tip";
  return "trend";
}

// A subscription counts as active while it has charged within the last ~month;
// once a full billing cycle passes with no charge it is probably cancelled.
const SUB_ACTIVE_DAYS = 40;

// Asks the engine which lapsed subscriptions are renamed versions of active
// ones. Cached by name set, so the on-device model runs only when it changes;
// if the model is still loading the lookup is left to retry on a later render.
function ensureSubAliases(activeNames, deadNames) {
  if (!activeNames.length || !deadNames.length) return;
  const sig = JSON.stringify([activeNames.slice().sort(), deadNames.slice().sort()]);
  if (state.subAliasSig === sig || state.subAliasBusy) return;
  state.subAliasBusy = true;
  api("/subscriptions/aliases", "POST", { active: activeNames, dead: deadNames })
    .then((r) => {
      if (r && r.ready) {
        state.subAliases = r.aliases || {};
        state.subAliasSig = sig;
        state.subAliasBusy = false;
        if (state.tab === "subscriptions") render();
        return;
      }
      state.subAliasBusy = false; // model not ready — retry on a later render
    })
    .catch(() => { state.subAliasBusy = false; });
}

function subscriptionsView() {
  const subs = state.transactions.filter(
    (t) => t.category === "Subscriptions" && t.amount < 0);
  if (!subs.length) {
    return '<div class="sec-head"><div class="label">Subscriptions</div></div>'
      + '<div class="card empty">No subscription charges found yet — categorize '
      + "transactions as Subscriptions to track them here.</div>";
  }
  // Group by merchant (see merchantKey — drops the varying transaction code).
  const byMerchant = {};
  subs.forEach((t) => {
    const k = merchantKey(t.description);
    (byMerchant[k] || (byMerchant[k] = [])).push(t);
  });
  const now = Date.now();
  // `amount` is the monthly-equivalent cost (a yearly charge ÷ 12); `charge` is
  // the actual amount billed. A yearly bill also stays "active" far longer.
  const rows = Object.keys(byMerchant).map((key) => {
    const list = byMerchant[key].slice()
      .sort((a, b) => new Date(b.date) - new Date(a.date));
    const last = list[0];
    const days = Math.floor((now - new Date(last.date).getTime()) / 86400000);
    const freq = state.merchantFreq[key] || "monthly";
    const charge = Math.abs(last.amount);
    return { key: key, desc: merchantName(last.description), last, days,
      count: list.length, charge: charge, freq: freq,
      amount: monthlyEquivalent(charge, freq), cur: last.currency,
      active: days <= (RECURRENCE_ACTIVE_DAYS[freq] || SUB_ACTIVE_DAYS) };
  });
  const active = rows.filter((r) => r.active).sort((a, b) => b.amount - a.amount);
  const deadAll = rows.filter((r) => !r.active).sort((a, b) => a.days - b.days);
  // A lapsed subscription the AI matched to an active one is just the same
  // service under a renamed descriptor — keep it out of "probably cancelled".
  ensureSubAliases(active.map((r) => r.desc), deadAll.map((r) => r.desc));
  const dead = deadAll.filter((r) => !state.subAliases[r.desc]);
  const monthly = active.reduce((s, r) => s + r.amount, 0);
  const cur = (rows[0] && rows[0].cur) || "ILS";

  const subRow = (r, faded) => {
    const note = r.freq !== "monthly"
      ? " · billed " + r.freq + " · " + money(r.charge, r.cur)
      : "";
    return '<div class="sub-row' + (faded ? " faded" : "") + '">'
      + '<span class="txn-icon" style="background:#7D8CED26;color:#7D8CED">🔁</span>'
      + '<div class="txn-main"><div class="txn-name">' + esc(r.desc) + "</div>"
      + '<div class="txn-sub">Last charged ' + fmtDate(r.last.date)
      + (faded ? " · " + r.days + " days ago"
          : r.count > 1 ? " · " + r.count + " charges" : "")
      + esc(note)
      + "</div></div>"
      + '<div class="sub-amt">' + money(r.amount, r.cur)
      + '<span class="sub-per">/mo</span></div></div>';
  };

  let out = '<div class="sec-head"><div class="label">Subscriptions</div></div>'
    + '<div class="card sub-summary"><div class="sub-big">' + money(monthly, cur)
    + '<span class="sub-per"> / month</span></div>'
    + '<div class="meta">' + active.length + " active subscription"
    + (active.length === 1 ? "" : "s")
    + (dead.length ? " · " + dead.length + " likely cancelled" : "")
    + "</div></div>"
    + '<div class="card sub-list"><div class="label">Active</div>'
    + (active.length ? active.map((r) => subRow(r, false)).join("")
        : '<div class="empty">No active subscriptions in the last month.</div>')
    + "</div>";
  if (dead.length) {
    out += '<div class="card sub-list"><div class="label">Probably cancelled</div>'
      + '<div class="meta">No charge in over a month — likely cancelled.</div>'
      + '<div style="margin-top:8px">'
      + dead.map((r) => subRow(r, true)).join("") + "</div></div>";
  }
  return out;
}

// A 12-month spending chart; tap a bar to drill into that month. The
// selected month carries the `sel` class so the detail card can track it.
function miniBars(months, selKey) {
  const max = Math.max(1, ...months.map((m) => m.spending));
  const bars = months.map((m, i) => {
    const h = Math.max(3, Math.round((m.spending / max) * 100));
    const sel = m.month === selKey ? " sel" : "";
    return '<div class="mb-col' + sel + '" data-month="' + m.month
      + '" title="' + esc(cycleLabel(m.month) + " · " + money(m.spending, "ILS"))
      + '"><div class="mb-fill" style="height:' + h
      + "%;animation-delay:" + i * 34 + 'ms"></div>'
      + '<div class="mb-x">' + monthLetter(m.month) + "</div></div>";
  }).join("");
  return '<div class="mb-wrap"><div class="mb">' + bars + "</div></div>";
}

function closeOverlay() { document.getElementById("overlays").innerHTML = ""; }

function openModal(buildBody) {
  const overlay = document.createElement("div");
  overlay.className = "overlay";
  const modal = document.createElement("div");
  modal.className = "modal";
  overlay.appendChild(modal);
  overlay.addEventListener("mousedown", (e) => { if (e.target === overlay) closeOverlay(); });
  document.getElementById("overlays").appendChild(overlay);
  buildBody(modal);
  return modal;
}

// Maps the government registry's Hebrew ownership label to our select values.
function ownershipKey(baalut) {
  const s = String(baalut || "");
  if (s.indexOf("פרטי") >= 0) return "private";
  if (s.indexOf("השכר") >= 0) return "rental";
  if (s.indexOf("ליסינג") >= 0 || s.indexOf("ליס") >= 0) return "lease";
  if (s.indexOf("חבר") >= 0) return "company";
  return "";
}

function budgetModal() {
  openModal((modal) => {
    const b = state.budget || {};
    const cur = b.currency || "ILS";
    const symbol = SYMBOLS[cur.toUpperCase()] || "";
    // Average monthly spend per category — a baseline for picking a limit.
    const avg = categoryStats().avgByCat;
    const current = {}, spent = {};
    (b.essentials || []).forEach((l) => {
      if (l.budget != null) current[l.category] = l.budget;
      spent[l.category] = l.spent || 0;
    });
    const row = (key, label, emoji, color) => {
      const sp = spent[key] || 0;
      const overNow = current[key] != null && sp > current[key];
      return '<div class="bm-row">'
        + '<span class="bm-ico" style="background:' + color + '22;color:'
        + color + '">' + emoji + "</span>"
        + '<div class="bm-info"><div class="bm-name">' + esc(label) + "</div>"
        + '<div class="bm-spent' + (overNow ? " over" : "") + '">Spent '
        + money(sp, cur) + " this month"
        + (avg[key] != null ? " · avg " + money(avg[key], cur) + "/mo" : "")
        + "</div>"
        + '<div class="bm-mini"><div data-mini="' + esc(key) + '"></div></div></div>'
        + '<div class="bm-input"><span class="bm-cur">' + symbol + "</span>"
        + '<input data-budget="' + esc(key) + '" data-spent="' + sp
        + '" type="number" min="0" step="50" placeholder="0" value="'
        + (current[key] != null ? current[key] : "") + '"></div></div>';
    };
    const catRows = (list) => list
      .map((c) => row(c, c, catStyle(c)[0], catStyle(c)[1])).join("");

    const v = projectedVariable(b.variable
      || { income: 0, committed: 0, spent: 0, allowed: 0 });
    const inWord = v.projected ? "expected" : "came in";
    const varNote = v.allowed > 0
      ? "Worked out automatically — " + money(v.income, cur) + " " + inWord + ", "
        + money(v.committed, cur) + " covers fixed bills and essentials, and "
        + money(v.spent, cur) + " is already spent."
      : "There's no room for variable spending this month — income is fully "
        + "taken up by fixed bills, essentials, and what's been spent already.";

    modal.innerHTML = "<h2>Monthly budgets</h2>"
      + '<p class="hint">Give each essential category a monthly limit. Fixed '
      + "bills aren't budgeted, and variable spending is worked out "
      + "automatically from whatever's left. Leave blank for no limit.</p>"
      + '<div class="bm-summary"><span>Total budgeted</span>'
      + '<span id="bm-total">—</span></div>'
      + '<div class="bgt-group">Essentials</div>' + catRows(ESSENTIAL_CATS)
      + '<div class="bgt-group">Variable spending · allowed right now</div>'
      + '<div class="bm-var"><div class="bm-var-amt">'
      + money(v.allowed > 0 ? v.allowed : 0, cur) + "</div>"
      + '<div class="bm-var-note">' + varNote + "</div></div>"
      + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
      + '<button class="primary" data-x="save">Save budgets</button></div>';

    const totalEl = modal.querySelector("#bm-total");
    const inputs = [...modal.querySelectorAll("[data-budget]")];
    function refresh() {
      let total = 0;
      inputs.forEach((inp) => {
        const amount = inp.value.trim() === "" ? 0 : Number(inp.value) || 0;
        total += amount;
        const sp = Number(inp.dataset.spent) || 0;
        const mini = modal.querySelector('[data-mini="' + inp.dataset.budget + '"]');
        if (!amount) { mini.style.width = "0"; return; }
        const ratio = sp / amount;
        mini.style.width = Math.min(100, ratio * 100) + "%";
        mini.style.background = ratio > 1 ? "var(--red)"
          : ratio > 0.85 ? "var(--amber)" : "var(--green)";
      });
      totalEl.textContent = money(total, cur);
    }
    inputs.forEach((inp) => inp.addEventListener("input", refresh));
    refresh();

    modal.querySelector('[data-x="cancel"]').addEventListener("click", closeOverlay);
    modal.querySelector('[data-x="save"]').addEventListener("click", async () => {
      const updates = [];
      inputs.forEach((inp) => {
        const cat = inp.dataset.budget;
        const raw = inp.value.trim();
        const amount = raw === "" ? 0 : Number(raw);
        const was = current[cat] != null ? current[cat] : 0;
        if (amount !== was) updates.push({ category: cat, monthlyAmount: amount });
      });
      try {
        for (const u of updates) await api("/budgets", "PUT", u);
        closeOverlay();
        state.budget = await api(budgetUrl());
        render();
        toast(updates.length ? "Budgets saved." : "No changes.");
      } catch (e) { toast(e.message, true); }
    });
  });
}

// A polished settings card — an icon + title header over a block of rows.
function setCard(delay, icon, title, body) {
  return '<section class="set-card" style="animation-delay:' + delay + 'ms">'
    + '<div class="set-card-head"><span class="set-ico">' + icon + "</span>"
    + esc(title) + "</div>" + body + "</section>";
}
// A label + sub-text block, optionally stacked above its control (`col`).
function setRow(name, sub, control, col) {
  return '<' + (col ? "div" : "label") + ' class="set-row' + (col ? " col" : "")
    + '"><div class="set-row-main"><div class="set-row-name">' + esc(name)
    + "</div>" + (sub ? '<div class="set-row-sub">' + esc(sub) + "</div>" : "")
    + "</div>" + (control || "") + "</" + (col ? "div" : "label") + ">";
}
function setSwitch(id, on) {
  return '<span class="switch"><input type="checkbox" id="' + id + '"'
    + (on ? " checked" : "") + '><span class="switch-track"></span></span>';
}
