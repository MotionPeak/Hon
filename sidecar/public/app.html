            "When a bank line is just the lump-sum card bill (already itemised "
            + "under the card), keep it out of spending totals so it is not "
            + "double-counted.",
            setSwitch("set-hidecards", settings.hideCardTotals))
          + setRow("Card-provider names",
            "A bank line whose description contains any of these is treated as "
            + "a card-bill total.",
            '<textarea id="set-providers" placeholder="One name per line">'
            + esc((settings.cardProviders || []).join("\n")) + "</textarea>",
            true))
      + setCard(160, "🤝", "Splitwise", '<div id="set-splitwise"></div>')
      + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
      + '<button class="primary" data-x="save">Save settings</button></div>';
    llmPanelMode = null; // re-sync the engine panel to the saved mode
    fillModelSection();
    fillSplitwiseSection();

    const seg = modal.querySelector("#set-incomescope");
    seg.addEventListener("click", (e) => {
      const b = e.target.closest("button");
      if (!b) return;
      seg.querySelectorAll("button").forEach((x) => x.classList.remove("on"));
      b.classList.add("on");
    });

    modal.querySelector('[data-x="cancel"]').addEventListener("click", closeOverlay);
    modal.querySelector('[data-x="save"]').addEventListener("click", async () => {
      settings.monthStartDay = Number(modal.querySelector("#set-startday").value) || 1;
      settings.projectRecurring = modal.querySelector("#set-project").checked;
      const segOn = seg.querySelector("button.on");
      settings.incomeAvgMonths = segOn ? Number(segOn.dataset.scope) : 3;
      settings.hideCardTotals = modal.querySelector("#set-hidecards").checked;
      settings.cardProviders = modal.querySelector("#set-providers").value
        .split("\n").map((s) => s.trim()).filter(Boolean);
      saveSettings();
      state.activityMonth = null;   // re-pick against the new cycle
      closeOverlay();
      toast("Settings saved.");
      // The budget window follows the cycle start day — refetch it.
      try { state.budget = await api(budgetUrl()); } catch (e) {}
      render();
    });
  });
}

function promptOtp(message) {
  return new Promise((resolve) => {
    openModal((modal) => {
      modal.innerHTML = "<h2>Verification code</h2>"
        + '<p class="hint">' + esc(message || "Enter the code the bank just sent you.")
        + "</p>"
        + '<div class="field"><input id="otp-code" type="text" inputmode="numeric" '
        + 'autocomplete="one-time-code" placeholder="123456"></div>'
        + '<div class="modal-actions"><button class="primary" data-x="submit">Submit</button></div>';
      const input = modal.querySelector("#otp-code");
      input.focus();
      const done = () => {
        const code = input.value.trim();
        if (!code) return;
        closeOverlay();
        resolve(code);
      };
      modal.querySelector('[data-x="submit"]').addEventListener("click", done);
      input.addEventListener("keydown", (e) => { if (e.key === "Enter") done(); });
    });
  });
}

// --- Actions ---------------------------------------------------------------

// Always runs the 2FA-aware path: if the bank asks for a one-time code, the
// OTP prompt starts automatically.
async function scrape(conn) {
  if (state.scrapes[conn.id] && state.scrapes[conn.id].phase === "running") return;
  state.scrapes[conn.id] = {
    phase: "running",
    message: "Signing in — you may be asked for a verification code.",
  };
  render();
  try {
    const { runId } = await api("/connections/" + conn.id + "/scrape", "POST",
      { interactive: true, monthsBack: 24 });
    while (true) {
      await sleep(1500);
      const { run } = await api("/scrape/" + runId);
      if (run.status === "needs-otp") {
        state.scrapes[conn.id] = { phase: "running", message: "Waiting for your code…" };
        render();
        const code = await promptOtp(run.message);
        await api("/scrape/" + runId + "/otp", "POST", { code });
        state.scrapes[conn.id] = { phase: "running", message: "Submitting code…" };
        render();
      } else if (run.status === "running") {
        state.scrapes[conn.id] = { phase: "running", message: run.message };
        render();
      } else {
        state.scrapes[conn.id] = {
          phase: run.status === "success" ? "done" : "failed", message: run.message,
        };
        render();
        break;
      }
    }
    await loadAll();
    await maybeAutoCategorize();
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    state.scrapes[conn.id] = { phase: "failed", message: e.message };
    render();
  }
}

async function syncAll() {
  for (const conn of state.connections) {
    if (conn.companyId !== SNAPTRADE_ID || conn.lastScrapeAt) await scrape(conn);
  }
}

async function removeConnection(id) {
  if (!confirm("Remove this connection and its accounts?")) return;
  try {
    await api("/connections/" + id, "DELETE");
    delete state.scrapes[id];
    await loadAll();
  } catch (e) { toast(e.message, true); }
}

async function removeAsset(id) {
  if (!confirm("Remove this asset?")) return;
  try {
    await api("/assets/" + id, "DELETE");
    await loadAll();
    toast("Asset removed.");
  } catch (e) { toast(e.message, true); }
}

async function linkBrokerage(id) {
  try {
    const { portal } = await api("/snaptrade/portal", "POST", {
      connectionId: id,
      customRedirect: location.origin + "/snaptrade/done",
    });
    window.open(portal.redirectURI, "_blank");
    toast(portal.atLimit
      ? "SnapTrade's free tier links up to 5 brokerages — you're at the limit."
      : "Opening SnapTrade's connection portal in a new tab…");
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast(e.message, true);
  }
}

async function downloadModel(modelId) {
  try {
    await api("/llm/download", "POST", { modelId });
    pollLlm();
  } catch (e) { toast(e.message, true); }
}
async function cancelModel() {
  try { await api("/llm/cancel", "POST"); } catch (e) {}
  state.llm = await api("/llm");
  fillModelSection();
}
async function pollLlm() {
  for (let i = 0; i < 6000; i++) {
    state.llm = await api("/llm");
    fillModelSection();
    const s = state.llm.state;
    if (s !== "downloading" && s !== "downloaded" && s !== "loading") {
      render();
      return;
    }
    await sleep(1000);
  }
}

// Runs categorization automatically after a refresh/sync, but only when there
// are transactions still missing a category.
async function maybeAutoCategorize() {
  if (state.categorize && state.categorize.state === "running") return;
  if (!state.transactions.some((t) => !t.category)) return;
  await categorize();
}

async function categorize() {
  if (state.categorize && state.categorize.state === "running") return;
  try {
    await api("/categorize", "POST");
    state.categorize = { state: "running", done: 0, total: 0, message: "Starting…" };
    render();
    for (let i = 0; i < 3000; i++) {
      await sleep(1000);
      state.categorize = await api("/categorize");
      render();
      if (state.categorize.state !== "running") break;
    }
    await loadAll();
    toast("Categorization finished.");
  } catch (e) { toast(e.message, true); }
}

async function generateInsights() {
  if (state.insights && state.insights.state === "generating") return;
  try {
    await api("/insights", "POST");
    state.insights = { state: "generating", text: "", message: "Generating…" };
    render();
    for (let i = 0; i < 600; i++) {
      await sleep(1000);
      state.insights = await api("/insights");
      render();
      if (state.insights.state !== "generating") break;
    }
  } catch (e) { toast(e.message, true); }
}

// Saves the transaction panel: applies a category change (optionally as a
// merchant rule) and any change to the linked refund/reimbursement.
async function saveMove() {
  if (!state.move) return;
  const m = state.move;
  const txn = state.transactions.find((t) => t.id === m.txnId);
  if (!txn) { state.move = null; render(); return; }
  const refundChanged = (m.refundId || null) !== (txn.refundId || null);
  const mKey = merchantKey(txn.description);
  const isIncome = txn.amount > 0 && !txn.refundForId;
  const incomeWant = isIncome && m.frequency === "income" ? "income" : "none";
  const incomeChanged = isIncome
    && incomeWant !== (state.merchantFreq[mKey] === "income" ? "income" : "none");
  if (!m.picked && !refundChanged && !incomeChanged) return;
  try {
    if (m.picked && (m.picked !== (txn.category || "") || m.always)) {
      await api("/transactions/" + m.txnId + "/category", "PATCH",
        { category: m.picked, applyToMerchant: m.always });
    }
    // Remember the billing frequency per merchant when it is a recurring bill.
    if (m.picked && recurrenceChoices(m.picked)) {
      const freq = m.frequency || "monthly";
      if (freq !== (state.merchantFreq[mKey] || "monthly")) {
        await api("/merchant-frequency", "PUT", { key: mKey, frequency: freq });
      }
    }
    // Mark or un-mark this source as recurring (salary-type) income.
    if (incomeChanged) {
      await api("/merchant-frequency", "PUT", { key: mKey, frequency: incomeWant });
    }
    if (refundChanged) {
      if (m.refundId) {
        await api("/transactions/" + m.txnId + "/link", "PUT",
          { refundId: m.refundId });
      } else {
        await api("/transactions/" + m.txnId + "/link", "DELETE");
      }
    }
    const movedCat = m.picked && (m.picked !== (txn.category || "") || m.always);
    state.move = null;
    await loadAll();
    toast(refundChanged && m.refundId ? "Reimbursement linked."
      : refundChanged ? "Reimbursement removed."
      : movedCat && m.always
          ? "Moved to " + m.picked + " — saved as a rule for this business."
      : movedCat ? "Moved to " + m.picked + "."
      : incomeChanged ? (incomeWant === "income"
          ? "Marked as recurring income." : "No longer recurring income.")
      : "Saved.");
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast(e.message, true);
  }
}

// Steps the Activity month picker: delta +1 = older, -1 = newer.
function shiftMonth(delta) {
  const months = activityMonths();
  const i = months.indexOf(state.activityMonth);
  const next = i + delta;
  if (i < 0 || next < 0 || next >= months.length) return;
  state.activityMonth = months[next];
  state.batch = {};
  render();
}

// Moves every batch-selected transaction to one category.
async function saveBatch() {
  const ids = Object.keys(state.batch);
  if (!ids.length) return;
  const cat = state.batchCat || CATEGORIES[0];
  try {
    for (const id of ids) {
      await api("/transactions/" + id + "/category", "PATCH",
        { category: cat, applyToMerchant: false });
    }
    state.batch = {};
    state.selectMode = false;
    await loadAll();
    toast("Moved " + ids.length + (ids.length === 1 ? " transaction" : " transactions")
      + " to " + cat + ".");
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast(e.message, true);
  }
}

// --- Splitwise -------------------------------------------------------------

// The Splitwise link for a transaction, if it has been split (else undefined).
function splitwiseLink(txnId) {
  return state.splitwise.links.find((l) => l.transactionId === txnId);
}

// The "· ₪X owed to you" / "· paid back" note shown under a split transaction.
function splitwiseNote(t) {
  const link = splitwiseLink(t.id);
  if (!link) return "";
  if (link.paidState === "paid") {
    return ' · <span class="txn-sw paid">paid back</span>';
  }
  const remaining = Math.max(0, link.owedToMe - (link.paidAmount || 0));
  return ' · <span class="txn-sw">' + money(remaining, link.currency)
    + " owed to you</span>";
}

// Loads Splitwise connection state and links, then refreshes balances and
// paid state. Optional — a failure never blocks the rest of the dashboard.
async function loadSplitwise() {
  try {
    const [status, links] = await Promise.all([
      api("/splitwise/status"), api("/splitwise/links"),
    ]);
    state.splitwise.connected = !!status.connected;
    state.splitwise.user = status.user || null;
    state.splitwise.links = links.links || [];
    state._sidebarSig = null;
    render();
  } catch (e) { return; }
  if (!state.splitwise.connected) return;
  try {
    const r = await api("/splitwise/refresh", "POST");
    state.splitwise.friends = r.friends || [];
    state.splitwise.links = r.links || state.splitwise.links;
    state._sidebarSig = null;
    render();
  } catch (e) { /* balances are best-effort */ }
}

// The Overview "Owed to you" card — friends who currently owe the user.
function splitwiseCard() {
  const sw = state.splitwise;
  if (!sw.connected) return "";
  const owing = (sw.friends || [])
    .map((f) => ({ name: f.name,
      owed: (f.balances || []).filter((b) => b.amount > 0) }))
    .filter((f) => f.owed.length);
  let body;
  if (owing.length) {
    body = '<div class="list">' + owing.map((f) =>
      '<div class="row"><div class="name">' + esc(f.name) + "</div>"
      + '<span class="amount pos">'
      + f.owed.map((b) => money(b.amount, b.currency)).join(" · ")
      + "</span></div>").join("") + "</div>";
  } else {
    body = '<div class="empty">You\'re all settled up on Splitwise.</div>';
  }
  return '<section class="card"><div class="card-head"><h3>Owed to you</h3>'
    + '<span class="spacer"></span><span class="meta">via Splitwise</span>'
    + "</div>" + body + "</section>";
}

// Deletes a transaction's Splitwise expense — on Splitwise too, so it is
// removed for everyone it was shared with.
async function unlinkSplitwise(txnId) {
  if (!confirm("Delete this expense from Splitwise? It will be removed for "
    + "everyone it is shared with.")) return;
  try {
    await api("/splitwise/expense/" + encodeURIComponent(txnId), "DELETE");
    state.splitwise.links =
      state.splitwise.links.filter((l) => l.transactionId !== txnId);
    state._sidebarSig = null;
    render();
    toast("Deleted from Splitwise.");
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast(e.message, true);
  }
}

// The Splitwise block in Settings — connect with an API key, or disconnect.
function splitwiseSectionHtml() {
  const sw = state.splitwise;
  if (sw.connected) {
    return '<div class="set-row"><div class="set-row-main">'
      + '<div class="set-row-name">Connected'
      + (sw.user ? " as " + esc(sw.user.name) : "") + "</div>"

// Paints the Settings Splitwise block and wires its buttons — like the model
// section, it sits outside the #content click delegation.
function fillSplitwiseSection() {
  const el = document.getElementById("set-splitwise");
  if (!el) return;

      }

}

// The sheet for splitting one transaction onto Splitwise: pick a friend or
// group, set the split, and create the expense.
function splitwiseSheet(txn) {
  const cost = Math.abs(txn.amount);
  openModal((modal) => {
    let data = null;   // { friends, groups, me }
    let pick = null;   // { kind, id, name, members? }

    const cancelRow = '<div class="modal-actions">'
      + '<button data-x="cancel">Cancel</button></div>';
    const bindCancel = () => {
      const c = modal.querySelector('[data-x="cancel"]');
      if (c) c.addEventListener("click", closeOverlay);
    };

    const renderLoading = () => {
      modal.innerHTML = "<h2>Split on Splitwise</h2>"
        + '<p class="hint">Loading your friends and groups…</p>' + cancelRow;
      bindCancel();
    };

    const renderError = (msg) => {
      modal.innerHTML = "<h2>Split on Splitwise</h2>"
        + '<p class="hint">' + esc(msg) + "</p>" + cancelRow;
      bindCancel();
    };

    const renderPick = () => {
      const friends = (data.friends || []).map((f) =>
        '<div class="pick-row" data-sw-friend="' + esc(String(f.id)) + '">'
        + '<span class="logo">🧑</span><div>' + esc(f.name)
        + "</div></div>").join("");
      const groups = (data.groups || []).map((g) =>
        '<div class="pick-row" data-sw-group="' + esc(String(g.id)) + '">'
        + '<span class="logo">👥</span><div>' + esc(g.name)
        + "</div></div>").join("");
      if (!friends && !groups) {
        return renderError("No Splitwise friends or groups found — add some in "
          + "the Splitwise app first.");
      }
      modal.innerHTML = "<h2>Split on Splitwise</h2>"
        + '<p class="hint">' + esc(txn.description) + " · "
        + money(cost, txn.currency) + " · " + fmtDate(txn.date) + "</p>"
        + (friends ? '<div class="label sb-label">Friends</div>'
            + '<div class="pick-list">' + friends + "</div>" : "")
        + (groups ? '<div class="label sb-label">Groups</div>'
            + '<div class="pick-list">' + groups + "</div>" : "")
        + cancelRow;
      bindCancel();
      modal.querySelectorAll("[data-sw-friend]").forEach((el) =>
        el.addEventListener("click", () => {
          const f = data.friends.find((x) => String(x.id) === el.dataset.swFriend);
          if (f) { pick = { kind: "friend", id: f.id, name: f.name }; renderConfigure(); }
        }));
      modal.querySelectorAll("[data-sw-group]").forEach((el) =>
        el.addEventListener("click", () => {
          const g = data.groups.find((x) => String(x.id) === el.dataset.swGroup);
          if (g) {
            pick = { kind: "group", id: g.id, name: g.name, members: g.members || [] };
            renderConfigure();
          }
        }));
    };

    const renderConfigure = () => {
      if (pick.kind === "friend") return renderFriend();
      return renderGroup();
    };

    const renderFriend = () => {
      modal.innerHTML = "<h2>Split with " + esc(pick.name) + "</h2>"
        + '<p class="hint">' + esc(txn.description) + " · "
        + money(cost, txn.currency) + "</p>"
        + '<div class="field"><label>How much does ' + esc(pick.name)
        + " owe you?</label>"
        + '<input id="sw-owed" type="number" min="0" step="0.01" value="'
        + (cost / 2).toFixed(2) + '"></div>'
        + '<p class="sub-hint" id="sw-hint"></p>'
        + '<div class="modal-err" id="sw-err" hidden></div>'
        + '<div class="modal-actions"><button data-x="back">‹ Back</button>'
        + '<button class="primary" data-x="create">Add to Splitwise</button></div>';
      const owed = modal.querySelector("#sw-owed");
      const hint = modal.querySelector("#sw-hint");
      const refreshHint = () => {
        const v = Math.min(cost, Math.max(0, Number(owed.value) || 0));
        hint.textContent = "You keep " + money(cost - v, txn.currency)
          + "; " + pick.name + " owes you " + money(v, txn.currency) + ".";
      };
      owed.addEventListener("input", refreshHint);
      refreshHint();
      modal.querySelector('[data-x="back"]')
        .addEventListener("click", () => { pick = null; renderPick(); });
      modal.querySelector('[data-x="create"]').addEventListener("click", () => {
        const v = Number(owed.value);
        const err = modal.querySelector("#sw-err");
        if (!Number.isFinite(v) || v <= 0) {
          err.textContent = "Enter how much " + pick.name + " owes you.";
          err.hidden = false;
          return;
        }
        if (v > cost + 0.001) {
          err.textContent = "That is more than the expense.";
          err.hidden = false;
          return;
        }
        create(null, [{ userId: pick.id, name: pick.name, owed: v }]);
      });
    };

    const renderGroup = () => {
      const others = (pick.members || [])
        .filter((m) => !data.me || m.id !== data.me.id);
      if (!others.length) {
        return renderError("That group has no one else in it to split with.");
      }
      modal.innerHTML = "<h2>Split with " + esc(pick.name) + "</h2>"
        + '<p class="hint">' + esc(txn.description) + " · "
        + money(cost, txn.currency)
        + " — split equally among everyone ticked, including you.</p>"
        + '<div class="sw-members">' + others.map((m) =>
            '<label class="sw-member"><input type="checkbox" data-sw-mem="'
            + esc(String(m.id)) + '" checked><span>' + esc(m.name)
            + "</span></label>").join("") + "</div>"
        + '<p class="sub-hint" id="sw-hint"></p>'
        + '<div class="modal-err" id="sw-err" hidden></div>'
        + '<div class="modal-actions"><button data-x="back">‹ Back</button>'
        + '<button class="primary" data-x="create">Add to Splitwise</button></div>';
      const hint = modal.querySelector("#sw-hint");
      const checks = [...modal.querySelectorAll("[data-sw-mem]")];
      const checked = () => checks.filter((c) => c.checked);
      const refreshHint = () => {
        const n = checked().length + 1;   // +1 for you
        const share = cost / n;
        hint.textContent = "Each of " + n + " pays " + money(share, txn.currency)
          + "; you're owed " + money(cost - share, txn.currency) + ".";
      };
      checks.forEach((c) => c.addEventListener("change", refreshHint));
      refreshHint();
      modal.querySelector('[data-x="back"]')
        .addEventListener("click", () => { pick = null; renderPick(); });
      modal.querySelector('[data-x="create"]').addEventListener("click", () => {
        const on = checked();
        const err = modal.querySelector("#sw-err");
        if (!on.length) {
          err.textContent = "Tick at least one person.";
          err.hidden = false;
          return;
        }
        const share = cost / (on.length + 1);
        const shares = on.map((c) => {
          const m = others.find((x) => String(x.id) === c.dataset.swMem);
          return { userId: m.id, name: m.name, owed: share };
        });
        create(pick.id, shares);
      });
    };

    const create = async (groupId, shares) => {
      const err = modal.querySelector("#sw-err");
      try {
        const r = await api("/splitwise/expense", "POST", {
          transactionId: txn.id, groupId: groupId, shares: shares,
        });
        if (r && r.link) {
          state.splitwise.links = state.splitwise.links
            .filter((l) => l.transactionId !== txn.id).concat([r.link]);
        }
        closeOverlay();
        state._sidebarSig = null;
        render();
        toast("Added to Splitwise.");
        loadSplitwise();
      } catch (e) {
        if (e instanceof VaultLocked) { closeOverlay(); return showGate(); }
        if (err) { err.textContent = e.message; err.hidden = false; }
        else toast(e.message, true);
      }
    };

    renderLoading();
    api("/splitwise/groups")
      .then((r) => {
        data = { friends: r.friends || [], groups: r.groups || [], me: r.me || null };
        renderPick();
      })
      .catch((e) => {
        if (e instanceof VaultLocked) { closeOverlay(); return showGate(); }
        renderError(e.message);
      });
  });
}

// --- Event delegation ------------------------------------------------------

function handleAction(action, btn) {
  const id = btn && btn.dataset.id;
  const conn = id && state.connections.find((c) => c.id === id);
  switch (action) {
    case "add-connection": addConnectionModal(); break;
    case "sync-all": syncAll(); break;
    case "sync": if (conn) scrape(conn); break;
    case "set-credentials": if (conn) credentialsModal(conn); break;
    case "link-brokerage": if (id) linkBrokerage(id); break;
    case "remove": if (id) removeConnection(id); break;
    case "edit-asset": {
      const a = id && (state.assets || []).find((x) => x.id === id);
      if (a) editAssetModal(a);
      break;
    }
    case "remove-asset": if (id) removeAsset(id); break;
    case "new-piggy": piggyModal(null); break;
    case "edit-piggy": {
      const b = id && (((state.budget || {}).piggy || {}).banks || [])
        .find((x) => x.id === id);
      if (b) piggyModal(b);
      break;
    }
    case "toggle-hold": if (id) togglePiggyHold(id); break;
    case "remove-piggy": if (id) removePiggy(id); break;
    case "month-prev": shiftMonth(1); break;
    case "month-next": shiftMonth(-1); break;
    case "toggle-select":
      state.selectMode = !state.selectMode;
      state.batchOpen = false;
      if (!state.selectMode) state.batch = {};
      else state.move = null;
      render();
      break;
    case "batch-toggle": state.batchOpen = !state.batchOpen; render(); break;
    case "batch-clear":
      state.batch = {}; state.batchOpen = false; render(); break;
    case "batch-move": state.batchOpen = false; saveBatch(); break;
    case "collapse-all": {
      const cs = state._actCats || [];
      const allCol = cs.length && cs.every((c) => state.collapsed[c]);
      cs.forEach((c) => {
        if (allCol) delete state.collapsed[c];
        else state.collapsed[c] = true;
      });
      render();
      break;
    }
    case "edit-budgets": budgetModal(); break;
    case "generate-insights": generateInsights(); break;
    case "toggle-holdings":
      if (id) {
        state.expandedHoldings[id] = !state.expandedHoldings[id];
        render();
      }
      break;
    case "insights-tab":
      if (btn && btn.dataset.arg) { state.insightsTab = btn.dataset.arg; render(); }
      break;
    case "view-month-activity":
      if (btn && btn.dataset.arg) {
        state.tab = "activity";
        state.activityMonth = btn.dataset.arg;
        render();
      }
      break;
  }
}

// Includes/excludes one account or manual asset from the net-worth total,
// then reloads so the headline figure and the breakdown reflect the change.
async function toggleNetWorth(kind, id, counted) {
  const excluded = !counted;
  try {
    if (kind === "asset") {
      await api("/assets/" + id, "PUT", { excluded: excluded });
    } else {
      await api("/accounts/" + id + "/excluded", "PATCH", { excluded: excluded });
    }
    await loadAll();
    render();
  } catch (err) {
    toast("Couldn't update the net-worth setting.");
    render(); // re-render to restore the checkbox to the stored state
  }
}

document.getElementById("content").addEventListener("click", (e) => {
  const balEl = e.target.closest("[data-edit-balance]");
  if (balEl) {
    const acct = state.accounts.find((a) => a.id === balEl.dataset.editBalance);
    if (acct) balanceModal(acct);
    return;
  }
  const nwEl = e.target.closest("[data-toggle-nw]");
  if (nwEl) {
    // The checkbox has already flipped: checked = counted in net worth.
    toggleNetWorth(nwEl.dataset.toggleNw, nwEl.dataset.id, nwEl.checked);
    return;
  }
  const bcatOpt = e.target.closest("[data-batch-cat]");
  if (bcatOpt) {
    state.batchCat = bcatOpt.dataset.batchCat;
    state.batchOpen = false;
    render();
    return;
  }
  // A click anywhere else closes an open category dropdown.
  if (state.batchOpen && !e.target.closest(".bcat")) {
    state.batchOpen = false;
    render();
    return;
  }
  const collapseEl = e.target.closest("[data-collapse]");
  if (collapseEl) {
    const cat = collapseEl.dataset.collapse;
    if (state.collapsed[cat]) delete state.collapsed[cat];
    else state.collapsed[cat] = true;
    render();
    return;
  }
  const txnEl = e.target.closest("[data-txn]");
  if (txnEl) {
    const txn = state.transactions.find((t) => t.id === txnEl.dataset.txn);
    if (!txn) return;
    if (state.selectMode) {
      if (state.batch[txn.id]) delete state.batch[txn.id];
      else state.batch[txn.id] = true;
      render();
      return;
    }
    state.move = { txnId: txn.id, picked: txn.category || "", always: false,
      linkMode: false, refundId: txn.refundId || null,
      frequency: state.merchantFreq[merchantKey(txn.description)] || "monthly" };
    render();
    document.getElementById("sidebar").scrollIntoView({ behavior: "smooth", block: "nearest" });
    return;
  }
  const monthEl = e.target.closest("[data-month]");
  if (monthEl) {
    state.insightsMonth = monthEl.dataset.month;
    render();
    return;
  }
  const btn = e.target.closest("[data-action]");
  if (btn) handleAction(btn.dataset.action, btn);
});

document.getElementById("nav").addEventListener("click", (e) => {
  const btn = e.target.closest("[data-tab]");
  if (!btn || btn.dataset.tab === state.tab) return;
  state.tab = btn.dataset.tab;
  render();
});

document.getElementById("sidebar").addEventListener("click", (e) => {
  const moveCat = e.target.closest("[data-move-cat]");
  if (moveCat && state.move) {
    state.move.picked = moveCat.dataset.moveCat;
    renderSidebar(); // re-render so the billing-frequency section follows suit
    return;
  }
  const freqBtn = e.target.closest("[data-freq]");
  if (freqBtn && state.move) {
    state.move.frequency = freqBtn.dataset.freq;
    renderSidebar();
    return;
  }
  const pick = e.target.closest("[data-pick-refund]");
  if (pick && state.move) {
    state.move.refundId = pick.dataset.pickRefund;
    state.move.linkMode = false;
    render();
    return;
  }
  const x = e.target.closest("[data-x]");
  if (x && state.move) {
    if (x.dataset.x === "move-cancel") { state.move = null; render(); }
    else if (x.dataset.x === "move-save") saveMove();
    else if (x.dataset.x === "link-add") { state.move.linkMode = true; render(); }
    else if (x.dataset.x === "link-back") { state.move.linkMode = false; render(); }
    else if (x.dataset.x === "link-remove") { state.move.refundId = null; render(); }
    else if (x.dataset.x === "sw-split") {
      const t = state.transactions.find((tx) => tx.id === state.move.txnId);
      if (t) splitwiseSheet(t);
    }
    else if (x.dataset.x === "sw-unlink") unlinkSplitwise(state.move.txnId);
    return;
  }
  const btn = e.target.closest("[data-action]");
  if (btn) handleAction(btn.dataset.action, btn);
});

document.getElementById("sidebar").addEventListener("change", (e) => {
  if (e.target.id === "move-always" && state.move) {
    state.move.always = e.target.checked;
  }
  if (e.target.id === "move-income" && state.move) {
    state.move.frequency = e.target.checked ? "income" : "none";
  }
});

document.getElementById("theme-toggle").addEventListener("click", () => {
  const next = document.documentElement.getAttribute("data-theme") === "light"
    ? "dark" : "light";
  applyTheme(next);
});
document.getElementById("settings-btn").addEventListener("click", settingsModal);

// Re-pack the Activity columns when the window width changes.
let _resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    if ((state.tab === "activity" || state.tab === "assets")
      && (state.connections.length || state.assets.length)) render();
  }, 180);
});

// --- Vault gate & boot -----------------------------------------------------

function showGate(creating) {
  document.getElementById("app").hidden = true;
  openModal((modal) => {
    modal.innerHTML = "<h2>" + (creating ? "Set a vault passphrase" : "Unlock Hon") + "</h2>"
      + '<p class="hint">' + (creating
        ? "Your bank credentials are encrypted with this passphrase. There is no recovery — keep it safe."
        : "Enter the passphrase that protects your stored credentials.")
      + "</p>"
      + '<div class="field"><input id="vault-pass" type="password" '
      + 'placeholder="Passphrase" autocomplete="current-password"></div>'
      + '<div class="modal-err" id="vault-err" hidden></div>'
      + '<div class="modal-actions"><button class="primary" data-x="go">'
      + (creating ? "Create vault" : "Unlock") + "</button></div>";
    const input = modal.querySelector("#vault-pass");
    input.focus();
    const go = async () => {
      const passphrase = input.value;
      const err = modal.querySelector("#vault-err");
      if (!passphrase) { err.textContent = "Enter a passphrase."; err.hidden = false; return; }
      try {
        await api("/vault/unlock", "POST", { passphrase });
        sessionStorage.setItem("honVaultPass", passphrase);
        closeOverlay();
        document.getElementById("app").hidden = false;
        await loadAll();
      } catch (e) {
        err.textContent = e.message; err.hidden = false;
      }
    };
    modal.querySelector('[data-x="go"]').addEventListener("click", go);
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });
  });
}

async function boot() {
  applyTheme(localStorage.getItem("honTheme") || "dark");
  if (!token) {
    document.getElementById("content").innerHTML =
      '<div class="card empty">No access token. Start the app with ./web.sh so the '
      + "dashboard URL includes its token.</div>";
    document.getElementById("shell").classList.add("bare");
    document.getElementById("app").hidden = false;
    return;
  }
  try {
    const health = await api("/health");
    document.getElementById("engine").textContent = "engine v" + health.version;
    const status = await api("/vault/status");
    if (status.unlocked) {
      document.getElementById("app").hidden = false;
      return loadAll();
    }
    const saved = sessionStorage.getItem("honVaultPass");
    if (status.exists && saved) {
      try {
        await api("/vault/unlock", "POST", { passphrase: saved });
        document.getElementById("app").hidden = false;
        return loadAll();
      } catch (e) { /* fall through to the gate */ }
    }
    showGate(!status.exists);
  } catch (e) {
    document.getElementById("content").innerHTML =
      '<div class="card empty">Could not reach the engine: ' + esc(e.message) + "</div>";
    document.getElementById("shell").classList.add("bare");
    document.getElementById("app").hidden = false;
  }
}

boot();
</script>
