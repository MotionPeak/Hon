<script>
"use strict";

const token = new URLSearchParams(location.hash.slice(1)).get("token");
const SYMBOLS = { ILS: "₪", NIS: "₪", USD: "$", EUR: "€", GBP: "£" };
const CATEGORIES = ["Groceries","Dining","Transport","Fuel","Shopping","Utilities",
  "Housing","Insurance","Health","Entertainment","Subscriptions","Travel","Education",
  "Income","Transfers","Fees","Other"];
// The live list of category names — user-created ones included — ordered by
// the same sortOrder catStyle uses, with the built-in CATEGORIES as a fallback
// before state.categories has loaded.
function categoryNames() {
  if (!state.categories || !state.categories.length) return CATEGORIES;
  return state.categories.slice()
    .sort((a, b) => (a.sortOrder ?? 100) - (b.sortOrder ?? 100))
    .map((c) => c.name);
}
// Category style + group come from the user-editable list at state.categories
// (loaded from /categories on startup). The DEFAULT_CATEGORY_STYLE matches
// the seeded built-ins so the UI renders sensibly even before state has been
// populated, and gives unknown categories a neutral fallback.
const DEFAULT_CATEGORY_STYLE = ["🏷️", "#8C8FA8"];
function catStyle(cat) {
  const row = (state.categories || []).find((c) => c.name === cat);
  if (row) return [row.emoji, row.color];
  return DEFAULT_CATEGORY_STYLE;
}
function catGroup(cat) {
  const row = (state.categories || []).find((c) => c.name === cat);
  return row ? row.catGroup : "variable";
}
const GROUP_ORDER = ["income", "essential", "fixed", "variable"];
const GROUP_LABEL = { income: "Income", essential: "Essentials",
  fixed: "Fixed expenses", variable: "Variable expenses" };

// A merchant key: the description with digit-bearing words dropped, so it
// survives the varying transaction code scrapers append to each charge.
function merchantWords(d) { return (d || "").split(/\s+/).filter((w) => w && !/\d/.test(w)); }
function merchantKey(d) { return merchantWords(d).join(" ").toLowerCase() || (d || ""); }
function merchantName(d) { return merchantWords(d).join(" ") || d; }

// How often a recurring charge bills. RECURRENCE_DIV turns one charge into a
// monthly-equivalent cost; RECURRENCE_ACTIVE_DAYS is how long since the last
// charge still counts as active (a yearly bill lapses far slower than monthly).
const RECURRENCE_DIV = { monthly: 1, bimonthly: 2, yearly: 12 };
const RECURRENCE_ACTIVE_DAYS = { monthly: 40, bimonthly: 75, yearly: 400 };
// The frequency choices the transaction editor offers for a given category —
// null when the category is not a recurring bill.
function recurrenceChoices(category) {
  if (category === "Subscriptions") return [["monthly", "Monthly"], ["yearly", "Yearly"]];
  if (catGroup(category) === "fixed") return [["monthly", "Monthly"], ["bimonthly", "Bimonthly"]];
  return null;
}
function monthlyEquivalent(amount, freq) {
  return amount / (RECURRENCE_DIV[freq] || 1);
}
const FIELD_LABELS = {
  username: "Username", password: "Password", userCode: "User code",
  id: "ID number", phone: "Phone number", card6Digits: "Card — last 6 digits",
  nationalID: "National ID", num: "Account number", clientId: "SnapTrade Client ID",
  consumerKey: "SnapTrade Consumer Key",
};
const SECURE_FIELDS = new Set(["password", "consumerKey"]);
const SNAPTRADE_ID = "snaptrade";
const TABS = [["overview", "Overview", "📊"], ["assets", "Assets", "🏦"],
  ["activity", "Activity", "🧾"], ["recurring", "Fixed bills", "📆"],
  ["income", "Income", "💼"],
  ["subscriptions", "Subscriptions", "🔁"],
  ["piggy", "Piggy banks", "🐷"],
  ["vouchers", "Vouchers", "🎟️"],
  ["insights", "Insights", "💡"],
  ["settings", "Settings", "⚙️"]];

// Icons offered when naming a piggy bank, and the preset "ready in N months"
// plans the create form turns into a suggested monthly set-aside.
const PIGGY_EMOJI = ["🐷", "✈️", "🏖️", "🚗", "🏠", "💍", "🎓", "💻", "📷",
  "🎁", "🛋️", "🚲", "⛺️", "🎮", "🪙", "❤️"];
const PIGGY_PLANS = [3, 6, 12, 24];

const state = {
  companies: [], connections: [], accounts: [], transactions: [], assets: [],
  vouchers: [],          // gift cards / prepaid vouchers — Shufersal, Pluxee, etc
  loans: [], rates: { prime: null, cpiNow: null },
  categories: [],         // user-editable spending categories, from /categories
  // Every refund→expense allocation. One refund may cover parts of several
  // expenses, and one expense may receive parts of several refunds.
  transactionLinks: [],   // [{ expenseId, refundId, amount }]
  summary: null, budget: null, insights: null, llm: null,
  merchantFreq: {},      // { merchantKey: "monthly"|"bimonthly"|"yearly" }
  merchantSplits: {},    // { merchantKey: N }  legacy — replaced by categorySplits
  categorySplits: {},    // { category: N }    N = "I pay 1/N of every charge in this category"
  cancelledSubs: {},     // { merchantKey: cancelledAtIso } — user-marked cancellations
  incomeOverride: null,  // null | number — manual override for Expected income
  monthlySavings: {},    // { "YYYY-MM": { amount, transferred } } — per-cycle savings set-aside
  scrapes: {}, categorize: null, tab: "overview",
  move: null,            // { txnId, picked, always } while moving a transaction
  activityMonth: null,   // "YYYY-MM" currently shown in the Activity tab
  activitySearch: "",    // when non-empty, Activity becomes a cross-month search
  selectMode: false,     // batch-select mode in the Activity tab
  batch: {},             // { txnId: true } selected for a batch move
  batchCat: "",          // target category chosen in the batch bar
  batchOpen: false,      // batch-bar category dropdown open?
  collapsed: {},         // { category: true } collapsed Activity groups
  insightsMonth: null,   // "YYYY-MM" drilled into on the Insights tab
  insightsTab: "spending", // "spending" | "brokerage" sub-view of Insights
  brokerage: { holdings: [], snapshots: [], holdingSnapshots: [], performance: [],
    ilsRates: null },
  brkRange: "1Y",        // "1M" | "3M" | "YTD" | "1Y" | "ALL" chart window
  brkBase: "native",     // "native" | "ILS" — currency the headlines render in
  brkAccount: "all",     // "all" | accountId — filter for chart + holdings
  brkOpenHolding: null,  // symbol of the holding whose detail card is open
  expandedHoldings: {},  // { accountId: true } account cards showing holdings
  subAliases: {},        // { lapsedName: activeName } — AI-detected renames
  subAliasSig: null,     // signature of the name set subAliases was built for
  subAliasBusy: false,   // an alias lookup is in flight
  // Splitwise: connection state, transaction↔expense links, friend balances.
  splitwise: { connected: false, user: null, links: [], friends: [] },
  _renderedTab: null, _nwShown: null, _sidebarSig: null,
};

// --- Helpers ---------------------------------------------------------------

function money(value, currency, sign) {
  if (value == null) return "—";
  const cur = (currency || "").toUpperCase();
  const symbol = SYMBOLS[cur] || cur + " ";
  const n = Math.abs(value).toLocaleString(undefined,
    { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const prefix = value < 0 ? "−" : (sign && value > 0 ? "+" : "");
  return prefix + symbol + n;
}
function fmtDate(s) {
  const d = new Date(s);
  return isNaN(d) ? s : d.toLocaleDateString(undefined,
    { year: "numeric", month: "short", day: "numeric" });
}
function fmtSize(bytes) {
  if (!bytes) return "";
  const gb = bytes / 1e9;
  return gb >= 1 ? gb.toFixed(1) + " GB" : Math.round(bytes / 1e6) + " MB";
}
// Compact money for tight spots (e.g. the donut centre): ₪12.3k, ₪840.
function moneyShort(value, currency) {
  const sym = SYMBOLS[(currency || "").toUpperCase()] || "";
  const abs = Math.abs(value);
  const sign = value < 0 ? "−" : "";
  if (abs >= 1000) return sign + sym + (abs / 1000).toFixed(abs >= 10000 ? 0 : 1) + "k";
  return sign + sym + Math.round(abs);
}
function monthLetter(key) {
  const p = key.split("-");
  return new Date(Number(p[0]), Number(p[1]) - 1, 1)
    .toLocaleDateString(undefined, { month: "narrow" });
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

function toast(message, isError) {
  const el = document.createElement("div");
  el.className = "toast" + (isError ? " err" : "");
  el.textContent = message;
  document.getElementById("toasts").appendChild(el);
  setTimeout(() => el.remove(), 4500);
}

// Counts a number up to its target — a small flourish on the net-worth figure.
function animateValue(el, to, currency) {
  const dur = 850, start = performance.now();
  (function step(now) {
    const p = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = money(to * eased, currency);
    if (p < 1) requestAnimationFrame(step);
  })(start);
}

class VaultLocked extends Error {}

async function api(path, method, body) {
  // Only send a JSON content-type when there is a body — Fastify rejects an
  // empty body with 400 "Bad Request" if application/json is declared.
  const headers = {};
  if (token) headers.Authorization = "Bearer " + token;
  if (body !== undefined) headers["Content-Type"] = "application/json";
  const res = await fetch(path, {
    method: method || "GET",
    headers,
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  if (res.status === 409) throw new VaultLocked("vault locked");
  if (!res.ok) {
    let detail = "HTTP " + res.status;
    try { detail = (await res.json()).error || detail; } catch (e) {}
    if (res.status === 401) detail = "Not authorized — re-open with ./web.sh.";
    throw new Error(detail);
  }
  return res.status === 204 ? null : res.json();
}

// --- Theme & sidebar -------------------------------------------------------

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("honTheme", theme);
  const btn = document.getElementById("theme-toggle");
  if (btn) btn.textContent = theme === "light" ? "☾" : "☀";
}

// --- Settings --------------------------------------------------------------

const DEFAULT_SETTINGS = {
  monthStartDay: 1,
  projectRecurring: true,   // expect recurring fixed bills + averaged income
  incomeAvgMonths: 3,       // months averaged for expected income
  hideCardTotals: true,
  cardProviders: ["מקס", "ישראכרט", "כאל", "ויזה כאל", "אמריקן אקספרס",
    "לאומי קארד", "דיינרס", "max", "isracard", "cal", "american express",
    "leumi card", "diners"],
};
let settings = loadSettings();
function loadSettings() {
  const base = Object.assign({}, DEFAULT_SETTINGS);
  try {
    const raw = JSON.parse(localStorage.getItem("honSettings") || "{}");
    if (raw && typeof raw === "object") Object.assign(base, raw);
  } catch (e) { /* fall back to defaults */ }
  if (!Array.isArray(base.cardProviders)) {
    base.cardProviders = DEFAULT_SETTINGS.cardProviders.slice();
  }
  return base;
}
function saveSettings() {
  localStorage.setItem("honSettings", JSON.stringify(settings));
}

// The "month" a transaction belongs to, honouring a custom cycle start day
// (e.g. the day the credit-card bill is debited). Returns the "YYYY-MM" key of
// the cycle's opening month.
function cycleKey(dateStr) {
  const start = settings.monthStartDay || 1;
  const d = new Date(dateStr);
  if (isNaN(d)) return (dateStr || "").slice(0, 7);
  let y = d.getFullYear(), m = d.getMonth();
  if (start > 1 && d.getDate() < start) {
    m -= 1;
    if (m < 0) { m = 11; y -= 1; }
  }
  return y + "-" + String(m + 1).padStart(2, "0");
}
// A cycle is labelled by its opening month — "March 2026" — even when a custom
// billing-cycle start day means it runs into the next calendar month.
function cycleLabel(key) {
  const p = key.split("-");
  return new Date(Number(p[0]), Number(p[1]) - 1, 1)
    .toLocaleDateString(undefined, { month: "long", year: "numeric" });
}
// The cycle key one billing cycle before the given one.
function prevCycleKey(key) {
  const p = key.split("-");
  let y = Number(p[0]), m = Number(p[1]) - 2;
  while (m < 0) { m += 12; y -= 1; }
  return y + "-" + String(m + 1).padStart(2, "0");
}
// Whole cycles between two YYYY-MM keys (toKey − fromKey). Negative if toKey
// is earlier.
function cyclesBetween(fromKey, toKey) {
  if (!fromKey || !toKey) return 0;
  const [fy, fm] = fromKey.split("-").map(Number);
  const [ty, tm] = toKey.split("-").map(Number);
  return (ty - fy) * 12 + (tm - fm);
}
function currentCycleKey() {
  return cycleKey(new Date().toISOString().slice(0, 10));
}
// Resolved ISO bounds [start, end) of the current billing cycle — the window
// the Budget card is scoped to, so it matches the Activity tab's cycle.
function currentCycleRange() {
  const key = currentCycleKey();           // "YYYY-MM" — the cycle's opening month
  const s = settings.monthStartDay || 1;
  const p = key.split("-");
  const y = Number(p[0]), m = Number(p[1]) - 1; // 0-based opening month
  const pad2 = (n) => String(n).padStart(2, "0");
  const ny = m === 11 ? y + 1 : y;
  const nm = m === 11 ? 0 : m + 1;
  return { start: key + "-" + pad2(s),
    end: ny + "-" + pad2(nm + 1) + "-" + pad2(s) };
}
// "/budget" scoped to the current billing cycle. When recurring projection is
// on, the expected income and smoothed fixed bills go along too — so the engine
// settles piggy banks against expected income, not just money in so far.
function budgetUrl() {
  const r = currentCycleRange();
  let url = "/budget?start=" + r.start + "&end=" + r.end;
  const p = budgetProjection();
  if (p) {
    if (p.expectedIncome != null) url += "&expectedIncome=" + Math.round(p.expectedIncome);
    url += "&expectedFixed=" + Math.round(p.expectedFixed || 0);
  }
  // Hide-card-bill-totals lives in the UI; forward the matchers so the engine
  // can filter card-bill bank lines out of "Spent this month" and "Money in".
  if (settings.hideCardTotals && Array.isArray(settings.cardProviders)) {
    settings.cardProviders.forEach((m) => {
      const v = (m || "").toString().trim();
      if (v) url += "&cardProvider=" + encodeURIComponent(v);
    });
  }
  return url;
}
// ILS expense spending in one billing cycle, card-bill totals excluded and
// refund offsets applied — the figures the Activity tab and Overview share.
function cycleSpending(key) {
  const byCat = {};
  let total = 0;
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || isCardTotal(t) || t.refundForId) return;
    if (cycleKey(t.date) !== key) return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt >= 0) return;
    total += -amt;
    const c = t.category || "Uncategorized";
    byCat[c] = (byCat[c] || 0) + -amt;
  });
  return { total, byCat };
}
// True when a transaction is just a credit-card bill total debited from a bank
// account — itemised under the card elsewhere, so it would double-count.
function isCardTotal(t) {
  if (!settings.hideCardTotals) return false;
  const desc = (t.description || "").toLowerCase();
  if (!desc) return false;
  return (settings.cardProviders || []).some((p) => {
    p = (p || "").trim().toLowerCase();
    return p.length > 1 && desc.indexOf(p) >= 0;
  });
}
// Whether a transaction matches the Activity tab's search query. Matches
// description, category, account label / institution name, ISO date, and a
// near-exact amount when the query parses as a number — so "rami" finds a
// merchant, "groceries" finds a category, "2026-05-23" finds a day, and a
// raw "176.40" finds the ₪176.40 charge. Hebrew works as-is (no case).
function txnMatchesSearch(t, q) {
  if (!q) return true;
  if ((t.description || "").toLowerCase().includes(q)) return true;
  if ((t.category || "").toLowerCase().includes(q)) return true;
  if (t.date && t.date.includes(q)) return true;
  const acct = state.accounts.find((a) => a.id === t.accountId);
  if (acct) {
    if ((acct.label || "").toLowerCase().includes(q)) return true;
    if ((acct.connectionName || "").toLowerCase().includes(q)) return true;
  }
  const num = parseFloat(q.replace(/[^0-9.\-]/g, ""));
  if (Number.isFinite(num) && num !== 0) {
    if (Math.abs(Math.abs(t.amount) - Math.abs(num)) < 0.5) return true;
  }
  return false;
}

// Updates the Activity search query, re-renders, and restores focus +
// cursor to the search input — otherwise typing would lose focus on every
// keystroke since the whole tab re-renders.
function setActivitySearch(value) {
  state.activitySearch = value;
  render();
  const el = document.getElementById("act-search");
  if (el) {
    el.focus();
    const v = el.value || "";
    el.setSelectionRange(v.length, v.length);
  }
}

// The total refund credit applied to an expense — sum of every allocation
// linked to it. With N:M linking one expense may receive parts of several
// refunds; this returns the combined offset (positive, the way refund rows
// are signed). 0 when nothing is linked.
function txnRefundAmount(t) {
  if (!t) return 0;
  let sum = 0;
  for (const l of (state.transactionLinks || [])) {
    if (l.expenseId === t.id) sum += l.amount;
  }
  return sum;
}

// The portion of a refund transaction that is still unallocated. Used by
// the link picker to show "₪307 left to allocate" alongside the amount.
function refundRemaining(refundId) {
  const r = state.transactions.find((x) => x.id === refundId);
  if (!r) return 0;
  let used = 0;
  for (const l of (state.transactionLinks || [])) {
    if (l.refundId === refundId) used += l.amount;
  }
  return Math.max(0, Math.abs(r.amount) - used);
}

// The single existing allocation between a given expense and refund, or
// undefined. The picker uses this so editing an already-linked pair starts
// the amount input at the current value rather than the unallocated rest.
function transactionLinkFor(expenseId, refundId) {
  return (state.transactionLinks || []).find(
    (l) => l.expenseId === expenseId && l.refundId === refundId,
  );
}

// Updates state.move.linkAmount on every keystroke and refreshes the
// "Effective spend · ..." line *in place*. A full render() would tear down
// the input and steal focus mid-edit, which is why we don't go through it.
function onLinkAmount(inputEl) {
  if (!state.move) return;
  const v = Number(inputEl.value);
  state.move.linkAmount = Number.isFinite(v) && v >= 0 ? v : 0;
  const txn = state.transactions.find((t) => t.id === state.move.txnId);
  if (!txn) return;
  const effective = txn.amount + Number(state.move.linkAmount || 0);
  const effEl = document.querySelector(".rf-eff");
  if (effEl) {
    effEl.textContent = "Effective spend · "
      + money(effective, txn.currency, true);
  }
}

// Match a transaction to a bank-scraped loan: same connection, the
// description contains the loan's number (the digit-prefix of its
// externalId, e.g. "108" from "108-416"). Returns null when no loan fits.
function loanForTransaction(t) {
  if (!t || !state.loans || !state.loans.length) return null;
  const acct = state.accounts.find((a) => a.id === t.accountId);
  if (!acct) return null;
  const desc = t.description || "";
  for (const loan of state.loans) {
    if (loan.connectionId !== acct.connectionId) continue;
    if (!loan.externalId) continue;
    const parts = String(loan.externalId).split(/[^0-9]/).filter((s) => s.length >= 3);
    if (parts.some((p) => desc.indexOf(p) >= 0)) return loan;
  }
  return null;
}

// Sub-line note appended to a transaction when it's a payment toward a
// recognised loan: how many monthly payments remain on it.
function loanNote(t) {
  const loan = loanForTransaction(t);
  if (!loan) return "";
  const left = Math.max(0, Math.round((loan.state && loan.state.monthsRemaining) || 0));
  if (left <= 0) return "";
  return '<span class="txn-refund"> · ' + left + " payment"
    + (left === 1 ? "" : "s") + " left</span>";
}

// --- Data loading ----------------------------------------------------------

async function loadAll() {
  try {
    const [companies, connections, accounts, transactions, assets, vouchersResp, loansResp, categoriesResp,
           summary, insights, llm, merchantFreq, brokerage, cancelledSubs,
           incomeOverrideResp, savingsResp, linksResp, splitsResp, catSplitsResp] =
      await Promise.all([
        api("/companies").then((r) => r.companies),
        api("/connections").then((r) => r.connections),
        api("/accounts").then((r) => r.accounts),
        api("/transactions?limit=1000").then((r) => r.transactions),
        api("/assets").then((r) => r.assets),
        api("/vouchers").catch(() => ({ vouchers: [] })),
        api("/loans").catch(() => ({ loans: [], rates: { prime: null, cpiNow: null } })),
        api("/categories").catch(() => ({ categories: [] })),
        api("/summary").then((r) => r.summary),
        api("/insights"),
        api("/llm"),
        api("/merchant-frequencies").then((r) => r.frequencies),
        api("/brokerage"),
        api("/subscriptions/cancelled").then((r) => r.cancelled),
        api("/budget/income-override").catch(() => ({ value: null })),
        api("/budget/savings").catch(() => ({ savings: {} })),
        api("/transaction-links").catch(() => ({ links: [] })),
        api("/merchant-splits").catch(() => ({ splits: {} })),
        api("/category-splits").catch(() => ({ splits: {} })),
      ]);
    Object.assign(state, {
      companies, connections, accounts, transactions, assets,
      vouchers: vouchersResp.vouchers || [],
      loans: loansResp.loans || [], rates: loansResp.rates || { prime: null, cpiNow: null },
      categories: categoriesResp.categories || [],
      summary, insights, llm, merchantFreq, brokerage, cancelledSubs,
      incomeOverride: incomeOverrideResp.value ?? null,
      monthlySavings: savingsResp.savings || {},
      transactionLinks: linksResp.links || [],
      merchantSplits: splitsResp.splits || {},
      categorySplits: catSplitsResp.splits || {},
    });
    // The budget is fetched once transactions are in state — its URL carries
    // the recurring projection, which is derived from those transactions.
    state.budget = await api(budgetUrl());
    // Drop a stale move target if its transaction is gone.
    if (state.move && !transactions.some((t) => t.id === state.move.txnId)) {
      state.move = null;
    }
    // Drop batch selections whose transactions no longer exist.
    Object.keys(state.batch).forEach((id) => {
      if (!transactions.some((t) => t.id === id)) delete state.batch[id];
    });
    render();
    loadSplitwise();   // optional — connection state, links, balance refresh
  } catch (err) {
    if (err instanceof VaultLocked) return showGate();
    toast(err.message, true);
  }
}

// --- Rendering -------------------------------------------------------------

function render() {
  document.getElementById("nav").innerHTML = TABS.map(([id, label, icon]) =>
    '<button data-tab="' + id + '"' + (state.tab === id ? ' class="active"' : "")
    + '><span class="rn-ico">' + icon + "</span><span>" + label
    + "</span></button>").join("");

  const content = document.getElementById("content");
  const tabChanged = state._renderedTab !== state.tab;
  state._renderedTab = state.tab;

  if (!state.connections.length && !state.assets.length && !(state.vouchers || []).length) {
    content.innerHTML = emptyState();
  } else if (state.tab === "assets") {
    content.innerHTML = accountsView();
  } else if (state.tab === "activity") {
    content.innerHTML = activityView();
  } else if (state.tab === "recurring") {
    content.innerHTML = recurringView();
  } else if (state.tab === "income") {
    content.innerHTML = incomeView();
  } else if (state.tab === "subscriptions") {
    content.innerHTML = subscriptionsView();
  } else if (state.tab === "piggy") {
    content.innerHTML = piggyView();
  } else if (state.tab === "vouchers") {
    content.innerHTML = vouchersView();
  } else if (state.tab === "insights") {
    content.innerHTML = insightsView();
  } else if (state.tab === "settings") {
    content.innerHTML = settingsView();
    bindSettings(content);
  } else {
    content.innerHTML = overviewView();
  }

  if (tabChanged) {
    content.classList.remove("tab-enter");
    void content.offsetWidth;
    content.classList.add("tab-enter");
    // Drop the class once the animation is done so later re-renders (scrape
    // polling, selecting a transaction) don't replay it.
    clearTimeout(state._tabTimer);
    state._tabTimer = setTimeout(() => content.classList.remove("tab-enter"), 750);
  }

  // Count the net-worth figure up when Overview is freshly shown.
  const nw = document.getElementById("nw-value");
  if (nw && nw.dataset.value) {
    const v = Number(nw.dataset.value);
    if (tabChanged || state._nwShown !== v) { animateValue(nw, v, "ILS"); }
    state._nwShown = v;
  }

  renderSidebar();
}

function emptyState() {
  return '<div class="blank"><div class="be">🏦</div>'
    + "<h2>Nothing here yet</h2>"
    + "<p>Connect a bank, credit card, or brokerage to pull in your balances "
    + "and transactions — or add a car, property, or cash as an asset.</p>"
    + '<button class="primary" data-action="add-connection">+ Add your first asset</button>'
    + "</div>";
}

/* --- Overview ------------------------------------------------------------ */

function overviewView() {
  return '<div class="ov-stack">' + balanceCard() + netWorthCard()
    + '<div class="ov-grid">' + spendingCard() + budgetSection() + "</div>"
    + splitwiseCard() + "</div>";
}

// A single big "this month's balance" headline — Expected income minus the
// committed outflows (fixed + essentials reserved at their projection, not
// the partial spend so far). Positive (green) is what's left after the
// planned bills for the month; negative (red) means even the bills won't
// fit. Sits at the top of the Overview so the bottom-line answer is the
// first thing you see, and the projected end-of-cycle bank balance rides
// along below it.
function balanceCard() {
  const b = state.budget;
  if (!b) return "";
  // `projectedVariable` now picks `expectedFixedThisCycle` from the merchant
  // rollup — which already accounts for category splits and only includes
  // bills due this cycle — so the headline math is driven from the Fixed-
  // bills page, with no extra adjustment needed here.
  const v = projectedVariable(
    b.variable || { income: 0, committed: 0, spent: 0, allowed: 0 },
  );
  const income = v.income || 0;
  // `committed` is fixed + essentials reserved for the whole cycle. We also
  // subtract `varSpent` — variable purchases already settled this cycle —
  // because that money is already gone too. Result: what's *really* free
  // right now, with no more variable spending.
  const committed = v.committed || 0;
  const varSpent = v.spent || 0;
  if (income <= 0 && committed <= 0 && varSpent <= 0) return "";
  const net = income - committed - varSpent;
  const positive = net >= 0;
  const cls = positive ? "good" : "bad";
  const sign = positive ? "+" : "−";
  const cap = positive
    ? "free this month after fixed, essentials and variable spend so far"
    : "short of what this month's commitments need";
  const varLine = varSpent > 0
    ? ' <span class="balance-sep">−</span> '
      + '<span>Variable spent</span> <b>' + money(varSpent, "ILS") + "</b>"
    : "";
  return '<section class="card balance-card">'
    + '<div class="balance-head">This month · ' + esc(cycleLabel(currentCycleKey())) + "</div>"
    + '<div class="balance-num ' + cls + '">' + sign
    + money(Math.abs(net), "ILS") + "</div>"
    + '<div class="balance-cap">' + cap + "</div>"
    + '<div class="balance-line">'
    + '<span>Income</span> <b>' + money(income, "ILS") + "</b>"
    + ' <span class="balance-sep">−</span> '
    + '<span>Expected fixed + essentials</span> <b>'
    + money(committed, "ILS") + "</b>"
    + varLine
    + "</div>" + bankProjectionBlock(v) + "</section>";
}

// Forward look at the checking pot: today's bank balance plus the income
// still expected to arrive minus the bills + savings still expected to go
// out — the best-case end-of-cycle bank balance, ignoring further variable
// spend. Returns "" when there's no bank account to project against.
function bankProjectionBlock(v) {
  const b = state.budget;
  if (!b) return "";
  // Sum the user's ILS bank-type checking accounts (skip cards, brokerages,
  // pension, excluded). That's the pot bills are paid from.
  const bankAccounts = (state.accounts || []).filter((a) => {
    if (a.excluded || a.currency !== "ILS") return false;
    const company = (state.companies || []).find((c) => c.id === a.companyId);
    return company && company.type === "bank";
  });
  if (!bankAccounts.length) return "";
  const bankNow = bankAccounts.reduce((s, a) => s + (a.balance || 0), 0);

  const cur = currentCycleKey();

  // Expected income — same figure the headline uses, so the projection
  // tracks the user's manual override when one is set. Falls back to the
  // scraper-detected recurring-merchant average when there's no override.
  // Subtract what's already landed THIS CYCLE from recurring merchants to
  // get the still-to-arrive portion — random inflows (transfers, refunds)
  // the user dismissed from the income tab never enter the math, by design.
  const recurringMonthly = recurringIncomeMerchants()
    .reduce((s, r) => s + (r.avg || 0), 0);
  const expectedIncomeTotal = (v.income != null && v.income > 0)
    ? v.income
    : recurringMonthly;
  const incomeReceived = recurringIncomeReceived(cur);

  // Full-cycle commitments — NOT "remaining" amounts. For credit-card-heavy
  // Israeli use, most of the cycle's card spending hasn't actually been
  // debited from bankNow yet (cards bill once a month); the spending was
  // recorded as transactions on the date the card was swiped, but the cash
  // doesn't leave checking until billing day. Deducting the FULL expected
  // outflows here gives a projection close to "what your bank lands at
  // after income arrives and the cards bill" — which is the user's actual
  // mental model. (A pure direct-debit user would end up slightly under-
  // projected by the amount already debited, but that's the rarer case.)
  const p = budgetProjection();
  const expectedFixed = (p && p.expectedFixedThisCycle != null
    ? p.expectedFixedThisCycle
    : (p && p.expectedFixed) || (v.fixedSpent || 0));
  const essentialBudget = (b.essentials || []).reduce((s, l) => s + (l.budget || 0), 0);
  const cycleEssentials = essentialBudget > 0 ? essentialBudget : (v.essentialSpent || 0);
  const cycleVariable = v.spent || 0; // what's been spent so far on variable
  const cyclePiggy = Math.max(0, v.piggyFunded || 0);
  // Savings is shown as a separate informational row but NOT deducted from
  // the projection. Rationale: a "savings transfer" earmarks money for the
  // long term but doesn't actually leave your spending pool — when planned
  // and not yet transferred, the cash is still sitting in checking. (When
  // it IS transferred it's already left bankNow, so no need to re-deduct.)
  // Either way, it doesn't belong as a deduction in the bank-end projection.
  const cycleSavings = v.savings || 0;
  const change = expectedIncomeTotal - expectedFixed - cycleEssentials
    - cycleVariable - cyclePiggy;
  const endBalance = bankNow + change;
  const up = change >= 0;
  const sign = up ? "+" : "−";
  const dcls = up ? "good" : "bad";
  // Itemised breakdown of the +/− change so the user can see exactly which
  // component is driving the projection. Rows always render — even at zero —
  // because "this number is zero" is itself useful (it tells you why the
  // headline is what it is in a way a missing row can't).
  const detail = (label, amount, tone) => {
    const sign = amount === 0 ? "" : tone === "good" ? "+" : "−";
    const toneClass = amount === 0 ? "" : tone;
    return '<div class="balance-detail"><span>' + label + "</span>"
      + '<span class="balance-detail-amt ' + toneClass + '">' + sign
      + money(Math.abs(amount), "ILS") + "</span></div>";
  };
  return '<div class="balance-sub">'
    + '<div class="balance-sub-head">Projected bank balance at end of cycle</div>'
    + '<div class="balance-sub-row">'
    + '<div class="balance-sub-num">' + money(endBalance, "ILS") + "</div>"
    + '<div class="balance-sub-delta ' + dcls + '">' + sign
    + money(Math.abs(change), "ILS") + "</div></div>"
    + '<div class="balance-details">'
    // Full cycle figures (not "remaining") so credit-card spending — which
    // hasn't yet hit the bank — is properly reserved against the projection.
    // "Bank now" is rendered as a static baseline row (no +/− sign, neutral
    // styling) so the math reads top-down: bank-now + income − all the
    // cycle's commitments = projected end balance. It's the starting point,
    // not a component of `change`.
    + '<div class="balance-detail" style="border-bottom:1px solid var(--card-border);padding-bottom:6px;margin-bottom:4px">'
    + '<span>Bank balance now</span>'
    + '<span class="balance-detail-amt ' + (bankNow >= 0 ? "good" : "bad") + '">'
    + money(bankNow, "ILS") + "</span></div>"
    + detail("Income expected this cycle", expectedIncomeTotal, "good")
    + detail("Fixed bills this cycle", expectedFixed, "bad")
    + detail("Essentials this cycle", cycleEssentials, "bad")
    + detail("Variable spent so far", cycleVariable, "bad")
    + detail("Set asides (piggies)", cyclePiggy, "bad")
    // Savings is shown as a contextual footnote — it's an earmark, not an
    // outflow, so it doesn't affect the projection. Rendered as a static
    // line (no +/− tone, no styling colour) so it reads as info, not math.
    + '<div class="balance-detail" style="opacity:.55;font-size:11.5px">'
    + '<span>Savings earmarked (stays in checking)</span>'
    + '<span class="balance-detail-amt">' + money(cycleSavings, "ILS")
    + "</span></div>"
    + "</div></div>";
}

// "This month" card — total spend, the month-over-month trend, and a donut
// chart of where the money went, with each slice's trend in the legend.
function spendingCard() {
  // Computed client-side so it matches the Activity tab — card-bill totals
  // excluded, refund offsets applied, grouped by the billing cycle.
  const curKey = currentCycleKey();
  const cur = cycleSpending(curKey);
  const prev = cycleSpending(prevCycleKey(curKey));
  const cats = Object.keys(cur.byCat).map((c) => {
    const amount = cur.byCat[c];
    const pv = prev.byCat[c];
    return { category: c, amount,
      changePct: pv && pv > 0 ? ((amount - pv) / pv) * 100 : null };
  }).sort((a, b) => b.amount - a.amount);

  let badge = "";
  if (prev.total > 0) {
    const pct = ((cur.total - prev.total) / prev.total) * 100;
    const down = pct < 0;
    badge = '<span class="delta ' + (down ? "good" : "bad") + '">'
      + (down ? "↓ " : "↑ ") + Math.abs(pct).toFixed(0) + "% vs last month</span>";
  }
  return '<section class="card"><div class="card-head"><h3>This month</h3></div>'
    + '<div class="spend-top"><div class="spend-num">'
    + money(cur.total, "ILS") + "</div>" + badge + "</div>"
    + spendPie(cats) + "</section>";
}

// SVG donut for this month's spending. Each slice is a clickable path that
// opens a drill-down modal of every transaction in the category. Slices
// stagger-fade in on render, lift on hover, and the centre text swaps from
// the total to the hovered slice's category + amount.
function spendPie(cats) {
  const total = cats.reduce((s, c) => s + c.amount, 0);
  if (total <= 0) return '<div class="empty">No spending recorded this month.</div>';

  const size = 240, cx = size / 2, cy = size / 2;
  const rOuter = 104, rInner = 68;
  // How far a hovered slice pushes outward along its own mid-angle.
  const pushPx = 9;

  // A single category is degenerate (start == end) for the arc formula; draw
  // the full ring as two half-arcs so it still renders.
  let slicesHtml;
  if (cats.length === 1) {
    const color = catStyle(cats[0].category)[1];
    const d = donutFullPath(cx, cy, rOuter, rInner);
    slicesHtml = '<path class="pie-slice" data-action="open-cat-drill" data-arg="'
      + esc(cats[0].category) + '" d="' + d + '" fill="' + color
      + '" style="--mx:0px;--my:0px;animation-delay:0ms"></path>';
  } else {
    let acc = 0;
    slicesHtml = cats.map((c, i) => {
      const a0 = (acc / total) * Math.PI * 2 - Math.PI / 2;
      acc += c.amount;
      const a1 = (acc / total) * Math.PI * 2 - Math.PI / 2;
      const mid = (a0 + a1) / 2;
      const mx = (Math.cos(mid) * pushPx).toFixed(2);
      const my = (Math.sin(mid) * pushPx).toFixed(2);
      const color = catStyle(c.category)[1];
      const d = donutArcPath(cx, cy, rOuter, rInner, a0, a1);
      return '<path class="pie-slice" data-action="open-cat-drill" data-arg="'
        + esc(c.category) + '" data-amt="' + c.amount.toFixed(2)
        + '" d="' + d + '" fill="' + color
        + '" style="--mx:' + mx + 'px;--my:' + my
        + 'px;animation-delay:' + Math.min(i, 14) * 70 + 'ms"></path>';
    }).join("");
  }

  const legend = cats.map((c) => {
    const color = catStyle(c.category)[1];
    let tr = "";
    if (c.changePct != null && Math.abs(c.changePct) >= 1) {
      const down = c.changePct < 0;
      tr = '<span class="lg-tr ' + (down ? "good" : "bad") + '">'
        + (down ? "↓" : "↑") + Math.abs(c.changePct).toFixed(0) + "%</span>";
    }
    return '<div class="lg-row" data-action="open-cat-drill" data-arg="'
      + esc(c.category) + '">'
      + '<span class="lg-dot" style="background:' + color + '"></span>'
      + '<span class="lg-name">' + esc(c.category) + "</span>" + tr
      + '<span class="lg-amt">' + money(c.amount, "ILS") + "</span>"
      + '<span class="lg-pct">' + Math.round((c.amount / total) * 100) + "%</span></div>";
  }).join("");

  return '<div class="pie-wrap"><svg class="pie pie-svg" viewBox="0 0 ' + size + ' ' + size
    + '" data-pie-total="' + moneyShort(total, "ILS") + '">'
    + '<g class="pie-slices">' + slicesHtml + '</g>'
    + '<text class="pie-c-amt" x="' + cx + '" y="' + (cy - 4)
    + '" text-anchor="middle" dominant-baseline="middle">'
    + esc(moneyShort(total, "ILS")) + '</text>'
    + '<text class="pie-c-lbl" x="' + cx + '" y="' + (cy + 18)
    + '" text-anchor="middle" dominant-baseline="middle">spent</text>'
    + '</svg></div>'
    + '<div class="legend">' + legend + "</div>";
}

// Builds the SVG path for one donut slice between two angles (radians).
function donutArcPath(cx, cy, rO, rI, a0, a1) {
  const x0o = cx + Math.cos(a0) * rO, y0o = cy + Math.sin(a0) * rO;
  const x1o = cx + Math.cos(a1) * rO, y1o = cy + Math.sin(a1) * rO;
  const x0i = cx + Math.cos(a1) * rI, y0i = cy + Math.sin(a1) * rI;
  const x1i = cx + Math.cos(a0) * rI, y1i = cy + Math.sin(a0) * rI;
  const large = a1 - a0 > Math.PI ? 1 : 0;
  return 'M ' + x0o + ' ' + y0o
    + ' A ' + rO + ' ' + rO + ' 0 ' + large + ' 1 ' + x1o + ' ' + y1o
    + ' L ' + x0i + ' ' + y0i
    + ' A ' + rI + ' ' + rI + ' 0 ' + large + ' 0 ' + x1i + ' ' + y1i
    + ' Z';
}
// Single-category special: a full ring drawn as two opposed half-arcs.
function donutFullPath(cx, cy, rO, rI) {
  return 'M ' + (cx - rO) + ' ' + cy
    + ' A ' + rO + ' ' + rO + ' 0 1 0 ' + (cx + rO) + ' ' + cy
    + ' A ' + rO + ' ' + rO + ' 0 1 0 ' + (cx - rO) + ' ' + cy + ' Z'
    + ' M ' + (cx - rI) + ' ' + cy
    + ' A ' + rI + ' ' + rI + ' 0 1 1 ' + (cx + rI) + ' ' + cy
    + ' A ' + rI + ' ' + rI + ' 0 1 1 ' + (cx - rI) + ' ' + cy + ' Z';
}

// Glanceable drill-in for one spending category — opens when the user clicks
// a slice or its legend row. Lists every transaction in that category within
// the current billing cycle, newest first, with a running total at the top.
function categoryDrillModal(category) {
  openModal((modal) => {
    const cycle = currentCycleKey();
    const [em, color] = catStyle(category || "Other");
    const acctById = {};
    state.accounts.forEach((a) => { acctById[a.id] = a; });

    // Same filter cycleSpending uses — card-bill totals out, refunds folded in,
    // ILS only, expenses only — so totals reconcile with the pie.
    const rows = state.transactions
      .filter((t) => t.currency === "ILS" && !isCardTotal(t) && !t.refundForId)
      .filter((t) => cycleKey(t.date) === cycle)
      .filter((t) => (t.category || "Uncategorized") === category)
      .map((t) => ({ t, eff: t.amount + txnRefundAmount(t) }))
      .filter((r) => r.eff < 0)
      .sort((a, b) => new Date(b.t.date) - new Date(a.t.date));

    const total = rows.reduce((s, r) => s + -r.eff, 0);

    const list = rows.length
      ? rows.map((r) => {
          const t = r.t;
          const acct = acctById[t.accountId];
          const place = acct ? " · " + esc(acct.label || acct.connectionName || "") : "";
          const refund = txnRefundAmount(t);
          const note = refund
            ? '<span class="txn-refund"> · ' + money(refund, t.currency)
              + " reimbursed</span>" : "";
          return '<div class="drill-row">'
            + '<div class="drill-main"><div class="drill-name">'
            + esc(t.description || "—") + "</div>"
            + '<div class="drill-sub">' + esc(fmtDate(t.date)) + place + note + "</div></div>"
            + '<div class="drill-amt">' + money(r.eff, t.currency, true) + "</div>"
            + "</div>";
        }).join("")
      : '<div class="empty">No transactions in this category this cycle.</div>';

    modal.innerHTML = ''
      + '<div class="drill-head">'
        + '<span class="drill-em" style="background:' + color + '22;color:' + color
        + '">' + em + '</span>'
        + '<div class="drill-h-main">'
          + '<div class="drill-h-cat">' + esc(category) + '</div>'
          + '<div class="drill-h-sub">' + esc(cycleLabel(cycle))
          + ' · ' + rows.length + (rows.length === 1 ? ' transaction' : ' transactions')
          + '</div>'
        + '</div>'
        + '<div class="drill-h-total">' + money(total, "ILS") + '</div>'
      + '</div>'
      + '<div class="drill-list">' + list + '</div>'
      + '<div class="modal-actions">'
        + '<button class="primary" data-drill-close>Done</button>'
      + '</div>';
    modal.querySelector('[data-drill-close]').addEventListener('click', closeOverlay);
  });
}

// Net-worth subtitle: how many accounts and manual assets back the figure.
function netWorthSub(s) {
  const parts = [];
  const a = s.accountCount || 0, m = s.manualAssetCount || 0;
  if (a) parts.push(a + (a === 1 ? " account" : " accounts"));
  if (m) parts.push(m + (m === 1 ? " asset" : " assets"));
  return parts.join(" · ") || "Nothing added yet";
}

// Label, emoji, and the colour the allocation bar uses for one net-worth
// source bucket from the /summary breakdown.
const SOURCE_LABEL = {
  bank:             ["🏦", "Bank accounts",  "#3dcd84"],
  card:             ["💳", "Credit cards",   "#f4685a"],
  brokerage:        ["📈", "Investments",    "#7c83ff"],
  pension:          ["🪺", "Pension funds",  "#ffd166"],
  "asset:car":      ["🚗", "Car",            "#5fb0ff"],
  "asset:pension":  ["🪺", "Pension",        "#ffd166"],
  "asset:property": ["🏠", "Property",       "#f896c8"],
  "asset:cash":     ["💵", "Cash savings",   "#74d0c2"],
  "asset:crypto":   ["🪙", "Crypto",         "#ffb74d"],
  "asset:other":    ["💎", "Other assets",   "#c2b3ff"],
  loan:             ["📉", "Loans",          "#ff8aa1"],
};
const SOURCE_FALLBACK = ["•", null, "#ffffff"];

// Stacked horizontal bar showing each positive source's share of the total —
// the visual key for the breakdown rows below it. Negative sources (credit
// card debt) are excluded; they read in the rows but would distort the bar.
function netWorthAllocBar(sources) {
  const positives = sources.filter((s) => s.amount > 0);
  const total = positives.reduce((sum, s) => sum + s.amount, 0);
  if (total <= 0) return "";
  const segs = positives.map((src) => {
    const meta = SOURCE_LABEL[src.key] || SOURCE_FALLBACK;
    const pct = (src.amount / total) * 100;
    return '<div class="nw-alloc-seg" style="width:' + pct + "%;background:"
      + meta[2] + '" title="' + esc(meta[1] || src.key) + " · "
      + esc(money(src.amount, "ILS")) + '"></div>';
  }).join("");
  return '<div class="nw-alloc">' + segs + "</div>";
}

// The "where it comes from" breakdown under the net-worth figure: one row per
// source bucket, each already converted to ILS by the engine. A coloured dot
// keys each row to its segment in the allocation bar; positives show their
// share, negatives (debt) are flagged with — to keep the percentages honest.
function netWorthBreakdown(s) {
  const sources = s.sources || [];
  if (!sources.length) return "";
  const positiveTotal = sources
    .filter((src) => src.amount > 0)
    .reduce((sum, src) => sum + src.amount, 0);
  const rows = sources.map((src) => {
    const meta = SOURCE_LABEL[src.key] || SOURCE_FALLBACK;
    const pct = src.amount > 0 && positiveTotal
      ? Math.round((src.amount / positiveTotal) * 100) + "%"
      : "—";
    return '<div class="nw-bd-row">'
      + '<span class="nw-bd-dot" style="background:' + meta[2] + '"></span>'
      + '<span class="nw-bd-ico">' + meta[0] + "</span>"
      + '<span class="nw-bd-name">' + esc(meta[1] || src.key) + "</span>"
      + '<span class="nw-bd-amt' + (src.amount < 0 ? " neg" : "") + '">'
      + money(src.amount, "ILS") + "</span>"
      + '<span class="nw-bd-pct">' + pct + "</span></div>";
  }).join("");
  return netWorthAllocBar(sources)
    + '<div class="nw-breakdown">' + rows + "</div>";
}

function netWorthCard() {
  const s = state.summary || { byCurrency: [], accountCount: 0, connectionCount: 0 };
  const totals = (s.byCurrency || []).slice().sort((a, b) =>
    a.currency === "ILS" ? -1 : b.currency === "ILS" ? 1 : b.total - a.total);

  // The headline is every account combined into one ILS figure; the chips show
  // the original per-currency balances. Falls back to ILS-only if FX is down.
  let valueAttr = "", headline, neg = false, chipTotals;
  if (s.netWorthILS != null) {
    headline = money(s.netWorthILS, "ILS");
    valueAttr = ' id="nw-value" data-value="' + s.netWorthILS + '"';
    neg = s.netWorthILS < 0;
    chipTotals = totals.length > 1 ? totals : [];
  } else {
    headline = totals[0] ? money(totals[0].total, totals[0].currency) : "—";
    neg = totals[0] && totals[0].total < 0;
    chipTotals = totals.slice(1);
  }
  const chips = chipTotals.map((t) =>
    '<span class="chip">' + money(t.total, t.currency) + "</span>").join("");
  return '<section class="networth"><div class="label">Total net worth</div>'
    + '<div class="nw-total' + (neg ? " neg" : "") + '"' + valueAttr + ">"
    + headline + "</div>"
    + (chips ? '<div class="chips">' + chips + "</div>" : "")
    + (s.netWorthILS != null ? netWorthBreakdown(s) : "")
    + '<div class="nw-sub">' + netWorthSub(s) + "</div></section>";
}

function modelSectionHtml() {

function fillModelSection() {
  const el = document.getElementById("set-model");
  if (!el) return;
  el.innerHTML = modelSectionHtml();
  el.querySelectorAll("[data-model-download]").forEach((b) =>
    b.addEventListener("click", () => downloadModel(b.dataset.modelDownload)));
  const cancel = el.querySelector("[data-model-cancel]");
  if (cancel) cancel.addEventListener("click", cancelModel);
  el.querySelectorAll("[data-llm-mode]").forEach((b) =>
    b.addEventListener("click", () => { llmPanelMode = b.dataset.llmMode; fillModelSection(); }));
  const test = el.querySelector("[data-ollama-test]");
  if (test) test.addEventListener("click", testOllamaConnection);
  const apiTest = el.querySelector("[data-api-test]");
  if (apiTest) apiTest.addEventListener("click", testApiConnection);
  const apply = el.querySelector("[data-llm-apply]");
  if (apply) apply.addEventListener("click", applyLlmProvider);
}

// Reads the Ollama form inputs currently on screen.
function ollamaFieldValues() {
  const get = (id) => { const e = document.getElementById(id); return e ? e.value : ""; };
  return {
    url: get("set-ollama-url").trim(),
    model: get("set-ollama-model").trim(),
    key: get("set-ollama-key"),
  };
}

// Reads the API-service form inputs currently on screen.
function apiFieldValues() {
  const get = (id) => { const e = document.getElementById(id); return e ? e.value : ""; };
  return {
    url: get("set-api-url").trim(),
    model: get("set-api-model").trim(),
    key: get("set-api-key"),
  };
}

// Probes the Ollama server with the values typed in, without saving them.
async function testOllamaConnection() {
  const f = ollamaFieldValues();
  const statusEl = document.getElementById("set-ollama-status");
  if (statusEl) statusEl.textContent = "Testing the connection…";
  try {
    const body = { ollamaUrl: f.url };
    if (f.key) body.ollamaKey = f.key;
    const r = await api("/llm/ollama/test", "POST", body);
    const list = r.models && r.models.length
      ? " — " + r.models.slice(0, 6).join(", ")
        + (r.models.length > 6 ? "…" : "") : "";
    if (statusEl) statusEl.textContent = r.message + list;
  } catch (e) {
    if (statusEl) statusEl.textContent = e.message;
  }
}

// Same as testOllamaConnection, but for the OpenAI-compatible API service.
async function testApiConnection() {
  const f = apiFieldValues();
  const statusEl = document.getElementById("set-api-status");
  if (statusEl) statusEl.textContent = "Testing the connection…";
  try {
    const body = { apiUrl: f.url };
    if (f.key) body.apiKey = f.key;
    const r = await api("/llm/api/test", "POST", body);
    const list = r.models && r.models.length
      ? " — " + r.models.slice(0, 6).join(", ")
        + (r.models.length > 6 ? "…" : "") : "";
    if (statusEl) statusEl.textContent = r.message + list;
  } catch (e) {
    if (statusEl) statusEl.textContent = e.message;
  }
}

// Commits the chosen AI engine to the engine — separate from the Settings
// modal's Save button, like the model download.
async function applyLlmProvider() {
  const mode = llmPanelMode || "local";
  const body = { mode };
  if (mode === "ollama") {
    const f = ollamaFieldValues();
    if (!f.url || !f.model) {
      toast("Enter the Ollama server URL and model name first.", true);
      return;
    }
    body.ollamaUrl = f.url;
    body.ollamaModel = f.model;
    if (f.key) body.ollamaKey = f.key; // blank keeps the saved key
  } else if (mode === "api") {
    const f = apiFieldValues();
    if (!f.url || !f.model) {
      toast("Enter the API base URL and model name first.", true);
      return;
    }
    if (!f.key && !(state.llm && state.llm.api && state.llm.api.hasKey)) {
      toast("Enter the API key first.", true);
      return;
    }
    body.apiUrl = f.url;
    body.apiModel = f.model;
    if (f.key) body.apiKey = f.key; // blank keeps the saved key
  }
  try {
    state.llm = await api("/llm/provider", "POST", body);
    llmPanelMode = state.llm.mode;
    fillModelSection();
    render();
    toast(mode === "ollama" ? "Now using your Ollama server for AI."
      : mode === "api" ? "Now using your API service for AI."
      : "Now using the on-device model for AI.");
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast(e.message, true);
  }
}

function accountsView() {
  // Groups the assets page by kind so each section is easy to skim:
  //   Banks → Credit cards → Investments → Pension → Other assets → Loans.
  // Sections sit side-by-side in a responsive grid, so each kind takes its
  // own column on wide screens instead of stretching across the full width
  // and stacking down the page. Within a section, cards stack vertically.
  const sectionsByKey = {
    bank: [], card: [], brokerage: [], pension: [], asset: [], loan: [],
  };
  for (const conn of state.connections) {
    const company = state.companies.find((c) => c.id === conn.companyId);
    const kind = (company && company.type) || "bank";
    (sectionsByKey[kind] || sectionsByKey.bank).push({
      html: connectionCard(conn),
      name: conn.displayName || "",
    });
  }
  for (const a of (state.assets || [])) {
    sectionsByKey.asset.push({ html: assetCard(a), name: a.name || "" });
  }
  for (const l of (state.loans || [])) {
    sectionsByKey.loan.push({ html: loanCard(l), name: l.name || "" });
  }

  // Order, label, and small emoji for each section header. Keys that hold no
  // items render nothing — empty sections never appear.
  const sections = [
    { key: "bank",      label: "Banks",         emoji: "🏦" },
    { key: "card",      label: "Credit cards",  emoji: "💳" },
    { key: "brokerage", label: "Investments",   emoji: "📈" },
    { key: "pension",   label: "Pension & savings", emoji: "🪺" },
    { key: "asset",     label: "Other assets",  emoji: "💎" },
    { key: "loan",      label: "Loans",         emoji: "📉" },
  ];

  const blocks = sections.map((sec) => {
    const list = sectionsByKey[sec.key] || [];
    if (!list.length) return "";
    list.sort((a, b) => a.name.localeCompare(b.name));
    return '<section class="assets-section">'
      + '<div class="assets-sub-head"><span class="ash-emoji">' + sec.emoji
      + "</span><span class=\"ash-label\">" + esc(sec.label) + "</span>"
      + '<span class="ash-count">' + list.length + "</span></div>"
      + '<div class="assets-stack">'
      + list.map((c) => c.html).join("")
      + "</div></section>";
  }).filter(Boolean).join("");

  const grids = blocks ? '<div class="assets-grid">' + blocks + "</div>" : "";

  return '<div class="sec-head"><div class="label">Assets</div>'
    + '<span class="spacer"></span>'
    + '<button class="mini" data-action="add-connection">+ Add asset</button>'
    + (state.connections.length
        ? '<button class="mini primary" data-action="sync-all">↻ Sync all</button>'
        : "")
    + "</div>" + (grids || '<p class="hint">Nothing here yet — hit + Add asset.</p>');
}

// --- Brokerage helpers -----------------------------------------------------

function holdingsFor(accountId) {
  return (state.brokerage.holdings || []).filter((h) => h.accountId === accountId);
}

// Market value, cost and unrealized gain for one position. Gain is computed
// from cost basis when both units and prices are known — that's the textbook
// formula and matches every brokerage's UI. The brokerage's own `openPnl`
// is only used as a fallback when we cannot compute, because SnapTrade hands
// it through per-share for some brokerages (notably IBKR) and per-position
// for others, with no flag — using it directly understated the figure by a
// factor of `units`.
function holdingStats(h) {
  // Prefer the bank-reported market value when the scraper supplied it
  // (Discount's Tmura field); fall back to units × price for SnapTrade
  // brokerages whose price is already in the same currency as the value.
  // Israeli funds quote price in agorot but hold value in NIS — a 100×
  // mismatch the naive multiplication would print as a too-big total.
  const value = h.value != null
    ? h.value
    : (h.price != null ? h.units * h.price : null);
  const cost = h.costBasis != null ? h.units * h.costBasis : null;
  let gain = value != null && cost != null
    ? value - cost
    : (h.openPnl != null ? h.openPnl : null);
  const gainPct = gain != null && cost ? (gain / Math.abs(cost)) * 100 : null;
  return { value: value, cost: cost, gain: gain, gainPct: gainPct };
}

// The expanded per-account positions list shown under a brokerage account.
function holdingsList(holds) {
  const rows = holds.map((h) => {
    const s = holdingStats(h);
    const gainCls = s.gain == null ? "flat" : s.gain >= 0 ? "good" : "bad";
    const gainTxt = s.gainPct == null ? ""
      : '<span class="hold-gain ' + gainCls + '">'
        + (s.gain >= 0 ? "↑" : "↓") + " " + Math.abs(s.gainPct).toFixed(1) + "%</span>";
    return '<div class="hold-row"><div class="hold-sym"><span class="hold-tk">'
      + esc(h.symbol) + "</span>"
      + (h.description ? '<span class="hold-desc">' + esc(h.description) + "</span>" : "")
      + '</div><div class="hold-end">'
      + '<span class="hold-val">' + (s.value != null ? money(s.value, h.currency) : "—")
      + "</span>"
      + '<span class="hold-units">' + fmtUnits(h.units) + " @ "
      + (h.price != null ? money(h.price, h.currency) : "—") + "</span>"
      + gainTxt + "</div></div>";
  }).join("");
  return '<div class="holds-list">' + rows + "</div>";
}

function fmtUnits(n) {
  const r = Math.round(n * 1e6) / 1e6;
  return Number.isInteger(r) ? String(r) : r.toFixed(4).replace(/0+$/, "");
}

function connectionCard(conn) {
  const accounts = state.accounts.filter((a) => a.connectionId === conn.id);
  const isSnap = conn.companyId === SNAPTRADE_ID;
  const prog = state.scrapes[conn.id];
  const company = state.companies.find((c) => c.id === conn.companyId);
  const isCard = !!(company && company.type === "card");

  let metaText = company ? company.name : conn.companyId;
  if (conn.lastScrapeAt) {
    metaText += " · " + (conn.lastStatus === "error" ? "sync failed" : "synced")
      + " " + fmtDate(conn.lastScrapeAt);
  }

  const buttons = [];
  if (!conn.hasCredentials) {
    buttons.push('<button class="mini primary" data-action="set-credentials" data-id="'
      + conn.id + '">Set credentials</button>');
  }
  buttons.push('<button class="mini" data-action="sync" data-id="' + conn.id + '">↻ Sync</button>');
  if (isSnap) {
    buttons.push('<button class="mini" data-action="link-brokerage" data-id="' + conn.id
      + '">Link brokerage</button>');
  }
  buttons.push('<button class="mini danger" data-action="remove" data-id="' + conn.id
    + '">Remove</button>');

  // Account balance — click to set by hand; shown red when negative.
  const amt = (a) => '<span class="amount bal-edit'
    + (a.balance != null && a.balance < 0 ? " neg" : "")
    + '" data-edit-balance="' + esc(a.id) + '" title="Set balance">'
    + money(a.balance, a.currency) + "</span>";

  let rows, total = null, totalCur = "ILS";
  if (accounts.length) {
    accounts.forEach((a) => {
      // An account the user excluded does not count toward the connection's
      // total — keeping it in step with the net-worth figure.
      if (a.balance != null && !a.excluded) {
        total = (total || 0) + a.balance; totalCur = a.currency;
      }
    });
    rows = '<div class="list conn-accounts">' + accounts.map((a) => {
      // Any account with holdings gets the expand affordance — SnapTrade
      // brokerages and the synthetic Discount קרן-כספית row both qualify.
      const holds = holdingsFor(a.id);
      const open = !!state.expandedHoldings[a.id];
      const toggle = holds.length
        ? '<button class="holds-toggle" data-action="toggle-holdings" data-id="'
          + esc(a.id) + '">' + (open ? "▾ " : "▸ ") + holds.length + " holding"
          + (holds.length === 1 ? "" : "s") + "</button>"
        : "";
      // For credit-card accounts, the soonest future processedDate is the
      // date THIS card bills — two cards on one connection often bill on
      // different days, so the date sits on the row, not the connection.
      const billDate = isCard ? accountNextBillDate(a.id) : null;
      const billSub = billDate
        ? '<div class="secondary">Bills ' + esc(fmtDate(billDate)) + "</div>"
        : "";
      return '<div class="row' + (a.excluded ? " nw-off" : "") + '"><div><div class="name">'
        + esc(a.label || "Account " + a.accountNumber) + "</div>"
        + (a.label ? '<div class="secondary">' + esc(a.accountNumber) + "</div>" : "")
        + billSub
        + toggle
        + '</div><div class="row-end">' + amt(a)
        + nwTick("account", a.id, a.excluded) + "</div></div>"
        + (open ? holdingsList(holds) : "");
    }).join("") + "</div>";
  } else if (isSnap && !conn.lastScrapeAt) {
    rows = '<div class="empty">No brokerage linked yet — use “Link brokerage”.</div>';
  } else {
    rows = '<div class="empty">' + (conn.lastScrapeAt ? "No accounts found." : "Not synced yet.")
      + "</div>";
  }

  // This billing cycle's spending. Every connection (banks and cards) shows
  // it as a secondary line below the headline balance — the headline itself
  // is always the actual sum of account balances, so it matches the rows.
  const cycleSpent = !isSnap && accounts.length ? connectionSpend(conn) : 0;
  let spendLine = "";
  if (!isSnap && accounts.length && cycleSpent < 0) {
    spendLine = '<div class="conn-spend"><span>'
      + (isCard ? "Spent this cycle" : "Spent this month") + "</span>"
      + '<span class="conn-spend-amt">' + money(-cycleSpent, "ILS") + "</span></div>";
  }

  // (Per-card bill date is rendered on each account row below — different
  // cards on the same connection can bill on different days, so a single
  // connection-level figure would hide that.)

  let progressNote = "";
  if (prog) {
    const cls = prog.phase === "done" ? "ok" : prog.phase === "failed" ? "err" : "run";
    progressNote = '<div class="note ' + cls + '">' + esc(prog.message) + "</div>";
  }
  const disabled = prog && prog.phase === "running" ? " disabled" : "";
  const btns = buttons.join("").replace(/<button/g, "<button" + (disabled ? " disabled" : ""));
  // SnapTrade connections show the linked brokerage's own favicon (matched by
  // name) rather than the SnapTrade favicon; 📈 is the fallback.
  let logo;
  if (isSnap) {
    const d = brokerageDomain(conn);
    logo = d
      ? '<span class="logo">📈<img src="/logo/brk-' + encodeURIComponent(d)
        + "?domain=" + encodeURIComponent(d) + '" alt="" onerror="this.remove()"></span>'
      : '<span class="logo">📈</span>';
  } else {
    logo = companyLogo(company);
  }

  // Headline is the sum of the connection's account balances — the same
  // figure the user sees if they add up the rows below. Cycle spend rides
  // along as a secondary line (handled above).
  let headAmt = "";
  if (total != null) {
    headAmt = '<span class="conn-total' + (total < 0 ? " neg" : "") + '">'
      + money(total, totalCur) + "</span>";
  } else if (!isSnap && accounts.length) {
    // No balance was scraped — offer a clear way to enter it.
    headAmt = '<button class="mini" style="margin-left:auto" data-edit-balance="'
      + esc(accounts[0].id) + '">Set balance</button>';
  }

  return '<div class="card"><div class="card-head">' + logo
    + '<div style="min-width:0"><h3>' + esc(conn.displayName)
    + '</h3><div class="meta">' + esc(metaText) + "</div></div>"
    + headAmt
    + "</div>" + progressNote + rows + spendLine
    + '<div class="conn-foot actions">' + btns + "</div></div>";
}

// This billing cycle's net spending across a connection's accounts (negative).
function connectionSpend(conn) {
  const ids = new Set(state.accounts
    .filter((a) => a.connectionId === conn.id).map((a) => a.id));
  if (!ids.size) return 0;
  const key = currentCycleKey();
  let total = 0;
  state.transactions.forEach((t) => {
    if (!ids.has(t.accountId) || isCardTotal(t) || t.refundForId) return;
    if (cycleKey(t.date) !== key) return;
    const a = t.amount + txnRefundAmount(t);
    if (a < 0) total += a;
  });
  return total;
}

// This billing cycle's net spending on a single account (negative). The
// per-account counterpart of connectionSpend — used to give each card a
// figure, since card scrapers report no balance.
function accountCycleSpend(accountId) {
  const key = currentCycleKey();
  let total = 0;
  state.transactions.forEach((t) => {
    if (t.accountId !== accountId || isCardTotal(t) || t.refundForId) return;
    if (cycleKey(t.date) !== key) return;
    const a = t.amount + txnRefundAmount(t);
    if (a < 0) total += a;
  });
  return total;
}

// Next bill date for a single credit-card account: the soonest future
// processedDate the card will bill on. Different cards on the same
// connection can bill on different days, so the date lives per-account.
// Returns null when no future-dated transactions are present (bill already
// settled, or the scraper hasn't pulled the upcoming month yet).
function accountNextBillDate(accountId) {
  const todayIso = new Date().toISOString().slice(0, 10);
  let earliest = null;
  state.transactions.forEach((t) => {
    if (t.accountId !== accountId || isCardTotal(t) || t.refundForId) return;
    const pd = t.processedDate || t.date;
    if (!pd || pd < todayIso) return;
    if (!earliest || pd < earliest) earliest = pd;
  });
  return earliest;
}

const ASSET_META = {
  car: ["🚗", "Car"], property: ["🏠", "Property"], cash: ["💵", "Cash"],
  pension: ["🪺", "Pension"], crypto: ["🪙", "Crypto"], other: ["💎", "Asset"],

// A card for one manually-valued asset, with edit/remove actions.
function assetCard(a) {
