    letter-spacing: .5px; }
  .hd-stat-val { font: 700 14px/1.1 ui-rounded, "SF Pro Rounded", system-ui;
    margin-top: 5px; font-variant-numeric: tabular-nums; }
  .hd-stat-val.good { color: var(--green); }
  .hd-stat-val.bad { color: var(--red); }
  .hd-chart-wrap { background: var(--card); border-radius: 12px;
    padding: 14px 14px 10px; }
  .hd-empty { padding: 16px 4px; color: var(--faint); font-size: 12.5px;
    text-align: center; }
  @media (max-width: 720px) {
    .hp-row { grid-template-columns: 10px 1.5fr 1fr auto 12px;
      gap: 10px; padding: 11px 10px; }
    .hp-gain-wrap { display: none; }
  }
  .md-big { display: flex; align-items: center; gap: 11px; margin-top: 16px;
    padding: 11px 12px; background: var(--card-hi); border-radius: 12px; }
  .md-big-ico { width: 34px; height: 34px; border-radius: 10px; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; font-size: 17px; }
  .md-big-main { flex: 1; min-width: 0; }
  .md-big-cap { font-size: 10px; font-weight: 700; letter-spacing: .8px;
    text-transform: uppercase; color: var(--faint); }
  .md-big-desc { font-size: 13px; font-weight: 600; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .md-big-amt { text-align: right; white-space: nowrap;
    font: 800 14.5px/1 ui-rounded, "SF Pro Rounded", system-ui; }
  .md-big-date { font-size: 10.5px; font-weight: 600; color: var(--faint);
    margin-top: 3px; text-align: right; }
  .ai-head { display: flex; align-items: center; gap: 10px; }
  .ai-list { display: flex; flex-direction: column; gap: 9px; margin-top: 13px; }
  .ai-card { display: flex; gap: 11px; padding: 11px 13px; border-radius: 12px;
    background: var(--card-hi); border-left: 3px solid var(--faint);
    animation: ai-in .45s ease both; }
  .ai-card.win { border-left-color: var(--green); }
  .ai-card.watch { border-left-color: var(--red); }
  .ai-card.trend { border-left-color: var(--accent); }
  .ai-card.tip { border-left-color: var(--amber); }
  .ai-ico { width: 27px; height: 27px; border-radius: 8px; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .ai-card.win .ai-ico { background: rgba(61,220,132,0.16); }
  .ai-card.watch .ai-ico { background: rgba(244,104,90,0.16); }
  .ai-card.trend .ai-ico { background: var(--accent-soft); }
  .ai-card.tip .ai-ico { background: rgba(245,181,74,0.18); }
  .ai-card.info .ai-ico { background: var(--card-hi); }
  .ai-text { font-size: 12.8px; line-height: 1.5; align-self: center; }
  .ai-empty { text-align: center; padding: 18px 12px; color: var(--faint);
    font-size: 12.5px; line-height: 1.55; }
  .ai-skel { display: flex; flex-direction: column; gap: 9px; margin-top: 13px; }
  .ai-skel-row { height: 49px; border-radius: 12px; background:
    linear-gradient(90deg, var(--card-hi) 25%, var(--bg-elev) 50%, var(--card-hi) 75%);
    background-size: 300% 100%; animation: shimmer 1.3s linear infinite; }
  @keyframes shimmer { from { background-position: 150% 0; }
    to { background-position: -150% 0; } }
  @keyframes ai-in { from { opacity: 0; transform: translateY(7px); }
    to { opacity: 1; transform: none; } }
  @keyframes bar-grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }

  /* --- Bars (budgets / model) ------------------------------------------- */
  .bar { height: 8px; border-radius: 5px; background: var(--card-hi);
    overflow: hidden; margin-top: 6px; }
  .bar > div { height: 100%; border-radius: 5px;
    transition: width .6s cubic-bezier(.2,.7,.2,1); }
  /* --- Budgets ----------------------------------------------------------- */
  .bgt-line { padding: 12px 11px; border-radius: 13px; cursor: pointer;
    border: 1px solid transparent;
    transition: background-color .16s, border-color .16s, transform .14s; }
  .bgt-line + .bgt-line { margin-top: 3px; }
  .bgt-line:hover { background: var(--card-hi); border-color: var(--hairline);
    transform: translateX(3px); }
  .bgt-head { display: flex; align-items: center; gap: 8px; }
  .bgt-emoji { font-size: 15px; }
  .bgt-cat { font-size: 13.5px; font-weight: 600; }
  .bgt-amt { margin-left: auto; font-size: 13px; font-weight: 700;
    font-variant-numeric: tabular-nums; }
  .bgt-amt .bgt-cap { color: var(--faint); font-weight: 600; }
  .bgt-track { height: 9px; border-radius: 6px; background: var(--card-hi);
    overflow: hidden; margin-top: 8px; }
  .bgt-line:hover .bgt-track { background: var(--bg-elev); }
  .bgt-fill { height: 100%; border-radius: 6px; min-width: 3px;
    transition: width .55s cubic-bezier(.2,.7,.2,1);
    animation: bgt-grow .7s cubic-bezier(.2,.7,.2,1) both; }
  .bgt-fill.over { background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,.22) 0 6px, transparent 6px 12px); }
  @keyframes bgt-grow { from { width: 0 !important; } }
  .bgt-foot { display: flex; justify-content: space-between; margin-top: 6px;
    font-size: 11.5px; font-weight: 600; }
  .bgt-pct { color: var(--faint); font-variant-numeric: tabular-nums; }
  .bgt-left { font-variant-numeric: tabular-nums; }
  .bgt-left.ok { color: var(--green); } .bgt-left.warn { color: var(--amber); }
  .bgt-left.over { color: var(--red); }
  .bgt-nolimit { font-size: 11px; color: var(--faint); font-weight: 600;
    padding: 3px 8px; border-radius: 999px; background: var(--card-hi);
    margin-left: auto; }
  .bgt-line:hover .bgt-nolimit { color: var(--accent); }
  .bgt-tot { display: flex; justify-content: space-between; align-items: baseline;
    font-size: 13px; font-weight: 700; padding: 13px 11px 3px;
    margin-top: 7px; border-top: 1px solid var(--hairline-2); }
  .bgt-tot .bgt-tot-sub { font-size: 11px; font-weight: 600; color: var(--faint); }
  .bgt-group { font-size: 11px; font-weight: 700; letter-spacing: .5px;
    text-transform: uppercase; color: var(--faint); margin: 14px 0 6px;
    padding-top: 11px; border-top: 1px solid var(--hairline); }
  .bgt-group:first-child { margin-top: 2px; padding-top: 0; border-top: 0; }
  /* --- Variable allowance ----------------------------------------------- */
  .bgt-var { border-radius: 13px; padding: 14px 14px 12px;
    background: var(--card-hi); }
  .bgt-var-top { display: flex; align-items: baseline; gap: 7px; }
  .bgt-var-amt { font: 800 27px/1 ui-rounded, "SF Pro Rounded", system-ui;
    font-variant-numeric: tabular-nums; }
  .bgt-var.ok .bgt-var-amt { color: var(--green); }
  .bgt-var.low .bgt-var-amt { color: var(--amber); }
  .bgt-var.none .bgt-var-amt { color: var(--red); }
  .bgt-var-unit { font-size: 11.5px; font-weight: 600; color: var(--faint); }
  .bgt-var-cap { font-size: 11.5px; color: var(--muted); line-height: 1.5;
    margin-top: 6px; }
  .bgt-var-track { height: 9px; border-radius: 6px; background: var(--bg-elev);
    overflow: hidden; margin: 12px 0 10px; }
  .bgt-var-fill { height: 100%; border-radius: 6px; min-width: 3px;
    transition: width .55s cubic-bezier(.2,.7,.2,1);
    animation: bgt-grow .7s cubic-bezier(.2,.7,.2,1) both; }
  .bgt-var-rows { display: flex; flex-direction: column; }
  .bgt-var-row { display: flex; justify-content: space-between; gap: 10px;
    font-size: 12px; padding: 6px 0; border-top: 1px solid var(--hairline); }
  .bgt-var-row:first-child { border-top: 0; }
  .bgt-var-row .k { color: var(--muted); }
  .bgt-var-row .v { font-weight: 700; font-variant-numeric: tabular-nums; }
  .bgt-var-row .v.out { color: var(--faint); }
  /* "Of which refunded / owed to you" rows — explain the fixed+essentials
     figure above, so they're indented and tinted green to read as credits
     applied to that gross. */
  .bgt-var-row.cred-row { padding: 4px 0 4px 14px;
    border-top: 1px dashed var(--hairline); }
  .bgt-var-row.cred-row + .bgt-var-row:not(.cred-row) {
    border-top: 1px solid var(--hairline); }
  .bgt-var-row .k.cred-k,
  .bgt-var-row.cred-row .k { color: var(--faint); font-size: 11.5px;
    font-style: italic; }
  .bgt-var-row .v.cred { color: var(--green); font-size: 12.5px; }
  .bgt-var-note { font-size: 11px; color: var(--faint); line-height: 1.45;
    margin-top: 9px; }
  /* --- Budget modal rows ------------------------------------------------- */
  .bm-row { display: flex; align-items: center; gap: 11px; padding: 10px 0;
    border-top: 1px solid var(--hairline); }
  .bm-row:first-of-type { border-top: 0; }
  .bm-ico { width: 32px; height: 32px; flex: none; border-radius: 9px;
    display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .bm-info { flex: 1; min-width: 0; }
  .bm-name { font-size: 13.5px; font-weight: 600; }
  .bm-spent { font-size: 11.5px; color: var(--faint); margin-top: 1px; }
  .bm-spent.over { color: var(--red); }
  .bm-toggle { display: flex; align-items: flex-start; gap: 7px; margin-top: 6px;
    font-size: 11.5px; color: var(--muted); cursor: pointer; line-height: 1.4; }
  .bm-toggle input { width: 14px; height: 14px; margin-top: 2px;
    flex: 0 0 auto; accent-color: var(--accent); cursor: pointer; }
  /* Quick "Max" chip for the savings reserve row — fills the input with
     whatever's free after this month's fixed bills + essentials + piggies. */
  .bm-max-btn { padding: 5px 10px; border-radius: 7px;
    border: 1px solid var(--hairline-2); background: var(--card-hi);
    color: var(--muted); cursor: pointer; font-size: 11px; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase; flex: none;
    transition: border-color .14s, color .14s, background-color .14s; }
  .bm-max-btn:hover { border-color: var(--indigo); color: var(--text);
    background: var(--indigo-soft); }
  .bm-input { position: relative; width: 116px; flex: none; }
  .bm-input .bm-cur { position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%); color: var(--faint); font-size: 13px;
    pointer-events: none; }
  .bm-input input { padding-left: 22px; text-align: right;
    font-variant-numeric: tabular-nums; }
  .bm-mini { height: 5px; border-radius: 4px; background: var(--card-hi);
    overflow: hidden; margin-top: 7px; }
  .bm-mini > div { height: 100%; border-radius: 4px; width: 0;
    transition: width .3s ease, background-color .2s; }
  .bm-summary { display: flex; justify-content: space-between;
    padding: 11px 13px; margin-bottom: 6px; border-radius: 12px;
    background: var(--card-hi); font-size: 13px; font-weight: 700; }
  .bm-summary span:last-child { font-variant-numeric: tabular-nums; }
  .bm-var { padding: 12px 13px; border-radius: 12px; background: var(--card-hi); }
  .bm-var-amt { font: 800 21px/1 ui-rounded, "SF Pro Rounded", system-ui;
    font-variant-numeric: tabular-nums; }
  .bm-var-note { font-size: 12px; color: var(--muted); line-height: 1.5;
    margin-top: 5px; }

  /* --- Notes, picks ------------------------------------------------------ */
  .note { display: flex; gap: 8px; align-items: center; font-size: 12.5px;
    padding: 9px 12px; border-radius: 10px; background: var(--card-hi);
    margin-top: 11px; }
  .note.run { color: var(--amber); } .note.ok { color: var(--green); }
  .note.err { color: var(--red); }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .company-head { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
  .company-head .ch-name { font-weight: 700; }
  .company-head .ch-type { color: var(--muted); font-size: 12px; }
  .pick-grid { display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin: 8px 0 4px; }
  .pick-card { flex: 1; border: 1px solid var(--hairline-2); border-radius: 13px;
    padding: 20px 8px; text-align: center; cursor: pointer; background: var(--card-hi);
    font-size: 13px; font-weight: 700; transition: border-color .15s, transform .12s; }
  .pick-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .pick-card .pc-emoji { font-size: 28px; display: block; margin-bottom: 7px; }
  .pick-card .pc-count { color: var(--muted); font-size: 11px; font-weight: 500;
    display: block; margin-top: 3px; }
  .pick-list { display: flex; flex-direction: column; gap: 2px; margin: 8px 0 4px;
    max-height: 340px; overflow-y: auto; }
  .pick-row { display: flex; align-items: center; gap: 11px; padding: 9px;
    border-radius: 10px; cursor: pointer; }
  .pick-row:hover { background: var(--card-hi); }
  .pick-row .pr-sub { color: var(--muted); font-size: 11px; font-weight: 500;
    display: block; margin-top: 2px; }
  .pick-row .pr-tag { margin-left: auto; flex: none; font-size: 10px;
    font-weight: 700; padding: 3px 8px; border-radius: 999px; white-space: nowrap; }
  .pick-row .pr-tag.auto { color: var(--green); background: rgba(61,220,132,0.15); }
  .pick-row .pr-tag.manual { color: var(--amber); background: rgba(245,181,74,0.15); }
  .back-btn { background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 13px; padding: 4px 0; margin-bottom: 6px; }
  .back-btn:hover { color: var(--text); }

  /* --- Empty state ------------------------------------------------------- */
  .blank { text-align: center; padding: 72px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .blank .be { font-size: 52px; }
  .blank h2 { font-size: 19px; font-weight: 700; }
  .blank p { color: var(--muted); font-size: 14px; max-width: 340px; }
  .blank button { margin-top: 10px; }

  /* --- Welcome / vault unlock gate -------------------------------------- */
  .gate { position: fixed; inset: 0; z-index: 60; padding: 24px;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(900px 600px at 18% 12%, rgba(252,185,50,0.18), transparent 62%),
      radial-gradient(800px 520px at 84% 88%, rgba(212,131,26,0.13), transparent 62%),
      var(--bg);
    transition: opacity .35s ease; }
  .gate.leaving { opacity: 0; pointer-events: none; }
  .gate-content { max-width: 460px; width: 100%; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .gate-brand { width: 78px; height: 78px; border-radius: 22px;
    background:
      radial-gradient(120% 100% at 0% 0%, rgba(255,255,255,0.30), transparent 60%),
      linear-gradient(135deg, var(--grad-1), var(--grad-2));
    color: #1a1612;
    display: flex; align-items: center; justify-content: center;
    padding: 14px;
    box-shadow: 0 12px 36px rgba(252,185,50,0.46),
                0 0 0 4px rgba(252,185,50,0.10),
                inset 0 1px 0 rgba(255,255,255,0.32);
    animation: gate-brand-in .55s cubic-bezier(.2,.9,.3,1.3) both,
               gate-brand-pulse 3.4s ease-in-out 1s infinite; }
  .gate-brand svg { display: block; width: 100%; height: 100%; }
  /* Two-line greeting: a small/muted lead-in ("Good evening,") sitting on top
   * of a big gold name. Sized to fit a typical full name on one line; clamps
   * down on narrower viewports and ellipses if the name is unusually long. */
  .gate-greeting { width: 100%; margin-top: 4px; }
  .gate-greet { display: block; font: 600 19px/1.25 system-ui;
    color: var(--muted); letter-spacing: -.1px; margin-bottom: 6px;
    opacity: 0; animation: gate-fade-up .55s ease .15s both; }
  .gate-name { display: block; margin: 0; padding: 0 4px;
    font: 800 clamp(34px, 5.4vw, 48px)/1.08 ui-rounded,
          "SF Pro Rounded", system-ui;
    letter-spacing: -.8px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    background: linear-gradient(135deg, var(--grad-1), var(--grad-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    opacity: 0; animation: gate-fade-up .55s ease .22s both; }
  .gate-sub { font-size: 15px; color: var(--muted); line-height: 1.55;
    max-width: 380px; margin: -4px 0 6px;
    opacity: 0; animation: gate-fade-up .55s ease .28s both; }
  .gate-panel { background: var(--card); border: 1px solid var(--hairline-2);
    border-radius: 18px; padding: 22px; width: 100%; box-shadow: var(--shadow);
    opacity: 0; animation: gate-fade-up .55s ease .42s both; }
  .gate-field { margin-bottom: 14px; text-align: left; }
  .gate-field:last-of-type { margin-bottom: 0; }
  .gate-field > label { display: block; font: 700 11px/1 system-ui;
    letter-spacing: .55px; text-transform: uppercase; color: var(--muted);
    margin-bottom: 8px; }
  .gate-input { width: 100%; background: var(--card-hi);
    border: 1px solid var(--hairline-2); border-radius: 11px;
    padding: 12px 14px; color: var(--text);
    font: 500 15px/1.4 system-ui;
    transition: border-color .14s, box-shadow .14s, background-color .14s; }
  .gate-input:focus { outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft); background: var(--card); }
  .gate-err { color: var(--red); font-size: 13px; font-weight: 500;
    margin-top: 12px; min-height: 18px; opacity: 0;
    transition: opacity .15s ease; }
  .gate-err.on { opacity: 1; }
  .gate-btn { width: 100%; margin-top: 18px; position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--grad-1), var(--grad-2));
    border: none; border-radius: 12px; padding: 13px 16px;
    font: 700 15px/1 system-ui; color: #1a1612; cursor: pointer;
    box-shadow: 0 6px 20px rgba(252,185,50,0.32);
    transition: transform .12s ease, box-shadow .14s ease; }
  .gate-btn:hover { transform: translateY(-1px);
    box-shadow: 0 10px 28px rgba(252,185,50,0.42); }
  .gate-btn:active { transform: translateY(0); }
  .gate-btn:disabled { opacity: .65; cursor: progress; transform: none; }
  .gate-btn::after { content: ""; position: absolute; inset: 0;
    background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
    transform: translateX(-130%); transition: transform .7s ease; }
  .gate-btn:hover::after { transform: translateX(130%); }
  .gate-foot { color: var(--faint); font-size: 12px; line-height: 1.55;
    max-width: 380px; margin-top: 4px;
    opacity: 0; animation: gate-fade-up .55s ease .55s both; }
  @keyframes gate-fade-up {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes gate-brand-in {
    from { opacity: 0; transform: scale(.6) translateY(-10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes gate-brand-pulse {
    0%, 100% { box-shadow: 0 8px 32px rgba(252,185,50,0.42),
                            0 0 0 4px rgba(252,185,50,0.10); }
    50%      { box-shadow: 0 10px 40px rgba(252,185,50,0.58),
                            0 0 0 7px rgba(252,185,50,0.18); }
  }

  /* --- Modals ----------------------------------------------------------- */
  .overlay { position: fixed; inset: 0; background: var(--scrim); display: flex;
    align-items: center; justify-content: center; padding: 24px; z-index: 50;
    animation: fade .18s ease; }
  .modal { background: var(--card); border: 1px solid var(--hairline);
    border-radius: 18px; width: 100%; max-width: 446px; max-height: 86vh;
    overflow: auto; padding: 24px; box-shadow: var(--shadow);
    animation: pop .22s cubic-bezier(.2,.8,.2,1); }
  .modal h2 { font-size: 18px; margin-bottom: 4px; }
  .modal p.hint { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .modal ol.hint { color: var(--muted); font-size: 13px; margin: -8px 0 16px;
    padding-left: 20px; }
  .modal ol.hint li { margin-bottom: 3px; }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
  input, select {
    width: 100%; background: var(--bg-elev); color: var(--text);
    border: 1px solid var(--hairline-2); border-radius: 9px; padding: 9px 11px;
    font: inherit; font-size: 14px;
  }
  input:focus, select:focus, textarea:focus {
    outline: 2px solid var(--accent); outline-offset: -1px; }
  .modal textarea { width: 100%; min-height: 92px; resize: vertical;
    background: var(--bg-elev); color: var(--text);
    border: 1px solid var(--hairline-2); border-radius: 9px; padding: 9px 11px;
    font: inherit; font-size: 13px; line-height: 1.5; }
  .set-toggle { display: flex; align-items: center; gap: 9px; cursor: pointer;
    font-size: 13.5px; font-weight: 600; margin-bottom: 0; }
  .set-toggle input { width: auto; accent-color: var(--accent); }
  .field .sub-hint { color: var(--muted); font-size: 12px; margin: 6px 0 0;
    line-height: 1.45; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .modal-err { color: var(--red); font-size: 13px; margin-top: 10px; }
  /* Settings — grouped cards, switches, segmented control */
  .set-card { background: var(--bg-elev); border: 1px solid var(--hairline);
    border-radius: 14px; padding: 13px 15px; margin-bottom: 11px;
    animation: fade-up .32s ease both; }
  .set-card-head { display: flex; align-items: center; gap: 8px;
    font-size: 12.5px; font-weight: 700; letter-spacing: .2px; margin-bottom: 4px; }
  .set-ico { font-size: 15px; }
  .set-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; }
  .set-row + .set-row { border-top: 1px solid var(--hairline); }
  .set-row.col { align-items: stretch; flex-direction: column; gap: 7px; }
  .set-row-main { flex: 1; min-width: 0; }
  .set-row-name { font-size: 13px; font-weight: 600; }
  .set-row-sub { font-size: 11.5px; color: var(--muted); margin-top: 3px;
    line-height: 1.45; }
  .set-row select { width: auto; flex: 0 0 auto; }
  /* Full-page Settings tab — bigger type, roomier cards, 2-column grid. */
  .settings-view { max-width: 1100px; margin: 0 auto; }
  .settings-view .sec-head { align-items: baseline; }
  .settings-view .sec-head .label { font: 800 22px/1 ui-rounded,
    "SF Pro Rounded", system-ui; text-transform: none; letter-spacing: -.2px;
    color: var(--text); }
  .set-intro { color: var(--muted); font-size: 14px; margin: 6px 0 22px;
    line-height: 1.5; }
  .set-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 20px; align-items: start; }
  .set-grid .set-card { margin-bottom: 0; padding: 24px 26px; border-radius: 18px; }
  /* The last card (Splitwise) spans the full grid width so it isn't left
   * alone in a half-width slot at the bottom. */
  .set-grid .set-card:last-child { grid-column: 1 / -1; }
  .set-grid .set-card-head { font-size: 12.5px; gap: 10px; margin-bottom: 16px;
    letter-spacing: .5px; text-transform: uppercase; color: var(--muted); }
  .set-grid .set-ico { font-size: 18px; }
  .set-grid .set-row { padding: 18px 0; gap: 16px; }
  .set-grid .set-row.col { gap: 12px; }
  .set-grid .set-row-name { font-size: 14.5px; }
  .set-grid .set-row-sub { font-size: 12.5px; margin-top: 5px; }
  /* Categories settings panel — sections of tiles grouped by umbrella, plus
     the dashed-border "+ Add category" tile at the bottom. Each tile is a
     clickable card; the user-created tiles also show a small ✕ in the corner
     on hover for removal. */
  .set-hint { color: var(--muted); font-size: 12.5px; margin: 0 0 16px;
    line-height: 1.55; }
  .cat-section + .cat-section { margin-top: 18px; }
  .cat-section-head { display: flex; align-items: baseline; gap: 10px;
    margin: 0 4px 10px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .cat-section-name { color: var(--text); }
  .cat-section-count { font-size: 10px; padding: 1px 7px; border-radius: 999px;
    background: var(--card-hi); color: var(--muted); letter-spacing: 0; }
  .cat-grid { display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(125px, 1fr)); }
  .cat-tile { position: relative; display: flex; flex-direction: column;
    align-items: center; gap: 8px; padding: 14px 8px 12px; border-radius: 14px;
    background: var(--card-hi); border: 1px solid transparent;
    border-top: 3px solid var(--cat-color, var(--hairline-2));
    cursor: pointer; transition: border-color .14s, transform .14s,
    background-color .14s; user-select: none; }
  .cat-tile:hover { border-color: var(--indigo); transform: translateY(-1px);
    background: var(--card); }
  .cat-tile-icon { width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--cat-color) 18%, transparent);
    font-size: 20px; line-height: 1; }
  .cat-tile-name { font-size: 12.5px; font-weight: 600; color: var(--text);
    text-align: center; max-width: 100%;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* ✕ always visible at a low opacity so it's discoverable on every tile;
     hovering the tile lights it up, and hovering it directly turns red. */
  .cat-tile-del { position: absolute; top: 5px; right: 5px;
    width: 22px; height: 22px; border-radius: 50%; border: none;
    background: rgba(0,0,0,0.35); color: rgba(255,255,255,0.55);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 11px; line-height: 1; padding: 0; opacity: 0.55;
    transition: opacity .14s, background-color .14s, color .14s, transform .12s; }
  .cat-tile:hover .cat-tile-del { opacity: 1; color: #fff; }
  .cat-tile-del:hover { background: var(--red); color: #fff;
    transform: scale(1.1); }
  /* Delete-confirmation preview — the category's own icon + name, mirroring
     how it appears in the panel so the user is clear which one they're
     about to remove. */
  .cat-del-preview { display: flex; align-items: center; gap: 12px;
    padding: 14px; border-radius: 12px; background: var(--card-hi);
    border-left: 3px solid var(--cat-color, var(--hairline-2));
    margin: 6px 0 4px; }
  .cat-del-preview .cat-tile-icon { width: 44px; height: 44px;
    background: color-mix(in srgb, var(--cat-color) 18%, transparent); }
  .cat-del-name { font-size: 16px; font-weight: 700; color: var(--text); }
  .cat-add { display: flex; align-items: center; justify-content: center;
    gap: 8px; width: 100%; margin-top: 18px; padding: 14px;
    border: 1.5px dashed var(--hairline-2); border-radius: 14px;
    background: transparent; color: var(--muted); cursor: pointer;
    font-size: 13px; font-weight: 600;
    transition: border-color .14s, color .14s, background-color .14s; }
  .cat-add:hover { border-color: var(--indigo); color: var(--text);
    background: var(--indigo-soft); }
  .cat-add-icon { font-size: 18px; font-weight: 300; line-height: 1; }
  /* Category add/edit modal — emoji grid, colour swatch grid, group cards. */
  .ce-emoji-grid { display: grid; grid-template-columns: repeat(11, 1fr);
    gap: 4px; margin-top: 4px; }
  .ce-emoji { background: var(--card-hi); border: 1px solid transparent;
    border-radius: 7px; padding: 6px 0; font-size: 17px; cursor: pointer;
    line-height: 1; transition: border-color .12s, transform .12s; }
  .ce-emoji:hover { border-color: var(--hairline-2); transform: translateY(-1px); }
  .ce-emoji.on { border-color: var(--indigo); background: var(--indigo-soft); }
  .ce-color-grid { display: grid; grid-template-columns: repeat(11, 1fr);
    gap: 6px; margin-top: 4px; }
  .ce-color { width: 100%; aspect-ratio: 1; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer; padding: 0;
    transition: transform .12s, border-color .12s; }
  .ce-color:hover { transform: scale(1.08); }
  .ce-color.on { border-color: var(--text); transform: scale(1.1); }
  .ce-groups { display: grid; gap: 8px; margin-top: 4px; }
  .ce-group { display: grid; grid-template-columns: 22px 1fr; align-items: start;
    gap: 10px; padding: 11px 13px; border: 1px solid var(--hairline-2);
    border-radius: 11px; cursor: pointer;
    transition: border-color .14s, background-color .14s; }
  .ce-group:hover { border-color: var(--indigo); }
  .ce-group.on { border-color: var(--indigo); background: var(--indigo-soft); }
  .ce-group input { margin: 2px 0 0; accent-color: var(--indigo);
    grid-column: 1; grid-row: 1 / span 2; }
  .ce-group-name { display: block; font-weight: 700; font-size: 13px; }
  .ce-group-sub { display: block; color: var(--muted); font-size: 11px;
    margin-top: 2px; }
  /* Auto-save chip in the section header — pulses on each save. */
  .set-saved { margin-left: auto; font-size: 11.5px; font-weight: 700;
    letter-spacing: .4px; text-transform: uppercase; color: var(--green);
    background: rgba(61,220,132,0.14); padding: 5px 11px; border-radius: 999px;
    opacity: 0; transform: translateY(-2px);
    transition: opacity .2s ease, transform .2s ease; }
  .set-saved.on { opacity: 1; transform: translateY(0); }
  .switch { position: relative; flex: 0 0 auto; width: 40px; height: 24px; }
  .switch input { position: absolute; inset: 0; opacity: 0; margin: 0;
    width: 100%; height: 100%; cursor: pointer; }
  .switch-track { position: absolute; inset: 0; border-radius: 999px;
    background: var(--hairline-2); transition: background .2s ease; }
  .switch-track::after { content: ""; position: absolute; top: 2px; left: 2px;
    width: 20px; height: 20px; border-radius: 50%; background: #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.32); transition: transform .2s ease; }
  .switch input:checked + .switch-track { background: var(--accent); }
  .switch input:checked + .switch-track::after { transform: translateX(16px); }
  /* Fully custom dropdown (button + popover) so the open list is also styled. */
  .dd { position: relative; display: inline-block; min-width: 220px; flex: 0 0 auto; }
  /* When open, lift the dd above sibling grid cards so the popover paints
   * over them instead of being clipped behind the next row. */
  .dd.open { z-index: 90; }
  /* Each .set-card forms its own stacking context (its fade-up animation
   * makes one), so the .dd-menu's z-index is trapped inside the card and the
   * next card paints over it. When a card contains an open dropdown, lift
   * the whole card above its siblings so the menu can spill out. */
  .set-card { position: relative; }
  .set-card:has(.dd.open) { z-index: 100; }
  .dd-trigger { width: 100%; display: inline-flex; align-items: center;
    justify-content: space-between; gap: 10px;
    background: var(--card-hi); border: 1px solid var(--hairline-2);
    border-radius: 10px; padding: 9px 12px;
    font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer;
    transition: border-color .14s, background-color .14s; }
  .dd-trigger:hover { border-color: var(--accent); }
  .dd.open .dd-trigger { border-color: var(--accent); background: var(--card); }
  .dd-chev { width: 11px; height: 8px; color: var(--accent); flex: none;
    transition: transform .18s ease; }
  .dd.open .dd-chev { transform: rotate(180deg); }
  /* The menu sits 4px below (or above) the trigger with its own shadow — no
   * extra glow on the trigger when open, so there's no "double-border" line
   * between them. .dd.up flips the menu above when there's no room below. */
  .dd-menu { position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--bg-elev); border: 1px solid var(--hairline-2);
    border-radius: 12px; padding: 5px;
    box-shadow: 0 14px 32px rgba(0,0,0,0.42), 0 4px 10px rgba(0,0,0,0.20);
    display: none; z-index: 70; max-height: min(320px, 70vh); overflow-y: auto;
    transform-origin: top center; }
  .dd.up .dd-menu { top: auto; bottom: calc(100% + 4px); transform-origin: bottom center; }
  .dd.open .dd-menu { display: block; animation: dd-pop .16s ease both; }
  @keyframes dd-pop {
    from { opacity: 0; transform: translateY(-4px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .dd.up.open .dd-menu { animation: dd-pop-up .16s ease both; }
  @keyframes dd-pop-up {
    from { opacity: 0; transform: translateY(4px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .dd-opt { display: flex; width: 100%; align-items: center; gap: 10px;
    text-align: left; padding: 9px 12px; border-radius: 8px;
    background: transparent; border: none; color: var(--text);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: background-color .12s, color .12s; }
  .dd-opt:hover { background: var(--card-hi); }
  .dd-opt.on { background: var(--accent-soft); color: var(--accent);
    font-weight: 700; }
  .dd-opt-tick { width: 12px; height: 12px; opacity: 0; flex: none; }
  .dd-opt.on .dd-opt-tick { opacity: 1; }
  /* Chip picker — used for the card-provider list. */
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 14px; border-radius: 999px; font-size: 13px; font-weight: 600;
    background: var(--card-hi); border: 1px solid var(--hairline-2);
    color: var(--muted); cursor: pointer; user-select: none;
    transition: border-color .14s, color .14s, background-color .14s; }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.on { background: var(--accent-soft); border-color: var(--accent);
    color: var(--text); }
  .chip-dot { width: 7px; height: 7px; border-radius: 50%;
    background: var(--hairline-2); transition: background-color .14s; }
  .chip.on .chip-dot { background: var(--accent); }
  .custom-row { margin-top: 14px; }
  .custom-row-label { display: block; color: var(--muted); font-size: 11px;
    font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    margin-bottom: 7px; }
  .custom-row input { font-size: 13px; padding: 8px 12px; border-radius: 9px;
    background: var(--card-hi); border: 1px solid var(--hairline-2);
    color: var(--text); width: 100%; transition: border-color .14s; }
  .custom-row input:focus { outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft); }
  .custom-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px;
    min-height: 1px; }
  .custom-chip { display: inline-flex; align-items: center; gap: 2px;
    background: var(--card-hi); border: 1px solid var(--hairline-2);
    border-radius: 999px; padding: 4px 4px 4px 11px;
    font-size: 12px; color: var(--text); font-weight: 500; }
  .custom-chip button { background: transparent; border: none;
    color: var(--muted); width: 20px; height: 20px; border-radius: 50%;
    padding: 0; font-size: 15px; line-height: 1; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background-color .14s, color .14s; }
  .custom-chip button:hover { background: rgba(244,104,90,0.16); color: var(--red); }
  .seg { display: inline-flex; gap: 2px; background: var(--card-hi);
    border-radius: 9px; padding: 2px; flex: 0 0 auto; }
  .seg button { padding: 5px 12px; font-size: 12.5px; font-weight: 600;
    border-radius: 7px; background: transparent; border: 0; color: var(--muted);
    transition: background .15s ease, color .15s ease; }
  .seg button.on { background: var(--accent); color: #fff; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .plate-row { display: flex; gap: 8px; }
  .plate-row input { flex: 1; min-width: 0; }
  .plate-row button { flex: none; }
  .est-note { font-size: 12px; line-height: 1.5; padding: 9px 12px;
    border-radius: 10px; background: var(--accent-soft); color: var(--muted);
    margin-bottom: 13px; }
  .est-note strong { color: var(--text); font-weight: 700; }

  #toasts { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 8px; z-index: 60; }
  .toast { background: var(--card); border: 1px solid var(--hairline-2);
    border-radius: 11px; padding: 11px 17px; font-size: 13px; max-width: 460px;
    box-shadow: var(--shadow); animation: pop .22s ease; }
  .toast.err { border-color: var(--red); color: var(--red); }

  /* --- Animations -------------------------------------------------------- */
  @keyframes fade { from { opacity: 0; } }
  @keyframes pop { from { opacity: 0; transform: scale(.95); } }
  @keyframes fade-up { from { opacity: 0; transform: translateY(12px); } }
  @keyframes txn-in { from { opacity: 0; transform: translateY(8px); } }
  @keyframes pie-in { from { opacity: 0; transform: scale(.84) rotate(-14deg); } }
  @keyframes bar-rise { from { transform: scaleY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tab-enter > * { animation: fade-up .36s ease both; }
  .tab-enter .txn { animation: txn-in .3s ease both; }
  .tab-enter .pie { animation: pie-in .55s cubic-bezier(.2,.8,.2,1) both; }
  .move-card { animation: pop .22s ease; }

  /* --- Splitwise --------------------------------------------------------- */
  .txn-sw { color: var(--amber); font-weight: 600; }
  .txn-sw.paid { color: var(--green); }
  .sw-members { display: flex; flex-direction: column; gap: 2px;
    margin: 8px 0 4px; max-height: 300px; overflow-y: auto; }
  .sw-member { display: flex; align-items: center; gap: 10px; padding: 9px;
    border-radius: 10px; cursor: pointer; font-size: 13.5px; }
  .sw-member:hover { background: var(--card-hi); }
  .sw-member input { width: auto; flex: 0 0 auto; accent-color: var(--accent); }

  /* --- Piggy banks ------------------------------------------------------- */
  .pgy-head { display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 16px; }
  .pgy-head h2 { font-size: 20px; font-weight: 800; }
  .pgy-head .pgy-sub { color: var(--muted); font-size: 12.5px; margin-top: 3px;
    line-height: 1.5; max-width: 440px; }
  .pgy-head .spacer { flex: 1; }
  .pgy-headroom { display: flex; gap: 9px; align-items: flex-start;
    background: var(--card); border: 1px solid var(--hairline);
    border-radius: 13px; padding: 12px 15px; margin-bottom: 16px;
    font-size: 12.5px; color: var(--muted); line-height: 1.55; }
  .pgy-headroom b { color: var(--text); font-weight: 700;
    font-variant-numeric: tabular-nums; }
  .pgy-grid { display: grid; gap: 15px;
    grid-template-columns: repeat(auto-fill, minmax(274px, 1fr)); }
  .pgy-card { background: var(--card); border: 1px solid var(--hairline);
    border-radius: 18px; padding: 17px; box-shadow: var(--shadow-sm);
    display: flex; flex-direction: column; gap: 13px;
    transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease; }
  .pgy-card:hover { transform: translateY(-3px); box-shadow: var(--shadow);
    border-color: var(--hairline-2); }
  .pgy-card.done { border-color: var(--green); }
  /* Lump-sum piggies that have been fully funded read as a green-accented
     reservation, distinct from monthly goal-reached cards (which use a
     party emoji and "Goal reached" copy). */
  .pgy-card.reserved { border-color: var(--green); }
  .pgy-card.reserved .pgy-emoji { background: rgba(61,220,132,0.16); }
  .pgy-card-top { display: flex; align-items: center; gap: 11px; }
  .pgy-emoji { width: 44px; height: 44px; flex: none; border-radius: 13px;
    display: flex; align-items: center; justify-content: center; font-size: 23px;
    background: var(--accent-soft); }
  .pgy-card.done .pgy-emoji { background: rgba(61,220,132,0.16); }
  .pgy-name { font-size: 14.5px; font-weight: 700; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .pgy-monthly { font-size: 11.5px; color: var(--muted); margin-top: 2px;
    display: inline-flex; align-items: center; gap: 6px; }
  /* "one-time" pill next to the amount on lump-sum cards. */
  .pgy-tag { font-size: 9.5px; font-weight: 800; letter-spacing: .4px;
    text-transform: uppercase; padding: 2px 7px; border-radius: 999px;
    background: rgba(61,220,132,0.16); color: var(--green); }
  /* Modal segmented kind picker — two side-by-side options with a label and
     a sub-label per side. */
  .pgy-kind { display: grid !important; grid-template-columns: 1fr 1fr;
    gap: 6px; padding: 4px; width: 100%; margin-bottom: 4px; }
  .pgy-kind button { flex: 1; padding: 10px 12px; border-radius: 8px;
    display: flex; flex-direction: column; gap: 3px; align-items: flex-start;
    text-align: left; }
  .pgy-kind-t { font-size: 13px; font-weight: 700; }
  .pgy-kind-s { font-size: 11px; opacity: .75; font-weight: 500; }
  .pgy-body { display: flex; align-items: center; gap: 15px; }
  .pgy-ring { width: 88px; height: 88px; flex: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: background .65s cubic-bezier(.2,.7,.2,1); }
  .pgy-hole { width: 66px; height: 66px; border-radius: 50%;
    background: var(--card); display: flex; flex-direction: column;
    align-items: center; justify-content: center; }
  .pgy-pct { font: 800 18px/1 ui-rounded, "SF Pro Rounded", system-ui;
    font-variant-numeric: tabular-nums; }
  .pgy-pct-lbl { font-size: 8.5px; font-weight: 700; letter-spacing: .5px;
    text-transform: uppercase; color: var(--faint); margin-top: 3px; }
  .pgy-figs { flex: 1; min-width: 0; }
  .pgy-saved { font: 800 18px/1.1 ui-rounded, "SF Pro Rounded", system-ui;
    font-variant-numeric: tabular-nums; }
  .pgy-target { font-size: 11px; color: var(--faint); margin-top: 3px;
    line-height: 1.45; }
  .pgy-eta { font-size: 11px; color: var(--muted); margin-top: 7px;
    font-weight: 600; }
  .pgy-badge { display: flex; gap: 7px; font-size: 11.5px; font-weight: 600;
    padding: 8px 11px; border-radius: 11px; line-height: 1.4; }
  .pgy-badge.funded, .pgy-badge.done { background: rgba(61,220,132,0.14);
    color: var(--green); }
  .pgy-badge.skipped { background: rgba(245,181,74,0.16); color: var(--amber); }
  .pgy-badge.onhold { background: var(--card-hi); color: var(--muted); }
  .pgy-card.onhold .pgy-card-top, .pgy-card.onhold .pgy-body { opacity: .5;
    transition: opacity .2s ease; }
  .pgy-actions { display: flex; align-items: center; gap: 6px;
    border-top: 1px solid var(--hairline); padding-top: 11px; }
  .pgy-actions .spacer { flex: 1; }
  /* Piggy modal */
  .pgy-em-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .pgy-em { width: 38px; height: 38px; flex: none; border-radius: 10px;
    font-size: 19px; padding: 0; background: var(--bg-elev);
    border: 1px solid var(--hairline-2); cursor: pointer;
    transition: transform .12s ease, border-color .12s ease,
      background-color .12s ease; }
  .pgy-em:hover { transform: translateY(-2px); }
  .pgy-em.on { border-color: var(--accent); background: var(--accent-soft);
    transform: translateY(-2px); }
  /* Voucher card title — allow up to 2 lines, then ellipsis. Piggy cards
   * still single-line via .pgy-name above; .vc-name only overrides on
   * vouchers. */
  .vc-name { white-space: normal; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-clamp: 2;
    overflow: hidden; line-height: 1.25; }
  .vc-sub { flex-wrap: wrap; }
  .vc-desc { color: var(--muted); }
  .vc-sep { color: var(--faint); }
  /* Voucher add-voucher picker — uses the same .pick-list/.pick-row
   * vertical layout as the bank picker for visual consistency. */
