function handleAction(action, btn) {
  const id = btn && btn.dataset.id;
  const conn = id && state.connections.find((c) => c.id === id);
  switch (action) {
    case "add-connection": addConnectionModal(); break;
    case "sync-all": syncAll(); break;
    case "sync": if (conn) scrape(conn); break;
    case "set-credentials": if (conn) credentialsModal(conn); break;
    case "link-brokerage": if (id) linkBrokerage(id); break;
    case "remove": if (id) removeConnection(id); break;
    case "edit-asset": {
      const a = id && (state.assets || []).find((x) => x.id === id);
      if (a) editAssetModal(a);
      break;
    }
    case "remove-asset": if (id) removeAsset(id); break;
    case "edit-loan": {
      const l = id && (state.loans || []).find((x) => x.id === id);
      if (l) editLoanModal(l);
      break;
    }
    case "remove-loan": if (id) removeLoan(id); break;
    case "new-category": categoryModal(null); break;
    case "edit-category": {
      const arg = btn && btn.dataset.arg;
      const c = arg && (state.categories || []).find((x) => x.name === arg);
      if (c) categoryModal(c);
      break;
    }
    case "remove-category": {
      const arg = btn && btn.dataset.arg;
      if (arg) removeCategoryByName(arg);
      break;
    }
    case "ignore-recurring": {
      const arg = btn && btn.dataset.arg;
      if (arg) ignoreRecurringMerchant(arg);
      break;
    }
    case "ignore-income": {
      const arg = btn && btn.dataset.arg;
      if (arg) ignoreIncomeMerchant(arg);
      break;
    }
    case "split-merchant": {
      const arg = btn && btn.dataset.arg;
      if (arg) splitMerchantModal(arg);
      break;
    }
    case "split-category": {
      const arg = btn && btn.dataset.arg;
      if (arg) splitCategoryModal(arg);
      break;
    }
    case "new-piggy": piggyModal(null); break;
    case "edit-piggy": {
      const b = id && (((state.budget || {}).piggy || {}).banks || [])
        .find((x) => x.id === id);
      if (b) piggyModal(b);
      break;
    }
    case "toggle-hold": if (id) togglePiggyHold(id); break;
    case "remove-piggy": if (id) removePiggy(id); break;
    case "mark-piggy-used": if (id) markPiggyUsed(id); break;
    // "Add voucher" opens the unified picker (providers + Custom). The
    // legacy `new-voucher` action skips straight to the manual form and
    // is still used internally (e.g. picker → "Custom voucher" row).
    case "add-voucher": addVoucherModal(); break;
    case "new-voucher": voucherModal(null); break;
    case "edit-voucher": {
      const v = id && (state.vouchers || []).find((x) => x.id === id);
      if (v) voucherModal(v);
      break;
    }
    case "remove-voucher": if (id) removeVoucher(id); break;
    case "toggle-voucher-excluded": if (id) toggleVoucherExcluded(id); break;
    case "month-prev": shiftMonth(1); break;
    case "month-next": shiftMonth(-1); break;
    case "toggle-select":
      state.selectMode = !state.selectMode;
      state.batchOpen = false;
      if (!state.selectMode) state.batch = {};
      else state.move = null;
      render();
      break;
    case "batch-toggle": state.batchOpen = !state.batchOpen; render(); break;
    case "batch-clear":
      state.batch = {}; state.batchOpen = false; render(); break;
    case "batch-move": state.batchOpen = false; saveBatch(); break;
    case "collapse-all": {
      const cs = state._actCats || [];
      const allCol = cs.length && cs.every((c) => state.collapsed[c]);
      cs.forEach((c) => {
        if (allCol) delete state.collapsed[c];
        else state.collapsed[c] = true;
      });
      render();
      break;
    }
    case "edit-budgets": budgetModal(); break;
    case "open-cat-drill":
      if (btn && btn.dataset.arg) categoryDrillModal(btn.dataset.arg);
      break;
    case "generate-insights": generateInsights(); break;
    case "toggle-holdings":
      if (id) {
        state.expandedHoldings[id] = !state.expandedHoldings[id];
        render();
      }
      break;
    case "insights-tab":
      if (btn && btn.dataset.arg) { state.insightsTab = btn.dataset.arg; render(); }
      break;
    case "brk-range":
      if (btn && btn.dataset.arg) { state.brkRange = btn.dataset.arg; render(); }
      break;
    case "brk-base":
      if (btn && btn.dataset.arg) { state.brkBase = btn.dataset.arg; render(); }
      break;
    case "brk-account":
      if (btn && btn.dataset.arg) {
        state.brkAccount = btn.dataset.arg;
        state.brkOpenHolding = null;
        render();
      }
      break;
    case "brk-hold":
      if (btn && btn.dataset.arg) {
        state.brkOpenHolding = state.brkOpenHolding === btn.dataset.arg
          ? null : btn.dataset.arg;
        render();
      }
      break;
    case "brk-inception-clear":
      if (btn && btn.dataset.arg) setAccountInception(btn.dataset.arg, null);
      break;
    case "view-month-activity":
      if (btn && btn.dataset.arg) {
        state.tab = "activity";
        state.activityMonth = btn.dataset.arg;
        render();
      }
      break;
    case "cancel-sub":
      if (btn && btn.dataset.key) markSubCancelled(btn.dataset.key);
      break;
    case "restore-sub":
      if (btn && btn.dataset.key) unmarkSubCancelled(btn.dataset.key);
      break;
  }
}

// Includes/excludes one account or manual asset from the net-worth total,
// then reloads so the headline figure and the breakdown reflect the change.
async function toggleNetWorth(kind, id, counted) {
  const excluded = !counted;
  try {
    if (kind === "asset") {
      await api("/assets/" + id, "PUT", { excluded: excluded });
    } else if (kind === "loan") {
      await api("/loans/" + id + "/excluded", "PATCH", { excluded: excluded });
    } else {
      await api("/accounts/" + id + "/excluded", "PATCH", { excluded: excluded });
    }
    await loadAll();
    render();
  } catch (err) {
    toast("Couldn't update the net-worth setting.");
    render(); // re-render to restore the checkbox to the stored state
  }
}

// Sets (or clears, when date is null/empty) the user-defined "when did I
// actually start investing" date for an account. The brokerage chart's
// equity series clips synthetic Yahoo/Maya pre-link history before this
// date so ALL means "since I started", not 10 years of pretend.
async function setAccountInception(id, date) {
  try {
    await api("/accounts/" + id + "/inception", "PATCH", {
      inceptionDate: date || null,
    });
    await loadAll();
    render();
  } catch (err) {
    toast("Couldn't save the investment-start date.");
    render();
  }
}

// Hover over a pie slice or its legend row → centre text swaps from the
// month's total to that category's name + amount. Pure presentation, so
// it sits outside the click dispatcher.
document.getElementById("content").addEventListener("mouseover", (e) => {
  const t = e.target.closest("[data-action='open-cat-drill']");
  if (!t) return;
  const svg = t.closest(".pie-wrap")
    ? t.closest(".pie-wrap").querySelector("svg.pie-svg")
    : (t.closest(".card") || document).querySelector("svg.pie-svg");
  if (!svg) return;
  const cat = t.dataset.arg;
  // Pull the row's amount from the legend (more accurate than the slice's
  // data-amt because we always render it as money there).
  const lg = svg.closest(".card")
    ? svg.closest(".card").querySelector(".lg-row[data-arg='"
        + (cat || "").replace(/'/g, "\\'") + "']")
    : null;
  const amt = lg ? lg.querySelector(".lg-amt").textContent
    : (t.dataset.amt ? "₪" + Number(t.dataset.amt).toLocaleString("en-US",
        { minimumFractionDigits: 0, maximumFractionDigits: 0 }) : "");
  const aEl = svg.querySelector(".pie-c-amt");
  const lEl = svg.querySelector(".pie-c-lbl");
  if (aEl && lEl && cat) {
    aEl.textContent = amt || aEl.textContent;
    lEl.textContent = cat;
    aEl.classList.add("hov"); lEl.classList.add("hov");
  }
});
document.getElementById("content").addEventListener("mouseout", (e) => {
  const t = e.target.closest("[data-action='open-cat-drill']");
  if (!t) return;
  const card = t.closest(".card");
  if (!card) return;
  const svg = card.querySelector("svg.pie-svg");
  if (!svg) return;
  const aEl = svg.querySelector(".pie-c-amt");
  const lEl = svg.querySelector(".pie-c-lbl");
  if (aEl && lEl) {
    aEl.textContent = svg.dataset.pieTotal || aEl.textContent;
    lEl.textContent = "spent";
    aEl.classList.remove("hov"); lEl.classList.remove("hov");
  }
});

document.getElementById("content").addEventListener("click", (e) => {
  const balEl = e.target.closest("[data-edit-balance]");
  if (balEl) {
    const acct = state.accounts.find((a) => a.id === balEl.dataset.editBalance);
    if (acct) balanceModal(acct);
    return;
  }
  const nwEl = e.target.closest("[data-toggle-nw]");
  if (nwEl) {
    // The checkbox has already flipped: checked = counted in net worth.
    toggleNetWorth(nwEl.dataset.toggleNw, nwEl.dataset.id, nwEl.checked);
    return;
  }
  const bcatOpt = e.target.closest("[data-batch-cat]");
  if (bcatOpt) {
    state.batchCat = bcatOpt.dataset.batchCat;
    state.batchOpen = false;
    render();
    return;
  }
  // A click anywhere else closes an open category dropdown.
  if (state.batchOpen && !e.target.closest(".bcat")) {
    state.batchOpen = false;
    render();
    return;
  }
  const collapseEl = e.target.closest("[data-collapse]");
  if (collapseEl) {
    const cat = collapseEl.dataset.collapse;
    if (state.collapsed[cat]) delete state.collapsed[cat];
    else state.collapsed[cat] = true;
    render();
    return;
  }
  const txnEl = e.target.closest("[data-txn]");
  if (txnEl) {
    const txn = state.transactions.find((t) => t.id === txnEl.dataset.txn);
    if (!txn) return;
    if (state.selectMode) {
      if (state.batch[txn.id]) delete state.batch[txn.id];
      else state.batch[txn.id] = true;
      render();
      return;
    }
    state.move = { txnId: txn.id, picked: txn.category || "", always: false,
      linkMode: false, refundId: txn.refundId || null,
      frequency: state.merchantFreq[merchantKey(txn.description)] || "monthly" };
    render();
    document.getElementById("sidebar").scrollIntoView({ behavior: "smooth", block: "nearest" });
    return;
  }
  const monthEl = e.target.closest("[data-month]");
  if (monthEl) {
    state.insightsMonth = monthEl.dataset.month;
    render();
    return;
  }
  const btn = e.target.closest("[data-action]");
  if (btn) handleAction(btn.dataset.action, btn);
});

document.getElementById("nav").addEventListener("click", (e) => {

document.getElementById("sidebar").addEventListener("click", (e) => {
  const moveCat = e.target.closest("[data-move-cat]");
  if (moveCat && state.move) {
    state.move.picked = moveCat.dataset.moveCat;
    renderSidebar(); // re-render so the billing-frequency section follows suit
    return;
  }
  const freqBtn = e.target.closest("[data-freq]");
  if (freqBtn && state.move) {
    state.move.frequency = freqBtn.dataset.freq;
    renderSidebar();
    return;
  }
  const pick = e.target.closest("[data-pick-refund]");
  if (pick && state.move) {
    state.move.refundId = pick.dataset.pickRefund;
    state.move.linkAmount = null;  // reset — the linked-card recomputes a default
    state.move.linkMode = false;
    render();
    return;
  }
  // The amount input on the linked-refund card uses its own oninput
  // handler (onLinkAmount) so it can update state and the "Effective
  // spend" line without a render() that would steal input focus.
  const x = e.target.closest("[data-x]");
  if (x && state.move) {
    if (x.dataset.x === "move-cancel") { state.move = null; render(); }
    else if (x.dataset.x === "move-save") saveMove();
    else if (x.dataset.x === "link-add") { state.move.linkMode = true; render(); }
    else if (x.dataset.x === "link-back") { state.move.linkMode = false; render(); }
    else if (x.dataset.x === "link-remove") {
      state.move.refundId = null;
      state.move.linkAmount = null;
      render();
    }
    else if (x.dataset.x === "sw-split") {
      const t = state.transactions.find((tx) => tx.id === state.move.txnId);
      if (t) splitwiseSheet(t);
    }
    else if (x.dataset.x === "sw-unlink") unlinkSplitwise(state.move.txnId);
    return;
  }
  const btn = e.target.closest("[data-action]");
  if (btn) handleAction(btn.dataset.action, btn);
});

document.getElementById("sidebar").addEventListener("change", (e) => {

// Time-of-day greeting — "Good morning", "Good afternoon", "Good evening".
function timeGreeting() {
  const h = new Date().getHours();
  if (h >= 5 && h < 12) return "Good morning";
  if (h >= 12 && h < 18) return "Good afternoon";
  return "Good evening";
}

// "shahar solomons" -> "Shahar Solomons". toUpperCase/toLowerCase on Hebrew
// letters are no-ops, so Hebrew names pass through unchanged.
function titleCase(s) {
  return (s || "")
    .split(/\s+/)
    .filter(Boolean)
    .map((w) => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
    .join(" ");
}

// Full-screen welcome / unlock screen with personalized greeting and animated
// reveal. First run asks the user's name and creates the vault; later runs
// greet by name (when stored) and just ask for the passphrase.
function showGate(creating) {
  document.getElementById("app").hidden = true;
  const overlays = document.getElementById("overlays");
  overlays.innerHTML = "";
  const name = localStorage.getItem("honUserName") || "";
  const askName = !name;

  // Greeting is rendered as two stacked lines: a small muted lead-in over a
  // big gold "name" line. Falls back to clean copy when no name is stored.
  let greetLead, greetName, subText, footText, btnText, passLabel;
  if (creating) {
    greetLead = "Welcome to";
    greetName = "Hon";
    subText = "Let's set up your private finance dashboard. Your bank "
      + "credentials are encrypted with a passphrase only you know.";
    footText = "Pick something memorable — there is no recovery if you lose it.";
    btnText = "Create vault & continue";
    passLabel = "Choose a passphrase";
  } else if (name) {
    greetLead = timeGreeting() + ",";
    greetName = titleCase(name);
    subText = "Welcome back. Unlock your vault to continue.";
    footText = "";
    btnText = "Unlock";
    passLabel = "Passphrase";
  } else {
    greetLead = "Welcome";
    greetName = "back";
    subText = "Unlock your vault to continue.";
    footText = "";
    btnText = "Unlock";
    passLabel = "Passphrase";
  }
  const helloHtml = '<div class="gate-greeting">'
    + '<span class="gate-greet">' + esc(greetLead) + "</span>"
    + '<h1 class="gate-name" title="' + esc(greetName) + '">'
    + esc(greetName) + "</h1></div>";

  const nameField = askName
    ? '<div class="gate-field"><label for="gate-name">Your name</label>'
      + '<input type="text" class="gate-input" id="gate-name" '
      + 'autocomplete="given-name" placeholder="e.g. Shahar"></div>'
    : "";

  const gate = document.createElement("div");
  gate.className = "gate";
  gate.innerHTML =
    '<div class="gate-content">'
    + '<div class="gate-brand" aria-hidden="true">'
    + '<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">'
    + '<defs><linearGradient id="gb-g" x1="0" y1="0" x2="0" y2="1">'
    + '<stop offset="0%" stop-color="#1f1810"/>'
    + '<stop offset="100%" stop-color="#2d2010"/></linearGradient></defs>'
    + '<g fill="url(#gb-g)">'
    + '<rect x="4" y="7" width="24" height="4.6" rx="2.3"/>'
    + '<rect x="4" y="7" width="4.6" height="21" rx="2.3"/>'
    + '<rect x="23.4" y="14" width="4.6" height="14" rx="2.3"/></g>'
    + '<path d="M5.5 7.8 L26.5 7.8" stroke="rgba(255,255,255,0.22)" '
    + 'stroke-width="0.9" stroke-linecap="round" fill="none"/>'
    + "</svg></div>"
    + helloHtml
    + '<p class="gate-sub">' + esc(subText) + "</p>"
    + '<div class="gate-panel">'
    + nameField
    + '<div class="gate-field"><label for="gate-pass">' + esc(passLabel) + "</label>"
    + '<input type="password" class="gate-input" id="gate-pass" '
    + 'autocomplete="' + (creating ? "new-password" : "current-password") + '" '
    + 'placeholder="Your secret passphrase"></div>'
    + '<button type="button" class="gate-btn" id="gate-go">' + esc(btnText) + "</button>"
    + '<div class="gate-err" id="gate-err"></div>'
    + "</div>"
    + (footText ? '<p class="gate-foot">' + esc(footText) + "</p>" : "")
    + "</div>";
  overlays.appendChild(gate);

  const nameInput = gate.querySelector("#gate-name");
  const passInput = gate.querySelector("#gate-pass");
  const btn = gate.querySelector("#gate-go");
  const err = gate.querySelector("#gate-err");

  // Focus the first empty field a hair after the entrance animation settles.
  setTimeout(() => {
    if (nameInput && !nameInput.value) nameInput.focus();
    else passInput.focus();
  }, 480);

  const showError = (msg) => {
    err.textContent = msg;
    err.classList.add("on");
    passInput.focus();
    passInput.select();
  };

  const go = async () => {
    const passphrase = passInput.value;
    if (!passphrase) return showError("Enter a passphrase.");
    btn.disabled = true;
    err.classList.remove("on");
    try {
      await api("/vault/unlock", "POST", { passphrase });
      sessionStorage.setItem("honVaultPass", passphrase);
      const typedName = nameInput ? nameInput.value.trim() : "";
      if (typedName) localStorage.setItem("honUserName", typedName);
      // Fade the gate out while the app shell appears behind it.
      gate.classList.add("leaving");
      document.getElementById("app").hidden = false;
      setTimeout(() => { overlays.innerHTML = ""; }, 360);
      await loadAll();
    } catch (e) {
      btn.disabled = false;
      showError(e.message || "Unlock failed.");
    }
  };

  btn.addEventListener("click", go);
  [nameInput, passInput].forEach((el) => {
    if (!el) return;
    el.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      if (el === nameInput) passInput.focus();
      else go();
    });
  });
}

async function boot() {
  applyTheme(localStorage.getItem("honTheme") || "dark");
  if (!token) {
    document.getElementById("content").innerHTML =
      '<div class="card empty">No access token. Start the app with ./web.sh so the '
      + "dashboard URL includes its token.</div>";
    document.getElementById("shell").classList.add("bare");
    document.getElementById("app").hidden = false;
    return;
  }
  try {
    const health = await api("/health");
    document.getElementById("engine").textContent = "engine v" + health.version;
    const status = await api("/vault/status");
    if (status.unlocked) {
      document.getElementById("app").hidden = false;
      return loadAll();
    }
    const saved = sessionStorage.getItem("honVaultPass");
    if (status.exists && saved) {
      try {
        await api("/vault/unlock", "POST", { passphrase: saved });
        document.getElementById("app").hidden = false;
        return loadAll();
      } catch (e) { /* fall through to the gate */ }
    }
    showGate(!status.exists);
  } catch (e) {
    document.getElementById("content").innerHTML =
      '<div class="card empty">Could not reach the engine: ' + esc(e.message) + "</div>";
    document.getElementById("shell").classList.add("bare");
    document.getElementById("app").hidden = false;
  }
}

boot();
</script>
</body>
</html>
