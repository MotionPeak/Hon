    + "<span>Always categorize transactions from this business this way</span></label>"
    + freqSection
    + incomeSection
    + '<div class="label sb-label">Reimbursement</div>' + refund
    + swSection
    + '<button class="primary block" data-x="move-save" style="margin-top:13px"'
    + (canSave ? "" : " disabled") + ">Save</button></div>";
}

// Spending and income for the trailing 12 billing cycles, computed the same
// way as the Overview and Activity tabs (cycleKey, card-bill totals excluded,
// refund offsets applied) so every tab agrees on what a "month" is.
function cycleAnalytics() {
  const keys = [];
  let k = currentCycleKey();
  for (let i = 0; i < 12; i++) { keys.unshift(k); k = prevCycleKey(k); }
  const agg = {};
  keys.forEach((key) => { agg[key] = { spending: 0, income: 0 }; });
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || isCardTotal(t) || t.refundForId) return;
    const bucket = agg[cycleKey(t.date)];
    if (!bucket) return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt < 0) bucket.spending += -amt;
    else bucket.income += amt;
  });
  return keys.map((key) => ({ month: key, spending: agg[key].spending,
    income: agg[key].income }));
}

// Per-cycle, per-category spend over the trailing 12 billing cycles, plus the
// average over *completed* cycles that had activity — the baseline the Insights
// and Budget screens compare against. Averages are null until there is at least
// one completed cycle with spending. byCatCycle/totalCycle index 11 is current.
function categoryStats() {
  const keys = [];
  let k = currentCycleKey();
  for (let i = 0; i < 12; i++) { keys.unshift(k); k = prevCycleKey(k); }
  const idx = {};
  keys.forEach((key, i) => { idx[key] = i; });
  const byCatCycle = {};
  const totalCycle = new Array(12).fill(0);
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || isCardTotal(t) || t.refundForId) return;
    const ci = idx[cycleKey(t.date)];
    if (ci === undefined) return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt >= 0) return;
    const cat = t.category || "Other";
    (byCatCycle[cat] || (byCatCycle[cat] = new Array(12).fill(0)))[ci] += -amt;
    totalCycle[ci] += -amt;
  });
  // Average over completed cycles (every cycle but the current, partial one)
  // that actually had spending — an empty cycle would drag the baseline down.
  const done = [];
  for (let i = 0; i < 11; i++) if (totalCycle[i] > 0) done.push(i);
  const avg = (arr) => done.length
    ? done.reduce((s, i) => s + (arr[i] || 0), 0) / done.length : null;
  const avgByCat = {};
  Object.keys(byCatCycle).forEach((c) => { avgByCat[c] = avg(byCatCycle[c]); });
  return { keys: keys, idx: idx, byCatCycle: byCatCycle, totalCycle: totalCycle,
    avgTotal: avg(totalCycle), avgByCat: avgByCat };
}

// A small coloured delta chip — more spending reads as "bad", less as "good".
// `baseline` null (no data to compare) yields an empty string.
function deltaChip(current, baseline, label) {
  if (baseline == null) return "";
  const diff = Math.round(current - baseline);
  const cls = diff > 0 ? "bad" : diff < 0 ? "good" : "flat";
  const arrow = diff > 0 ? "↑" : diff < 0 ? "↓" : "±";
  return '<span class="md-d ' + cls + '">' + arrow
    + moneyShort(Math.abs(diff), "ILS") + " " + label + "</span>";
}

function insightsView() {
  // The Brokerage sub-tab is for SnapTrade-linked accounts only. Discount's
  // קרן-כספית holdings are surfaced on the connection tile but excluded
  // from the brokerage view (its currency + performance machinery doesn't
  // model Israeli securities). Scope both gates to accounts that look like
  // brokerages — SnapTrade-linked plus anything else (e.g. Meitav's portfolio
  // management area) that exposes a holdings list. The keren-kaspit cash row
  // has no holdings, so this still keeps it out.
  const brkAcctIds = new Set(state.accounts
    .filter((a) =>
      a.companyId === SNAPTRADE_ID
      || (state.brokerage.holdings || []).some((h) => h.accountId === a.id),
    )
    .map((a) => a.id));
  const hasBrokerage = (state.brokerage.holdings || [])
      .some((h) => brkAcctIds.has(h.accountId))
    || (state.brokerage.snapshots || []).length > 0;
  const tab = state.insightsTab === "brokerage" ? "brokerage" : "spending";

  let toggle = "";
  if (hasBrokerage) {
    const pill = (key, label) => '<button class="ins-pill'
      + (tab === key ? " on" : "") + '" data-action="insights-tab" data-arg="'
      + key + '">' + label + "</button>";
    toggle = '<div class="ins-toggle">' + pill("spending", "Spending")
      + pill("brokerage", "Brokerage") + "</div>";
  }
  const head = '<div class="sec-head"><div class="label">Insights</div>'
    + toggle + "</div>";

  if (tab === "brokerage" && hasBrokerage) {
    return head + '<div class="ins-stack">' + brokerageView() + "</div>";
  }

  const months = cycleAnalytics();
  if (!months.some((m) => m.spending || m.income)) {
    return head + '<div class="card empty">No analytics yet — sync an account '
      + "to see your spending trends.</div>";
  }
  const keys = months.map((m) => m.month);
  let sel = state.insightsMonth;
  if (keys.indexOf(sel) < 0) sel = keys[keys.length - 1];

  const chart = '<div class="card"><div class="label">Spending</div>'
    + '<div class="ins-sub">Last 12 months · tap a month for its breakdown</div>'
    + miniBars(months, sel) + "</div>";

  return head + '<div class="ins-stack">' + chart
    + monthDetailCard(months, sel) + aiInsightsCard(state.insights) + "</div>";
}

// The brokerage stats view: portfolio value with its trend, total unrealized
// gain, a value-over-time chart, and the consolidated holdings allocation.
function brokerageView() {
  // The Insights brokerage view covers every account with investable
  // holdings — SnapTrade-linked brokerages plus any other connection that
  // exposes a holdings list (Meitav's portfolio-management area today;
  // future providers as they're wired). Accounts without holdings stay out
  // so the keren-kaspit synthetic row doesn't sneak in.
  const brkAccts = state.accounts.filter((a) =>
    a.companyId === SNAPTRADE_ID
    || (state.brokerage.holdings || []).some((h) => h.accountId === a.id),
  );
  const brkAcctIds = new Set(brkAccts.map((a) => a.id));
  const allHoldings = (state.brokerage.holdings || [])
    .filter((h) => brkAcctIds.has(h.accountId));
  const snaps = (state.brokerage.snapshots || [])
    .filter((s) => brkAcctIds.has(s.accountId));
  const holdSnaps = (state.brokerage.holdingSnapshots || [])
    .filter((s) => brkAcctIds.has(s.accountId));
  const performance = state.brokerage.performance || [];
  const ilsRates = state.brokerage.ilsRates || null;

  // Account filter (the user can narrow chart + holdings to one account).
  const acctFilter = state.brkAccount && state.brkAccount !== "all"
    && brkAccts.some((a) => a.id === state.brkAccount) ? state.brkAccount : "all";
  const acctsInScope = acctFilter === "all"
    ? brkAccts : brkAccts.filter((a) => a.id === acctFilter);
  const holdings = acctFilter === "all"
    ? allHoldings : allHoldings.filter((h) => h.accountId === acctFilter);
  const snapsScoped = acctFilter === "all"
    ? snaps : snaps.filter((s) => s.accountId === acctFilter);

  // Headline currency: prefer SnapTrade's reported currency, then account
  // currency. Heavy-weight performance so a USD report wins over an ILS cash
  // sub-account.
  const curCount = {};
  acctsInScope.forEach((a) => { curCount[a.currency] = (curCount[a.currency] || 0) + 1; });
  if (acctFilter === "all") {
    performance.forEach((p) => {
      const c = p.data && p.data.currency;
      if (c) curCount[c] = (curCount[c] || 0) + 5;
    });
  }
  const nativeCur = Object.keys(curCount).sort((x, y) => curCount[y] - curCount[x])[0]
    || "USD";

  const useIls = state.brkBase === "ILS" && ilsRates;
  const displayCur = useIls ? "ILS" : nativeCur;
  const toIls = (v, c) => {
    if (v == null || !ilsRates) return null;
    const r = ilsRates[(c || nativeCur).toUpperCase()];
    return r == null ? null : v * r;
  };
  const conv = (v, c) => {
    if (v == null) return null;
    if (!useIls) return v;
    const out = toIls(v, c || nativeCur);
    return out == null ? v : out;
  };

  // Total value uses account balances (includes cash); gain/cost come from
  // priced positions only.
  let totalValue = 0, haveValue = false;
  acctsInScope.forEach((a) => {
    if (a.balance == null) return;
    const v = conv(a.balance, a.currency);
    if (v == null) return;
    totalValue += v; haveValue = true;
  });
  let totalCost = 0, totalGain = 0, haveGain = false;
  holdings.forEach((h) => {
    const s = holdingStats(h);
    if (s.cost != null) { const c = conv(s.cost, h.currency); if (c != null) totalCost += c; }
    if (s.gain != null) {
      const g = conv(s.gain, h.currency);
      if (g != null) { totalGain += g; haveGain = true; }
    }
  });
  // Provider-level fallback: when no per-holding cost basis is available
  // (Meitav reports only value per position) but the connection's
  // performance report includes cumulative contributions, use that as the
  // synthetic "cost" — net deposits minus withdrawals. Gain becomes
  // `current value − net contributions`, which is the same intuition as
  // cost-basis P&L at the portfolio level. Picks performance reports whose
  // connection owns any in-scope account (same scoping the chart uses).
  if (!haveGain && totalValue > 0) {
    const acctIdsInScope = new Set(acctsInScope.map((a) => a.id));
    const perfInScope = (performance || []).filter((p) =>
      state.accounts.some((a) =>
        acctIdsInScope.has(a.id) && a.connectionId === p.connectionId));
    let contribs = 0, haveContribs = false;
    perfInScope.forEach((p) => {
      const c = p.data && typeof p.data.contributions === "number"
        ? p.data.contributions : null;
      if (c != null) {
        const v = conv(c, p.data.currency || "ILS");
        if (v != null) { contribs += v; haveContribs = true; }
      }
    });
    if (haveContribs && contribs > 0) {
      totalCost = contribs;
      totalGain = totalValue - contribs;
      haveGain = true;
    }
  }
  const gainPct = haveGain && totalCost ? (totalGain / Math.abs(totalCost)) * 100 : null;

  // Equity series — SnapTrade's reporting timeline when an account isn't
  // narrowed (the report is connection-wide); local snapshots when filtered
  // to one account, or as the universal fallback.
  // Per-holding snapshots scoped to the in-view accounts. Yahoo Finance
  // backfills these on every brokerage sync, so the chart has multi-year
  // history even when SnapTrade returns no performance report.
  const holdSnapsScoped = acctFilter === "all"
    ? holdSnaps : holdSnaps.filter((s) => s.accountId === acctFilter);
  // Performance reports are stored per *connection*, not per account. When
  // the user narrows to a single account we still want any report whose
  // connection owns that account — for the Meitav portfolio (where one
  // connection holds one tracked account) that's exactly what makes the
  // chart light up instead of falling back to local-snapshot-only mode.
  const filteredPerf = acctFilter === "all"
    ? performance
    : performance.filter((p) => state.accounts.some((a) =>
        a.id === acctFilter && a.connectionId === p.connectionId));
  const fullSeriesRaw = acctFilter === "all"
    ? buildEquitySeries(performance, snaps, holdSnaps, conv)
    : buildEquitySeries(filteredPerf, snapsScoped, holdSnapsScoped, conv);
  // SnapTrade reports historical equity going back to whenever the broker
  // first opened the account — often years before the user actually
  // started buying. Anchor the chart to the user's earliest transaction
  // on the in-scope accounts so "ALL" doesn't paint a 10-year line of
  // pretend ownership. Fall back to the unfiltered series when capping
  // would leave the chart empty (brand-new connection with no points yet
  // past that date, or a brokerage that doesn't expose transactions).
  const scopedAcctIdsForTxn = acctFilter === "all"
    ? brkAcctIds : new Set([acctFilter]);
  let firstTxnDate = null;
  for (const t of (state.transactions || [])) {
    if (!scopedAcctIdsForTxn.has(t.accountId)) continue;
    if (!t.date) continue;
    if (firstTxnDate == null || t.date < firstTxnDate) firstTxnDate = t.date;
  }
  const fullSeriesCapped = firstTxnDate
    ? fullSeriesRaw.filter((p) => p.date >= firstTxnDate)
    : fullSeriesRaw;
  const fullSeries = fullSeriesCapped.length ? fullSeriesCapped : fullSeriesRaw;
  const range = state.brkRange || "1Y";
  const series = sliceRange(fullSeries, range);
  const first = series.length ? series[0].value : null;
  const last = series.length ? series[series.length - 1].value : null;
  const periodPct = first ? ((last - first) / Math.abs(first)) * 100 : null;
  const periodAbs = first != null && last != null ? last - first : null;

  // Reporting stats — picked from the timeframe the user selected at the top
  // of the chart. SnapTrade caches every range on each sync (1M/3M/YTD/1Y/
  // ALL) into `byRange`, so flipping a pill is instant. Falls back to the
  // top-level fields when an older cache pre-dates the per-range fetch. Uses
  // the same filteredPerf as the chart so the tile reflects the picked
  // account / connection (otherwise the Meitav portfolio's rate-of-return
  // disappears whenever the user narrows to that account).
  let dividend = 0, haveDividend = false;
  let rateSum = 0, rateCount = 0;
  filteredPerf.forEach((p) => {
    const d = p.data || {};
    const window = (d.byRange && d.byRange[range]) || {
      rateOfReturn: d.rateOfReturn ?? null,
      dividendIncome: d.dividendIncome ?? null,
    };
    if (typeof window.dividendIncome === "number") {
      const v = conv(window.dividendIncome, d.currency);
      if (v != null) { dividend += v; haveDividend = true; }
    }
    if (typeof window.rateOfReturn === "number") {
      rateSum += window.rateOfReturn; rateCount += 1;
    }
  });
  const rateOfReturn = rateCount ? (rateSum / rateCount) * 100 : null;

  // Period-aware gain tile — value + percent computed off the equity-series
  // window the user picked at the top of the chart (1M / 3M / YTD / 1Y / ALL).
  // Replaces the old static "Unrealized gain" tile so the headline gain
  // updates as the user switches timeframes.
  let periodTile;
  if (periodAbs != null) {
    const tone = periodAbs >= 0 ? "good" : "bad";
    const sign = periodAbs >= 0 ? "+" : "−";
    const val = sign + money(Math.abs(periodAbs), displayCur)
      + (periodPct != null
          ? ' <span class="md-tile-aux">'
            + (periodPct >= 0 ? "+" : "") + periodPct.toFixed(2) + "%</span>"
          : "");
    periodTile = statTile(val, "Gain · " + range, tone);
  } else if (haveGain) {
    // Fall back to the all-time cost-basis gain when no series is available.
    periodTile = statTile(money(totalGain, displayCur, true), "Unrealized gain",
      totalGain >= 0 ? "good" : "bad");
  } else {
    periodTile = statTile("—", "Gain · " + range, "");
  }

  // Cost-basis unrealized P&L — the dollar amount the per-row pills add up
  // to. Distinct from the "Gain · <range>" tile (which is series first-vs-
  // last in the picked window) and from "Return on cost" (which shows the
  // same number as a percent). Sums across in-scope holdings.
  const unrealizedTile = haveGain
    ? statTile(
        (totalGain >= 0 ? "+" : "−") + money(Math.abs(totalGain), displayCur),
        "Unrealized P&L",
        totalGain >= 0 ? "good" : "bad",
      )
    : "";
  const tiles = '<div class="md-tiles">'
    + statTile(haveValue ? money(totalValue, displayCur) : "—", "Portfolio value", "")
    + periodTile
    + unrealizedTile
    + statTile(gainPct == null ? "—"
        : (gainPct >= 0 ? "+" : "") + gainPct.toFixed(1) + "%",
        "Return on cost", gainPct == null ? "" : gainPct >= 0 ? "good" : "bad")
    + (rateOfReturn != null
        ? statTile((rateOfReturn >= 0 ? "+" : "") + rateOfReturn.toFixed(1) + "%",
            "Rate of return · " + range, rateOfReturn >= 0 ? "good" : "bad")
        : "")
    + (haveDividend
        ? statTile(money(dividend, displayCur), "Dividends · " + range, "good")
        : "")
    + statTile(String(holdings.length),
        holdings.length === 1 ? "Holding" : "Holdings", "")
    + "</div>";

  // Currency + range pills sit above the chart.
  let baseToggle = "";
  if (ilsRates && nativeCur !== "ILS") {
    const pill = (key, label) => '<button class="ins-pill'
      + ((state.brkBase === key || (key === "native" && state.brkBase !== "ILS")) ? " on" : "")
      + '" data-action="brk-base" data-arg="' + key + '">' + label + "</button>";
    baseToggle = '<div class="ins-toggle">' + pill("native", nativeCur)
      + pill("ILS", "ILS") + "</div>";
  }
  const ranges = ["1M", "3M", "YTD", "1Y", "ALL"];
  const rangePills = '<div class="ins-toggle">' + ranges.map((r) =>
    '<button class="ins-pill' + (range === r ? " on" : "")
    + '" data-action="brk-range" data-arg="' + r + '">' + r + "</button>").join("") + "</div>";

  let trendCard;
  if (series.length >= 2) {
    const down = periodPct != null && periodPct < 0;
    const pill = periodPct == null ? ""
      : '<span class="md-trend ' + (down ? "bad" : "good") + '">'
        + (down ? "↓ " : "↑ ") + Math.abs(periodPct).toFixed(2) + "% · "
        + money(Math.abs(periodAbs), displayCur) + "</span>";
    trendCard = '<div class="card"><div class="md-head">'
      + '<span class="md-month">Value over time</span>' + pill + "</div>"
      + '<div class="brk-ctrl">' + rangePills + baseToggle + "</div>"
      + lineChart(series, displayCur, { tone: down ? "bad" : "good" }) + "</div>";
  } else if (fullSeries.length >= 1) {
    trendCard = '<div class="card"><div class="md-head">'
      + '<span class="md-month">Value over time</span></div>'
      + '<div class="brk-ctrl">' + rangePills + baseToggle + "</div>"
      + '<div class="lc-empty">Only one data point so far — the line draws '
      + "itself in once two syncs have landed in this window.</div></div>";
  } else {
    trendCard = '<div class="card"><div class="label">Value over time</div>'
      + '<div class="ins-sub">SnapTrade returned no historical equity data. '
      + "It is built up locally on every sync — hit <b>↻ Sync</b> a few times "
      + "to populate the graph.</div></div>";
  }

  // Account filter pills — only meaningful when there's more than one.
  let acctFilterRow = "";
  if (brkAccts.length > 1) {
    const pill = (id, label) => '<button class="brk-acct-pill'
      + (acctFilter === id ? " on" : "")
      + '" data-action="brk-account" data-arg="' + esc(id) + '">'
      + esc(label) + "</button>";
    acctFilterRow = '<div class="brk-acct-row">' + pill("all", "All accounts")
      + brkAccts.map((a) =>
          pill(a.id, a.label || ("Account " + a.accountNumber))).join("")
      + "</div>";
  }

  // Inception-date control — only when a specific account is in focus, since
  // it's a per-account setting. Lets the user pin "this is when I actually
  // started" so the chart's ALL range stops painting Yahoo's pretend history
  // from a decade ago.
  let inceptionRow = "";
  if (acctFilter !== "all") {
    const focused = brkAccts.find((a) => a.id === acctFilter);
    if (focused) {
      const value = focused.inceptionDate || "";
      inceptionRow = '<div class="brk-inception-row">'
        + '<label class="brk-inception-label">'
        + 'Investment start (since when "ALL" counts):'
        + '<input type="date" class="brk-inception-input" value="'
        + esc(value) + '" '
        + 'data-action="brk-inception" data-arg="' + esc(focused.id) + '" />'
        + (value ? '<button class="brk-inception-clear" '
          + 'data-action="brk-inception-clear" data-arg="' + esc(focused.id)
          + '" title="Clear">×</button>' : '')
        + '</label>'
        + (value
          ? '<span class="brk-inception-hint">Synthetic backfill before this '
            + 'date is hidden.</span>'
          : '<span class="brk-inception-hint">Until set, the chart shows '
            + 'whatever the price source returns (Yahoo: up to 10 years).</span>')
        + '</div>';
    }
  }

  return tiles + trendCard + acctFilterRow + inceptionRow
    + holdingsPanel(holdings, holdSnaps, conv, useIls, displayCur,
        haveValue ? totalValue : null, acctsInScope.length, range);
}

// --- Holdings panel --------------------------------------------------------

// Builds the consolidated holdings allocation card. Each row is clickable;
// the expanded state shows a stats grid and a per-holding sparkline. One
// flat list, sorted by value — the per-account filter pills at the top of
// the panel already let the user narrow to a single provider.
function holdingsPanel(holdings, holdSnaps, conv, useIls, displayCur, totalValue, acctCount, range) {
  // Consolidate by symbol across accounts in scope, carrying every
  // contributing accountId so the per-holding sparkline can pull its history.
  const bySym = {};
  holdings.forEach((h) => {
    const s = holdingStats(h);
    const e = bySym[h.symbol] || (bySym[h.symbol] = {
      symbol: h.symbol, description: h.description, units: 0,
      value: 0, cost: 0, gain: 0, price: h.price, currency: h.currency,
      haveGain: false, accountIds: [],
    });
    e.units += h.units;
    if (s.value != null) e.value += s.value;
    if (s.cost != null) e.cost += s.cost;
    if (s.gain != null) { e.gain += s.gain; e.haveGain = true; }
    e.accountIds.push(h.accountId);
  });
  const rows = Object.keys(bySym).map((k) => bySym[k])
    .sort((a, b) => b.value - a.value);
  const allocTotal = rows.reduce((sum, r) => sum + r.value, 0);

  const total = totalValue != null ? totalValue
    : rows.reduce((sum, r) => {
        const v = conv(r.value, r.currency);
        return sum + (v == null ? 0 : v);
      }, 0);

  // Card header: title + portfolio total + count.
  let head = '<div class="hp-head"><div><div class="label">Holdings</div>'
    + '<div class="hp-sub">' + rows.length + " position"
    + (rows.length === 1 ? "" : "s") + " across "
    + acctCount + " account" + (acctCount === 1 ? "" : "s") + "</div></div>"
    + '<div class="hp-totals"><div class="hp-total-val">'
    + money(total, displayCur) + "</div>"
    + '<div class="hp-total-cap">Portfolio total</div></div></div>';

  let body;
  if (!rows.length) {
    body = '<div class="empty" style="padding:14px 2px">No positions yet — '
      + "your broker may still be syncing holdings (give it a few minutes "
      + "after linking). Hit <b>↻ Sync</b> on the connection and try again."
      + "</div>";
  } else {
    body = '<div class="hp-list">' + rows.map((r, idx) =>
      holdingRow(r, idx, allocTotal, holdSnaps, conv, useIls, displayCur, range)).join("")
      + "</div>";
  }
  return '<div class="card hp-card">' + head + body + "</div>";
}

function holdingRow(r, idx, allocTotal, holdSnaps, conv, useIls, displayCur, range) {
  const open = state.brkOpenHolding === r.symbol;
  const pct = allocTotal ? (r.value / allocTotal) * 100 : 0;
  const gPct = r.haveGain && r.cost ? (r.gain / Math.abs(r.cost)) * 100 : null;
  const gCls = gPct == null ? "flat" : gPct >= 0 ? "good" : "bad";
  const shownVal = conv(r.value, r.currency);
  const shownCur = useIls && shownVal != null && shownVal !== r.value
    ? "ILS" : r.currency;
  const shownGain = conv(r.gain, r.currency);
  const gainCur = useIls && shownGain != null && shownGain !== r.gain
    ? "ILS" : r.currency;

  // Coloured dot keys this row to its segment in the (future) allocation bar.
  const dotColor = holdingColor(idx);
  const gainPill = gPct == null ? "" : '<span class="hp-gain ' + gCls + '">'
    + (gPct >= 0 ? "▲" : "▼") + " " + Math.abs(gPct).toFixed(2) + "%"
    + (shownGain != null ? ' <span class="hp-gain-abs">'
        + money(Math.abs(shownGain), gainCur) + "</span>" : "")
    + "</span>";

  const head = '<button class="hp-row' + (open ? " open" : "")
    + '" data-action="brk-hold" data-arg="' + esc(r.symbol) + '">'
    + '<span class="hp-dot" style="background:' + dotColor + '"></span>'
    + '<div class="hp-id"><div class="hp-sym">' + esc(r.symbol) + "</div>"
    + (r.description ? '<div class="hp-name">' + esc(r.description) + "</div>" : "")
    + "</div>"
    + '<div class="hp-bar"><div class="hp-bar-fill" style="width:'
    + Math.max(2, pct) + "%;background:" + dotColor + '"></div></div>'
    + '<div class="hp-figs"><div class="hp-val">' + money(shownVal, shownCur) + "</div>"
    + '<div class="hp-pct">' + pct.toFixed(1) + "%</div></div>"
    + '<div class="hp-gain-wrap">' + gainPill + "</div>"
    + '<span class="hp-chev">' + (open ? "▾" : "▸") + "</span></button>";

  const detail = open
    ? holdingDetail(r, holdSnaps, conv, useIls, displayCur, range) : "";
  return '<div class="hp-item' + (open ? " open" : "") + '">' + head + detail + "</div>";
}

function holdingDetail(r, holdSnaps, conv, useIls, displayCur, range) {
  const avgPrice = r.cost && r.units ? r.cost / r.units : null;
  const shownPrice = conv(r.price, r.currency);
  const shownAvg = conv(avgPrice, r.currency);
  const shownCost = conv(r.cost, r.currency);
  const shownVal = conv(r.value, r.currency);
  const shownGain = conv(r.gain, r.currency);
  const cur = useIls && shownVal != null && shownVal !== r.value ? "ILS" : r.currency;

  const stat = (label, value, tone) =>
    '<div class="hd-stat"><div class="hd-stat-cap">' + esc(label) + "</div>"
    + '<div class="hd-stat-val' + (tone ? " " + tone : "") + '">' + value + "</div></div>";

  // Per-holding sparkline — collected from every account this symbol is held
  // in. The range pill above the chart applies here too, so a "1Y" toggle
  // narrows both the portfolio chart and every position's sparkline.
  const fullSeries = buildHoldingSeries(holdSnaps, r.symbol, r.accountIds,
    conv, r.currency);
  const series = sliceRange(fullSeries, range || "ALL");

  // Period-scoped gain comes from the sliced series; absolute gain still
  // comes from cost basis (all-time). Two complementary numbers.
  let periodGain = null, periodPct = null;
  if (series.length >= 2) {
    periodGain = series[series.length - 1].value - series[0].value;
    if (series[0].value) periodPct = (periodGain / Math.abs(series[0].value)) * 100;
  }
  const periodTone = periodGain == null ? ""
    : periodGain >= 0 ? "good" : "bad";
  const periodVal = periodGain == null ? "—"
    : (periodGain >= 0 ? "+" : "−") + money(Math.abs(periodGain), cur)
      + (periodPct != null
          ? ' <span class="md-tile-aux">' + (periodPct >= 0 ? "+" : "")
            + periodPct.toFixed(2) + "%</span>"
          : "");

  const gainTone = r.gain == null ? "" : r.gain >= 0 ? "good" : "bad";
  const stats = '<div class="hd-stats">'
    + stat("Units", fmtUnits(r.units))
    + stat("Last price", shownPrice == null ? "—" : money(shownPrice, cur))
    + stat("Avg cost", shownAvg == null ? "—" : money(shownAvg, cur))
    + stat("Market value", shownVal == null ? "—" : money(shownVal, cur))
    + stat("Total cost", shownCost == null ? "—" : money(shownCost, cur))
    + stat("Gain · " + (range || "ALL"), periodVal, periodTone)
    + stat("Unrealized · ALL",
        shownGain == null ? "—" : money(shownGain, cur, true), gainTone)
    + "</div>";

  // Attach per-point extras to the sparkline so the hover tooltip shows
  // price + units alongside the market-value figure.
  const seriesWithExtras = series.map((p) => {
    const extras = [];
    if (typeof p.price === "number") extras.push(["Price", money(p.price, cur)]);
    if (typeof p.units === "number") extras.push(["Units", fmtUnits(p.units)]);
    return extras.length ? Object.assign({}, p, { extras }) : p;
  });

  const chart = series.length >= 2
    ? lineChart(seriesWithExtras, cur, { tone: periodTone || gainTone || "good",
        height: 160, showAxis: true })
    : (fullSeries.length >= 1
        ? '<div class="hd-empty">No data in this window — try ALL.</div>'
        : '<div class="hd-empty">Per-position history starts collecting today — '
          + "the sparkline appears after a couple of syncs.</div>");

  return '<div class="hp-detail">' + stats
    + '<div class="hd-chart-wrap">' + chart + "</div></div>";
}

// Picks a stable colour for a holding by its rank. Brighter for the top
// positions so the allocation reads at a glance.
const HOLDING_PALETTE = ["#7c83ff", "#3dcd84", "#fcb932", "#f896c8",
  "#5fb0ff", "#74d0c2", "#ffb74d", "#c2b3ff", "#ff8a76", "#a0a6ff"];
function holdingColor(idx) {
  return HOLDING_PALETTE[idx % HOLDING_PALETTE.length];
}

// Builds a per-holding equity series by summing this symbol's daily value
// across every account it sits in. Currency conversion happens on each point.
function buildHoldingSeries(holdSnaps, symbol, accountIds, conv, currency) {
  const ids = new Set(accountIds);
  // Per-account inception cap — clip snapshots before the account's user-set
  // inception date so the sparkline obeys the same "since I started" rule as
  // the main equity chart. A holding can span multiple accounts; each one's
  // contribution gets clipped to its own inception.
  const inceptionByAcct = {};
  (state.accounts || []).forEach((a) => {
    if (a.inceptionDate) inceptionByAcct[a.id] = a.inceptionDate;
  });
  const byDate = {};
  holdSnaps.forEach((s) => {
    if (s.symbol !== symbol || !ids.has(s.accountId)) return;
    const cap = inceptionByAcct[s.accountId];
    if (cap && s.date < cap) return;
    const v = conv(s.value, s.currency || currency);
    if (v == null) return;
    const e = byDate[s.date] || (byDate[s.date] = {
      value: 0, units: 0, price: null, priceCur: s.currency || currency,
    });
    e.value += v;
    e.units += s.units || 0;
    // Price is per-share — when a symbol sits in multiple accounts they all
    // see the same close, so keep the first non-null we see.
    if (e.price == null && typeof s.price === "number") e.price = s.price;
  });
  return Object.keys(byDate).sort().map((d) => {
    const e = byDate[d];
    return {
      date: d, value: e.value, units: e.units,
      price: e.price != null ? conv(e.price, e.priceCur) : null,
    };
  });
}

// Picks the equity series the chart should draw. SnapTrade's reporting API
// is the source of truth when available — it returns daily values going back
// years on the very first sync. Hon's own snapshots (one per sync) are the
// fallback when SnapTrade returned no history (e.g. brokerage still syncing).
// Picks the equity series the chart should draw, in fidelity order:
//   1) SnapTrade's `getReportingCustomRange` (rich, daily, years back).
//   2) Per-holding daily snapshots (Yahoo Finance backfill — units × close
//      reconstructed per date, summed across positions with forward-fill so
//      non-trading days don't drop positions off the running total).
//   3) Hon's own per-sync account_value_snapshots (sparse, one per sync).
function buildEquitySeries(performance, snaps, holdSnaps, conv) {
  // 1) SnapTrade performance — connection-scope, sums across all accounts.
  let havePerformance = false;
  const fromPerf = {};
  performance.forEach((p) => {
    const pts = (p.data && p.data.totalEquity) || [];
    if (pts.length) havePerformance = true;
    const pcur = (p.data && p.data.currency) || "USD";
    pts.forEach((pt) => {
      const v = conv(pt.value, pt.currency || pcur);
      if (v == null) return;
      fromPerf[pt.date] = (fromPerf[pt.date] || 0) + v;
    });
  });
  if (havePerformance) {
    return Object.keys(fromPerf).sort()
      .map((d) => ({ date: d, value: fromPerf[d] }));
  }

  // 2) Per-holding snapshots — forward-fill each (account, symbol) so a
  //    missing day doesn't tank the running portfolio total. These come from
  //    the price-history backfill (Yahoo Finance / Maya), which paints a
  //    *hypothetical* "what if you'd always held these units" curve. To stop
  //    ALL from showing 10 years of pretend history before the account
  //    actually existed, cap the series to when Hon first saw the account
  //    locally (the earliest entry in `snaps`). Sources with real provider-
  //    reported history (SnapTrade reports, Meitav GetTsuot) take path (1)
  //    above and aren't affected.
  if (holdSnaps && holdSnaps.length) {
    // Inception cap: when an account has a per-account inception date set
    // (via the brokerage settings — see /accounts/:id/inception PATCH),
    // clip synthetic Yahoo backfill before that date. Without it we don't
    // know when the user actually started investing, so the full backfill
    // stands. ALL ends up matching whatever the source goes back to —
    // pretend-history for Yahoo, real history for SnapTrade / Meitav.
    let earliestRealSnap = null;
    // Only consider accounts whose holdings actually feed this series — for
    // a per-account filter, that means just the one focused account.
    const acctIdsInSeries = new Set(holdSnaps.map((s) => s.accountId));
    const inceptionDates = (state.accounts || [])
      .filter((a) => acctIdsInSeries.has(a.id) && a.inceptionDate)
      .map((a) => a.inceptionDate);
    if (inceptionDates.length) {
      // Cap at the *earliest* inception across in-scope accounts so a multi-
      // account portfolio still shows the full joint history.
      earliestRealSnap = inceptionDates
        .reduce((m, d) => d < m ? d : m, inceptionDates[0]);
    }
    const bySym = {};
    holdSnaps.forEach((s) => {
      const v = conv(s.value, s.currency);
      if (v == null) return;
      const k = s.accountId + ":" + s.symbol;
      (bySym[k] = bySym[k] || []).push({ date: s.date, value: v });
    });
    const keys = Object.keys(bySym);
    keys.forEach((k) => bySym[k].sort((a, b) => a.date.localeCompare(b.date)));
    const dateSet = new Set();
    keys.forEach((k) => bySym[k].forEach((p) => dateSet.add(p.date)));
    const dates = Array.from(dateSet).sort()
      .filter((d) => earliestRealSnap == null || d >= earliestRealSnap);
    const cur = {};
    keys.forEach((k) => { cur[k] = 0; });
    const out = [];
    for (const d of dates) {
      let sum = 0, any = false;
      for (const k of keys) {
        const arr = bySym[k];
        while (cur[k] + 1 < arr.length && arr[cur[k] + 1].date <= d) cur[k] += 1;
        if (arr[cur[k]].date <= d) { sum += arr[cur[k]].value; any = true; }
      }
      if (any) out.push({ date: d, value: sum });
    }
    if (out.length) return out;
  }

  // 3) Account-level snapshots — Hon's per-sync fallback.
  const byDate = {};
  snaps.forEach((s) => {
    const v = conv(s.value, s.currency);
    if (v == null) return;
    byDate[s.date] = (byDate[s.date] || 0) + v;
  });
  return Object.keys(byDate).sort()
    .map((d) => ({ date: d, value: byDate[d] }));
}

// Filters an equity series down to a preset window: 1M / 3M / YTD / 1Y / ALL.
function sliceRange(series, range) {
  if (!series.length || range === "ALL") return series;
  const now = new Date();
  let cutoff;
  if (range === "YTD") {
    cutoff = new Date(now.getFullYear(), 0, 1);
  } else {
    const months = range === "1M" ? 1 : range === "3M" ? 3 : 12;
    cutoff = new Date(now);
    cutoff.setMonth(cutoff.getMonth() - months);
  }
  const iso = cutoff.toISOString().slice(0, 10);
  const inside = series.filter((p) => p.date >= iso);
  // When the in-window slice has < 2 points (Meitav's monthly cadence in 1M /
  // 3M, a freshly-linked SnapTrade with one snapshot, etc.) the chart shows
  // "only one data point so far". Anchor it to the last point *before* the
  // window so the line draws from a known starting position. The since-start
  // diff stays meaningful — `first` becomes that anchor.
  if (inside.length >= 2) return inside;
  const before = series.filter((p) => p.date < iso);
  if (!before.length) return inside;
  const anchor = before[before.length - 1];
  return [anchor, ...inside];
}

// SVG line + area chart with hover crosshair and tooltip. The line draws
// itself on mount; the area fades in behind. Points are sampled into pixel
// coordinates server-side so the hover handler can find the nearest one in
// O(1) without parsing the SVG.
let lcUid = 0;
function lineChart(series, cur, opts) {
  opts = opts || {};
  const height = opts.height || 220;
  const tone = opts.tone || "good";
  const showAxis = opts.showAxis !== false;
  const W = 1000, H = 240; // viewBox units; preserveAspectRatio="none" stretches
  const max = series.reduce((m, p) => Math.max(m, p.value), -Infinity);
  const min = series.reduce((m, p) => Math.min(m, p.value), +Infinity);
  const flat = max === min;
  const range = flat ? 1 : max - min;
  const pad = 14;
  const xAt = (i) => series.length > 1 ? (i / (series.length - 1)) * W : W / 2;
  // Flat series (every point identical) centers; otherwise scale linearly
  // between min/max with a little top/bottom padding.
  const yAt = (v) => flat ? H / 2 : H - pad - ((v - min) / range) * (H - pad * 2);

  // Catmull-Rom-to-cubic-bezier smoothing turns the jagged daily line into a
  // soft curve — the same kind of chart Robinhood / Wealthfront use. The math
  // is straightforward: each cubic uses the two surrounding control points to
  // pick its handles, with `tension` controlling how taut the curve feels.
  function smoothPath() {
    if (series.length < 2) {
      const x = xAt(0), y = yAt(series[0].value);
      return "M" + x + " " + y;
    }
    const pts = series.map((p, i) => ({ x: xAt(i), y: yAt(p.value) }));
    const tension = 0.18;
    let d = "M" + pts[0].x.toFixed(2) + " " + pts[0].y.toFixed(2);
    for (let i = 0; i < pts.length - 1; i += 1) {
      const p0 = pts[i - 1] || pts[i];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[i + 2] || p2;
      const c1x = p1.x + (p2.x - p0.x) * tension;
      const c1y = p1.y + (p2.y - p0.y) * tension;
      const c2x = p2.x - (p3.x - p1.x) * tension;
      const c2y = p2.y - (p3.y - p1.y) * tension;
      d += " C" + c1x.toFixed(2) + " " + c1y.toFixed(2)
        + " " + c2x.toFixed(2) + " " + c2y.toFixed(2)
        + " " + p2.x.toFixed(2) + " " + p2.y.toFixed(2);
    }
    return d;
  }
  const line = smoothPath();
  const area = line + " L" + W + " " + H + " L0 " + H + " Z";

  const uid = "lc" + (++lcUid);
  const color = tone === "bad" ? "var(--chart-down)" : "var(--chart-up)";
  const glow = tone === "bad" ? "var(--chart-down-glow)" : "var(--chart-up-glow)";

  // Embed per-point positions for the hover handler, plus a parallel JSON
  // array carrying value/date/extras (price, units, change-since-start, …).
  // Two channels keeps the hot-path split/parse cheap while still allowing
  // rich content in the tooltip.
  const firstValue = series.length ? series[0].value : 0;
  const pts = series.map((p, i) => {
    const xp = series.length > 1 ? (i / (series.length - 1)) * 100 : 50;
    const yp = (yAt(p.value) / H) * 100;
    return xp.toFixed(3) + "," + yp.toFixed(3);
  }).join(";");
  const meta = JSON.stringify(series.map((p) => {
    const extras = (p.extras || []).slice();
    // Auto "Change from start" extra — meaningful for every chart with at
    // least two points; gives the hover an at-a-glance period context.
    if (series.length > 1 && firstValue) {
      const change = p.value - firstValue;
      const pct = (change / Math.abs(firstValue)) * 100;
      const sign = change >= 0 ? "+" : "−";
      extras.push(["Since start",
        sign + money(Math.abs(change), cur) + " · "
        + (change >= 0 ? "+" : "") + pct.toFixed(2) + "%",
        change >= 0 ? "good" : "bad"]);
    }
    return { v: p.value, d: p.date, e: extras };
  }));

  // Faint horizontal grid lines for value reference. Four bands feels right
  // without crowding the chart.
  let grid = "";
  for (let i = 1; i < 5; i += 1) {
    const y = (H / 5) * i;
    grid += '<line x1="0" x2="' + W + '" y1="' + y + '" y2="' + y
      + '" stroke="var(--chart-grid)" stroke-width="1" '
      + 'vector-effect="non-scaling-stroke"/>';
  }

  const axis = showAxis
    ? '<div class="lc-axis"><span>' + fmtDate(series[0].date) + "</span><span>"
      + fmtDate(series[series.length - 1].date) + "</span></div>"
    : "";

  // Soft drop-shadow under the stroke so the line lifts off the card. A
  // <filter> in the SVG defs handles it; matches the chart's tone colour.
  const filter = '<filter id="' + uid + 'f" x="-10%" y="-30%" width="120%" height="160%">'
    + '<feGaussianBlur stdDeviation="3.5" />'
    + '<feComponentTransfer><feFuncA type="linear" slope="0.7"/></feComponentTransfer>'
    + "</filter>";

  return '<div class="lc-wrap" id="' + uid + '" data-cur="' + esc(cur)
    + '" data-pts="' + esc(pts) + '" data-meta="' + esc(meta)
    + '" style="height:' + height
    + 'px" onmousemove="chartHover(this,event)" onmouseleave="chartLeave(this)" '
    + 'ontouchmove="chartHover(this,event)" ontouchend="chartLeave(this)">'
    + '<svg class="lc-svg lc-' + tone + '" viewBox="0 0 ' + W + " " + H
    + '" preserveAspectRatio="none">'
    + "<defs>" + filter
    + '<linearGradient id="' + uid + 'g" x1="0" y1="0" x2="0" y2="1">'
    + '<stop offset="0%" stop-color="' + color + '" stop-opacity="0.55"/>'
    + '<stop offset="55%" stop-color="' + color + '" stop-opacity="0.18"/>'
    + '<stop offset="100%" stop-color="' + color + '" stop-opacity="0"/>'
    + "</linearGradient></defs>"
    + "<g>" + grid + "</g>"
    + '<path class="lc-glow" d="' + line + '" fill="none" stroke="' + glow
    + '" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" '
    + 'filter="url(#' + uid + 'f)" vector-effect="non-scaling-stroke"/>'
    + '<path class="lc-area" d="' + area + '" fill="url(#' + uid + 'g)"/>'
    + '<path class="lc-line" d="' + line + '" fill="none" stroke="' + color
    + '" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" '
    + 'pathLength="1000" vector-effect="non-scaling-stroke"/>'
    + "</svg>"
    + '<div class="lc-cross"></div>'
    + '<div class="lc-dot lc-' + tone + '"><span class="lc-dot-pulse"></span></div>'
    + '<div class="lc-tip lc-' + tone + '">'
    + '<div class="lc-tip-val"></div>'
    + '<div class="lc-tip-date"></div>'
    + '<div class="lc-tip-extras"></div>'
    + "</div>"
    + "</div>" + axis;
}

// Moves the crosshair, dot and tooltip to the nearest data point under the
// cursor. Called from inline mousemove/touchmove for zero extra binding work.
// Positions live in `data-pts` (cheap split/parse); rich tooltip content
// (value, date, extras) is parsed once from `data-meta` and cached.
function chartHover(wrap, evt) {
  if (!wrap.dataset.pts) return;
  // Cache the parsed point array per wrapper to keep mousemove cheap.
  let cache = wrap._lc;
  if (!cache) {
    cache = wrap._lc = {
      pts: wrap.dataset.pts.split(";").map((s) => {
        const p = s.split(",");
        return { xp: +p[0], yp: +p[1] };
      }),
      meta: JSON.parse(wrap.dataset.meta || "[]"),
    };
  }
  const cur = wrap.dataset.cur || "";
  const rect = wrap.getBoundingClientRect();
  const clientX = evt.touches && evt.touches[0]
    ? evt.touches[0].clientX : evt.clientX;
  const xPct = ((clientX - rect.left) / rect.width) * 100;
  let bestI = -1, bestD = Infinity;
  for (let i = 0; i < cache.pts.length; i += 1) {
    const d = Math.abs(cache.pts[i].xp - xPct);
    if (d < bestD) { bestD = d; bestI = i; }
  }
  if (bestI < 0) return;
  const pt = cache.pts[bestI];
  const m = cache.meta[bestI] || {};
  const cross = wrap.querySelector(".lc-cross");
  const dot = wrap.querySelector(".lc-dot");
  const tip = wrap.querySelector(".lc-tip");
  cross.style.left = pt.xp + "%"; cross.classList.add("on");
  dot.style.left = pt.xp + "%"; dot.style.top = pt.yp + "%";
  dot.classList.add("on");
  tip.style.left = pt.xp + "%"; tip.classList.add("on");
  tip.querySelector(".lc-tip-val").textContent = money(m.v, cur);
  tip.querySelector(".lc-tip-date").textContent = fmtDate(m.d);
  // Extras: each entry is [label, value, optionalTone].
  const extrasEl = tip.querySelector(".lc-tip-extras");
  if (m.e && m.e.length) {
    extrasEl.innerHTML = m.e.map((row) => {
      const tone = row[2] ? " " + row[2] : "";
      return '<div class="lc-tip-row"><span class="lc-tip-k">'
        + esc(row[0]) + '</span><span class="lc-tip-v' + tone + '">'
        + esc(row[1]) + "</span></div>";
    }).join("");
    extrasEl.style.display = "";
  } else {
    extrasEl.innerHTML = "";
    extrasEl.style.display = "none";
  }
  // Flip the tooltip to the right/left edge when it would overflow.
  tip.classList.toggle("right", pt.xp > 80);
  tip.classList.toggle("left", pt.xp < 20);
}
function chartLeave(wrap) {
  wrap.querySelectorAll(".on").forEach((el) => el.classList.remove("on"));
}

// One billing cycle's spend breakdown — category split, transaction count and
// the single biggest expense — filtered the same way as cycleSpending so it
// matches the headline figure.
function monthMetrics(key) {
  const byCat = {};
  let biggest = null;
  let count = 0;
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || isCardTotal(t) || t.refundForId) return;
    if (cycleKey(t.date) !== key) return;
    count += 1;
    const amt = t.amount + txnRefundAmount(t);
    if (amt >= 0) return;
    const spent = -amt;
    const cat = t.category || "Other";
    byCat[cat] = (byCat[cat] || 0) + spent;
    if (!biggest || spent > biggest.amount) {
      biggest = { amount: spent, desc: t.description, date: t.date, cat: cat };
    }
  });
  const cats = Object.keys(byCat)
    .map((c) => ({ category: c, amount: byCat[c] }))
    .sort((x, y) => y.amount - x.amount);
  return { count: count, cats: cats, biggest: biggest };
}

// The drill-down card for one selected month: a headline trend, four stat
// tiles, the category breakdown, and the biggest single expense.
function monthDetailCard(months, sel) {
  const idx = months.findIndex((m) => m.month === sel);
  const m = months[idx];
  const prev = idx > 0 ? months[idx - 1] : null;
  const net = m.income - m.spending;
  const det = monthMetrics(sel);
  const stats = categoryStats();

  // Headline pills: this cycle's spending vs the previous cycle and vs the
  // trailing average.
  const pctPill = (base, label) => {
    if (base == null || base <= 0) return "";
    const pct = ((m.spending - base) / base) * 100;
    const down = pct < 0;
    return '<span class="md-trend ' + (down ? "good" : "bad") + '">'
      + (down ? "↓ " : "↑ ") + Math.abs(pct).toFixed(0) + "% " + label + "</span>";
  };
  let trend = pctPill(prev ? prev.spending : null,
      prev ? "vs " + cycleLabel(prev.month).split(" ")[0] : "")
    + pctPill(stats.avgTotal, "vs avg");
  if (!trend) trend = '<span class="md-trend flat">earliest month</span>';

  const tiles = '<div class="md-tiles">'
    + statTile(money(m.spending, "ILS"), "Spent", "bad")
    + statTile(money(m.income, "ILS"), "Income", "good")
    + statTile(money(Math.abs(net), "ILS"), net >= 0 ? "Saved" : "Overspent",
        net >= 0 ? "good" : "bad")
    + statTile(String(det.count),
        det.count === 1 ? "Transaction" : "Transactions", "")
    + "</div>";

  let breakdown = '<div class="md-label">Where it went</div>';
  if (det.cats.length) {
    const top = det.cats.slice(0, 6);
    const max = top[0].amount || 1;
    const total = det.cats.reduce((s, c) => s + c.amount, 0) || 1;
    breakdown += top.map((c) => {
      const st = catStyle(c.category);
      const w = Math.max(5, Math.round((c.amount / max) * 100));
      const pct = Math.round((c.amount / total) * 100);
      const hist = stats.byCatCycle[c.category];
      const prevAmt = prev && hist ? hist[idx - 1] : null;
      const deltas = deltaChip(c.amount, prevAmt, "vs last")
        + deltaChip(c.amount, stats.avgByCat[c.category], "vs avg");
      return '<div class="md-cat">'
        + '<span class="md-cat-ico" style="background:' + st[1] + '22">'
        + st[0] + "</span>"
        + '<div class="md-cat-main"><div class="md-cat-top">'
        + '<span class="md-cat-name">' + esc(c.category) + "</span>"
        + '<span class="md-cat-amt">' + money(c.amount, "ILS") + "</span></div>"
        + '<div class="md-cat-track"><div class="md-cat-fill" style="width:'
        + w + "%;background:" + st[1] + '"></div></div>'
        + (deltas ? '<div class="md-cat-d">' + deltas + "</div>" : "")
        + "</div>"
        + '<span class="md-cat-pct">' + pct + "%</span></div>";
    }).join("");
  } else {
    breakdown += '<div class="empty" style="padding:6px 0">'
      + "No spending recorded this month.</div>";
  }

  let big = "";
  if (det.biggest) {
    const st = catStyle(det.biggest.cat);
    big = '<div class="md-big">'
      + '<span class="md-big-ico" style="background:' + st[1] + '22">'
      + st[0] + "</span>"
      + '<div class="md-big-main"><div class="md-big-cap">Biggest expense</div>'
      + '<div class="md-big-desc">' + esc(det.biggest.desc || det.biggest.cat)
      + "</div></div><div>"
      + '<div class="md-big-amt">' + money(det.biggest.amount, "ILS") + "</div>"
      + '<div class="md-big-date">' + fmtDate(det.biggest.date) + "</div>"
      + "</div></div>";
  }

  const viewBtn = '<button class="block" data-action="view-month-activity"'
    + ' data-arg="' + sel + '" style="margin-top:14px">'
    + "View transactions</button>";

  return '<div class="card"><div class="md-head">'
    + '<span class="md-month">' + cycleLabel(sel) + "</span>" + trend
    + "</div>" + tiles + breakdown + big + viewBtn + "</div>";
}

function statTile(value, label, tone) {
  return '<div class="md-tile"><div class="md-tile-val' + (tone ? " " + tone : "")
    + '">' + value + '</div><div class="md-tile-cap">' + label + "</div></div>";
}

const AI_ICON = { win: "🎉", watch: "⚠️", trend: "📈", tip: "💡", info: "✨" };
const AI_TAGS = { WIN: "win", WATCH: "watch", TREND: "trend", TIP: "tip" };

// The AI analysis card: a shimmer while the model runs, then one coloured
// card per tagged insight line.
function aiInsightsCard(ins) {
  const generating = ins && ins.state === "generating";
  const ready = ins && ins.state === "ready" && ins.text;
  const btn = '<button class="mini primary" data-action="generate-insights"'
    + (generating ? " disabled" : "") + ">"
    + (ready ? "Regenerate" : "Generate") + "</button>";
  const head = '<div class="ai-head"><div class="label">AI analysis</div>'
    + '<span class="spacer"></span>' + btn + "</div>";

  let body;
  if (generating) {
    body = '<div class="ai-skel"><div class="ai-skel-row"></div>'
      + '<div class="ai-skel-row"></div><div class="ai-skel-row"></div>'
      + '<div class="ai-skel-row"></div></div>';
  } else if (ready) {
    const cards = parseInsights(ins.text);
    body = cards.length
      ? '<div class="ai-list">' + cards.map((c, i) =>
          '<div class="ai-card ' + c.kind + '" style="animation-delay:'
          + (i * 70) + 'ms"><span class="ai-ico">' + AI_ICON[c.kind]
          + '</span><span class="ai-text">' + esc(c.text)
          + "</span></div>").join("") + "</div>"
      : '<div class="ai-empty">' + esc(ins.text) + "</div>";
  } else if (ins && ins.state === "error") {
    body = '<div class="ai-empty">' + esc(ins.message) + "</div>";
  } else {
    body = '<div class="ai-empty">No analysis yet — tap Generate for an AI '
      + "read on this month's spending, budgets and trends.</div>";
  }
  return '<div class="card">' + head + body + "</div>";
}

// Splits the model's tagged lines into styled insight cards; falls back to
// keyword sentiment when a line carries no explicit WIN/WATCH/TREND/TIP tag.
function parseInsights(text) {
  return String(text).split(/\n+/).map((raw) => {
    const s = raw.trim().replace(/^[-•*\d.)\s]+/, "").trim();
    if (!s) return null;
    const m = s.match(/^([A-Za-z]{3,6})\s*[:.—-]\s+(.+)$/);
    if (m && AI_TAGS[m[1].toUpperCase()]) {
      return { kind: AI_TAGS[m[1].toUpperCase()], text: m[2].trim() };
    }
    return { kind: inferInsightKind(s), text: s };
  }).filter(Boolean);
}

function inferInsightKind(s) {
  const t = s.toLowerCase();
  if (/over budget|overspent|overspend|exceeded|spike|jumped|climbed|increase|higher|rose|watch out/.test(t))
    return "watch";
  if (/under budget|saved|still left|on track|good job|well done|nicely|great|dropped|reduced|lower than|less than/.test(t))
    return "win";
  if (/try |consider|could |suggest|recommend|set a budget|cut back|aim to/.test(t))
    return "tip";
  return "trend";
}

// A subscription counts as active while it has charged within the last ~month;
// once a full billing cycle passes with no charge it is probably cancelled.
const SUB_ACTIVE_DAYS = 40;

// Asks the engine which lapsed subscriptions are renamed versions of active
// ones. Cached by name set, so the on-device model runs only when it changes;
// if the model is still loading the lookup is left to retry on a later render.
function ensureSubAliases(activeNames, deadNames) {
  if (!activeNames.length || !deadNames.length) return;
  const sig = JSON.stringify([activeNames.slice().sort(), deadNames.slice().sort()]);
  if (state.subAliasSig === sig || state.subAliasBusy) return;
  state.subAliasBusy = true;
  api("/subscriptions/aliases", "POST", { active: activeNames, dead: deadNames })
    .then((r) => {
      if (r && r.ready) {
        state.subAliases = r.aliases || {};
        state.subAliasSig = sig;
        state.subAliasBusy = false;
        if (state.tab === "subscriptions") render();
        return;
      }
      state.subAliasBusy = false; // model not ready — retry on a later render
    })
    .catch(() => { state.subAliasBusy = false; });
}

// Visualises the fixed-bill merchants that make up the "Expected fixed"
// figure on the Overview card. Same per-merchant rollup the budget engine
// uses: a fixed-category merchant counts as recurring once it has charged
// in two or more cycles (or the user has set a frequency on it). Each
// charge is reduced to a monthly-equivalent so the totals stack honestly.
// Whether a recurring fixed bill has already charged this cycle, hasn't yet,
// or — for bimonthly / yearly tracks — simply isn't due this cycle. Drives
// the little tag next to each merchant in the Fixed bills view.
function fixedBillStatus(r) {
  const cur = currentCycleKey();
  if (r.cycles && r.cycles[cur]) {
    return { cls: "good", label: "✓ Billed", hint: "Already billed this cycle." };
  }
  const lastCycle = r.last ? cycleKey(r.last.date) : null;
  const gap = lastCycle ? cyclesBetween(lastCycle, cur) : 999;
  if (r.freq === "bimonthly" && gap === 1) {
    return { cls: "muted", label: "Off-cycle",
      hint: "Bimonthly — billed last cycle, not expected this one." };
  }
  if (r.freq === "yearly" && gap >= 1 && gap < 12) {
    const left = 12 - gap;
    return { cls: "muted", label: "Off-cycle",
      hint: "Yearly — next charge in " + left + " cycle" + (left === 1 ? "" : "s") + "." };
  }
  return { cls: "warn", label: "Not yet billed",
    hint: "Expected this cycle but no charge has arrived yet." };
}

function recurringView() {
  const merch = {};
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || isCardTotal(t) || t.refundForId) return;
    if (catGroup(t.category) !== "fixed") return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt >= 0) return;
    const key = merchantKey(t.description);
    const r = merch[key] || (merch[key] = {
      key, cycles: {}, count: 0, lastT: 0,
      charge: 0, last: null,
      desc: merchantName(t.description), category: t.category || "Other",
    });
    r.cycles[cycleKey(t.date)] = true;
    r.count += 1;
    const ts = new Date(t.date).getTime();
    if (ts >= r.lastT) {
      r.lastT = ts; r.charge = -amt; r.last = t;
      r.desc = merchantName(t.description);
      r.category = t.category || r.category;
    }
  });
  const cancelled = state.cancelledSubs || {};
  const rows = Object.values(merch).filter((r) => {
    const freq = state.merchantFreq[r.key];
    if (freq === "ignore") return false; // user removed it from this view
    // A merchant the user marked cancelled in the Subscriptions tab no
    // longer counts as an active fixed bill here — that organization is the
    // source of truth, so the two views agree on what's actually running.
    if (cancelled[r.key]) return false;
    return freq || Object.keys(r.cycles).length >= 2;
  }).map((r) => {
    const freq = state.merchantFreq[r.key] || "monthly";
    // Split lives per CATEGORY now (Utilities ÷ 3 for the whole section,
    // not per merchant) — same divisor applies to every row inside it.
    const split = (state.categorySplits || {})[r.category] || 1;
    const fullMonthly = monthlyEquivalent(r.charge, freq);
    return Object.assign({}, r, {
      freq,
      split,
      fullCharge: r.charge,
      myCharge: r.charge / split,
      fullMonthly,
      monthly: fullMonthly / split,        // user's share — used in every total
    });
  });

  if (!rows.length) {
    return '<div class="sec-head"><div class="label">Fixed bills</div></div>'
      + '<div class="card empty">No recurring fixed bills detected yet. They '
      + "appear here once a fixed-category charge (Housing / Utilities / "
      + "Insurance / Subscriptions / Education / Fees) is seen in two or more "
      + "billing cycles — or once you set a frequency on a charge by hand from "
      + "the transaction editor.</div>";
  }

  const byCat = {};
  rows.forEach((r) => { (byCat[r.category] || (byCat[r.category] = [])).push(r); });
  Object.keys(byCat).forEach((k) => byCat[k].sort((a, b) => b.monthly - a.monthly));

  const totalMonthly = rows.reduce((s, r) => s + r.monthly, 0);
  const FREQ_LABEL = { monthly: "Monthly", bimonthly: "Bimonthly", yearly: "Yearly" };

  // Categories ranked by their combined monthly cost — heaviest first.
  const catOrder = Object.keys(byCat).sort(
    (a, b) => byCat[b].reduce((s, r) => s + r.monthly, 0)
              - byCat[a].reduce((s, r) => s + r.monthly, 0),
  );

  const sections = catOrder.map((cat) => {
    const list = byCat[cat];
    const [em, color] = catStyle(cat);
    const groupTotal = list.reduce((s, r) => s + r.monthly, 0);
    const rowsHtml = list.map((r) => {
      const lastDate = r.last ? fmtDate(r.last.date) : "—";
      const everyN = r.count === 1 ? "1 charge" : r.count + " charges";
      const txnId = (r.last && r.last.id) || "";
      const isShared = r.split > 1;
      const amountCell = isShared
        ? '<div class="rec-amount">' + money(r.monthly, "ILS")
            + '<span class="rec-unit">/mo</span>'
            + '<div class="rec-amount-full">of ' + money(r.fullMonthly, "ILS")
            + "</div></div>"
        : '<div class="rec-amount">' + money(r.monthly, "ILS")
            + '<span class="rec-unit">/mo</span></div>';
      const metaCharge = isShared
        ? money(r.myCharge, "ILS") + " your share · "
          + money(r.fullCharge, "ILS") + " full"
        : money(r.charge, "ILS") + " per charge";
      const status = fixedBillStatus(r);
      const tag = '<span class="rec-tag rec-tag-' + status.cls + '" title="'
        + esc(status.hint) + '">' + esc(status.label) + "</span>";
      return '<div class="rec-row">'
        + '<div class="rec-main" data-txn="' + esc(txnId) + '">'
        + '<div class="rec-name">' + esc(r.desc) + " " + tag + "</div>"
        + '<div class="rec-meta">' + esc(FREQ_LABEL[r.freq] || r.freq)
        + " · " + metaCharge + " · last " + esc(lastDate)
        + " · " + esc(everyN) + "</div></div>"
        + amountCell
        + '<button type="button" class="rec-remove" '
        + 'data-action="ignore-recurring" data-arg="' + esc(r.key) + '" '
        + 'title="Remove from Fixed bills — keeps the underlying transactions, '
        + 'just stops counting this merchant toward Expected fixed" '
        + 'aria-label="Remove">✕</button>'
        + "</div>";
    }).join("");
    // Per-category split (e.g. Utilities ÷ 3 when shared with roommates).
    // Applied to every row in the section; the header pill is the edit
    // affordance. The total shown is the user's share, with the full bill
    // as a small struck-through line when a split is active. (Same total is
    // also shown on the header bar; "Due this cycle" lives lower down.)
    const catSplit = (state.categorySplits || {})[cat] || 1;
    const catShared = catSplit > 1;
    const splitPill = '<button type="button" class="rec-split'
      + (catShared ? " on" : "") + '" data-action="split-category" '
      + 'data-arg="' + esc(cat) + '" title="'
      + (catShared
          ? "You pay 1/" + catSplit + " of every " + cat
            + " bill. Click to change."
          : "Share this category with roommates / partner") + '">÷'
      + catSplit + "</button>";
    const groupFull = list.reduce((s, r) => s + r.fullMonthly, 0);
    const totalCell = catShared
      ? '<span class="rec-cat-total">' + money(groupTotal, "ILS")
        + '<span class="rec-unit">/mo</span>'
        + '<span class="rec-cat-total-full">of '
        + money(groupFull, "ILS") + "</span></span>"
      : '<span class="rec-cat-total">' + money(groupTotal, "ILS")
        + '<span class="rec-unit">/mo</span></span>';
    return '<div class="rec-section">'
      + '<div class="rec-cat-head" style="--cat-color:' + esc(color) + '">'
      + '<span class="rec-cat-icon">' + em + "</span>"
      + '<span class="rec-cat-name">' + esc(cat) + "</span>"
      + '<span class="rec-cat-count">' + list.length + "</span>"
      + splitPill + totalCell + "</div>"
      + '<div class="rec-list">' + rowsHtml + "</div></div>";
  }).join("");

  // Reconcile this page's fixed-only total with the Overview headline
  // Reconciliation with the Overview "Expected fixed + essentials" headline:
  // render an additional Essentials-reserved section — one row per essential
  // category with its reserved amount — so the user can see the full math
  // (fixed merchants + essentials = headline) in actual rows, not just text.
  const essentialLines = ((state.budget && state.budget.essentials) || [])
    .map((l) => ({
      category: l.category,
      budget: l.budget || 0,
      spent: l.spent || 0,
      reserved: Math.max(l.budget || 0, l.spent || 0),
    }))
    .filter((l) => l.reserved > 0)
    .sort((a, b) => b.reserved - a.reserved);
  const essentialsReserved = essentialLines.reduce((s, l) => s + l.reserved, 0);
  const combined = totalMonthly + essentialsReserved;

  let essentialsSection = "";
  if (essentialLines.length) {
    const rowsHtml = essentialLines.map((l) => {
      const [em, color] = catStyle(l.category);
      const over = l.budget > 0 && l.spent > l.budget;
      const meta = l.budget > 0
        ? "Budget " + money(l.budget, "ILS")
            + " · spent " + money(l.spent, "ILS") + " this cycle"
            + (over ? " · over budget" : "")
        : "No budget set · using spend so far (" + money(l.spent, "ILS") + ")";
      return '<div class="rec-row">'
        + '<div class="rec-main">'
        + '<div class="rec-name" style="display:flex;align-items:center;gap:8px">'
        + '<span class="rec-essential-dot" style="background:' + esc(color) + '"></span>'
        + esc(l.category) + "</div>"
        + '<div class="rec-meta">' + esc(meta) + "</div></div>"
        + '<div class="rec-amount">' + money(l.reserved, "ILS")
        + '<span class="rec-unit">/mo</span></div></div>';
    }).join("");
    essentialsSection = '<div class="rec-section rec-section-essentials">'
      + '<div class="rec-cat-head" style="--cat-color:#F2C752">'
      + '<span class="rec-cat-icon">🥗</span>'
      + '<span class="rec-cat-name">Essentials reserved</span>'
      + '<span class="rec-cat-count">' + essentialLines.length + "</span>"
      + '<span class="rec-cat-total">' + money(essentialsReserved, "ILS")
      + '<span class="rec-unit">/mo</span></span></div>'
      + '<div class="rec-list">' + rowsHtml + "</div>"
      + '<div class="rec-section-note">Budgeted per category in Settings — '
      + "not pulled from merchants. The reserved amount is the larger of the "
      + "category budget and what's already been spent this cycle.</div></div>";
  }

  // Two different fixed totals to expose:
  //   1. ACTUAL — fixed-category transactions that actually posted this cycle.
  //      This is what the Overview's "Expected fixed + essentials" uses, so
  //      it's the number that reconciles with the headline.
  //   2. PROJECTED — sum of each merchant's monthly-equivalent (a yearly
  //      bill ÷ 12, a bimonthly ÷ 2). Useful for planning, but inflates if
  //      merchants are mis-tagged (a quarterly bill marked monthly billows
  //      four-fold).
  // Showing both removes the mystery: when projected ≫ actual, fix the
  // frequencies on the offending merchants.
  // "Due this cycle" = the full charge of every merchant that's either
  // already billed this cycle or is predicted to bill before the cycle
  // ends, divided by the category split. This is the figure the Overview
  // headline now uses — so the page total and the headline match exactly,
  // and a bimonthly bill that won't bill this month contributes ₪0
  // instead of an averaged half-share.
  const fixedDueThisCycle = rows.reduce((s, r) => {
    const status = fixedBillStatus(r);
    if (status.cls === "muted") return s; // off-cycle, not due
    return s + (r.fullCharge / r.split);
  }, 0);
  const headlineMatch = fixedDueThisCycle + essentialsReserved;

  const totalsStrip = essentialLines.length
    ? '<div class="rec-totals">'
        + '<div class="rec-totals-cell"><span class="rec-totals-k">Fixed due this cycle</span>'
        + '<span class="rec-totals-v">' + money(fixedDueThisCycle, "ILS")
        + '<span class="rec-unit">/mo</span></span></div>'
        + '<span class="rec-totals-op">+</span>'
        + '<div class="rec-totals-cell"><span class="rec-totals-k">Essentials reserved</span>'
        + '<span class="rec-totals-v">' + money(essentialsReserved, "ILS")
        + '<span class="rec-unit">/mo</span></span></div>'
        + '<span class="rec-totals-op">=</span>'
        + '<div class="rec-totals-cell rec-totals-final"><span class="rec-totals-k">'
        + 'Matches Overview</span><span class="rec-totals-v">'
        + money(headlineMatch, "ILS") + '<span class="rec-unit">/mo</span></span></div>'
        + "</div>"
    : "";

  return '<div class="sec-head"><div class="label">Fixed bills</div>'
    + '<span class="spacer"></span>'
    + '<div class="rec-grand-pair">'
    + '<div class="rec-grand-item primary"><div class="rec-grand-num">'
    + money(fixedDueThisCycle, "ILS") + '<span class="rec-unit">/mo</span></div>'
    + '<div class="rec-grand-lab">Due this cycle</div></div>'
    + '<div class="rec-grand-item"><div class="rec-grand-num muted">'
    + money(totalMonthly, "ILS") + '<span class="rec-unit">/mo</span></div>'
    + '<div class="rec-grand-lab">Monthly average</div></div>'
    + "</div></div>"
    + '<p class="hint"><b>Two totals.</b> '
    + '<b>Due this cycle</b> sums the full charge of every recurring merchant '
    + "that's billing in this cycle — a bimonthly bill counts in full the cycle "
    + "it's due and ₪0 the cycle between, instead of always counting half. "
    + "This is what the Overview's <b>Expected fixed + essentials</b> uses, so "
    + 'the headline lines up exactly with the bottom of this page. <b>Monthly '
    + "average</b> sums each merchant's monthly-equivalent — the long-run "
    + "smoothed cost regardless of which cycle a bill lands in.</p>"
    + sections
    + essentialsSection
    + totalsStrip;
}

// Source-of-truth scan for the user's recurring income. Returns one row per
// merchant Hon considers a real income source — either because the user
// marked it explicitly from the move sheet (freq === "income") or because
// it appeared in two or more billing cycles. Merchants the user flagged
// with the ✕ in the Income tab (freq === "ignore") are excluded. Used by
// both the Income tab itself and the Overview's end-of-cycle projection.
function recurringIncomeMerchants() {
  const merch = {};
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || t.refundForId) return;
    if (t.category === "Transfers") return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt <= 0) return;
    const key = merchantKey(t.description);
    const r = merch[key] || (merch[key] = {
      key, cycles: {}, count: 0, total: 0, lastT: 0,
      charge: 0, last: null,
      desc: merchantName(t.description), category: t.category || "Income",
    });
    r.cycles[cycleKey(t.date)] = true;
    r.count += 1;
    r.total += amt;
    const ts = new Date(t.date).getTime();
    if (ts >= r.lastT) {
      r.lastT = ts; r.charge = amt; r.last = t;
      r.desc = merchantName(t.description);
    }
  });
  return Object.values(merch).filter((r) => {
    const freq = state.merchantFreq[r.key];
    if (freq === "ignore") return false;
    return freq === "income" || Object.keys(r.cycles).length >= 2;
  }).map((r) => Object.assign({}, r, {
    avg: r.total / Math.max(1, Object.keys(r.cycles).length),
    marked: state.merchantFreq[r.key] === "income",
  }));
}

// Sum of positive transactions in the given cycle that come from one of
// the recurring-income merchants. The bank projection uses this to figure
// out how much of the expected income has already landed.
function recurringIncomeReceived(cycle) {
  const keys = new Set(recurringIncomeMerchants().map((r) => r.key));
  let sum = 0;
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || t.refundForId) return;
    if (t.category === "Transfers") return;
    if (cycleKey(t.date) !== cycle) return;
    if (!keys.has(merchantKey(t.description))) return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt > 0) sum += amt;
  });
  return sum;
}

// Income tab. The mirror of Fixed bills, scoped to positive transactions:
// lists every merchant Hon has detected as recurring income (or that the
// user marked as income from the move sheet) so misclassified inflows can
// be removed in one click. Removing a row sets the merchant's frequency to
// "ignore", which strips it from the budget projection's expected income.
function incomeView() {
  const rows = recurringIncomeMerchants().sort((a, b) => b.avg - a.avg);

  if (!rows.length) {
    return '<div class="sec-head"><div class="label">Income</div></div>'
      + '<div class="card empty">No recurring income detected yet. A positive '
      + "transaction lands here once it has shown up in two or more billing "
      + "cycles, or once you mark it as recurring income from the transaction "
      + "editor. Removing a row stops it from inflating <b>Expected income</b> "
      + "in the budget — useful for transfers or refunds Hon mistakenly saw "
      + "as salary.</div>";
  }

  const totalMonthly = rows.reduce((s, r) => s + r.avg, 0);

  const list = rows.map((r) => {
    const lastDate = r.last ? fmtDate(r.last.date) : "—";
    const cycles = Object.keys(r.cycles).length;
    const seenN = cycles === 1 ? "1 cycle" : cycles + " cycles";
    const txnId = (r.last && r.last.id) || "";
    const tag = r.marked
      ? '<span class="rec-tag rec-tag-good" title="Marked as recurring income">marked</span>'
      : '<span class="rec-tag rec-tag-muted" title="Detected automatically — appears in two or more cycles">auto</span>';
    return '<div class="rec-row">'
      + '<div class="rec-main" data-txn="' + esc(txnId) + '">'
      + '<div class="rec-name">' + esc(r.desc) + " " + tag + "</div>"
      + '<div class="rec-meta">' + money(r.charge, "ILS") + " per inflow · "
      + "last " + esc(lastDate) + " · " + esc(seenN) + "</div></div>"
      + '<div class="rec-amount good">' + money(r.avg, "ILS")
      + '<span class="rec-unit">/mo avg</span></div>'
      + '<button type="button" class="rec-remove" '
      + 'data-action="ignore-income" data-arg="' + esc(r.key) + '" '
      + 'title="Remove from Income — keeps the underlying transactions, just '
      + 'stops counting this merchant toward Expected income" '
      + 'aria-label="Remove">✕</button>'
      + "</div>";
  }).join("");

  const totals = '<div class="rec-totals">'
    + '<div class="rec-tot-row"><span>Recurring income / month</span>'
    + '<b class="good">' + money(totalMonthly, "ILS") + "</b></div></div>";

  return '<div class="sec-head"><div class="label">Income</div></div>'
    + '<p class="hint" style="margin-bottom:14px">Recurring inflows Hon counts '
    + "as <b>Expected income</b> in the budget. Remove anything that isn't really "
    + "income — a refund, a transfer between your own accounts, money a friend "
    + "paid you back — so the projection stays honest.</p>"
    + '<section class="rec-section">' + list + "</section>"
    + totals;
}

async function ignoreIncomeMerchant(key) {
  try {
    await api("/merchant-frequency", "PUT", { key, frequency: "ignore" });
    state.merchantFreq = Object.assign({}, state.merchantFreq, { [key]: "ignore" });
    render();
    toast("Removed from Income.");
  } catch (e) {
    toast((e && e.message) || "Could not remove the merchant.", true);
  }
}

function subscriptionsView() {
  const subs = state.transactions.filter(
    (t) => t.category === "Subscriptions" && t.amount < 0);
  if (!subs.length) {
    return '<div class="sec-head"><div class="label">Subscriptions</div></div>'
      + '<div class="card empty">No subscription charges found yet — categorize '
      + "transactions as Subscriptions to track them here.</div>";
  }
  // Group by merchant (see merchantKey — drops the varying transaction code).
  const byMerchant = {};
  subs.forEach((t) => {
    const k = merchantKey(t.description);
    (byMerchant[k] || (byMerchant[k] = [])).push(t);
  });
  const now = Date.now();
  // `amount` is the monthly-equivalent cost (a yearly charge ÷ 12); `charge` is
  // the actual amount billed. A yearly bill also stays "active" far longer.
  const rows = Object.keys(byMerchant).map((key) => {
    const list = byMerchant[key].slice()
      .sort((a, b) => new Date(b.date) - new Date(a.date));
    const last = list[0];
    const days = Math.floor((now - new Date(last.date).getTime()) / 86400000);
    const freq = state.merchantFreq[key] || "monthly";
    const charge = Math.abs(last.amount);
    return { key: key, desc: merchantName(last.description), last, days,
      count: list.length, charge: charge, freq: freq,
      amount: monthlyEquivalent(charge, freq), cur: last.currency,
      active: days <= (RECURRENCE_ACTIVE_DAYS[freq] || SUB_ACTIVE_DAYS) };
  });
  // Partition by user mark + activity. Sections, in order:
  //   • Flagged   — user marked cancelled, but a charge arrived AFTER that.
  //   • Active    — recent charge AND not user-cancelled.
  //   • Cancelled — user-marked, no charges since the mark.
  //   • Probably cancelled — auto-lapsed (no charge in over a month).
  const cancelledMap = state.cancelledSubs || {};
  const flagged = [];
  const userCancelled = [];
  const stillActive = [];
  const autoLapsedAll = [];
  rows.forEach((r) => {
    const cancelledAt = cancelledMap[r.key];
    if (cancelledAt) {
      const lastTs = new Date(r.last.date).getTime();
      const cancelledTs = new Date(cancelledAt).getTime();
      if (lastTs > cancelledTs) flagged.push(r);
      else userCancelled.push(r);
      return;
    }
    if (r.active) stillActive.push(r);
    else autoLapsedAll.push(r);
  });
  stillActive.sort((a, b) => b.amount - a.amount);
  userCancelled.sort((a, b) => a.days - b.days);
  autoLapsedAll.sort((a, b) => a.days - b.days);
  flagged.sort((a, b) => new Date(b.last.date) - new Date(a.last.date));
  // A lapsed subscription the AI matched to an active one is just the same
  // service under a renamed descriptor — keep it out of "probably cancelled".
  ensureSubAliases(stillActive.map((r) => r.desc), autoLapsedAll.map((r) => r.desc));
  const autoLapsed = autoLapsedAll.filter((r) => !state.subAliases[r.desc]);
  const monthly = stillActive.reduce((s, r) => s + r.amount, 0);
  const cur = (rows[0] && rows[0].cur) || "ILS";

  const subRow = (r, opts) => {
    const faded = opts && opts.faded;
    const cancelled = opts && opts.cancelled;
    const note = r.freq !== "monthly"
      ? " · billed " + r.freq + " · " + money(r.charge, r.cur)
      : "";
    const action = cancelled
      ? '<button class="mini" data-action="restore-sub" data-key="'
        + esc(r.key) + '">Restore</button>'
      : '<button class="mini" data-action="cancel-sub" data-key="'
        + esc(r.key) + '">Mark cancelled</button>';
    return '<div class="sub-row' + (faded ? " faded" : "") + '">'
      + '<span class="txn-icon" style="background:#7D8CED26;color:#7D8CED">🔁</span>'
      + '<div class="txn-main"><div class="txn-name">' + esc(r.desc) + "</div>"
      + '<div class="txn-sub">Last charged ' + fmtDate(r.last.date)
      + (faded ? " · " + r.days + " days ago"
          : r.count > 1 ? " · " + r.count + " charges" : "")
      + esc(note)
      + "</div></div>"
      + '<div class="sub-amt">' + money(r.amount, r.cur)
      + '<span class="sub-per">/mo</span>'
      + '<div style="margin-top:6px">' + action + "</div>"
      + "</div></div>";
  };

  let out = '<div class="sec-head"><div class="label">Subscriptions</div></div>'
    + '<div class="card sub-summary"><div class="sub-big">' + money(monthly, cur)
    + '<span class="sub-per"> / month</span></div>'
    + '<div class="meta">' + stillActive.length + " active subscription"
    + (stillActive.length === 1 ? "" : "s")
    + (userCancelled.length ? " · " + userCancelled.length + " cancelled" : "")
    + (autoLapsed.length ? " · " + autoLapsed.length + " likely cancelled" : "")
    + "</div></div>";
  if (flagged.length) {
    out += '<div class="card sub-list" style="border:1px solid #E0883F66">'
      + '<div class="label">⚠ Charged after you marked them cancelled</div>'
      + '<div class="meta">A new charge arrived after you marked these cancelled — '
      + "the cancellation may not have gone through. Restore to count them again, "
      + "or mark cancelled again once you have re-confirmed it with the merchant.</div>"
      + '<div style="margin-top:8px">'
      + flagged.map((r) => subRow(r, { cancelled: true })).join("")
      + "</div></div>";
  }
  out += '<div class="card sub-list"><div class="label">Active</div>'
    + (stillActive.length ? stillActive.map((r) => subRow(r, {})).join("")
        : '<div class="empty">No active subscriptions in the last month.</div>')
    + "</div>";
  if (userCancelled.length) {
    out += '<div class="card sub-list"><div class="label">Cancelled</div>'
      + '<div class="meta">You marked these cancelled — Hon will flag any new '
      + "charge for them.</div>"
      + '<div style="margin-top:8px">'
      + userCancelled.map((r) => subRow(r, { faded: true, cancelled: true })).join("")
      + "</div></div>";
  }
  if (autoLapsed.length) {
    out += '<div class="card sub-list"><div class="label">Probably cancelled</div>'
      + '<div class="meta">No charge in over a month — likely cancelled.</div>'
      + '<div style="margin-top:8px">'
      + autoLapsed.map((r) => subRow(r, { faded: true })).join("") + "</div></div>";
  }
  return out;
}

// A 12-month spending chart; tap a bar to drill into that month. The
// selected month carries the `sel` class so the detail card can track it.
function miniBars(months, selKey) {
  const max = Math.max(1, ...months.map((m) => m.spending));
  const bars = months.map((m, i) => {
    const h = Math.max(3, Math.round((m.spending / max) * 100));
    const sel = m.month === selKey ? " sel" : "";
    return '<div class="mb-col' + sel + '" data-month="' + m.month
      + '" title="' + esc(cycleLabel(m.month) + " · " + money(m.spending, "ILS"))
