<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hon</title>
<style>
  :root {
    --bg: #131120; --bg-elev: #1b1930; --card: #211f33; --card-hi: #2b2842;
    --hairline: rgba(255,255,255,0.075); --hairline-2: rgba(255,255,255,0.15);
    --text: #f1eff8; --muted: rgba(255,255,255,0.60); --faint: rgba(255,255,255,0.40);
    --brand: #ecb949; --indigo: #7d72ff; --indigo-soft: rgba(125,114,255,0.16);
    --green: #3ddc84; --amber: #f5b54a; --red: #f4685a;
    --grad-1: #7d72ff; --grad-2: #4a3fb0;
    --shadow: 0 10px 30px rgba(0,0,0,0.42); --shadow-sm: 0 2px 10px rgba(0,0,0,0.32);
    --scrim: rgba(9,8,16,0.80);
  }
  [data-theme="light"] {
    --bg: #f1f1f7; --bg-elev: #ffffff; --card: #ffffff; --card-hi: #f3f3f9;
    --hairline: rgba(24,22,48,0.09); --hairline-2: rgba(24,22,48,0.17);
    --text: #1d1b2e; --muted: rgba(29,27,46,0.62); --faint: rgba(29,27,46,0.44);
    --brand: #c79220; --indigo: #5f54e3; --indigo-soft: rgba(95,84,227,0.11);
    --green: #16a85c; --amber: #cf8c1c; --red: #d8473a;
    --grad-1: #6f64f0; --grad-2: #9182f6;
    --shadow: 0 12px 32px rgba(45,42,80,0.13); --shadow-sm: 0 2px 12px rgba(45,42,80,0.08);
    --scrim: rgba(28,26,52,0.55);
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, "SF Pro Text", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    transition: background-color .3s ease, color .3s ease;
  }
  a { color: var(--indigo); }

  /* --- Shell ------------------------------------------------------------- */
  #app { display: flex; flex-direction: column; min-height: 100vh;
    padding: 0 26px 48px; }

  header {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 12px;
    padding: 16px 0 14px; margin-bottom: 8px;
    background: var(--bg); border-bottom: 1px solid var(--hairline);
  }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand-mark { width: 22px; height: 22px; border-radius: 7px;
    background: linear-gradient(135deg, var(--brand), #d98f2e);
    box-shadow: 0 2px 8px rgba(236,185,73,0.4); }
  h1 { font: 800 23px/1 ui-rounded, "SF Pro Rounded", system-ui;
    color: var(--brand); letter-spacing: .3px; }
  #engine { color: var(--faint); font-size: 12px; }
  .spacer { margin-left: auto; }

  .shell { display: grid; grid-template-columns: 196px minmax(0,1fr) 340px;
    gap: 22px; align-items: start;
    transition: grid-template-columns .3s ease; }
  .shell.collapsed { grid-template-columns: 196px minmax(0,1fr) 0px; }
  .shell.collapsed #sidebar { opacity: 0; pointer-events: none; }
  .shell.bare { grid-template-columns: 1fr; }
  .shell.bare #nav, .shell.bare #sidebar { display: none; }
  #content { min-width: 0; }
  #sidebar { position: sticky; top: 78px; display: flex; flex-direction: column;
    gap: 14px; overflow: hidden; transition: opacity .22s ease; }
  @media (max-width: 860px) {
    .shell, .shell.collapsed { grid-template-columns: 1fr; }
    #nav, #sidebar { position: static; }
    .shell.collapsed #sidebar { display: none; }
  }

  /* --- Buttons ----------------------------------------------------------- */
  button {
    background: var(--card); color: var(--text);
    border: 1px solid var(--hairline-2); border-radius: 9px;
    padding: 8px 14px; font: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
    transition: transform .12s ease, border-color .15s, background .15s, opacity .15s;
  }
  button:hover { border-color: var(--indigo); }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .42; cursor: default; transform: none; }
  button.primary { background: var(--indigo); border-color: transparent;
    color: #fff; box-shadow: 0 4px 14px var(--indigo-soft); }
  button.primary:hover { filter: brightness(1.08); }
  button.danger { color: var(--red); }
  button.danger:hover { border-color: var(--red); }
  button.mini { padding: 5px 11px; font-size: 12px; }
  button.block { width: 100%; padding: 11px; font-size: 14px; }
  .icon-btn { width: 36px; height: 36px; padding: 0; font-size: 15px;
    display: inline-flex; align-items: center; justify-content: center; }

  /* --- Nav --------------------------------------------------------------- */
  /* Left navigation rail */
  #nav { display: flex; flex-direction: column; gap: 5px;
    position: sticky; top: 78px; }
  #nav button {
    display: flex; align-items: center; gap: 11px; width: 100%;
    padding: 11px 13px; border-radius: 12px; text-align: left;
    background-color: transparent; border: 1px solid transparent;
    color: var(--muted); font-size: 14px; font-weight: 600; position: relative;
    transition: color .2s ease, background-color .2s ease, border-color .2s ease,
      transform .16s ease, box-shadow .2s ease;
  }
  #nav button .rn-ico { font-size: 17px; line-height: 1;
    transition: transform .26s cubic-bezier(.34,1.7,.6,1); }
  /* Accent bar that slides in from the left edge on hover. */
  #nav button::before {
    content: ""; position: absolute; left: 0; top: 50%;
    width: 3px; height: 0; border-radius: 0 3px 3px 0;
    background: var(--indigo); transform: translateY(-50%);
    transition: height .24s ease;
  }
  #nav button:hover {
    color: var(--text); background-color: var(--card-hi);
    border-color: var(--hairline); transform: translateX(4px);
  }
  #nav button:hover .rn-ico { transform: scale(1.22) rotate(-7deg); }
  #nav button:hover::before { height: 54%; }
  #nav button.active {
    color: #fff; transform: none; border-color: transparent;
    background: linear-gradient(135deg, var(--indigo), #5c51c4);
    box-shadow: 0 8px 20px var(--indigo-soft);
  }
  #nav button.active::before { height: 0; }
  #nav button.active .rn-ico { transform: scale(1.08); }

  /* --- Cards & sections -------------------------------------------------- */
  .label { font: 700 11px/1 system-ui; letter-spacing: 1.4px;
    color: var(--faint); text-transform: uppercase; }
  section { margin-bottom: 18px; }
  .card { background: var(--card); border: 1px solid var(--hairline);
    border-radius: 16px; padding: 17px 18px; box-shadow: var(--shadow-sm);
    transition: transform .16s ease, box-shadow .16s ease, background-color .3s; }
  .card h3 { font-size: 15px; font-weight: 700; }
  .card .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .card-head .spacer { margin-left: auto; }
  .ov-stack { display: flex; flex-direction: column; gap: 18px; }
  .ov-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
    align-items: start; }
  .ov-grid > section { margin-bottom: 0; }
  @media (max-width: 940px) { .ov-grid { grid-template-columns: 1fr; } }
  .sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .sec-head .spacer { margin-left: auto; }

  /* --- Net worth banner -------------------------------------------------- */
  .networth { position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--grad-1), var(--grad-2));
    border-radius: 20px; padding: 26px 26px 24px; color: #fff;
    box-shadow: var(--shadow); margin-bottom: 18px; }
  .networth::after { content: ""; position: absolute; top: -60px; right: -40px;
    width: 220px; height: 220px; border-radius: 50%;
    background: rgba(255,255,255,0.10); }
  .networth .label { color: rgba(255,255,255,0.75); }
  .nw-total { font: 800 46px/1.05 ui-rounded, "SF Pro Rounded", system-ui;
    margin-top: 10px; letter-spacing: -.5px; }
  .nw-total.neg { color: #ffd7d1; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .chip { background: rgba(255,255,255,0.16); border-radius: 999px;
    padding: 5px 12px; font-size: 13px; font-weight: 600; }
  .nw-sub { color: rgba(255,255,255,0.78); font-size: 12.5px; margin-top: 14px;
    position: relative; }
  .nw-breakdown { position: relative; margin-top: 16px; padding-top: 4px;
    border-top: 1px solid rgba(255,255,255,0.22); }
  .nw-bd-row { display: flex; align-items: center; gap: 9px; padding: 7px 0;
    font-size: 13px; border-top: 1px solid rgba(255,255,255,0.14); }
  .nw-bd-row:first-child { border-top: 0; }
  .nw-bd-ico { font-size: 14px; width: 19px; flex: 0 0 auto; text-align: center; }
  .nw-bd-name { flex: 1; min-width: 0; color: rgba(255,255,255,0.92); }
  .nw-bd-amt { font: 700 13.5px/1 ui-rounded, "SF Pro Rounded", system-ui;
    font-variant-numeric: tabular-nums; }
  .nw-bd-amt.neg { color: #ffd7d1; }

  /* --- Generic rows ------------------------------------------------------ */
  .row { display: flex; justify-content: space-between; align-items: center;
    gap: 12px; padding: 10px 0; border-top: 1px solid var(--hairline); }
  .list .row:first-child { border-top: 0; }
  .row .name { font-size: 14px; font-weight: 500; }
  .row .secondary { color: var(--faint); font-size: 12px; margin-top: 2px; }
  .amount { font: 700 14px/1 ui-rounded, "SF Pro Rounded", system-ui;
    white-space: nowrap; }
  .bal-edit { cursor: pointer; border-radius: 6px; padding: 3px 6px;
    margin: -3px -6px; transition: background-color .14s; }
  .bal-edit:hover { background: var(--card-hi); }
  .row-end { display: flex; align-items: center; gap: 10px; }
  .nw-pill { display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; color: var(--muted);
    padding: 4px 9px 4px 7px; border-radius: 999px; cursor: pointer;
    border: 1px solid var(--hairline-2); user-select: none;
    transition: border-color .14s, color .14s, background-color .14s; }
  .nw-pill:hover { border-color: var(--indigo); color: var(--text); }
  .nw-pill.on { color: var(--text); border-color: var(--indigo);
    background: var(--indigo-soft); }
  .nw-pill .nw-tick { width: 13px; height: 13px; margin: 0; flex: none;
    cursor: pointer; accent-color: var(--indigo); }
  .row.nw-off { opacity: 0.55; }
  .row.nw-off .amount { text-decoration: line-through; }
  .asset-card.nw-off .conn-total { text-decoration: line-through; opacity: 0.6; }
  .pos { color: var(--green); }
  .empty { color: var(--muted); font-size: 13px; padding: 14px 2px;
    text-align: center; }
  .pill { display: inline-block; font-size: 11px; padding: 2px 8px;
    border-radius: 999px; background: var(--indigo-soft); color: var(--indigo);
    font-weight: 600; }

  .logo { position: relative; flex: 0 0 36px; width: 36px; height: 36px;
    border-radius: 10px; background: var(--card-hi); display: inline-flex;
    align-items: center; justify-content: center; font-size: 18px; overflow: hidden; }
  .logo img { position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; background: #fff; }

  /* --- Connection cards -------------------------------------------------- */
  .conn-accounts { margin-top: 12px; }
  .conn-foot { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 13px;
    padding-top: 13px; border-top: 1px solid var(--hairline); }
  .conn-total { margin-left: auto; align-self: center; font-weight: 700;
    font-family: ui-rounded, "SF Pro Rounded", system-ui; }
  .neg, .amount.neg, .conn-total.neg { color: var(--red); }
  .conn-spend { display: flex; justify-content: space-between;
    font-size: 12.5px; font-weight: 600; color: var(--muted);
    margin-top: 13px; padding-top: 13px; border-top: 1px solid var(--hairline); }
  .conn-spend .conn-spend-amt { font-weight: 800; color: var(--text);
    font-family: ui-rounded, "SF Pro Rounded", system-ui; }

  /* --- Activity ---------------------------------------------------------- */
  .act-bar { display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    margin-bottom: 18px; }
  .month-pick { display: flex; align-items: center; background: var(--card-hi);
    border-radius: 11px; padding: 3px; }
  .month-pick .icon-btn { width: 30px; height: 30px; font-size: 19px;
    background: transparent; border: 0; border-radius: 8px; color: var(--muted); }
  .month-pick .icon-btn:hover:not(:disabled) { background: var(--bg-elev);
    color: var(--text); border: 0; }
  .month-pick .icon-btn:disabled { opacity: .26; cursor: default; }
  .month-label { font: 700 13.5px/1.15 ui-rounded, "SF Pro Rounded", system-ui;
    min-width: 134px; text-align: center; padding: 0 4px; }
  .act-meta { display: flex; flex-direction: column; gap: 1px; line-height: 1.25; }
  .act-count { color: var(--muted); font-size: 12.5px; font-weight: 600; }
  .act-hidden { color: var(--faint); font-size: 11px; font-weight: 600; }
  .act-cat { color: var(--amber); font-size: 11px; font-weight: 700; }
  .act-cat .spin { display: inline-block; animation: spin 1s linear infinite; }
  .act-cols { display: flex; align-items: flex-start; gap: 18px; }
  .act-col { flex: 1 1 0; min-width: 0; display: flex;
    flex-direction: column; gap: 18px; }
  .act-section.gap { margin-top: 26px; }
  .umbrella { display: flex; align-items: baseline; gap: 10px;
    margin: 0 2px 12px; }
  .umbrella-name { font-size: 12px; font-weight: 700; letter-spacing: .6px;
    text-transform: uppercase; color: var(--faint); }
  .umbrella-line { flex: 1; height: 1px; background: var(--hairline); }
  .umbrella-total { font: 800 13px/1 ui-rounded, "SF Pro Rounded", system-ui; }

  /* --- Subscriptions ----------------------------------------------------- */
  .sub-summary, .sub-list { margin-bottom: 14px; }
  .sub-summary { text-align: center; padding: 22px 16px; }
  .sub-big { font: 800 34px/1 ui-rounded, "SF Pro Rounded", system-ui; }
  .sub-per { color: var(--faint); font-size: 14px; font-weight: 600; }
  .sub-summary .meta { margin-top: 6px; }
  .sub-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; }
  .sub-row + .sub-row { border-top: 1px solid var(--hairline); }
  .sub-row.faded { opacity: .55; }
  .sub-list .label { margin-bottom: 8px; }
  .sub-amt { font: 800 14.5px/1 ui-rounded, "SF Pro Rounded", system-ui;
    white-space: nowrap; }
  .sub-amt .sub-per { font-size: 10.5px; margin-left: 1px; }
  .cat-card { padding: 13px 15px 7px; }
  .cat-card.collapsed { padding: 13px 15px; }
  .cat-head { display: flex; align-items: center; gap: 9px; cursor: pointer;
    user-select: none; border-radius: 9px; padding: 4px 6px; margin: -4px -6px;
    transition: background-color .14s; }
  .cat-head:hover { background: var(--card-hi); }
  .cat-card.collapsed .cat-head:hover { background: var(--card-hi); }
  .cat-chev { font-size: 10px; color: var(--faint); flex: 0 0 auto;
    transition: transform .2s ease; }
  .cat-chev.col { transform: rotate(-90deg); }
  .cat-dot { width: 11px; height: 11px; border-radius: 4px; flex: 0 0 auto; }
  .cat-name { font-size: 14px; font-weight: 700; }
  .cat-count { font-size: 11px; font-weight: 700; color: var(--faint);
    background: var(--card-hi); padding: 2px 8px; border-radius: 999px; }
  .cat-head:hover .cat-count { background: var(--bg-elev); }
  .cat-count.has { background: var(--indigo-soft); color: var(--indigo); }
  .cat-total { margin-left: auto; font: 800 14.5px/1 ui-rounded,
    "SF Pro Rounded", system-ui; }
  .cat-list { margin-top: 5px; }
  .txn { display: flex; align-items: center; gap: 12px; padding: 9px 7px;
    border-radius: 11px; cursor: pointer;
    transition: background .14s ease; }
  .txn + .txn { border-top: 1px solid var(--hairline); }
  .txn:hover { background: var(--card-hi); }
  .txn:hover + .txn { border-top-color: transparent; }
  .txn.sel { background: var(--indigo-soft);
    box-shadow: inset 0 0 0 1.5px var(--indigo); }
  .txn-icon { flex: 0 0 38px; width: 38px; height: 38px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .txn-main { flex: 1; min-width: 0; }
  .txn-name { font-size: 13.5px; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .txn-sub { color: var(--faint); font-size: 11.5px; margin-top: 2px; }
  .txn-amt { font: 800 14.5px/1 ui-rounded, "SF Pro Rounded", system-ui;
    white-space: nowrap; }
  .txn-amt.pos { color: var(--green); }
  .txn-check { flex: 0 0 21px; width: 21px; height: 21px; border-radius: 7px;
    border: 1.6px solid var(--hairline-2); display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 800; color: #fff;
    transition: background-color .14s, border-color .14s, transform .12s; }
  .txn-check.on { background: var(--indigo); border-color: var(--indigo);
    transform: scale(1.06); }
  .txn.picked { background: var(--indigo-soft); }

  /* --- Batch action bar -------------------------------------------------- */
  .batch-bar { position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%); display: flex; align-items: center; gap: 14px;
    padding: 12px 14px; background: var(--card);
    border: 1px solid var(--hairline-2); border-radius: 16px;
    box-shadow: var(--shadow); z-index: 55; }
  .batch-n { font-weight: 700; font-size: 13px; white-space: nowrap;
    padding-left: 4px; }
  .batch-sep { color: var(--faint); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .4px; margin: 0 -6px; }
  /* Custom category dropdown */
  .bcat { position: relative; }
  .bcat-btn { display: flex; align-items: center; gap: 8px; padding: 8px 11px;
    background: var(--card-hi); border: 1.5px solid var(--hairline-2);
    border-radius: 11px; font-size: 13px; font-weight: 700; min-width: 168px;
    transition: border-color .14s; }
  .bcat-btn:hover, .bcat-btn.open { border-color: var(--indigo); }
  .bcat-em { width: 24px; height: 24px; flex: none; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .bcat-chev { margin-left: auto; font-size: 10px; color: var(--faint);
    transition: transform .18s; }
  .bcat-btn.open .bcat-chev { transform: rotate(180deg); }
  .bcat-menu { position: absolute; bottom: calc(100% + 8px); left: 0; right: 0;
    background: var(--card); border: 1px solid var(--hairline-2);
    border-radius: 13px; box-shadow: var(--shadow); padding: 5px;
    max-height: 320px; overflow-y: auto; z-index: 60;
    animation: pop .15s cubic-bezier(.2,.8,.2,1); }
  .bcat-opt { display: flex; align-items: center; gap: 9px; padding: 8px 9px;
    border-radius: 9px; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: background-color .12s; }
  .bcat-opt:hover { background: var(--card-hi); }
  .bcat-opt.on { background: var(--indigo-soft); color: var(--indigo); }
  .bcat-opt .bcat-check { margin-left: auto; font-weight: 800; }

  /* --- Sidebar ----------------------------------------------------------- */
  .move-cats { display: flex; flex-direction: column; gap: 4px;
    margin: 11px 0; max-height: 320px; overflow-y: auto; }
  .move-cat { display: flex; align-items: center; gap: 9px; width: 100%;
    text-align: left; padding: 9px 11px; border-radius: 10px; font-size: 13px;
    border: 1.5px solid transparent; background: var(--card-hi); }
  .move-cat:hover { border-color: var(--hairline-2); }
  .move-cat.active { border-color: currentColor; font-weight: 700; }
  .move-cat .mc-em { font-size: 15px; }
  .move-cat .mc-check { margin-left: auto; font-weight: 800; opacity: 0;
    transition: opacity .12s; }
  .move-cat.active .mc-check { opacity: 1; }
  .move-txn { display: flex; align-items: center; gap: 11px;
    padding: 11px; background: var(--card-hi); border-radius: 12px;
    margin-bottom: 4px; }
  .always { display: flex; align-items: flex-start; gap: 9px; margin: 4px 0 13px;
    font-size: 12.5px; color: var(--muted); cursor: pointer; }
  .always input { width: auto; margin-top: 1px; flex: 0 0 auto;
    accent-color: var(--indigo); }
  .freq-pick { display: flex; gap: 8px; margin: 4px 0 13px; }
  .freq-opt { flex: 1; padding: 8px 6px; font-size: 12.5px; font-weight: 600;
    background: var(--card-hi); border: 1.5px solid transparent;
    border-radius: 9px; color: var(--muted); }
  .freq-opt:hover { border-color: var(--hairline-2); }
  .freq-opt.active { background: var(--indigo); border-color: transparent;
    color: #fff; }
  /* Reimbursement / refund linking */
  .sb-label { margin: 13px 0 7px; }
  .rf-hint { font-size: 12px; color: var(--muted); line-height: 1.45;
    margin: 2px 0 9px; }
  .rf-add { background: var(--card-hi); border: 1.5px dashed var(--hairline-2);
    color: var(--muted); font-weight: 600; }
  .rf-add:hover { border-color: var(--indigo); color: var(--indigo); }
  .rf-list { display: flex; flex-direction: column; gap: 3px;
    max-height: 340px; overflow-y: auto; margin-bottom: 6px; }
  .rf-opt { display: flex; align-items: center; gap: 10px; width: 100%;
    text-align: left; padding: 8px 9px; border-radius: 10px;
    border: 1.5px solid transparent; background: var(--card-hi); }
  .rf-opt:hover { border-color: var(--indigo); }
  .txn-icon.sm { flex: 0 0 30px; width: 30px; height: 30px; font-size: 14px;
    border-radius: 9px; }
  .rf-linked { background: var(--card-hi); border-radius: 12px;
    padding: 10px 11px; }
  .rf-linked-row { display: flex; align-items: center; gap: 9px; }
  .rf-eff { margin-top: 8px; padding-top: 8px; font-size: 12.5px;

<script>
"use strict";

const token = new URLSearchParams(location.hash.slice(1)).get("token");
const SYMBOLS = { ILS: "₪", NIS: "₪", USD: "$", EUR: "€", GBP: "£" };
const CATEGORIES = ["Groceries","Dining","Transport","Fuel","Shopping","Utilities",
  "Housing","Insurance","Health","Entertainment","Subscriptions","Travel","Education",
  "Income","Transfers","Fees","Other"];
// [emoji, accent colour] per category.
const CATEGORY_STYLE = {
  Groceries: ["🛒", "#5CC773"], Dining: ["🍽️", "#F59942"],
  Transport: ["🚌", "#5C9EF5"], Fuel: ["⛽", "#EB736B"],
  Shopping: ["🛍️", "#D975D6"], Utilities: ["💡", "#F2C752"],
  Housing: ["🏠", "#66B8BD"], Insurance: ["🛡️", "#6E8FD6"],
  Health: ["⚕️", "#ED6680"],
  Entertainment: ["🎭", "#A880ED"], Subscriptions: ["🔁", "#7D8CED"],
  Travel: ["✈️", "#5CC7DB"], Education: ["📚", "#73B39E"],
  Income: ["💰", "#4CD180"], Transfers: ["↔️", "#999EB8"],
  Fees: ["﹪", "#B38C80"], Other: ["▫️", "#8C8FA8"],
};
function catStyle(cat) { return CATEGORY_STYLE[cat] || CATEGORY_STYLE.Other; }

// Spending umbrellas: recurring "fixed" bills, day-to-day "essential" spend,
// and everything discretionary or miscellaneous as "variable".
const ESSENTIAL_CATS = ["Groceries", "Dining", "Transport", "Fuel", "Health"];
const FIXED_CATS = ["Utilities", "Housing", "Insurance", "Subscriptions",
  "Education", "Fees"];
function catGroup(cat) {
  if (ESSENTIAL_CATS.indexOf(cat) >= 0) return "essential";
  if (FIXED_CATS.indexOf(cat) >= 0) return "fixed";
  return "variable"; // Shopping, Entertainment, Travel, Other, Transfers, Income…
}
const GROUP_ORDER = ["essential", "fixed", "variable"];
const GROUP_LABEL = { essential: "Essentials", fixed: "Fixed expenses",
  variable: "Variable expenses" };

// A merchant key: the description with digit-bearing words dropped, so it
// survives the varying transaction code scrapers append to each charge.
function merchantWords(d) { return (d || "").split(/\s+/).filter((w) => w && !/\d/.test(w)); }
function merchantKey(d) { return merchantWords(d).join(" ").toLowerCase() || (d || ""); }
function merchantName(d) { return merchantWords(d).join(" ") || d; }

// How often a recurring charge bills. RECURRENCE_DIV turns one charge into a
// monthly-equivalent cost; RECURRENCE_ACTIVE_DAYS is how long since the last
// charge still counts as active (a yearly bill lapses far slower than monthly).
const RECURRENCE_DIV = { monthly: 1, bimonthly: 2, yearly: 12 };
const RECURRENCE_ACTIVE_DAYS = { monthly: 40, bimonthly: 75, yearly: 400 };
// The frequency choices the transaction editor offers for a given category —
// null when the category is not a recurring bill.
function recurrenceChoices(category) {
  if (category === "Subscriptions") return [["monthly", "Monthly"], ["yearly", "Yearly"]];
  if (catGroup(category) === "fixed") return [["monthly", "Monthly"], ["bimonthly", "Bimonthly"]];
  return null;
}
function monthlyEquivalent(amount, freq) {
  return amount / (RECURRENCE_DIV[freq] || 1);
}
const FIELD_LABELS = {
  username: "Username", password: "Password", userCode: "User code",
  id: "ID number", phone: "Phone number", card6Digits: "Card — last 6 digits",
  nationalID: "National ID", num: "Account number", clientId: "SnapTrade Client ID",
  consumerKey: "SnapTrade Consumer Key",
};
const SECURE_FIELDS = new Set(["password", "consumerKey"]);
const SNAPTRADE_ID = "snaptrade";
const TABS = [["overview", "Overview", "📊"], ["assets", "Assets", "🏦"],
  ["activity", "Activity", "🧾"], ["subscriptions", "Subscriptions", "🔁"],
  ["piggy", "Piggy banks", "🐷"], ["insights", "Insights", "💡"]];

// Icons offered when naming a piggy bank, and the preset "ready in N months"
// plans the create form turns into a suggested monthly set-aside.
const PIGGY_EMOJI = ["🐷", "✈️", "🏖️", "🚗", "🏠", "💍", "🎓", "💻", "📷",
  "🎁", "🛋️", "🚲", "⛺️", "🎮", "🪙", "❤️"];
const PIGGY_PLANS = [3, 6, 12, 24];

const state = {
  companies: [], connections: [], accounts: [], transactions: [], assets: [],
  summary: null, budget: null, insights: null, llm: null,
  merchantFreq: {},      // { merchantKey: "monthly"|"bimonthly"|"yearly" }
  scrapes: {}, categorize: null, tab: "overview",
  move: null,            // { txnId, picked, always } while moving a transaction
  activityMonth: null,   // "YYYY-MM" currently shown in the Activity tab
  selectMode: false,     // batch-select mode in the Activity tab
  batch: {},             // { txnId: true } selected for a batch move
  batchCat: "",          // target category chosen in the batch bar
  batchOpen: false,      // batch-bar category dropdown open?
  collapsed: {},         // { category: true } collapsed Activity groups
  insightsMonth: null,   // "YYYY-MM" drilled into on the Insights tab
  insightsTab: "spending", // "spending" | "brokerage" sub-view of Insights
  brokerage: { holdings: [], snapshots: [] }, // positions + value history
  expandedHoldings: {},  // { accountId: true } account cards showing holdings
  subAliases: {},        // { lapsedName: activeName } — AI-detected renames
  subAliasSig: null,     // signature of the name set subAliases was built for
  subAliasBusy: false,   // an alias lookup is in flight
  // Splitwise: connection state, transaction↔expense links, friend balances.
  splitwise: { connected: false, user: null, links: [], friends: [] },
  _renderedTab: null, _nwShown: null, _sidebarSig: null,
};

// --- Helpers ---------------------------------------------------------------

function money(value, currency, sign) {
  if (value == null) return "—";
  const cur = (currency || "").toUpperCase();
  const symbol = SYMBOLS[cur] || cur + " ";
  const n = Math.abs(value).toLocaleString(undefined,
    { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const prefix = value < 0 ? "−" : (sign && value > 0 ? "+" : "");
  return prefix + symbol + n;
}
function fmtDate(s) {
  const d = new Date(s);
  return isNaN(d) ? s : d.toLocaleDateString(undefined,
    { year: "numeric", month: "short", day: "numeric" });
}
function fmtSize(bytes) {
  if (!bytes) return "";
  const gb = bytes / 1e9;
  return gb >= 1 ? gb.toFixed(1) + " GB" : Math.round(bytes / 1e6) + " MB";
}
// Compact money for tight spots (e.g. the donut centre): ₪12.3k, ₪840.
function moneyShort(value, currency) {
  const sym = SYMBOLS[(currency || "").toUpperCase()] || "";
  const abs = Math.abs(value);
  const sign = value < 0 ? "−" : "";
  if (abs >= 1000) return sign + sym + (abs / 1000).toFixed(abs >= 10000 ? 0 : 1) + "k";
  return sign + sym + Math.round(abs);
}
function monthLetter(key) {
  const p = key.split("-");
  return new Date(Number(p[0]), Number(p[1]) - 1, 1)
    .toLocaleDateString(undefined, { month: "narrow" });
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

function toast(message, isError) {
  const el = document.createElement("div");
  el.className = "toast" + (isError ? " err" : "");
  el.textContent = message;
  document.getElementById("toasts").appendChild(el);
  setTimeout(() => el.remove(), 4500);
}

// Counts a number up to its target — a small flourish on the net-worth figure.
function animateValue(el, to, currency) {
  const dur = 850, start = performance.now();
  (function step(now) {
    const p = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = money(to * eased, currency);
    if (p < 1) requestAnimationFrame(step);
  })(start);
}

class VaultLocked extends Error {}

async function api(path, method, body) {
  // Only send a JSON content-type when there is a body — Fastify rejects an
  // empty body with 400 "Bad Request" if application/json is declared.
  const headers = {};
  if (token) headers.Authorization = "Bearer " + token;
  if (body !== undefined) headers["Content-Type"] = "application/json";
  const res = await fetch(path, {
    method: method || "GET",
    headers,
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  if (res.status === 409) throw new VaultLocked("vault locked");
  if (!res.ok) {
    let detail = "HTTP " + res.status;
    try { detail = (await res.json()).error || detail; } catch (e) {}
    if (res.status === 401) detail = "Not authorized — re-open with ./web.sh.";
    throw new Error(detail);
  }
  return res.status === 204 ? null : res.json();
}

// --- Theme & sidebar -------------------------------------------------------

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("honTheme", theme);
  const btn = document.getElementById("theme-toggle");
  if (btn) btn.textContent = theme === "light" ? "☾" : "☀";
}

// --- Settings --------------------------------------------------------------

const DEFAULT_SETTINGS = {
  monthStartDay: 1,
  projectRecurring: true,   // expect recurring fixed bills + averaged income
  incomeAvgMonths: 3,       // months averaged for expected income
  hideCardTotals: true,
  cardProviders: ["מקס", "ישראכרט", "כאל", "ויזה כאל", "אמריקן אקספרס",
    "לאומי קארד", "דיינרס", "max", "isracard", "cal", "american express",
    "leumi card", "diners"],
};
let settings = loadSettings();
function loadSettings() {
  const base = Object.assign({}, DEFAULT_SETTINGS);
  try {
    const raw = JSON.parse(localStorage.getItem("honSettings") || "{}");
    if (raw && typeof raw === "object") Object.assign(base, raw);
  } catch (e) { /* fall back to defaults */ }
  if (!Array.isArray(base.cardProviders)) {
    base.cardProviders = DEFAULT_SETTINGS.cardProviders.slice();
  }
  return base;
}
function saveSettings() {
  localStorage.setItem("honSettings", JSON.stringify(settings));
}

// The "month" a transaction belongs to, honouring a custom cycle start day
// (e.g. the day the credit-card bill is debited). Returns the "YYYY-MM" key of
// the cycle's opening month.
function cycleKey(dateStr) {
  const start = settings.monthStartDay || 1;
  const d = new Date(dateStr);
  if (isNaN(d)) return (dateStr || "").slice(0, 7);
  let y = d.getFullYear(), m = d.getMonth();
  if (start > 1 && d.getDate() < start) {
    m -= 1;
    if (m < 0) { m = 11; y -= 1; }
  }
  return y + "-" + String(m + 1).padStart(2, "0");
}
// A cycle is labelled by its opening month — "March 2026" — even when a custom
// billing-cycle start day means it runs into the next calendar month.
function cycleLabel(key) {
  const p = key.split("-");
  return new Date(Number(p[0]), Number(p[1]) - 1, 1)
    .toLocaleDateString(undefined, { month: "long", year: "numeric" });
}
// The cycle key one billing cycle before the given one.
function prevCycleKey(key) {
  const p = key.split("-");
  let y = Number(p[0]), m = Number(p[1]) - 2;
  while (m < 0) { m += 12; y -= 1; }
  return y + "-" + String(m + 1).padStart(2, "0");
}
function currentCycleKey() {
  return cycleKey(new Date().toISOString().slice(0, 10));
}
// Resolved ISO bounds [start, end) of the current billing cycle — the window
// the Budget card is scoped to, so it matches the Activity tab's cycle.
function currentCycleRange() {
  const key = currentCycleKey();           // "YYYY-MM" — the cycle's opening month
  const s = settings.monthStartDay || 1;
  const p = key.split("-");
  const y = Number(p[0]), m = Number(p[1]) - 1; // 0-based opening month
  const pad2 = (n) => String(n).padStart(2, "0");
  const ny = m === 11 ? y + 1 : y;
  const nm = m === 11 ? 0 : m + 1;
  return { start: key + "-" + pad2(s),
    end: ny + "-" + pad2(nm + 1) + "-" + pad2(s) };
}
// "/budget" scoped to the current billing cycle. When recurring projection is
// on, the expected income and smoothed fixed bills go along too — so the engine
// settles piggy banks against expected income, not just money in so far.
function budgetUrl() {
  const r = currentCycleRange();
  let url = "/budget?start=" + r.start + "&end=" + r.end;
  const p = budgetProjection();
  if (p) {
    if (p.expectedIncome != null) url += "&expectedIncome=" + Math.round(p.expectedIncome);
    url += "&expectedFixed=" + Math.round(p.expectedFixed || 0);
  }
  return url;
}
// ILS expense spending in one billing cycle, card-bill totals excluded and
// refund offsets applied — the figures the Activity tab and Overview share.
function cycleSpending(key) {
  const byCat = {};
  let total = 0;
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || isCardTotal(t) || t.refundForId) return;
    if (cycleKey(t.date) !== key) return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt >= 0) return;
    total += -amt;
    const c = t.category || "Uncategorized";
    byCat[c] = (byCat[c] || 0) + -amt;
  });
  return { total, byCat };
}
// True when a transaction is just a credit-card bill total debited from a bank
// account — itemised under the card elsewhere, so it would double-count.
function isCardTotal(t) {
  if (!settings.hideCardTotals) return false;
  const desc = (t.description || "").toLowerCase();
  if (!desc) return false;
  return (settings.cardProviders || []).some((p) => {
    p = (p || "").trim().toLowerCase();
    return p.length > 1 && desc.indexOf(p) >= 0;
  });
}
// The amount a linked refund offsets from an expense (0 when not linked).
function txnRefundAmount(t) {
  if (!t || !t.refundId) return 0;
  const r = state.transactions.find((x) => x.id === t.refundId);
  return r ? r.amount : 0;
}

// --- Data loading ----------------------------------------------------------

async function loadAll() {
  try {
    const [companies, connections, accounts, transactions, assets, summary,
           insights, llm, merchantFreq, brokerage] =
      await Promise.all([
        api("/companies").then((r) => r.companies),
        api("/connections").then((r) => r.connections),
        api("/accounts").then((r) => r.accounts),
        api("/transactions?limit=1000").then((r) => r.transactions),
        api("/assets").then((r) => r.assets),
        api("/summary").then((r) => r.summary),
        api("/insights"),
        api("/llm"),
        api("/merchant-frequencies").then((r) => r.frequencies),
        api("/brokerage"),
      ]);
    Object.assign(state, {
      companies, connections, accounts, transactions, assets, summary,
      insights, llm, merchantFreq, brokerage,
    });
    // The budget is fetched once transactions are in state — its URL carries
    // the recurring projection, which is derived from those transactions.
    state.budget = await api(budgetUrl());
    // Drop a stale move target if its transaction is gone.
    if (state.move && !transactions.some((t) => t.id === state.move.txnId)) {
      state.move = null;
    }
    // Drop batch selections whose transactions no longer exist.
    Object.keys(state.batch).forEach((id) => {
      if (!transactions.some((t) => t.id === id)) delete state.batch[id];
    });
    render();
    loadSplitwise();   // optional — connection state, links, balance refresh
  } catch (err) {
    if (err instanceof VaultLocked) return showGate();
    toast(err.message, true);
  }
}

// --- Rendering -------------------------------------------------------------

function render() {
  document.getElementById("nav").innerHTML = TABS.map(([id, label, icon]) =>
    '<button data-tab="' + id + '"' + (state.tab === id ? ' class="active"' : "")
    + '><span class="rn-ico">' + icon + "</span><span>" + label
    + "</span></button>").join("");

  const content = document.getElementById("content");
  const tabChanged = state._renderedTab !== state.tab;
  state._renderedTab = state.tab;

  if (!state.connections.length && !state.assets.length) {
    content.innerHTML = emptyState();
  } else if (state.tab === "assets") {
    content.innerHTML = accountsView();
  } else if (state.tab === "activity") {
    content.innerHTML = activityView();
  } else if (state.tab === "subscriptions") {
    content.innerHTML = subscriptionsView();
  } else if (state.tab === "piggy") {
    content.innerHTML = piggyView();
  } else if (state.tab === "insights") {
    content.innerHTML = insightsView();
  } else {
    content.innerHTML = overviewView();
  }

  if (tabChanged) {
    content.classList.remove("tab-enter");
    void content.offsetWidth;
    content.classList.add("tab-enter");
    // Drop the class once the animation is done so later re-renders (scrape
    // polling, selecting a transaction) don't replay it.
    clearTimeout(state._tabTimer);
    state._tabTimer = setTimeout(() => content.classList.remove("tab-enter"), 750);
  }

  // Count the net-worth figure up when Overview is freshly shown.
  const nw = document.getElementById("nw-value");
  if (nw && nw.dataset.value) {
    const v = Number(nw.dataset.value);
    if (tabChanged || state._nwShown !== v) { animateValue(nw, v, "ILS"); }
    state._nwShown = v;
  }

  renderSidebar();
}

function emptyState() {
  return '<div class="blank"><div class="be">🏦</div>'
    + "<h2>Nothing here yet</h2>"
    + "<p>Connect a bank, credit card, or brokerage to pull in your balances "
    + "and transactions — or add a car, property, or cash as an asset.</p>"
    + '<button class="primary" data-action="add-connection">+ Add your first asset</button>'
    + "</div>";
}

/* --- Overview ------------------------------------------------------------ */

function overviewView() {
  return '<div class="ov-stack">' + netWorthCard()
    + '<div class="ov-grid">' + spendingCard() + budgetSection() + "</div>"
    + splitwiseCard() + "</div>";
}

// "This month" card — total spend, the month-over-month trend, and a donut
// chart of where the money went, with each slice's trend in the legend.
function spendingCard() {
  // Computed client-side so it matches the Activity tab — card-bill totals
  // excluded, refund offsets applied, grouped by the billing cycle.
  const curKey = currentCycleKey();
  const cur = cycleSpending(curKey);
  const prev = cycleSpending(prevCycleKey(curKey));
  const cats = Object.keys(cur.byCat).map((c) => {
    const amount = cur.byCat[c];
    const pv = prev.byCat[c];
    return { category: c, amount,
      changePct: pv && pv > 0 ? ((amount - pv) / pv) * 100 : null };
  }).sort((a, b) => b.amount - a.amount);

  let badge = "";
  if (prev.total > 0) {
    const pct = ((cur.total - prev.total) / prev.total) * 100;
    const down = pct < 0;
    badge = '<span class="delta ' + (down ? "good" : "bad") + '">'
      + (down ? "↓ " : "↑ ") + Math.abs(pct).toFixed(0) + "% vs last month</span>";
  }
  return '<section class="card"><div class="card-head"><h3>This month</h3></div>'
    + '<div class="spend-top"><div class="spend-num">'
    + money(cur.total, "ILS") + "</div>" + badge + "</div>"
    + spendPie(cats) + "</section>";
}

function spendPie(cats) {
  const total = cats.reduce((s, c) => s + c.amount, 0);
  if (total <= 0) return '<div class="empty">No spending recorded this month.</div>';
  let acc = 0;
  const stops = cats.map((c) => {
    const a0 = (acc / total) * 100;
    acc += c.amount;
    return catStyle(c.category)[1] + " " + a0.toFixed(2) + "% "
      + ((acc / total) * 100).toFixed(2) + "%";
  }).join(", ");
  const legend = cats.map((c) => {
    const color = catStyle(c.category)[1];
    let tr = "";
    if (c.changePct != null && Math.abs(c.changePct) >= 1) {
      const down = c.changePct < 0;
      tr = '<span class="lg-tr ' + (down ? "good" : "bad") + '">'
        + (down ? "↓" : "↑") + Math.abs(c.changePct).toFixed(0) + "%</span>";
    }
    return '<div class="lg-row"><span class="lg-dot" style="background:' + color
      + '"></span><span class="lg-name">' + esc(c.category) + "</span>" + tr
      + '<span class="lg-amt">' + money(c.amount, "ILS") + "</span>"
      + '<span class="lg-pct">' + Math.round((c.amount / total) * 100) + "%</span></div>";
  }).join("");
  return '<div class="pie-wrap"><div class="pie" style="background:conic-gradient('
    + stops + ')"><div class="pie-hole"><div class="pie-c-amt">'
    + moneyShort(total, "ILS") + '</div><div class="pie-c-lbl">spent</div>'
    + "</div></div></div>"
    + '<div class="legend">' + legend + "</div>";
}

// Net-worth subtitle: how many accounts and manual assets back the figure.
function netWorthSub(s) {
  const parts = [];
  const a = s.accountCount || 0, m = s.manualAssetCount || 0;
  if (a) parts.push(a + (a === 1 ? " account" : " accounts"));
  if (m) parts.push(m + (m === 1 ? " asset" : " assets"));
  return parts.join(" · ") || "Nothing added yet";
}

// Label + emoji for one net-worth source bucket from the /summary breakdown.
const SOURCE_LABEL = {
  bank: ["🏦", "Bank accounts"],
  card: ["💳", "Credit cards"],
  brokerage: ["📈", "Investments"],
  pension: ["🪺", "Pension funds"],
  "asset:car": ["🚗", "Car"],
  "asset:pension": ["🪺", "Pension"],
  "asset:property": ["🏠", "Property"],
  "asset:cash": ["💵", "Cash savings"],
  "asset:crypto": ["🪙", "Crypto"],
  "asset:other": ["💎", "Other assets"],
};
// The "where it comes from" breakdown under the net-worth figure: one row per
// source bucket, each already converted to ILS by the engine.
function netWorthBreakdown(s) {
  const sources = s.sources || [];
  if (!sources.length) return "";
  const rows = sources.map((src) => {
    const meta = SOURCE_LABEL[src.key] || ["•", src.key];
    return '<div class="nw-bd-row"><span class="nw-bd-ico">' + meta[0]
      + '</span><span class="nw-bd-name">' + esc(meta[1]) + "</span>"
      + '<span class="nw-bd-amt' + (src.amount < 0 ? " neg" : "") + '">'
      + money(src.amount, "ILS") + "</span></div>";
  }).join("");
  return '<div class="nw-breakdown">' + rows + "</div>";
}

function netWorthCard() {
  const s = state.summary || { byCurrency: [], accountCount: 0, connectionCount: 0 };
  const totals = (s.byCurrency || []).slice().sort((a, b) =>
    a.currency === "ILS" ? -1 : b.currency === "ILS" ? 1 : b.total - a.total);

  // The headline is every account combined into one ILS figure; the chips show
  // the original per-currency balances. Falls back to ILS-only if FX is down.
  let valueAttr = "", headline, neg = false, chipTotals;
  if (s.netWorthILS != null) {
    headline = money(s.netWorthILS, "ILS");
    valueAttr = ' id="nw-value" data-value="' + s.netWorthILS + '"';
    neg = s.netWorthILS < 0;
    chipTotals = totals.length > 1 ? totals : [];
  } else {
    headline = totals[0] ? money(totals[0].total, totals[0].currency) : "—";
    neg = totals[0] && totals[0].total < 0;
    chipTotals = totals.slice(1);
  }
  const chips = chipTotals.map((t) =>
    '<span class="chip">' + money(t.total, t.currency) + "</span>").join("");
  return '<section class="networth"><div class="label">Total net worth</div>'
    + '<div class="nw-total' + (neg ? " neg" : "") + '"' + valueAttr + ">"
    + headline + "</div>"
    + (chips ? '<div class="chips">' + chips + "</div>" : "")
    + (s.netWorthILS != null ? netWorthBreakdown(s) : "")
    + '<div class="nw-sub">' + netWorthSub(s) + "</div></section>";
}

// The AI engine lives in Settings. `modelSectionHtml` renders its current
// state — an on-device model or a remote Ollama server; `fillModelSection`
// paints that into the open Settings modal and wires its buttons directly —
// modal clicks sit outside the #content delegation that drives the app.

// Which engine panel the Settings modal is showing. A UI mirror of the saved
// `state.llm.mode`, switched by the segmented toggle before the user applies.
let llmPanelMode = null;

// The on-device model catalog / download progress — the `local` panel.
function llmCatalogHtml(llm) {
  if (llm.state === "ready") {
    return '<div class="meta">Loaded: ' + esc(llm.modelName || llm.modelId)
      + " — runs entirely on this machine, nothing is sent anywhere.</div>";
  }
  if (llm.state === "downloading" || llm.state === "loading" || llm.state === "downloaded") {
    const pct = llm.totalBytes ? Math.round(100 * llm.downloadedBytes / llm.totalBytes) : 0;
    return '<div class="meta">' + esc(llm.message || llm.state) + "</div>"
      + '<div class="bar"><div style="width:' + pct + '%;background:var(--indigo)"></div></div>'
      + '<div class="actions" style="margin-top:10px">'
      + '<button class="mini" data-model-cancel>Cancel</button></div>';
  }
  const options = (llm.catalog || []).map((m) =>
    '<div class="row"><div><div class="name">' + esc(m.name)
    + (m.recommended ? ' <span class="pill">recommended</span>' : "") + "</div>"
    + '<div class="secondary">' + esc(m.description) + " · " + fmtSize(m.approxSizeBytes)
    + "</div></div>"
    + '<button class="mini" data-model-download="' + esc(m.id)
    + '">Download</button></div>').join("");
  return '<div class="meta">No on-device model yet — pick one to download. It '
    + "runs entirely on this machine.</div>"
    + '<div class="list" style="margin-top:8px">' + options + "</div>";
}

// The OpenAI-compatible API form — the `api` panel. Works with Groq's free
// tier, OpenRouter, Google Gemini's OpenAI endpoint, a local LM Studio, etc.
function apiPanelHtml(llm) {

  return '<div class="field"><label>API base URL</label>'
    + '<input id="set-api-url" type="text" autocomplete="off" '
    + 'placeholder="https://api.groq.com/openai/v1" value="' + esc(a.baseUrl || "") + '"></div>'
    + '<div class="field"><label>Model</label>'
    + '<input id="set-api-model" type="text" autocomplete="off" '
    + 'placeholder="llama-3.3-70b-versatile" value="' + esc(a.model || "") + '"></div>'
    + '<div class="field"><label>API key</label>'
    + '<input id="set-api-key" type="password" autocomplete="off" placeholder="'
    + (a.hasKey ? "saved — leave blank to keep it" : "your service's API key")
    + '"></div>'
    + '<div class="actions"><button class="mini" data-api-test>Test connection</button></div>'
    + '<div class="meta" id="set-api-status" style="margin-top:8px"></div>'
    + '<p class="sub-hint" style="margin-top:9px">Any OpenAI-compatible chat API works. '

    + '<a href="https://console.groq.com" target="_blank" rel="noopener">Groq</a> — '

// The Ollama server form — the `ollama` panel.
function ollamaPanelHtml(llm) {
  const o = llm.ollama || {};
  return '<div class="field"><label>Server URL</label>'
    + '<input id="set-ollama-url" type="text" autocomplete="off" '
    + 'placeholder="http://localhost:11434" value="' + esc(o.baseUrl || "") + '"></div>'

    + '<input id="set-ollama-model" type="text" autocomplete="off" '
    + 'placeholder="qwen2.5:3b" value="' + esc(o.model || "") + '"></div>'
    + '<div class="field"><label>API key</label>'
    + '<input id="set-ollama-key" type="password" autocomplete="off" placeholder="'
    + (o.hasKey ? "saved — leave blank to keep it" : "for Ollama Cloud; blank for a local server")
    + '"></div>'
    + '<div class="actions"><button class="mini" data-ollama-test>Test connection</button></div>'

}

function modelSectionHtml() {
  const llm = state.llm;
  if (!llm) return '<div class="meta">AI engine status unavailable.</div>';
  if (llmPanelMode == null) llmPanelMode = llm.mode || "local";
  const seg = '<div class="seg" id="set-llm-mode" style="margin-bottom:12px">'
    + '<button type="button" data-llm-mode="local"'
    + (llmPanelMode === "local" ? ' class="on"' : "") + ">On-device model</button>"
    + '<button type="button" data-llm-mode="ollama"'
    + (llmPanelMode === "ollama" ? ' class="on"' : "") + ">Ollama server</button>"
    + '<button type="button" data-llm-mode="api"'
    + (llmPanelMode === "api" ? ' class="on"' : "") + ">API service</button></div>";
  const panel = llmPanelMode === "ollama" ? ollamaPanelHtml(llm)
    : llmPanelMode === "api" ? apiPanelHtml(llm)
    : llmCatalogHtml(llm);
  const active = llm.mode === "ollama"
    ? "Active: Ollama" + (llm.ollama && llm.ollama.model ? " · " + esc(llm.ollama.model) : "")
    : llm.mode === "api"
    ? "Active: API" + (llm.api && llm.api.model ? " · " + esc(llm.api.model) : "")
    : "Active: on-device model";
  const applyLabel = llmPanelMode === "ollama" ? "Use this Ollama server"
    : llmPanelMode === "api" ? "Use this API service"
    : "Use the on-device model";
  return seg + panel
    + '<div class="actions" style="margin-top:12px;justify-content:space-between;'
    + 'align-items:center"><span class="meta">' + active + "</span>"
    + '<button class="mini" data-llm-apply>' + applyLabel + "</button></div>";
}

function fillModelSection() {
  const el = document.getElementById("set-model");
  if (!el) return;
  el.innerHTML = modelSectionHtml();
  el.querySelectorAll("[data-model-download]").forEach((b) =>
    b.addEventListener("click", () => downloadModel(b.dataset.modelDownload)));
  const cancel = el.querySelector("[data-model-cancel]");
  if (cancel) cancel.addEventListener("click", cancelModel);
  el.querySelectorAll("[data-llm-mode]").forEach((b) =>
    b.addEventListener("click", () => { llmPanelMode = b.dataset.llmMode; fillModelSection(); }));
  const test = el.querySelector("[data-ollama-test]");
  if (test) test.addEventListener("click", testOllamaConnection);
  const apiTest = el.querySelector("[data-api-test]");
  if (apiTest) apiTest.addEventListener("click", testApiConnection);
  const apply = el.querySelector("[data-llm-apply]");
  if (apply) apply.addEventListener("click", applyLlmProvider);
}

// Reads the Ollama form inputs currently on screen.
function ollamaFieldValues() {
  const get = (id) => { const e = document.getElementById(id); return e ? e.value : ""; };
  return {
    url: get("set-ollama-url").trim(),
    model: get("set-ollama-model").trim(),
    key: get("set-ollama-key"),
  };
}

// Reads the API-service form inputs currently on screen.
function apiFieldValues() {
  const get = (id) => { const e = document.getElementById(id); return e ? e.value : ""; };
  return {
    url: get("set-api-url").trim(),
    model: get("set-api-model").trim(),
    key: get("set-api-key"),
  };
}

// Probes the Ollama server with the values typed in, without saving them.
async function testOllamaConnection() {
  const f = ollamaFieldValues();
  const statusEl = document.getElementById("set-ollama-status");
  if (statusEl) statusEl.textContent = "Testing the connection…";
  try {
    const body = { ollamaUrl: f.url };
    if (f.key) body.ollamaKey = f.key;
    const r = await api("/llm/ollama/test", "POST", body);
    const list = r.models && r.models.length
      ? " — " + r.models.slice(0, 6).join(", ")
        + (r.models.length > 6 ? "…" : "") : "";
    if (statusEl) statusEl.textContent = r.message + list;
  } catch (e) {
    if (statusEl) statusEl.textContent = e.message;
  }
}

// Same as testOllamaConnection, but for the OpenAI-compatible API service.
async function testApiConnection() {
  const f = apiFieldValues();
  const statusEl = document.getElementById("set-api-status");
  if (statusEl) statusEl.textContent = "Testing the connection…";
  try {
    const body = { apiUrl: f.url };
    if (f.key) body.apiKey = f.key;
    const r = await api("/llm/api/test", "POST", body);
    const list = r.models && r.models.length
      ? " — " + r.models.slice(0, 6).join(", ")
        + (r.models.length > 6 ? "…" : "") : "";
    if (statusEl) statusEl.textContent = r.message + list;
  } catch (e) {
    if (statusEl) statusEl.textContent = e.message;
  }
}

// Commits the chosen AI engine to the engine — separate from the Settings
// modal's Save button, like the model download.
async function applyLlmProvider() {
  const mode = llmPanelMode || "local";
  const body = { mode };
  if (mode === "ollama") {
    const f = ollamaFieldValues();
    if (!f.url || !f.model) {
      toast("Enter the Ollama server URL and model name first.", true);
      return;
    }
    body.ollamaUrl = f.url;
    body.ollamaModel = f.model;
    if (f.key) body.ollamaKey = f.key; // blank keeps the saved key
  } else if (mode === "api") {
    const f = apiFieldValues();
    if (!f.url || !f.model) {
      toast("Enter the API base URL and model name first.", true);
      return;
    }
    if (!f.key && !(state.llm && state.llm.api && state.llm.api.hasKey)) {
      toast("Enter the API key first.", true);
      return;
    }
    body.apiUrl = f.url;
    body.apiModel = f.model;
    if (f.key) body.apiKey = f.key; // blank keeps the saved key
  }
  try {
    state.llm = await api("/llm/provider", "POST", body);
    llmPanelMode = state.llm.mode;
    fillModelSection();
    render();
    toast(mode === "ollama" ? "Now using your Ollama server for AI."
      : mode === "api" ? "Now using your API service for AI."
      : "Now using the on-device model for AI.");
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast(e.message, true);
  }
}

// A category emoji with the institution's favicon layered on top; if the
// favicon cannot load, onerror removes it and the emoji shows through.
function companyLogo(company) {
  const type = company && company.type ? company.type : "bank";
  const emoji = type === "card" ? "💳" : type === "brokerage" ? "📈" : "🏦";
  const img = company && company.domain
    ? '<img src="/logo/' + encodeURIComponent(company.id) + '" '
      + 'alt="" onerror="this.remove()">'
    : "";
  return '<span class="logo">' + emoji + img + "</span>";
}
function categoryLabel(type) {
  return type === "card" ? "Credit card"
    : type === "brokerage" ? "Brokerage"
    : type === "pension" ? "Pension fund" : "Bank";
}
// SnapTrade brokerages are not in the scraper catalog, so their logo is the
// favicon of a known website, matched on the connection / account name.
const BROKERAGE_DOMAINS = {
  "interactive brokers": "interactivebrokers.com", "ibkr": "interactivebrokers.com",
  "charles schwab": "schwab.com", "schwab": "schwab.com",
  "fidelity": "fidelity.com", "robinhood": "robinhood.com",
  "vanguard": "vanguard.com", "e*trade": "etrade.com", "etrade": "etrade.com",
  "webull": "webull.com", "td ameritrade": "tdameritrade.com",
  "coinbase": "coinbase.com", "merrill": "ml.com", "sofi": "sofi.com",
};
function brokerageDomain(conn) {
  const accts = state.accounts.filter((a) => a.connectionId === conn.id);
  const text = (conn.displayName + " "
    + accts.map((a) => a.label || "").join(" ")).toLowerCase();
  for (const k in BROKERAGE_DOMAINS) {
    if (text.indexOf(k) >= 0) return BROKERAGE_DOMAINS[k];
  }

}

function brokerageLogo(b) {

    ? '<img src="' + esc(b.logoUrl) + '" alt="" onerror="this.remove()">'
    : "";
  return '<span class="logo">📈' + img + "</span>";
}

// A pill-shaped toggle that includes/excludes one account or manual asset
// from the net-worth total. The "In net worth" label stays visible on every
// row so it's obvious what the box does; the title attribute adds the longer
// explanation on hover. `kind` is "account" or "asset".
function nwTick(kind, id, excluded) {
  return '<label class="nw-pill' + (excluded ? "" : " on") + '" title="'
    + (excluded
        ? "Excluded from net worth. Tick to count this balance in the total."
        : "Counted in net worth. Untick to leave this balance out of the total.")
    + '"><input type="checkbox" class="nw-tick" data-toggle-nw="' + esc(kind)

// --- Brokerage helpers -----------------------------------------------------

function holdingsFor(accountId) {
  return (state.brokerage.holdings || []).filter((h) => h.accountId === accountId);
}

// Market value, cost and unrealized gain for one position. `openPnl` is used
// when the brokerage reports it; otherwise gain is derived from cost basis.
function holdingStats(h) {
  const value = h.price != null ? h.units * h.price : null;
  const cost = h.costBasis != null ? h.units * h.costBasis : null;
  let gain = h.openPnl != null ? h.openPnl
    : (value != null && cost != null ? value - cost : null);
  const gainPct = gain != null && cost ? (gain / Math.abs(cost)) * 100 : null;
  return { value: value, cost: cost, gain: gain, gainPct: gainPct };
}

// The expanded per-account positions list shown under a brokerage account.
function holdingsList(holds) {
  const rows = holds.map((h) => {
    const s = holdingStats(h);
    const gainCls = s.gain == null ? "flat" : s.gain >= 0 ? "good" : "bad";
    const gainTxt = s.gainPct == null ? ""
      : '<span class="hold-gain ' + gainCls + '">'
        + (s.gain >= 0 ? "↑" : "↓") + " " + Math.abs(s.gainPct).toFixed(1) + "%</span>";
    return '<div class="hold-row"><div class="hold-sym"><span class="hold-tk">'
      + esc(h.symbol) + "</span>"
      + (h.description ? '<span class="hold-desc">' + esc(h.description) + "</span>" : "")
      + '</div><div class="hold-end">'
      + '<span class="hold-val">' + (s.value != null ? money(s.value, h.currency) : "—")
      + "</span>"
      + '<span class="hold-units">' + fmtUnits(h.units) + " @ "
      + (h.price != null ? money(h.price, h.currency) : "—") + "</span>"
      + gainTxt + "</div></div>";
  }).join("");
  return '<div class="holds-list">' + rows + "</div>";
}

function fmtUnits(n) {
  const r = Math.round(n * 1e6) / 1e6;
  return Number.isInteger(r) ? String(r) : r.toFixed(4).replace(/0+$/, "");
}

function connectionCard(conn) {
  const accounts = state.accounts.filter((a) => a.connectionId === conn.id);
  const isSnap = conn.companyId === SNAPTRADE_ID;
  const prog = state.scrapes[conn.id];
  const company = state.companies.find((c) => c.id === conn.companyId);
  const isCard = !!(company && company.type === "card");

  let metaText = company ? company.name : conn.companyId;
  if (conn.lastScrapeAt) {
    metaText += " · " + (conn.lastStatus === "error" ? "sync failed" : "synced")
      + " " + fmtDate(conn.lastScrapeAt);
  }

  const buttons = [];
  if (!conn.hasCredentials) {
    buttons.push('<button class="mini primary" data-action="set-credentials" data-id="'
      + conn.id + '">Set credentials</button>');
  }
  buttons.push('<button class="mini" data-action="sync" data-id="' + conn.id + '">↻ Sync</button>');
  if (isSnap) {
    buttons.push('<button class="mini" data-action="link-brokerage" data-id="' + conn.id
      + '">Link brokerage</button>');
  }
  buttons.push('<button class="mini danger" data-action="remove" data-id="' + conn.id
    + '">Remove</button>');

  // Account balance — click to set by hand; shown red when negative.
  const amt = (a) => '<span class="amount bal-edit'
    + (a.balance != null && a.balance < 0 ? " neg" : "")
    + '" data-edit-balance="' + esc(a.id) + '" title="Set balance">'
    + money(a.balance, a.currency) + "</span>";

  let rows, total = null, totalCur = "ILS";
  if (accounts.length) {
    accounts.forEach((a) => {
      // An account the user excluded does not count toward the connection's
      // total — keeping it in step with the net-worth figure.
      if (a.balance != null && !a.excluded) {
        total = (total || 0) + a.balance; totalCur = a.currency;
      }
    });
    rows = '<div class="list conn-accounts">' + accounts.map((a) => {
      const holds = isSnap ? holdingsFor(a.id) : [];
      const open = !!state.expandedHoldings[a.id];
      const toggle = holds.length
        ? '<button class="holds-toggle" data-action="toggle-holdings" data-id="'
          + esc(a.id) + '">' + (open ? "▾ " : "▸ ") + holds.length + " holding"
          + (holds.length === 1 ? "" : "s") + "</button>"
        : "";
      return '<div class="row' + (a.excluded ? " nw-off" : "") + '"><div><div class="name">'
        + esc(a.label || "Account " + a.accountNumber) + "</div>"
        + (a.label ? '<div class="secondary">' + esc(a.accountNumber) + "</div>" : "")
        + toggle
        + '</div><div class="row-end">' + amt(a)
        + nwTick("account", a.id, a.excluded) + "</div></div>"
        + (open ? holdingsList(holds) : "");
    }).join("") + "</div>";
  } else if (isSnap && !conn.lastScrapeAt) {
    rows = '<div class="empty">No brokerage linked yet — use “Link brokerage”.</div>';
  } else {
    rows = '<div class="empty">' + (conn.lastScrapeAt ? "No accounts found." : "Not synced yet.")
      + "</div>";
  }

  // This billing cycle's spending. Credit cards show it as their headline
  // figure (their "balance"); banks show it as a secondary line.
  const cycleSpent = !isSnap && accounts.length ? connectionSpend(conn) : 0;
  let spendLine = "";
  if (!isSnap && !isCard && accounts.length && cycleSpent < 0) {
    spendLine = '<div class="conn-spend"><span>Spent this month</span>'
      + '<span class="conn-spend-amt">' + money(-cycleSpent, "ILS") + "</span></div>";
  }

  let progressNote = "";
  if (prog) {
    const cls = prog.phase === "done" ? "ok" : prog.phase === "failed" ? "err" : "run";
    progressNote = '<div class="note ' + cls + '">' + esc(prog.message) + "</div>";
  }
  const disabled = prog && prog.phase === "running" ? " disabled" : "";
  const btns = buttons.join("").replace(/<button/g, "<button" + (disabled ? " disabled" : ""));
  // SnapTrade connections show the linked brokerage's own favicon (matched by
  // name) rather than the SnapTrade favicon; 📈 is the fallback.
  let logo;
  if (isSnap) {
    const d = brokerageDomain(conn);
    logo = d
      ? '<span class="logo">📈<img src="/logo/brk-' + encodeURIComponent(d)
        + "?domain=" + encodeURIComponent(d) + '" alt="" onerror="this.remove()"></span>'
      : '<span class="logo">📈</span>';
  } else {
    logo = companyLogo(company);
  }

  // Credit cards headline the cycle's spend; others headline the balance.
  let headAmt = "";
  if (isCard && accounts.length) {
    headAmt = '<span class="conn-total' + (cycleSpent < 0 ? " neg" : "") + '">'
      + money(cycleSpent, "ILS", true) + "</span>";
  } else if (total != null) {
    headAmt = '<span class="conn-total' + (total < 0 ? " neg" : "") + '">'
      + money(total, totalCur) + "</span>";
  } else if (!isSnap && accounts.length) {
    // No balance was scraped — offer a clear way to enter it.
    headAmt = '<button class="mini" style="margin-left:auto" data-edit-balance="'
      + esc(accounts[0].id) + '">Set balance</button>';
  }

  return '<div class="card"><div class="card-head">' + logo
    + '<div style="min-width:0"><h3>' + esc(conn.displayName)
    + '</h3><div class="meta">' + esc(metaText) + "</div></div>"
    + headAmt
    + "</div>" + progressNote + rows + spendLine
    + '<div class="conn-foot actions">' + btns + "</div></div>";
}

// This billing cycle's net spending across a connection's accounts (negative).
function connectionSpend(conn) {
  const ids = new Set(state.accounts
    .filter((a) => a.connectionId === conn.id).map((a) => a.id));
  if (!ids.size) return 0;
  const key = currentCycleKey();
  let total = 0;
  state.transactions.forEach((t) => {
    if (!ids.has(t.accountId) || isCardTotal(t) || t.refundForId) return;
    if (cycleKey(t.date) !== key) return;
    const a = t.amount + txnRefundAmount(t);
    if (a < 0) total += a;
  });
  return total;
}

// This billing cycle's net spending on a single account (negative). The
// per-account counterpart of connectionSpend — used to give each card a
// figure, since card scrapers report no balance.
function accountCycleSpend(accountId) {
  const key = currentCycleKey();
  let total = 0;
  state.transactions.forEach((t) => {
    if (t.accountId !== accountId || isCardTotal(t) || t.refundForId) return;
    if (cycleKey(t.date) !== key) return;
    const a = t.amount + txnRefundAmount(t);
    if (a < 0) total += a;
  });
  return total;
}

const ASSET_META = {
  car: ["🚗", "Car"], property: ["🏠", "Property"], cash: ["💵", "Cash"],
  pension: ["🪺", "Pension"], crypto: ["🪙", "Crypto"], other: ["💎", "Asset"],
};

// A card for one manually-valued asset, with edit/remove actions.
function assetCard(a) {
  const meta = ASSET_META[a.kind] || ASSET_META.other;

  if (a.kind === "car") {
