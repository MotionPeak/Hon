// Hebrew + English labels for each loan track. The pill class matches a
// distinct colour so the four tracks read at a glance.
const LOAN_TRACK = {
  "fixed":     { label: "Fixed",                cls: "fixed" },
  "prime":     { label: "Prime + margin",       cls: "prime" },
  "cpi-fixed": { label: "CPI-linked · Fixed",   cls: "cpi-fixed" },
  "cpi-prime": { label: "CPI-linked · Prime",   cls: "cpi-prime" },
};

// A loan card with current outstanding, progress bar, monthly payment and
// remaining term. The progress bar animates from 0 each render so the value
// feels alive on screen.
function loanCard(loan) {
  const s = loan.state || {};
  const track = LOAN_TRACK[loan.rateType] || LOAN_TRACK.fixed;
  const pct = Math.max(0, Math.min(1, s.progress || 0)) * 100;
  const yrs = Math.floor((s.monthsRemaining || 0) / 12);
  const mos = Math.round((s.monthsRemaining || 0) - yrs * 12);
  const remainText = yrs
    ? yrs + " yr" + (yrs === 1 ? "" : "s") + (mos ? " " + mos + " mo" : "")
    : (mos + " mo" + (mos === 1 ? "" : "s"));
  const rateText = (s.annualRate != null ? s.annualRate.toFixed(2) : loan.rateValue.toFixed(2)) + "%";

  // A loan scraped from a bank carries the bank's connectionId. Show the
  // bank's logo and "Loan · {bank name}" as the headline, with the bank's
  // own product name (e.g. "דיגיטל 108-416") on the sub-line — so loans
  // from the same bank stay distinguishable. Hand-entered loans keep the
  // 📉 icon and the user-typed name.
  const conn = loan.connectionId
    ? state.connections.find((c) => c.id === loan.connectionId)
    : null;
  const bank = conn ? state.companies.find((c) => c.id === conn.companyId) : null;
  const headLogo = bank ? companyLogo(bank) : '<span class="logo">📉</span>';
  const heading = bank ? "Loan · " + esc(bank.name) : esc(loan.name);
  const productLine = bank
    ? '<div class="secondary">' + esc(loan.name)
        + (loan.externalId ? " · #" + esc(loan.externalId) : "") + "</div>"
    : "";

  return '<div class="card loan-card' + (loan.excluded ? " nw-off" : "") + '">'
    + '<div class="card-head">' + headLogo
    + '<div style="min-width:0"><h3>' + heading + "</h3>" + productLine
    + '<div class="meta">' + remainText + " left · "
    + '<span class="loan-pill ' + track.cls + '">' + esc(track.label) + "</span></div></div>"
    + '<span class="conn-total">' + money(-(s.outstanding || 0), loan.currency) + "</span></div>"
    + '<div class="loan-bar"><span style="width:' + pct.toFixed(1) + '%"></span></div>'
    + '<div class="loan-stats">'
    + '<div class="loan-stat"><label>Monthly</label><b>' + money(s.monthlyPayment || 0, loan.currency) + "</b></div>"
    + '<div class="loan-stat"><label>Rate</label><b>' + esc(rateText) + "</b>"
    + (loan.isPrime
        ? '<span class="muted">' + esc((state.rates.prime ?? 0).toFixed(2)) + "% prime + " + esc(loan.rateValue.toFixed(2)) + "%</span>"
        : (loan.isCpiLinked && s.cpiRatio && s.cpiRatio !== 1
            ? '<span class="muted">×' + esc(s.cpiRatio.toFixed(4)) + " index</span>"
            : ""))
    + "</div>"
    + '<div class="loan-stat"><label>Paid · ' + Math.round(pct) + '%</label>'
    + '<b>' + money(s.totalPaid || 0, loan.currency) + "</b>"
    + '<span class="muted">of ' + money(loan.principal * (s.cpiRatio || 1), loan.currency) + "</span></div>"
    + "</div>"
    // Lifetime total + interest at the current monthly payment. CPI- and
    // prime-linked tracks will move with the rate, so this is a snapshot
    // valid at today's rate, not a guaranteed figure.
    + (function () {
        const total = (s.monthlyPayment || 0) * (loan.termMonths || 0);
        const principalNow = loan.principal * (s.cpiRatio || 1);
        const interest = Math.max(0, total - principalNow);
        if (total <= 0) return "";
        return '<div class="loan-life"><span>Over '
          + loan.termMonths + " months</span> · <b>"
          + money(total, loan.currency) + "</b> total · <b>"
          + money(interest, loan.currency) + "</b> interest</div>";
      })()
    + '<div class="conn-foot actions">'
    + nwTick("loan", loan.id, loan.excluded)
    + '<button class="mini" data-action="edit-loan" data-id="' + esc(loan.id) + '">Edit</button>'
    + '<button class="mini danger" data-action="remove-loan" data-id="' + esc(loan.id) + '">Remove</button>'
    + "</div></div>";
}

/* --- Activity ------------------------------------------------------------ */

// Billing-cycle months (newest first) that have at least one transaction.
function activityMonths() {
  const set = {};
  state.transactions.forEach((t) => {
    if (isCardTotal(t) || t.refundForId) return;
    const k = cycleKey(t.date);
    if (k && k.length === 7) set[k] = true;
  });
  return Object.keys(set).sort().reverse();
}

function batchBar() {
  if (!state.selectMode) return "";
  const n = Object.keys(state.batch).length;
  const allCats = categoryNames();
  const cur = state.batchCat || allCats[0] || "Other";
  const [curEm, curColor] = catStyle(cur);
  let menu = "";
  if (state.batchOpen) {
    menu = '<div class="bcat-menu">' + allCats.map((c) => {
      const [em, color] = catStyle(c);
      return '<div class="bcat-opt' + (c === cur ? " on" : "")
        + '" data-batch-cat="' + esc(c) + '">'
        + '<span class="bcat-em" style="background:' + color + '22">' + em + "</span>"
        + "<span>" + esc(c) + "</span>"
        + (c === cur ? '<span class="bcat-check">✓</span>' : "") + "</div>";
    }).join("") + "</div>";
  }
  return '<div class="batch-bar">'
    + '<span class="batch-n">' + (n ? n + " selected" : "Tap rows to select")
    + "</span><span class=\"batch-sep\">move to</span>"
    + '<div class="bcat">'
    + '<button class="bcat-btn' + (state.batchOpen ? " open" : "")
    + '" data-action="batch-toggle">'
    + '<span class="bcat-em" style="background:' + curColor + '22">' + curEm + "</span>"
    + "<span>" + esc(cur) + '</span><span class="bcat-chev">▾</span></button>'
    + menu + "</div>"
    + '<button class="primary" data-action="batch-move"'
    + (n ? "" : " disabled") + ">Move</button>"
    + '<button data-action="batch-clear"' + (n ? "" : " disabled")
    + ">Clear</button></div>";
}

function activityView() {
  if (!state.transactions.length) {
    return '<div class="card empty">No transactions yet — '
      + "sync an account to see activity.</div>";
  }
  const byId = {};
  state.accounts.forEach((a) => { byId[a.id] = a; });

  const months = activityMonths();
  if (!months.length) months.push(new Date().toISOString().slice(0, 7));
  if (!state.activityMonth || months.indexOf(state.activityMonth) < 0) {
    state.activityMonth = months[0];
  }
  const mi = months.indexOf(state.activityMonth);
  const inCycle = state.transactions.filter(
    (t) => cycleKey(t.date) === state.activityMonth);
  const hidden = inCycle.filter(isCardTotal).length;
  // Refunds are folded into their expense, so they don't show as their own row.
  const folded = inCycle.filter((t) => t.refundForId && !isCardTotal(t)).length;
  const monthTxns = inCycle.filter((t) => !isCardTotal(t) && !t.refundForId);

  // Group the month's transactions under their spending category.
  const groups = {};
  monthTxns.forEach((t) => {
    const cat = t.category || "Uncategorized";
    (groups[cat] || (groups[cat] = [])).push(t);
  });
  const order = categoryNames().concat(["Uncategorized"]);
  const cats = Object.keys(groups).sort((a, b) => {
    const ia = order.indexOf(a), ib = order.indexOf(b);
    return ((ia < 0 ? 999 : ia) - (ib < 0 ? 999 : ib)) || a.localeCompare(b);
  });
  state._actCats = cats;
  const allCollapsed = cats.length && cats.every((c) => state.collapsed[c]);
  const catRunning = state.categorize && state.categorize.state === "running";

  const searchQ = (state.activitySearch || "").trim().toLowerCase();
  const searchVal = state.activitySearch || "";
  const searchBox = '<div class="act-search"><span class="act-search-ico">⌕</span>'
    + '<input id="act-search" type="search" placeholder="Search transactions…" '
    + 'value="' + esc(searchVal) + '" '
    + 'oninput="setActivitySearch(this.value)" '
    + 'onkeydown="if(event.key===\'Escape\')setActivitySearch(\'\')">'
    + (searchVal ? '<button type="button" class="act-search-clear" '
        + 'onclick="setActivitySearch(\'\')" aria-label="Clear">×</button>' : "")
    + "</div>";

  const header = '<div class="card act-bar">'
    + (searchQ ? "" : '<div class="month-pick">'
        + '<button class="icon-btn" data-action="month-prev"'
        + (mi >= months.length - 1 ? " disabled" : "") + ">‹</button>"
        + '<span class="month-label">' + esc(cycleLabel(state.activityMonth)) + "</span>"
        + '<button class="icon-btn" data-action="month-next"'
        + (mi <= 0 ? " disabled" : "") + ">›</button></div>")
    + '<div class="act-meta"><span class="act-count">' + monthTxns.length
    + (monthTxns.length === 1 ? " transaction" : " transactions") + "</span>"
    + (catRunning
        ? '<span class="act-cat"><span class="spin">⟳</span> Categorizing… '
          + (state.categorize.done || 0) + "/" + (state.categorize.total || 0)
          + "</span>"
        : hidden ? '<span class="act-hidden">' + hidden + " card-bill line"
            + (hidden === 1 ? "" : "s") + " hidden</span>" : "")
    + (folded ? '<span class="act-hidden">' + folded + " reimbursement"
        + (folded === 1 ? "" : "s") + " applied</span>" : "")
    + "</div>" + searchBox + "<span class=\"spacer\"></span>"
    + (!searchQ && cats.length > 1
        ? '<button class="mini" data-action="collapse-all">'
          + (allCollapsed ? "Expand all" : "Collapse all") + "</button>" : "")
    + '<button class="mini' + (state.selectMode ? " primary" : "")
    + '" data-action="toggle-select">'
    + (state.selectMode ? "Done" : "Select") + "</button></div>";

  if (!searchQ && !monthTxns.length) {
    return header + '<div class="card empty">No transactions in '
      + esc(cycleLabel(state.activityMonth)) + ".</div>";
  }

  const txnRow = (t, i) => {
    const acct = byId[t.accountId];
    const place = acct ? " · " + esc(acct.label || acct.connectionName) : "";
    const [em, color] = catStyle(t.category || "Other");
    const picked = !!state.batch[t.id];
    const sel = !state.selectMode && state.move && state.move.txnId === t.id
      ? " sel" : "";
    const check = state.selectMode
      ? '<span class="txn-check' + (picked ? " on" : "") + '">'
        + (picked ? "✓" : "") + "</span>" : "";
    const refund = txnRefundAmount(t);
    const note = refund
      ? '<span class="txn-refund"> · ' + money(refund, t.currency)
        + " reimbursed</span>" : "";
    const swNote = splitwiseNote(t);
    const shown = t.amount + refund;
    // Pending zero-amount charges (e.g. Max purchases the bank hasn't yet
    // finalized) show a Pending pill instead of "₪0.00" — the figure isn't
    // available yet, and showing 0 read as a free purchase.
    const isPendingZero = t.status === "pending" && !shown;
    const amtCell = isPendingZero
      ? '<span class="txn-pending">Pending</span>'
      : '<div class="txn-amt' + (shown > 0 ? " pos" : "") + '">'
        + money(shown, t.currency, true) + "</div>";
    return '<div class="txn' + sel + (picked ? " picked" : "")
      + '" data-txn="' + esc(t.id)
      + '" style="animation-delay:' + Math.min(i, 16) * 20 + 'ms">'
      + check
      + '<span class="txn-icon" style="background:' + color + '26;color:' + color
      + '">' + em + "</span>"
      + '<div class="txn-main"><div class="txn-name">' + esc(t.description) + "</div>"
      + '<div class="txn-sub">' + fmtDate(t.date) + place + note + loanNote(t) + swNote
      + "</div></div>"
      + amtCell + "</div>";
  };
  // Search mode: a flat, cross-month list of matching transactions, newest
  // first — no category grouping. Card-totals and refunds are still folded
  // out, same as the month view.
  if (searchQ) {
    const matches = state.transactions
      .filter((t) => !isCardTotal(t) && !t.refundForId && txnMatchesSearch(t, searchQ))
      .sort((a, b) => new Date(b.date) - new Date(a.date));
    const list = matches.length
      ? '<div class="cat-list">' + matches.map(txnRow).join("") + "</div>"
      : '<div class="empty">No matching transactions.</div>';
    return header
      + '<div class="card cat-card">'
      + '<div class="cat-head" style="cursor:default">'
      + '<span class="cat-name">Search results</span>'
      + '<span class="cat-count">' + matches.length + "</span></div>"
      + list + "</div>";
  }

  const buildCard = (cat) => {
    const [, color] = catStyle(cat === "Uncategorized" ? "Other" : cat);
    const list = groups[cat].slice().sort((a, b) => new Date(b.date) - new Date(a.date));
    const collapsed = !!state.collapsed[cat];
    let total = 0, cur = "ILS";
    list.forEach((t) => { total += t.amount + txnRefundAmount(t); cur = t.currency; });
    const picks = list.filter((t) => state.batch[t.id]).length;
    const count = picks ? picks + " / " + list.length : String(list.length);
    const html = '<div class="card cat-card' + (collapsed ? " collapsed" : "") + '">'
      + '<div class="cat-head" data-collapse="' + esc(cat) + '">'
      + '<span class="cat-chev' + (collapsed ? " col" : "") + '">▾</span>'
      + '<span class="cat-dot" style="background:' + color + '"></span>'
      + '<span class="cat-name">' + esc(cat) + "</span>"
      + '<span class="cat-count' + (picks ? " has" : "") + '">' + count + "</span>"
      + '<span class="cat-total" style="color:' + (total < 0 ? "var(--text)" : "var(--green)")
      + '">' + money(total, cur, true) + "</span></div>"
      + (collapsed ? ""
          : '<div class="cat-list">' + list.map(txnRow).join("") + "</div>")
      + "</div>";
    // Rough rendered height, used only to balance the columns.
    return { html, h: collapsed ? 56 : 70 + list.length * 57, total, cur };
  };
  // Columns are height-balanced so each column's first card lines up at the
  // top (a CSS multi-column layout leaves a ragged gap above later columns).
  const contentEl = document.getElementById("content");
  const colW = (contentEl && contentEl.clientWidth) || 880;
  const baseCols = allCollapsed ? 1 : Math.max(1, Math.min(3, Math.floor(colW / 380)));

  // Group the category cards under the Fixed / Variable / Other umbrellas.
  let firstShown = true;
  const sections = GROUP_ORDER.map((g) => {
    const ucats = cats.filter((c) => catGroup(c) === g);
    if (!ucats.length) return "";
    const data = ucats.map(buildCard);
    let total = 0, cur = "ILS";
    data.forEach((d) => { total += d.total; cur = d.cur; });
    // Always pack into the same number of columns so card widths stay
    // consistent between umbrellas, even when one has a single card.
    const cols = packColumns(data, (c) => c.h, baseCols);
    const grid = '<div class="act-cols">' + cols.map((col) =>
      '<div class="act-col">' + col.map((c) => c.html).join("") + "</div>").join("")
      + "</div>";
    const head = '<div class="umbrella"><span class="umbrella-name">'
      + GROUP_LABEL[g] + '</span><span class="umbrella-line"></span>'
      + '<span class="umbrella-total" style="color:'
      + (total < 0 ? "var(--text)" : "var(--green)") + '">'
      + money(total, cur, true) + "</span></div>";
    const cls = "act-section" + (firstShown ? "" : " gap");
    firstShown = false;
    return '<div class="' + cls + '">' + head + grid + "</div>";
  }).join("");

  return header + sections
    + (state.selectMode ? '<div style="height:88px"></div>' : "")
    + batchBar();
}

// Greedy bin-packing: places each item in the currently shortest column.
function packColumns(items, getHeight, colCount) {
  const cols = [];
  for (let i = 0; i < colCount; i++) cols.push({ h: 0, items: [] });
  items.forEach((it) => {
    let best = cols[0];
    for (const c of cols) if (c.h < best.h) best = c;
    best.items.push(it);
    best.h += getHeight(it);
  });
  return cols.map((c) => c.items);
}

// One essential-category budget row: emoji, spent / limit, and a usage bar.
function essentialLineHtml(l, currency) {
  const [emoji, color] = catStyle(l.category);
  const ratio = l.budget ? l.spent / l.budget : null;
  const pct = ratio == null ? 100 : Math.min(100, ratio * 100);
  const over = ratio != null && ratio > 1;
  const barColor = ratio == null ? color
    : over ? "var(--red)" : ratio > 0.85 ? "var(--amber)" : "var(--green)";
  let foot = "";
  if (ratio != null) {
    const left = l.budget - l.spent;
    const cls = over ? "over" : ratio > 0.85 ? "warn" : "ok";
    const txt = over ? money(-left, currency) + " over"
      : money(left, currency) + " left";
    foot = '<div class="bgt-foot"><span class="bgt-pct">'
      + Math.round(ratio * 100) + '% used</span>'
      + '<span class="bgt-left ' + cls + '">' + txt + "</span></div>";
  }
  return '<div class="bgt-line" data-action="edit-budgets">'
    + '<div class="bgt-head"><span class="bgt-emoji">' + emoji + "</span>"
    + '<span class="bgt-cat">' + esc(l.category) + "</span>"
    + (l.budget
        ? '<span class="bgt-amt">' + money(l.spent, currency)
          + ' <span class="bgt-cap">/ ' + money(l.budget, currency)
          + "</span></span>"
        : '<span class="bgt-nolimit">' + money(l.spent, currency)
          + " · set limit</span>")
    + "</div>"
    + '<div class="bgt-track"><div class="bgt-fill' + (over ? " over" : "")
    + '" style="width:' + pct + "%;background:" + barColor + '"></div></div>'
    + foot + "</div>";
}

// Expected recurring income and fixed-bill commitment for the projected
// budget. Only recurring income is averaged — a source seen in two or more
// cycles — so a one-off windfall does not inflate it; each fixed bill is
// reduced to a monthly-equivalent so a bimonthly bill is reserved every cycle.
// Returns null when projection is switched off in Settings.
function budgetProjection() {
  if (!settings.projectRecurring) return null;
  const n = settings.incomeAvgMonths || 3;

  // Detect recurring income: a source (merchant) that has deposited in two or
  // more distinct cycles. A one-off deposit — a windfall, a gift — is ignored.
  const incomeSeen = {}; // merchantKey -> { cycleKey: true }
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || t.refundForId || t.category === "Transfers") return;
    if (t.amount + txnRefundAmount(t) <= 0) return;
    const key = merchantKey(t.description);
    (incomeSeen[key] || (incomeSeen[key] = {}))[cycleKey(t.date)] = true;
  });
  const recurringIncome = {};
  Object.keys(incomeSeen).forEach((key) => {
    if (Object.keys(incomeSeen[key]).length >= 2) recurringIncome[key] = true;
  });
  // A source the user marked as recurring income always counts — even before
  // it has repeated enough to be detected automatically.
  Object.keys(state.merchantFreq).forEach((key) => {
    if (state.merchantFreq[key] === "income") recurringIncome[key] = true;
  });

  // Expected income: average that recurring income over the chosen window of
  // completed cycles that actually saw it.
  const win = {};
  let k = prevCycleKey(currentCycleKey()); // start at the last completed cycle
  for (let i = 0; i < n; i++) { win[k] = 0; k = prevCycleKey(k); }
  const cur = currentCycleKey();
  let cycleIncome = 0; // fallback: this cycle's own non-transfer income
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || t.refundForId || t.category === "Transfers") return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt <= 0) return;
    const ck = cycleKey(t.date);
    if (ck === cur) cycleIncome += amt;
    if (ck in win && recurringIncome[merchantKey(t.description)]) win[ck] += amt;
  });
  const earned = Object.keys(win).filter((c) => win[c] > 0);
  // No recurring income known yet — fall back to this cycle's actual income
  // (internal transfers excluded), never the raw server figure which counts
  // transfers as income.
  const computedIncome = earned.length
    ? earned.reduce((s, c) => s + win[c], 0) / earned.length : cycleIncome;
  // The user can manually override the auto-averaged income from the budget
  // editor — e.g. a known fixed salary that the average underestimates while
  // still ramping up. The computed value is still kept for the editor to show
  // as a placeholder/comparison.
  const expectedIncome = state.incomeOverride != null ? state.incomeOverride : computedIncome;

  // Expected fixed commitment: every recurring fixed-group merchant reduced to
  // a monthly-equivalent. "Recurring" = a frequency is set, or it has charged
  // in two or more distinct cycles (a one-off fixed expense is not reserved).
  // Also computes a second figure, `expectedFixedThisCycle`, which is the
  // full charge of every recurring merchant predicted to bill this cycle —
  // a bimonthly bill counts in full the cycle it's due and zero the cycle in
  // between, instead of always counting half. That's the figure the Overview
  // headline uses ("Expected fixed + essentials" matches what your bank will
  // actually be charged this cycle).
  const merch = {};
  state.transactions.forEach((t) => {
    if (t.currency !== "ILS" || isCardTotal(t) || t.refundForId) return;
    if (catGroup(t.category) !== "fixed") return;
    const amt = t.amount + txnRefundAmount(t);
    if (amt >= 0) return;
    const key = merchantKey(t.description);
    const r = merch[key] || (merch[key] = {
      cycles: {}, lastT: 0, charge: 0, category: t.category || 'Other',
    });
    r.cycles[cycleKey(t.date)] = true;
    const ts = new Date(t.date).getTime();
    if (ts >= r.lastT) {
      r.lastT = ts; r.charge = -amt; r.category = t.category || r.category;
    }
  });

  // monthsBetweenCycleKeys: how many calendar months separate two YYYY-MM
  // cycle keys. Negative for future, 0 for same cycle, positive for past.
  // Cycles are calendar months (with a user-chosen start day), so the
  // YYYY-MM portion is sufficient for "is the next bill due here?" math.
  const ymToMonths = (s) => {
    const [y, m] = s.split("-").map(Number);
    return y * 12 + (m - 1);
  };
  const curCycle = currentCycleKey();
  const curMonths = ymToMonths(curCycle);
  const PERIOD_CYCLES = { monthly: 1, bimonthly: 2, yearly: 12 };
  const catSplits = state.categorySplits || {};

  let expectedFixed = 0;
  let expectedFixedThisCycle = 0;
  const cancelled = state.cancelledSubs || {};
  Object.keys(merch).forEach((key) => {
    const r = merch[key];
    const freq = state.merchantFreq[key];
    if (freq === "ignore") return; // user explicitly excluded this merchant
    if (cancelled[key]) return; // marked cancelled in the Subscriptions tab
    if (!freq && Object.keys(r.cycles).length < 2) return; // one-off — skip
    const f = freq || "monthly";
    const split = catSplits[r.category] || 1;
    expectedFixed += monthlyEquivalent(r.charge, f) / split;
    // Is this merchant due to bill this cycle?
    //   - If it has already billed this cycle, count the actual charge.
    //   - Else if at least one period has elapsed since its last bill, the
    //     next one is due now (or overdue) — count it.
    //   - Otherwise skip; it'll bill in a later cycle.
    const lastCycle = cycleKey(new Date(r.lastT).toISOString());
    const elapsed = curMonths - ymToMonths(lastCycle);
    const period = PERIOD_CYCLES[f] || 1;
    if (elapsed === 0 || elapsed >= period) {
      expectedFixedThisCycle += r.charge / split;
    }
  });

  return {
    expectedIncome: expectedIncome,
    expectedFixed: expectedFixed,
    expectedFixedThisCycle: expectedFixedThisCycle,
  };
}

// The variable-budget figures with recurring projection applied — income as a
// multi-month average, fixed bills smoothed to a monthly-equivalent. Falls back
// to the actual figures when projection is off.
function projectedVariable(v) {
  const p = budgetProjection();
  if (!p) return v;
  // Straightforward leftover formula:
  //   variable = income − (essential budget + expected fixed this cycle)
  // Income is the multi-month average ("Expected income"); the essential
  // side reserves the budgets you set in Settings (the planning amount, so
  // the leftover stays stable as essentials get used). For fixed we prefer
  // `expectedFixedThisCycle` from the merchant rollup — the FULL charge of
  // every recurring merchant predicted to bill this cycle, with per-
  // category splits applied. A bimonthly bill counts in full the cycle
  // it's due and zero the cycle in between, instead of an average half-
  // share. Falls back to the actual fixedSpent when the projection is off.
  const income = p.expectedIncome != null ? p.expectedIncome : v.income;
  const essentialBudget = ((state.budget && state.budget.essentials) || [])
    .reduce((s, l) => s + (l.budget || 0), 0);
  const essentialSpent = v.essentialSpent || 0;
  const essential = essentialBudget > 0
    ? Math.max(essentialBudget, essentialSpent)
    : essentialSpent;
  const fixed = p.expectedFixedThisCycle != null
    ? p.expectedFixedThisCycle
    : (v.fixedSpent || 0);
  const committed = fixed + essential;
  const piggy = v.piggyFunded || 0;
  // This-month savings reserve — capped at whatever room is left so it never
  // forces the leftover negative on its own. The wish is kept around for the
  // UI to show "(capped at …)" when the cap kicks in.
  const savingsEntry = state.monthlySavings[currentCycleKey()] || {};
  const savingsWish = savingsEntry.amount || 0;
  const savingsTransferred = !!savingsEntry.transferred;
  const roomBeforeSavings = Math.max(0, income - committed - piggy);
  const savings = Math.min(savingsWish, roomBeforeSavings);
  const disposable = income - committed - piggy - savings;
  return { spent: v.spent, income: income, fixedSpent: fixed,
    essentialSpent: essential, committed: committed, piggyFunded: piggy,
    savings: savings, savingsWish: savingsWish,
    savingsTransferred: savingsTransferred,
    disposable: disposable, allowed: disposable - v.spent, projected: true };
}

// The computed variable / discretionary allowance: whatever this month's
// income leaves once fixed bills and essentials are paid, less the variable
// spending already made. Goes to zero once outgoings outpace income.
function variableCardHtml(v, currency) {
  const pool = v.disposable > 0 ? v.disposable : 0;
  const pct = pool > 0 ? Math.max(0, Math.min(100, (v.allowed / pool) * 100)) : 0;
  // Lump-sum piggies funded this month — listed by name in the overdraft
  // warning so the cause of the negative variable is obvious.
  const banks = (((state.budget || {}).piggy || {}).banks || []);
  const lumpFunded = banks.filter((b) =>
    b.kind === "lump" && b.thisMonth.status === "funded" && b.thisMonth.amount > 0);
  const lumpThisMonth = lumpFunded.reduce((s, b) => s + (b.thisMonth.amount || 0), 0);
  const lumpNames = lumpFunded.map((b) => '"' + b.name + '"').join(", ");

  // Refund / Splitwise context for this cycle. Both figures are ALREADY
  // folded into v.committed (the txn_effective view applies them), so the
  // rows below are purely informational — they explain *why* "Fixed +
  // essentials" reads lower than the gross of what you spent.
  const curKey = currentCycleKey();
  const cycleExpenseIds = new Set(
    state.transactions
      .filter((t) => t.amount < 0 && cycleKey(t.date) === curKey)
      .map((t) => t.id),
  );
  let manuallyRefunded = 0;
  for (const l of (state.transactionLinks || [])) {
    if (cycleExpenseIds.has(l.expenseId)) manuallyRefunded += l.amount;
  }
  let owedToYou = 0;
  for (const link of ((state.splitwise || {}).links || [])) {
    if (!cycleExpenseIds.has(link.transactionId)) continue;
    const unpaid = Math.max(0, (link.owedToMe || 0) - (link.paidAmount || 0));
    // Don't double-count the part already covered by a manual link to the
    // same expense — that's the exact shape `txn_effective` uses.
    let manualForThis = 0;
    for (const l of (state.transactionLinks || [])) {
      if (l.expenseId === link.transactionId) manualForThis += l.amount;
    }
    owedToYou += Math.max(0, unpaid - manualForThis);
  }
  let cls = "", fillColor = "var(--green)", cap;
  if (!v.income && !v.committed && !v.spent) {
    cap = "No income or spending recorded this month yet.";
    fillColor = "var(--hairline-2)";
  } else if (v.disposable <= 0) {
    cls = "none"; fillColor = "var(--red)";
    const deficit = Math.abs(v.disposable);
    if (lumpFunded.length && lumpThisMonth >= deficit / 2) {
      // The lump set-asides explain (most of) the gap — call them out.
      cap = "Setting aside " + money(lumpThisMonth, currency) + " for "
        + lumpNames + " puts you " + money(deficit, currency)
        + " over what's coming in this month. The reservation still stands — "
        + "you'll need to dip into savings or cut back to absorb the gap.";
    } else {
      cap = "You're spending more than you're bringing in — there's no room "
        + "for variable spending this month.";
    }
  } else if (v.allowed <= 0) {
    cls = "none"; fillColor = "var(--red)";
    cap = "This month's discretionary room is used up — anything more eats "
      + "into money meant for fixed bills and essentials.";
  } else {
    cls = pct <= 20 ? "low" : "ok";
    fillColor = pct <= 20 ? "var(--amber)" : "var(--green)";
    cap = lumpFunded.length
      ? "Free to spend after reserving " + money(lumpThisMonth, currency)
        + " for " + lumpNames + " this month."
      : "Free to spend on shopping, entertainment, travel and the like.";
  }
  // Row helper. `tone` is "out" (red minus), "cred" (green credit/refund
  // row), or empty (neutral). The credit rows are informational — already
  // baked into the totals above, shown so the user sees WHY their effective
  // spend is below the gross.
  const row = (k, val, tone) => {
    const rowCls = tone === "cred" ? " cred-row" : "";
    return '<div class="bgt-var-row' + rowCls + '"><span class="k">' + k
      + '</span><span class="v' + (tone ? " " + tone : "") + '">' + val
      + "</span></div>";
  };
  // The credit rows live in a nested "of which …" block under fixed+essentials
  // so it's clear they explain that figure, not stack on top of it.
  let creditRows = "";
  if (manuallyRefunded > 0) {
    creditRows += row("Of which refunded", "↩ " + money(manuallyRefunded, currency), "cred");
  }
  if (owedToYou > 0) {
    creditRows += row("Of which owed to you", "⏳ " + money(owedToYou, currency), "cred");
  }
  return '<div class="bgt-group">Variable spending · allowed right now</div>'
    + '<div class="bgt-var ' + cls + '">'
    + '<div class="bgt-var-top"><span class="bgt-var-amt">'
    + money(v.allowed > 0 ? v.allowed : 0, currency)
    + '</span><span class="bgt-var-unit">left to spend</span></div>'
    + '<div class="bgt-var-cap">' + cap + "</div>"
    + '<div class="bgt-var-track"><div class="bgt-var-fill" style="width:'
    + pct + "%;background:" + fillColor + '"></div></div>'
    + '<div class="bgt-var-rows">'
    + row(v.projected ? "Expected income" : "Money in", money(v.income, currency))
    + row(v.projected ? "Expected fixed + essentials" : "Fixed + essential spend",
        "− " + money(v.committed, currency), "out")
    + creditRows
    + (lumpThisMonth
        ? row("Set asides (one-time)", "− " + money(lumpThisMonth, currency), "out")
        : "")
    + (v.savings > 0
        ? row("Savings (this month)"
            + (v.savingsWish && v.savingsWish > v.savings ? " · capped" : ""),
            "− " + money(v.savings, currency), "out")
        : "")
    + (v.piggyFunded - lumpThisMonth > 0
        ? row("Piggy banks",
            "− " + money(v.piggyFunded - lumpThisMonth, currency), "out")
        : "")
    + row("Variable spent", "− " + money(v.spent, currency), "out")
    + "</div>"
    + (v.projected ? '<div class="bgt-var-note">Projected — fixed bills '
        + "reserved every cycle and income averaged over recent months. "
        + "Turn off in Settings.</div>" : "")
    + "</div>";
}

function budgetSection() {
  const b = state.budget;
  if (!b) return "";
  const essentials = b.essentials || [];
  const v = b.variable
    || { income: 0, committed: 0, spent: 0, disposable: 0, allowed: 0 };

  let body = variableCardHtml(projectedVariable(v), b.currency);
  if (essentials.length) {
    const sortRatio = (a, b2) => {
      const ra = a.budget ? a.spent / a.budget : -1;
      const rb = b2.budget ? b2.spent / b2.budget : -1;
      return rb - ra || b2.spent - a.spent;
    };
    body += '<div class="bgt-group">Essentials</div>'
      + essentials.slice().sort(sortRatio)
          .map((l) => essentialLineHtml(l, b.currency)).join("");
  }
  body += '<div class="bgt-tot"><span>Spent this month</span><span>'
    + money(b.totalSpent || 0, b.currency) + "</span></div>";

  return '<section class="card"><div class="card-head"><h3>Budget · '
    + esc(cycleLabel(b.month)) + '</h3><span class="spacer"></span>'
    + '<button class="mini" data-action="edit-budgets">Edit</button></div>'
    + body + "</section>";
}

/* --- Piggy banks --------------------------------------------------------- */

// The piggy-bank screen. The settled per-bank status (saved so far, whether
// this month's set-aside fit the budget) rides along in the budget report.
function piggyView() {
  const rep = (state.budget && state.budget.piggy)
    || { banks: [], fundedTotal: 0, headroom: 0 };
  const banks = rep.banks || [];
  const cur = (state.budget && state.budget.currency) || "ILS";

  if (!banks.length) {
    return '<div class="blank"><div class="be">🐷</div>'
      + "<h2>No piggy banks yet</h2>"
      + "<p>Create one for something you're saving toward — a trip, a new "
      + "camera, a rainy-day fund — and Hon sets a little aside each month, "
      + "counting it as an expense against your budget.</p>"
      + '<button class="primary" data-action="new-piggy">'
      + "+ Create your first piggy bank</button></div>";
  }

  const head = '<div class="pgy-head"><div><h2>Piggy banks</h2>'
    + '<div class="pgy-sub">Money set aside each month for what you\'re saving '
    + "up for. It counts as an expense — and pauses automatically on any month "
    + "it doesn't fit your budget.</div></div><span class=\"spacer\"></span>"
    + '<button class="primary" data-action="new-piggy">+ New piggy bank</button>'
    + "</div>";

  const skipped = banks.filter((b) => !b.complete && b.thisMonth.status === "skipped").length;
  const incomeWord = rep.projected ? "your expected income" : "income";
  const room = rep.headroom > 0
    ? "Saving room this month — " + incomeWord + " less fixed bills and "
      + "essentials: <b>" + money(rep.headroom, cur) + "</b>."
      + (rep.projected ? " Projected from your recurring income." : "")
    : "There's no saving room this month — " + incomeWord + " is fully taken "
      + "up by fixed bills and essentials.";
  const set = rep.fundedTotal > 0
    ? " <b>" + money(rep.fundedTotal, cur) + "</b> set aside so far." : "";
  const pause = skipped
    ? " " + skipped + (skipped === 1 ? " bank is" : " banks are")
      + " paused — they don't fit right now." : "";
  const onHoldCount = banks.filter((b) => b.onHold && !b.complete).length;
  const held = onHoldCount
    ? " " + onHoldCount + " on hold." : "";
  const strip = '<div class="pgy-headroom"><span>🪙</span><span>'
    + room + set + pause + held + "</span></div>";

  return head + strip + '<div class="pgy-grid">'
    + banks.map(piggyCard).join("") + "</div>";
}

function piggyCard(b) {
  const cur = b.currency || "ILS";
  const lump = b.kind === "lump";
  const reserved = lump && b.thisMonth.status === "reserved";
  const pct = Math.round((b.progress || 0) * 100);
  const deg = Math.max(0, Math.min(360, (b.progress || 0) * 360));
  const ringColor = b.complete ? "var(--green)"
    : reserved ? "var(--green)"
    : b.onHold ? "var(--hairline-2)"
    : b.thisMonth.status === "skipped" ? "var(--amber)" : "var(--accent)";
  const ringLabel = lump ? (reserved ? "reserved" : "set aside") : "saved";
  const ring = '<div class="pgy-ring" style="background:conic-gradient('
    + ringColor + " " + deg.toFixed(1) + "deg, var(--card-hi) 0)\">"
    + '<div class="pgy-hole"><div class="pgy-pct">' + pct + "%</div>"
    + '<div class="pgy-pct-lbl">' + ringLabel + "</div></div></div>";

  let badge;
  if (b.complete) {
    badge = '<div class="pgy-badge done"><span>🎉</span><span>Goal reached — '
      + money(b.targetAmount, cur) + " saved.</span></div>";
  } else if (b.onHold) {
    badge = '<div class="pgy-badge onhold"><span>⏸</span><span>On hold — you\'ve '
      + "paused this piggy bank. Resume it any time to start saving again."
      + "</span></div>";
  } else if (lump) {
    // Lump-sum piggies always fund the first month — they're a "have-to"
    // commitment, not a "if-it-fits" goal. After that, they sit reserved
    // until the user marks them used.
    if (reserved) {
      badge = '<div class="pgy-badge done"><span>🔒</span><span>'
        + money(b.targetAmount, cur)
        + " set aside — held until you mark it used.</span></div>";
    } else {
      badge = '<div class="pgy-badge funded"><span>✓</span><span>'
        + money(b.thisMonth.amount, cur)
        + " reserved this month — counts as a fixed commitment in your budget.</span></div>";
    }
  } else if (b.thisMonth.status === "funded") {
    badge = '<div class="pgy-badge funded"><span>✓</span><span>'
      + money(b.thisMonth.amount, cur) + " set aside this month.</span></div>";
  } else {
    badge = '<div class="pgy-badge skipped"><span>⏸</span><span>Paused this '
      + "month — the set-aside doesn't fit your budget right now.</span></div>";
  }

  let eta = "";
  if (!lump && !b.complete && b.monthsLeft != null) {
    eta = '<div class="pgy-eta">'
      + (b.monthsLeft <= 1 ? "About a month to go"
          : "About " + b.monthsLeft + " months to go")
      + " · " + money(b.monthlyAmount, cur) + "/mo</div>";
  }

  const subline = lump
    ? '<div class="pgy-monthly">' + money(b.targetAmount, cur)
      + ' set aside <span class="pgy-tag">one-time</span></div>'
    : '<div class="pgy-monthly">' + money(b.monthlyAmount, cur)
      + " a month</div>";

  // Lump piggies swap "Hold" for "Mark as used" — semantically the user is
  // saying the reserved money has been spent on its intended target.
  const middleAction = b.complete ? ""
    : lump
      ? (reserved
          ? '<button class="mini" data-action="mark-piggy-used" data-id="'
            + esc(b.id) + '">Mark as used</button>'
          : '<button class="mini" data-action="toggle-hold" data-id="'
            + esc(b.id) + '">' + (b.onHold ? "Resume" : "Hold") + "</button>")
      : '<button class="mini" data-action="toggle-hold" data-id="' + esc(b.id)
        + '">' + (b.onHold ? "Resume" : "Hold") + "</button>";

  return '<div class="pgy-card' + (b.complete ? " done" : "")
    + (reserved ? " reserved" : "")
    + (b.onHold && !b.complete ? " onhold" : "") + '">'
    + '<div class="pgy-card-top"><div class="pgy-emoji">' + esc(b.emoji)
    + '</div><div style="flex:1;min-width:0"><div class="pgy-name">'
    + esc(b.name) + "</div>" + subline + "</div></div>"
    + '<div class="pgy-body">' + ring
    + '<div class="pgy-figs"><div class="pgy-saved">' + money(b.saved, cur)
    + '</div><div class="pgy-target">'
    + (lump
        ? (reserved
            ? "fully reserved · click <b>Mark as used</b> when paid"
            : "of " + money(b.targetAmount, cur) + " to reserve")
        : "of " + money(b.targetAmount, cur) + " goal · "
          + money(b.remaining, cur) + " to go")
    + "</div>" + eta + "</div></div>"
    + badge
    + '<div class="pgy-actions">'
    + '<button class="mini" data-action="edit-piggy" data-id="' + esc(b.id)
    + '">Edit</button>'
    + middleAction
    + '<span class="spacer"></span>'
    + '<button class="mini danger" data-action="remove-piggy" data-id="'
    + esc(b.id) + '">Delete</button></div></div>';
}

// Create / edit a piggy bank. The target amount drives a few "ready in N
// months" plans; picking one fills in the monthly set-aside, or type a custom.
function piggyModal(bank) {
  openModal((modal) => {
    const editing = !!bank;
    const cur = "ILS";
    const sym = SYMBOLS.ILS;
    let emoji = bank ? bank.emoji : "🐷";
    let planSel = "custom"; // a PIGGY_PLANS month count, or "custom"
    let kind = bank && bank.kind === "lump" ? "lump" : "monthly";

    const emojiRow = PIGGY_EMOJI.map((e) =>
      '<button type="button" class="pgy-em' + (e === emoji ? " on" : "")
      + '" data-emoji="' + esc(e) + '">' + e + "</button>").join("");

    // Kind picker — "Monthly" vs "Set aside once". A lump piggy reserves the
    // full target in one shot, no monthly draw; held until the user marks it
    // used. Perfect for things like a tax bill or a deposit.
    const kindRow = '<div class="seg pgy-kind" id="pgy-kind">'
      + '<button type="button" data-kind="monthly"'
      + (kind === "monthly" ? ' class="on"' : "")
      + '><span class="pgy-kind-t">Monthly</span>'
      + '<span class="pgy-kind-s">save each month</span></button>'
      + '<button type="button" data-kind="lump"'
      + (kind === "lump" ? ' class="on"' : "")
      + '><span class="pgy-kind-t">Set aside once</span>'
      + '<span class="pgy-kind-s">reserve a lump sum</span></button>'
      + "</div>";

    modal.innerHTML = "<h2>" + (editing ? "Edit piggy bank" : "New piggy bank")
      + "</h2><p class=\"hint\">What are you saving up for? Either grow it a "
      + "little each month, or reserve a lump sum now for an upcoming bill.</p>"
      + '<label class="fld-lbl">Type</label>' + kindRow
      + '<label class="fld-lbl">Icon</label>'
      + '<div class="pgy-em-row">' + emojiRow + "</div>"
      + '<label class="fld-lbl">Name</label>'
      + '<input id="pgy-name" type="text" maxlength="40" '
      + 'placeholder="New camera, summer trip…" value="'
      + esc(bank ? bank.name : "") + '">'
      + '<label class="fld-lbl" style="margin-top:13px" id="pgy-target-lbl">Goal amount</label>'
      + '<div class="pgy-amt"><span>' + sym + '</span>'
      + '<input id="pgy-target" type="number" min="0" step="50" placeholder="0" '
      + 'value="' + (bank ? bank.targetAmount : "") + '"></div>'
      + '<div id="pgy-monthly-section">'
      + '<label class="fld-lbl">Monthly set-aside</label>'
      + '<div id="pgy-plans"></div>'
      + '<div class="pgy-custom"><span>' + sym + '</span>'
      + '<input id="pgy-monthly" type="number" min="0" step="10" '
      + 'placeholder="Custom amount" value="'
      + (bank && bank.kind !== "lump" ? bank.monthlyAmount : "") + '"></div>'
      + '<div id="pgy-eta" class="pgy-modal-eta" hidden></div></div>'
      + '<div id="pgy-lump-note" class="pgy-modal-eta" hidden>'
      + 'The full amount is reserved the first month it fits your budget, '
      + 'then held until you mark it used.</div>'
      + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
      + '<button class="primary" data-x="save">'
      + (editing ? "Save changes" : "Create piggy bank") + "</button></div>";

    const targetInp = modal.querySelector("#pgy-target");
    const monthlyInp = modal.querySelector("#pgy-monthly");
    const plansEl = modal.querySelector("#pgy-plans");
    const etaEl = modal.querySelector("#pgy-eta");
    const monthlySection = modal.querySelector("#pgy-monthly-section");
    const lumpNote = modal.querySelector("#pgy-lump-note");
    const targetLbl = modal.querySelector("#pgy-target-lbl");
    const kindRowEl = modal.querySelector("#pgy-kind");

    // Toggle which fields are visible based on the chosen kind. A lump piggy
    // hides the monthly section entirely (it doesn't recur), and renames the
    // goal label so the user knows it's the one-time reservation amount.
    function applyKind() {
      const lump = kind === "lump";
      monthlySection.hidden = lump;
      lumpNote.hidden = !lump;
      targetLbl.textContent = lump ? "Amount to set aside" : "Goal amount";
    }
    applyKind();
    kindRowEl.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-kind]");
      if (!btn) return;
      kind = btn.dataset.kind === "lump" ? "lump" : "monthly";
      kindRowEl.querySelectorAll("button")
        .forEach((x) => x.classList.toggle("on", x === btn));
      applyKind();
    });

    // The suggested monthly amount to clear `target` in `months`, rounded up
    // to a tidy multiple of 10.
    function presetFor(months) {
      const t = Number(targetInp.value);
      if (!Number.isFinite(t) || t <= 0) return null;
      return Math.max(10, Math.ceil(t / months / 10) * 10);
    }
    function refreshEta() {
      const t = Number(targetInp.value);
      const mo = Number(monthlyInp.value);
      if (t > 0 && mo > 0) {
        const months = Math.ceil(t / mo);
        etaEl.textContent = "At " + money(mo, cur) + " a month you'll reach "
          + money(t, cur) + " in about " + months
          + (months === 1 ? " month." : " months.");
        etaEl.hidden = false;
      } else {
        etaEl.hidden = true;
      }
    }
    function refreshPlans() {
      const t = Number(targetInp.value);
      if (!Number.isFinite(t) || t <= 0) {
        plansEl.innerHTML = '<div class="pgy-plan-hint">'
          + "Enter a goal amount to see monthly options.</div>";
      } else {
        plansEl.innerHTML = PIGGY_PLANS.map((m) => {
          return '<button type="button" class="pgy-plan'
            + (planSel === m ? " on" : "") + '" data-plan="' + m + '">'
            + '<span class="pgy-plan-amt">' + money(presetFor(m), cur) + "</span>"
            + '<span class="pgy-plan-sub">a month · ready in ' + m
            + " months</span></button>";
        }).join("");
      }
      refreshEta();
    }
    refreshPlans();

    targetInp.addEventListener("input", () => {
      // The presets follow the goal; if one was picked, keep its amount in step.
      if (typeof planSel === "number") {
        const pm = presetFor(planSel);
        if (pm != null) monthlyInp.value = pm;
      }
      refreshPlans();
    });
    monthlyInp.addEventListener("input", () => {
      planSel = "custom";
      plansEl.querySelectorAll(".pgy-plan.on")
        .forEach((x) => x.classList.remove("on"));
      refreshEta();
    });
    modal.querySelector(".pgy-em-row").addEventListener("click", (e) => {
      const btn = e.target.closest("[data-emoji]");
      if (!btn) return;
      emoji = btn.dataset.emoji;
      modal.querySelectorAll(".pgy-em")
        .forEach((x) => x.classList.toggle("on", x === btn));
    });
    plansEl.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-plan]");
      if (!btn) return;
      planSel = Number(btn.dataset.plan);
      const pm = presetFor(planSel);
      if (pm != null) monthlyInp.value = pm;
      plansEl.querySelectorAll(".pgy-plan")
        .forEach((x) => x.classList.toggle("on", x === btn));
      refreshEta();
    });

    modal.querySelector('[data-x="cancel"]').addEventListener("click", closeOverlay);
    modal.querySelector('[data-x="save"]').addEventListener("click", async () => {
      const name = modal.querySelector("#pgy-name").value.trim();
      const target = Number(targetInp.value);
      const monthly = Number(monthlyInp.value);
      if (!name) return toast("Give your piggy bank a name.", true);
      if (!(target > 0)) {
        return toast(kind === "lump"
          ? "Enter the amount to set aside." : "Enter a goal amount.", true);
      }
      if (kind !== "lump" && !(monthly > 0)) {
        return toast("Choose a monthly set-aside.", true);
      }
      const body = { name: name, emoji: emoji, kind: kind,
        targetAmount: target,
        monthlyAmount: kind === "lump" ? target : monthly };
      try {
        if (editing) await api("/piggy/" + bank.id, "PUT", body);
        else await api("/piggy", "POST", body);
        closeOverlay();
        state.budget = await api(budgetUrl());
        render();
        toast(editing ? "Piggy bank updated." : "Piggy bank created — happy saving!");
      } catch (e) {
        if (e instanceof VaultLocked) { closeOverlay(); return showGate(); }
        toast(e.message, true);
      }
    });
  });
}

// Manually pause or resume a piggy bank. On hold it gets no monthly set-aside
// and stops counting against the budget, whatever the headroom.
async function togglePiggyHold(id) {
  const bank = (((state.budget || {}).piggy || {}).banks || [])
    .find((b) => b.id === id);
  if (!bank) return;
  const onHold = !bank.onHold;
  try {
    await api("/piggy/" + id, "PUT", { onHold: onHold });
    state.budget = await api(budgetUrl());
    render();
    toast(onHold
      ? '"' + bank.name + '" is on hold — no set-aside until you resume it.'
      : '"' + bank.name + '" resumed — back to saving each month.');
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast(e.message, true);
  }
}

// Marks a lump-sum piggy bank as actually used (the reserved money has been
// paid out — taxes filed, deposit made, whatever). Removes it so it stops
// reading as an active reservation; the funded ledger entry stays, so past
// budgets still reflect the month the lump sum was set aside.
async function markPiggyUsed(id) {
  const bank = (((state.budget || {}).piggy || {}).banks || [])
    .find((b) => b.id === id);
  const label = bank ? '"' + bank.name + '"' : "this set-aside";
  if (!confirm("Mark " + label + " as used? It will be removed from your "
      + "list of active reservations.")) return;
  try {
    await api("/piggy/" + id, "DELETE");
    state.budget = await api(budgetUrl());
    render();
    toast("Marked as used.");
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast(e.message, true);
  }
}

async function removePiggy(id) {
  const bank = (((state.budget || {}).piggy || {}).banks || [])
    .find((b) => b.id === id);
  const label = bank ? '"' + bank.name + '"' : "this piggy bank";
  if (!confirm("Delete " + label + "? Its saved progress will be lost."))
    return;
  try {
    await api("/piggy/" + id, "DELETE");
    state.budget = await api(budgetUrl());
    render();
    toast("Piggy bank deleted.");
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast(e.message, true);
  }
}

/* --- Vouchers ------------------------------------------------------------ */
// Gift cards and prepaid vouchers — Shufersal Tav Hazahav, Pluxee/Sodexo,
// Cibus, employer gifts. Currently manual entry only; a future sync via
// the Shufersal portal will upsert into the same table without affecting
// rows the user typed in by hand.

// Lightweight catalogue of common Israeli voucher providers. Picking one
// pre-fills the provider field; "Other" lets the user type a custom label.
const VOUCHER_PROVIDERS = [
  { id: "shufersal", label: "Shufersal — תו הזהב", emoji: "🛒" },
  { id: "pluxee",    label: "Pluxee / Sodexo",     emoji: "🍱" },
  { id: "cibus",     label: "Cibus / 10bis",       emoji: "🍽️" },
  { id: "buyme",     label: "BuyMe",               emoji: "🎁" },
  { id: "behatzlacha", label: "תו הקנייה",          emoji: "🛍️" },
  { id: "other",     label: "Other",                emoji: "🎟️" },
];

function voucherProviderMeta(provider) {
  const text = String(provider || "").toLowerCase();
  for (const p of VOUCHER_PROVIDERS) {
    if (p.id === "other") continue;
    if (text.indexOf(p.id) >= 0 || provider === p.label) return p;
  }
  return VOUCHER_PROVIDERS[VOUCHER_PROVIDERS.length - 1];
}

// Days until expiry, or null when no expiry is set. Used for the
// "expires in N days" badge on each card. Negative = already expired.
function daysUntil(iso) {
  if (!iso) return null;
  const target = new Date(iso + "T00:00:00");
  if (isNaN(target.getTime())) return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((target - today) / (24 * 60 * 60 * 1000));
}

function vouchersView() {
  const vouchers = state.vouchers || [];
  const head = '<div class="pgy-head"><div><h2>Vouchers &amp; gift cards</h2>'
    + '<div class="pgy-sub">תלושים ותוים — Shufersal Tav Hazahav, Pluxee, '
    + "Cibus, employer gifts. Track current balances here; they count toward "
    + 'your net worth.</div></div><span class="spacer"></span>'
    + '<button class="primary" data-action="add-voucher">+ Add voucher</button>'
    + "</div>";

  if (!vouchers.length) {
    return head + '<div class="blank"><div class="be">🎟️</div>'
      + "<h2>No vouchers yet</h2>"
      + "<p>Sync directly from a provider — Shufersal Tav Hazahav, BuyMe and "
      + "more — or add one by hand. Either way, Hon folds it into your net "
      + "worth and reminds you when it's about to expire.</p>"
      + '<button class="primary" data-action="add-voucher">+ Add your first voucher</button></div>';
  }

  // A small per-currency total strip up top so the user can see at a glance
  // how much voucher value they're carrying. Excluded vouchers don't count
  // (matches the net-worth roll-up on the backend).
  const totals = {};
  for (const v of vouchers) {
    if (v.excluded) continue;
    totals[v.currency] = (totals[v.currency] || 0) + (Number(v.balance) || 0);
  }
  const totalStrip = Object.keys(totals).length
    ? '<div class="pgy-headroom"><span>🎟️</span><span>'
      + "Total balance: "
      + Object.keys(totals).sort().map((cur) =>
          '<b>' + money(totals[cur], cur) + '</b>'
        ).join(" · ")
      + "</span></div>"
    : "";

  return head + totalStrip + '<div class="pgy-grid">'
    + vouchers.map(voucherCard).join("") + "</div>";
}

// "BUYME ALL - מגוון אדיר במתנה אחת" → { title: "BUYME ALL",
//                                          description: "מגוון אדיר במתנה אחת" }
// Voucher providers (BuyMe especially) ship long titles like
// "<brand> - <marketing description>". Splitting on the " - " separator
// gives a short headline + a smaller subtitle, so the card doesn't
// truncate mid-Hebrew-word.
function splitVoucherTitle(name) {
  const s = String(name || "");
  const idx = s.indexOf(" - ");
  if (idx > 0 && idx < s.length - 3) {
    return { title: s.slice(0, idx).trim(), description: s.slice(idx + 3).trim() };
  }
  return { title: s, description: "" };
}

function voucherCard(v) {
  const meta = voucherProviderMeta(v.provider);
  const cur = v.currency || "ILS";
  const days = daysUntil(v.expiresOn);
  const split = splitVoucherTitle(v.name);

  let expiryBadge = "";
  if (days != null) {
    if (days < 0) {
      expiryBadge = '<div class="pgy-badge skipped"><span>⌛</span><span>'
        + "Expired " + Math.abs(days) + (Math.abs(days) === 1 ? " day" : " days")
        + " ago</span></div>";
    } else if (days <= 30) {
      expiryBadge = '<div class="pgy-badge skipped"><span>⌛</span><span>'
        + "Expires in " + days + (days === 1 ? " day" : " days")
        + " (" + v.expiresOn + ")</span></div>";
    } else {
      expiryBadge = '<div class="pgy-badge funded"><span>📅</span><span>'
        + "Expires " + v.expiresOn + "</span></div>";
    }
  }

  const notesLine = v.notes
    ? '<div class="pgy-eta">' + esc(v.notes) + "</div>"
    : "";
  const excludedTag = v.excluded
    ? ' <span class="pgy-tag">excluded</span>' : "";

  // Subtitle line: provider + optional description, joined with " · ".
  // BuyMe gifts like "BUYME ALL - מגוון אדיר במתנה אחת" surface as
  // headline "BUYME ALL" with subtitle "BuyMe · מגוון אדיר במתנה אחת",
  // which fits a single line and respects RTL flow.
  const subtitle = split.description
    ? esc(v.provider) + ' <span class="vc-sep">·</span> '
      + '<span class="vc-desc">' + esc(split.description) + "</span>"
    : esc(v.provider);

  return '<div class="pgy-card' + (v.excluded ? " onhold" : "") + '">'
    + '<div class="pgy-card-top"><div class="pgy-emoji">' + meta.emoji
    + '</div><div style="flex:1;min-width:0"><div class="pgy-name vc-name">'
    + esc(split.title) + excludedTag + "</div>"
    + '<div class="pgy-monthly vc-sub">' + subtitle + "</div></div></div>"
    + '<div class="pgy-body">'
    + '<div class="pgy-figs"><div class="pgy-saved">'
    + money(v.balance, cur) + "</div>"
    + '<div class="pgy-target">current balance</div>'
    + notesLine + "</div></div>"
    + expiryBadge
    + '<div class="pgy-actions">'
    + '<button class="mini" data-action="edit-voucher" data-id="' + esc(v.id)
    + '">Edit</button>'
    + '<button class="mini" data-action="toggle-voucher-excluded" data-id="'
    + esc(v.id) + '">'
    + (v.excluded ? "Include in net worth" : "Exclude from net worth")
    + "</button>"
    + '<span class="spacer"></span>'
    + '<button class="mini danger" data-action="remove-voucher" data-id="'
    + esc(v.id) + '">Delete</button></div></div>';
}

function voucherModal(voucher) {
  const editing = !!voucher;
  openModal((modal) => {
    const initial = voucher || {
      name: "", provider: "", balance: 0, currency: "ILS",
      expiresOn: "", notes: "",
    };
    const providerOptions = VOUCHER_PROVIDERS.map((p) =>
      '<button type="button" class="pgy-em" data-provider="' + esc(p.label)
      + '" title="' + esc(p.label) + '">' + p.emoji + "</button>").join("");

    modal.innerHTML = "<h2>" + (editing ? "Edit voucher" : "New voucher") + "</h2>"
      + '<div class="field"><label>Provider</label>'
      + '<div class="pgy-em-row" id="vc-providers">' + providerOptions + "</div>"
      + '<input id="vc-provider" type="text" placeholder="e.g. Shufersal — תו הזהב" '
      + 'value="' + esc(initial.provider || "") + '"></div>'
      + '<div class="field"><label>Card name / alias</label>'
      + '<input id="vc-name" type="text" placeholder="e.g. Tav Hazahav (work gift)" '
      + 'value="' + esc(initial.name || "") + '"></div>'
      + '<div class="field row"><div style="flex:2"><label>Balance</label>'
      + '<input id="vc-balance" type="number" step="0.01" min="0" value="'
      + Number(initial.balance || 0) + '"></div>'
      + '<div style="flex:1"><label>Currency</label>'
      + '<input id="vc-currency" type="text" value="' + esc(initial.currency || "ILS")
      + '" maxlength="3" style="text-transform:uppercase"></div></div>'
      + '<div class="field"><label>Expires on <span class="hint">(optional)</span></label>'
      + '<input id="vc-expires" type="date" value="' + esc(initial.expiresOn || "") + '"></div>'
      + '<div class="field"><label>Notes <span class="hint">(optional)</span></label>'
      + '<input id="vc-notes" type="text" placeholder="card number, source, anything" value="'
      + esc(initial.notes || "") + '"></div>'
      + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
      + '<button class="primary" id="vc-save">'
      + (editing ? "Save changes" : "Add voucher") + "</button></div>";

    // Picking a provider chip fills the provider text field; clearing the
    // field re-arms manual entry.
    modal.querySelectorAll("[data-provider]").forEach((btn) => {
      btn.addEventListener("click", () => {
        modal.querySelector("#vc-provider").value = btn.dataset.provider;
        modal.querySelectorAll("[data-provider]").forEach((b) => b.classList.remove("on"));
        btn.classList.add("on");
        // Default the card name to the provider label when adding new and
        // the user hasn't typed one yet — saves a step for the common case.
        const nameInput = modal.querySelector("#vc-name");
        if (!editing && !nameInput.value.trim()) nameInput.value = btn.dataset.provider;
      });
    });

    modal.querySelector('[data-x="cancel"]').addEventListener("click", closeOverlay);
    modal.querySelector("#vc-save").addEventListener("click", async () => {
      const name = modal.querySelector("#vc-name").value.trim();
      const provider = modal.querySelector("#vc-provider").value.trim();
      const balanceRaw = modal.querySelector("#vc-balance").value;
      const balance = Number(balanceRaw);
      const currency = (modal.querySelector("#vc-currency").value || "ILS")
        .toUpperCase().slice(0, 3);
      const expiresOn = modal.querySelector("#vc-expires").value || null;
      const notes = modal.querySelector("#vc-notes").value.trim() || null;

      if (!name) { toast("Give the voucher a name first.", true); return; }
      if (!provider) { toast("Pick or type a provider.", true); return; }
      if (!Number.isFinite(balance)) { toast("Balance must be a number.", true); return; }

      try {
        if (editing) {
          await api("/vouchers/" + voucher.id, "PATCH", {
            name, provider, balance, currency, expiresOn, notes,
          });
        } else {
          await api("/vouchers", "POST", {
            name, provider, balance, currency, expiresOn, notes,
          });
        }
        const fresh = await api("/vouchers").catch(() => ({ vouchers: state.vouchers }));
        state.vouchers = fresh.vouchers || [];
        try { state.summary = (await api("/summary")).summary; } catch (e) {}
        closeOverlay();
        render();
        toast(editing ? "Voucher updated." : "Voucher added.");
      } catch (e) {
        if (e instanceof VaultLocked) return showGate();
        toast((e && e.message) || "Could not save the voucher.", true);
      }
    });
  });
}

async function removeVoucher(id) {
  const v = (state.vouchers || []).find((x) => x.id === id);
  const label = v ? '"' + v.name + '"' : "this voucher";
  if (!confirm("Delete " + label + "?")) return;
  try {
    await api("/vouchers/" + id, "DELETE");
    state.vouchers = (state.vouchers || []).filter((x) => x.id !== id);
    try { state.summary = (await api("/summary")).summary; } catch (e) {}
    render();
    toast("Voucher deleted.");
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast((e && e.message) || "Could not delete the voucher.", true);
  }
}

async function toggleVoucherExcluded(id) {
  const v = (state.vouchers || []).find((x) => x.id === id);
  if (!v) return;
  try {
    await api("/vouchers/" + id, "PATCH", { excluded: !v.excluded });
    v.excluded = !v.excluded;
    try { state.summary = (await api("/summary")).summary; } catch (e) {}
    render();
  } catch (e) {
    if (e instanceof VaultLocked) return showGate();
    toast((e && e.message) || "Could not update the voucher.", true);
  }
}

// Walks the user through the Shufersal Tav Hazahav 2-step sync: enter
// phone → backend triggers the SMS → enter OTP → backend completes the
// scrape and upserts the cards. State machine lives in the modal: the
// same modal element rewrites its body as we progress.
function shufersalSyncModal() {
  openModal(async (modal) => {
    let syncId = null;
    let pollTimer = null;
    const stopPolling = () => { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } };
    const cleanup = () => { stopPolling(); };

    // Try to pre-fill the phone from the vault for the common re-sync case.
    let savedPhone = "";
    try {
      const r = await api("/vouchers/sync/shufersal/saved-phone");
      savedPhone = r && r.phone || "";
    } catch (e) { /* fine */ }

    const showPhoneStep = () => {
      modal.innerHTML = "<h2>Sync from Shufersal</h2>"
        + '<p class="hint">Hon will sign in to '
        + "<b>giftcard.shufersal.co.il</b> and pull your active Tav Hazahav / "
        + "GiftCard balances. You'll get an SMS with a 6-digit code.</p>"
        + '<div class="field"><label>Mobile number</label>'
        + '<input id="sh-phone" type="tel" inputmode="numeric" '
        + 'placeholder="0501234567" maxlength="13" '
        + 'value="' + esc(savedPhone) + '"></div>'
        + '<div class="field"><label class="inline">'
        + '<input id="sh-remember" type="checkbox"'
        + (savedPhone ? ' checked' : '') + ' /> '
        + "Remember this number for next sync</label></div>"
        + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
        + '<button class="primary" id="sh-send">Send code</button></div>';
      const phoneInput = modal.querySelector("#sh-phone");
      phoneInput.focus();
      modal.querySelector('[data-x="cancel"]').addEventListener("click", () => { cleanup(); closeOverlay(); });
      modal.querySelector("#sh-send").addEventListener("click", () => sendCode());

      const sendCode = async () => {
        const phone = phoneInput.value.replace(/\D/g, "");
        if (!/^05\d{8}$/.test(phone)) {
          toast("Enter a 10-digit Israeli mobile (e.g. 0501234567).", true);
          return;
        }
        const remember = modal.querySelector("#sh-remember").checked;
        modal.querySelector("#sh-send").disabled = true;
        modal.querySelector("#sh-send").textContent = "Sending…";
        try {
          const r = await api("/vouchers/sync/shufersal/start", "POST", { phone, remember });
          syncId = r.syncId;
          // Show the "signing in" step and poll backend status. We only
          // switch to the OTP input once the scrape actually reaches the
          // OTP screen on Shufersal (status='awaiting-otp').
          showSigningInStep();
        } catch (e) {
          modal.querySelector("#sh-send").disabled = false;
          modal.querySelector("#sh-send").textContent = "Send code";
          toast((e && e.message) || "Could not start the sync.", true);
        }
      };
    };

    // Intermediate step: shows a spinner while puppeteer signs in on
    // Shufersal. Polls backend status and routes to OTP / success / error.
    const showSigningInStep = () => {
      modal.innerHTML = "<h2>Signing in…</h2>"
        + '<p class="hint" id="sh-status">Opening Shufersal and requesting your '
        + 'code. This usually takes 10–20 seconds.</p>'
        + '<div class="modal-actions"><button data-x="cancel">Cancel</button></div>';
      modal.querySelector('[data-x="cancel"]').addEventListener("click", async () => {
        cleanup();
        try { await api("/vouchers/sync/shufersal/cancel", "POST", { syncId }); } catch (e) {}
        closeOverlay();
      });

      const status = modal.querySelector("#sh-status");
      pollTimer = setInterval(async () => {
        try {
          const s = await api("/vouchers/sync/shufersal/status/" + syncId);
          if (s.message) status.textContent = s.message;
          if (s.status === "awaiting-otp") {
            stopPolling();
            showOtpStep();
          } else if (s.finished) {
            stopPolling();
            handleFinish(s);
          }
        } catch (e) { /* keep polling */ }
      }, 1200);
    };

    const handleFinish = async (s) => {
      if (s.status === "success") {
        const fresh = await api("/vouchers").catch(() => ({ vouchers: state.vouchers }));
        state.vouchers = fresh.vouchers || [];
        try { state.summary = (await api("/summary")).summary; } catch (e) {}
        render();
        const n = (s.vouchers || []).length;
        toast("Shufersal: synced " + n + " card" + (n === 1 ? "" : "s") + ".");
        closeOverlay();
      } else {
        toast(s.error || "Sync failed.", true);
        // Rewrite the modal into an error view so the user can see what
        // went wrong without flipping to a toast that disappears.
        modal.innerHTML = "<h2>Sync didn't complete</h2>"
          + '<p class="hint">' + esc(s.error || "Unknown error.") + "</p>"
          + '<div class="modal-actions">'
          + '<button data-x="close">Close</button>'
          + '<button class="primary" id="sh-retry">Try again</button></div>';
        modal.querySelector('[data-x="close"]').addEventListener("click", closeOverlay);
        modal.querySelector("#sh-retry").addEventListener("click", () => {
          syncId = null;
          showPhoneStep();
        });
      }
    };

    const showOtpStep = () => {
      modal.innerHTML = "<h2>Enter the code</h2>"
        + '<p class="hint">Shufersal just sent a 6-digit code to your phone. '
        + 'Enter it below; Hon will sign in and pull your card balances.</p>'
        + '<div class="field"><label>SMS code</label>'
        + '<input id="sh-code" type="text" inputmode="numeric" '
        + 'placeholder="6-digit code" maxlength="8" autocomplete="one-time-code"></div>'
        + '<div class="hint" id="sh-status">Waiting for the code…</div>'
        + '<div class="modal-actions"><button data-x="cancel">Cancel</button>'
        + '<button class="primary" id="sh-verify">Verify</button></div>';
      const codeInput = modal.querySelector("#sh-code");
      const status = modal.querySelector("#sh-status");
      codeInput.focus();

      // Backend polling: surfaces "syncing…" / "success" / "error" once OTP
      // is submitted so the user sees progress (the scrape can take 10-20s
      // while puppeteer loads the dashboard). Once the run finishes we hand
      // off to the same handleFinish path the signing-in step uses.
      pollTimer = setInterval(async () => {
        try {
          const s = await api("/vouchers/sync/shufersal/status/" + syncId);
          if (s.message) status.textContent = s.message;
          if (s.finished) {
            stopPolling();
            handleFinish(s);
          }
        } catch (e) { /* keep polling */ }
      }, 1200);

      modal.querySelector('[data-x="cancel"]').addEventListener("click", async () => {
        cleanup();
        try { await api("/vouchers/sync/shufersal/cancel", "POST", { syncId }); } catch (e) {}
        closeOverlay();
      });
      modal.querySelector("#sh-verify").addEventListener("click", () => verify());
      codeInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") verify();
      });

      const verify = async () => {
        const code = codeInput.value.replace(/\D/g, "");
        if (code.length < 4) { toast("Enter the full code.", true); return; }
        modal.querySelector("#sh-verify").disabled = true;
        modal.querySelector("#sh-verify").textContent = "Verifying…";
        status.textContent = "Verifying with Shufersal…";
        try {
          await api("/vouchers/sync/shufersal/otp", "POST", { syncId, code });
        } catch (e) {
          modal.querySelector("#sh-verify").disabled = false;
          modal.querySelector("#sh-verify").textContent = "Verify";
          toast((e && e.message) || "Could not submit the code.", true);
        }
      };
    };

    showPhoneStep();
  });
}

/* --- Sidebar ------------------------------------------------------------- */

function renderSidebar() {
  // The sidebar only hosts the move-transaction panel now; it slides away
  // (collapsing the shell) whenever nothing is being moved.
  const sig = JSON.stringify(state.move);
  if (sig === state._sidebarSig) return;
  state._sidebarSig = sig;
  const shell = document.getElementById("shell");
  if (state.move) {
    document.getElementById("sidebar").innerHTML = movePanel();
    shell.classList.remove("collapsed");
  } else {
    document.getElementById("sidebar").innerHTML = "";
    shell.classList.add("collapsed");
  }
}

function movePanel() {
  const txn = state.transactions.find((t) => t.id === state.move.txnId);
  if (!txn) { state.move = null; return ""; }
  const [em, color] = catStyle(txn.category || "Other");
  const header = '<div class="card move-card"><div class="card-head">'
    + '<div class="label">Transaction</div>'
    + '<span class="spacer"></span>'
    + '<button class="icon-btn mini" data-x="move-cancel">✕</button></div>'
    + '<div class="move-txn"><span class="txn-icon" style="background:' + color
    + '26;color:' + color + '">' + em + "</span>"
    + '<div class="txn-main"><div class="txn-name">' + esc(txn.description) + "</div>"
    + '<div class="txn-sub">' + money(txn.amount, txn.currency, true) + " · "
    + fmtDate(txn.date) + "</div></div></div>";

  // Refund-picker mode: choose the transaction that reimburses this expense.
  // One refund may now cover parts of several expenses, so the filter is
  // "any incoming transaction with unallocated balance" rather than the
  // old "only refunds linked to nothing else".
  if (state.move.linkMode) {
    const picks = state.transactions
      .filter((t) => {
        if (t.id === txn.id || t.amount <= 0) return false;
        const existing = transactionLinkFor(txn.id, t.id);
        return refundRemaining(t.id) > 0 || existing;
      })
      .slice(0, 80);
    const list = picks.length
      ? picks.map((t) => {
          const [ce, cc] = catStyle(t.category || "Income");
          const remaining = refundRemaining(t.id);
          const existing = transactionLinkFor(txn.id, t.id);
          const total = Math.abs(t.amount);
          const tag = existing
            ? '<div class="rf-opt-tag on">' + money(existing.amount, t.currency)
              + " linked</div>"
            : (remaining < total
                ? '<div class="rf-opt-tag">' + money(remaining, t.currency)
                  + " left of " + money(total, t.currency) + "</div>"
                : "");
          return '<button class="rf-opt" data-pick-refund="' + esc(t.id) + '">'
            + '<span class="txn-icon sm" style="background:' + cc + '26;color:' + cc
            + '">' + ce + "</span>"
            + '<div class="txn-main"><div class="txn-name">' + esc(t.description)
            + '</div><div class="txn-sub">' + fmtDate(t.date) + "</div></div>"
            + '<div class="rf-opt-end"><div class="txn-amt pos">'
            + money(t.amount, t.currency, true) + "</div>" + tag + "</div></button>";
        }).join("")
      : '<div class="empty">No incoming transactions with unallocated balance.</div>';
    return header
      + '<button class="back-btn" data-x="link-back">‹ Back</button>'
      + '<div class="rf-hint">Pick the transaction that paid you back — Hon '
      + "deducts whatever portion you allocate from this expense. One transfer "
      + "can split across several expenses.</div>"
      + '<div class="rf-list">' + list + "</div></div>";
  }

  const cats = categoryNames().map((cat) => {
    const [ce] = catStyle(cat);
    const on = cat === state.move.picked;
    return '<button class="move-cat' + (on ? " active" : "") + '" data-move-cat="'
      + esc(cat) + '" style="color:' + catStyle(cat)[1] + '">'
      + '<span class="mc-em">' + ce + "</span>"
      + '<span style="color:var(--text);font-weight:inherit">' + esc(cat) + "</span>"
      + '<span class="mc-check">✓</span></button>';
  }).join("");

  let refund;
  const r = state.move.refundId
    && state.transactions.find((t) => t.id === state.move.refundId);
  if (r) {
    // Default the input to: the existing link's amount, the refund's unused
    // balance, or whichever is smaller relative to the expense magnitude —
    // so the common single-refund-single-expense case still works in one
    // click while partial allocations are now possible.
    const existing = transactionLinkFor(txn.id, r.id);
    const expenseMag = Math.abs(txn.amount);
    const refundMag = Math.abs(r.amount);
    const otherUsed = refundMag - refundRemaining(r.id) - (existing?.amount || 0);
    const freeOnRefund = Math.max(0, refundMag - otherUsed);
    const defaultAmt = state.move.linkAmount != null
      ? state.move.linkAmount
      : (existing?.amount ?? Math.min(freeOnRefund, expenseMag));
    const sym = SYMBOLS[(txn.currency || "ILS").toUpperCase()] || "";
    const effective = txn.amount + Number(defaultAmt || 0);
    refund = '<div class="rf-linked"><div class="rf-linked-row">'
      + '<div class="txn-main"><div class="txn-name">' + esc(r.description)
      + '</div><div class="txn-sub">' + money(r.amount, r.currency, true) + " · "
      + fmtDate(r.date) + "</div></div>"
      + '<button class="icon-btn mini" data-x="link-remove">✕</button></div>'
      + '<div class="rf-amount-row">'
      + '<label class="rf-amount-lbl">Allocate</label>'
      + '<div class="rf-amount-input"><span>' + sym + "</span>"
      + '<input type="number" min="0" step="0.01" max="' + freeOnRefund
      + '" value="' + Number(defaultAmt).toFixed(2)
      + '" id="rf-amount-input" oninput="onLinkAmount(this)">'
      + "</div>"
      + '<span class="rf-amount-cap">of ' + money(freeOnRefund, r.currency)
      + " free</span></div>"
      + '<div class="rf-eff">Effective spend · '
      + money(effective, txn.currency, true) + "</div></div>";
  } else {
    refund = '<button class="block rf-add" data-x="link-add">'
      + "+ Link a refund or reimbursement</button>";
  }

  // Billing frequency — only for recurring-bill categories. Used to show a
  // monthly-equivalent cost (a yearly charge ÷ 12, a bimonthly one ÷ 2).
  const choices = recurrenceChoices(state.move.picked);
  let freqSection = "";
  if (choices) {
    let freq = state.move.frequency;
    if (!choices.some((c) => c[0] === freq)) {
      freq = "monthly";
      state.move.frequency = freq;
    }
    const btns = choices.map((c) =>
      '<button class="freq-opt' + (c[0] === freq ? " active" : "")
      + '" data-freq="' + c[0] + '">' + c[1] + "</button>").join("");
    freqSection = '<div class="label sb-label">Billing frequency</div>'
      + '<div class="freq-pick">' + btns + "</div>";
  }

  // Recurring income — for an incoming transaction, lets a salary be marked so
  // the budget projection anchors its expected income on it.
  let incomeSection = "";
  if (txn.amount > 0 && !txn.refundForId) {
    incomeSection = '<div class="label sb-label">Income</div>'
      + '<label class="set-row" style="padding:2px 0">'
      + '<div class="set-row-main"><div class="set-row-name">Recurring income</div>'
      + '<div class="set-row-sub">Count this as regular salary-type income in '
      + "the budget projection — even before it has repeated enough to be "
      + "detected on its own.</div></div>"
      + setSwitch("move-income", state.move.frequency === "income") + "</label>";
  }

  const refundChanged = (state.move.refundId || null) !== (txn.refundId || null);
  // The Save button also lights up when only the allocation amount changed
  // on an already-picked refund — that's a re-link, not a new link.
  const existingLink = state.move.refundId
    ? transactionLinkFor(state.move.txnId, state.move.refundId)
    : null;
  const amountChanged = !!(state.move.refundId
    && typeof state.move.linkAmount === "number"
    && existingLink
    && Math.abs(existingLink.amount - state.move.linkAmount) > 0.005);
  const canSave = !!state.move.picked || refundChanged || amountChanged;

  // Splitwise — split this transaction, or show its linked expense's status.
  let swSection = "";
  if (state.splitwise.connected) {
    const link = splitwiseLink(txn.id);
    if (link) {
      const paid = link.paidState === "paid";
      const remaining = Math.max(0, link.owedToMe - (link.paidAmount || 0));
      const who = (link.counterparties || []).map((c) => esc(c.name)).join(", ");
      swSection = '<div class="label sb-label">Splitwise</div>'
        + '<div class="rf-linked"><div class="rf-linked-row">'
        + '<div class="txn-main"><div class="txn-name">'
        + (paid ? "Paid back" : money(remaining, link.currency) + " owed to you")
        + '</div><div class="txn-sub">' + (who || "On Splitwise") + "</div></div>"
        + '<button class="icon-btn mini" data-x="sw-unlink" title="Delete from Splitwise">✕</button>'
        + "</div></div>";
    } else {
      swSection = '<div class="label sb-label">Splitwise</div>'
        + '<button class="block rf-add" data-x="sw-split">'
        + "+ Split on Splitwise</button>";
    }
  }

  return header
    + '<div class="label sb-label">Category</div>'
    + '<div class="move-cats">' + cats + "</div>"
    + '<label class="always"><input type="checkbox" id="move-always"'
    + (state.move.always ? " checked" : "") + ">"
